<style>
:root {
  --primary: #1976D2;
  --primary-hover: #1565C0;
  --primary-light: #E3F2FD;
  --primary-lighter: #F0F7FF;
  --accent: #42A5F5;
  --success: #4CAF50;
  --warning: #FF9800;
  --danger: #F44336;
  --bg: #F5F7FA;
  --white: #FFFFFF;
  --border: #E0E0E0;
  --border-light: #F0F0F0;
  --text: #333;
  --text-light: #666;
  --text-lighter: #999;
  --sidebar-w: 230px;
  --sidebar-c: 60px;
  --header-h: 64px;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Malgun Gothic", "맑은 고딕", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar { width: var(--sidebar-w); background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: width .2s; flex-shrink: 0; }
.sidebar.collapsed { width: var(--sidebar-c); }
.sb-head { height: var(--header-h); display: flex; align-items: center; padding: 0 12px; border-bottom: 1px solid var(--border); }
.sb-logo { flex: 1; display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--primary); font-size: 17px; overflow: hidden; white-space: nowrap; }
.sb-toggle { background: none; border: none; cursor: pointer; color: var(--text-light); padding: 6px; font-size: 14px; }
.sb-scroll { flex: 1; overflow-y: auto; padding: 6px 0; }
.sb-section-title { padding: 12px 16px 6px; font-size: 10px; font-weight: 700; color: var(--text-lighter); letter-spacing: 1px; white-space: nowrap; overflow: hidden; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 9px 16px; cursor: pointer; color: var(--text); border-left: 3px solid transparent; white-space: nowrap; overflow: hidden; font-size: 13px; }
.nav-item:hover { background: var(--primary-lighter); }
.nav-item.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
.nav-sub { display: inline-block; margin-left: 6px; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--primary); color: #fff; font-weight: 700; letter-spacing: .3px; vertical-align: middle; }
.nav-wip { display: inline-block; margin-left: 6px; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #fef3c7; color: #92400e; font-weight: 700; vertical-align: middle; }
.nav-wip-item { opacity: .7; }
/* 조직/권한 컴팩트 테이블 */
.org-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.org-table thead th { background: var(--bg); padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-light); border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.org-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.org-table tbody:last-child tr:last-child td { border-bottom: none; }
.org-dept-row td { background: #f0f5fb; font-weight: 700; font-size: 12px; color: var(--primary); padding: 6px 12px; }
.perm-chip { display: inline-block; background: #ede9fe; color: #6d28d9; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; margin: 1px 2px; }
.org-ico-btn { border: 1px solid var(--border); background: var(--white); border-radius: 6px; padding: 3px 7px; font-size: 12px; cursor: pointer; margin-left: 3px; }
.org-ico-btn:hover { background: var(--bg); }
.nav-item.active .nav-sub { background: var(--white); color: var(--primary); }
.nav-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }

.dept-group { border-top: 1px solid var(--border-light); margin-top: 4px; padding-top: 4px; }
.dept-head { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; }
.dept-head:hover { background: var(--bg); }
.dept-caret { font-size: 10px; color: var(--text-lighter); transition: transform .15s; flex-shrink: 0; width: 12px; }
.dept-caret.open { transform: rotate(90deg); }
.dept-tools { background: #FAFAFA; }
.tool-item { display: flex; align-items: center; gap: 10px; padding: 7px 16px 7px 32px; cursor: pointer; color: var(--text); font-size: 12px; white-space: nowrap; overflow: hidden; border-left: 3px solid transparent; }
.tool-item:hover { background: var(--primary-lighter); }
.tool-item.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
.tool-item.pending { color: var(--text-lighter); cursor: default; }
.tool-item.pending:hover { background: transparent; }
.tool-pill { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
.tool-pill.live { background: #E8F5E9; color: #2E7D32; }
.tool-pill.soon { background: #FFF3E0; color: #E65100; }

.sidebar.collapsed .nav-label,
.sidebar.collapsed .sb-logo span:last-child,
.sidebar.collapsed .sb-foot span,
.sidebar.collapsed .sb-section-title,
.sidebar.collapsed .dept-head span:not(.dept-caret),
.sidebar.collapsed .tool-item span:not(.nav-icon),
.sidebar.collapsed .tool-pill { display: none; }
.sidebar.collapsed .sb-logo-img { max-width: 34px; object-fit: cover; object-position: left center; }
.sidebar.collapsed .tool-item { padding: 7px 16px; justify-content: center; }
.sidebar.collapsed .dept-head { justify-content: center; }
.sidebar.collapsed .dept-caret { display: none; }
.sb-foot { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-lighter); white-space: nowrap; overflow: hidden; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header { height: var(--header-h); background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
.h-title { font-size: 17px; font-weight: 600; flex: 1; display: flex; align-items: center; gap: 10px; overflow: hidden; min-width: 0; }
.h-title, .h-title * { white-space: nowrap; }
.h-title > span, .h-title > button { overflow: hidden; text-overflow: ellipsis; }
.h-back-label { display: inline; }
.h-search { flex: 0 1 280px; position: relative; }
.h-search input { width: 100%; padding: 7px 12px 7px 32px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); font-size: 13px; }
.h-search::before { content: "🔍"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; }
.h-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.icon-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; position: relative; }
.icon-btn:hover { background: var(--primary-light); }
.icon-btn .badge { position: absolute; top: 2px; right: 2px; background: var(--danger); color: white; font-size: 10px; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
.user-chip { display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 4px; border-radius: 20px; background: var(--bg); cursor: pointer; font-size: 13px; }
.um-item:hover { background: var(--bg); }
.avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }

.back-btn { background: var(--primary-light); color: var(--primary); border: none; border-radius: 5px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-weight: 600; }
.back-btn:hover { background: var(--primary); color: white; }

.content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.content-pad { padding: 24px; overflow-y: auto; flex: 1; }
.mod-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.mod-title { font-size: 22px; font-weight: 700; }
.mod-sub { color: var(--text-light); font-size: 13px; margin-top: 4px; }

.btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.kpi-label { font-size: 12px; color: var(--text-light); margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 700; color: var(--primary); }
.kpi-trend { font-size: 11px; margin-top: 6px; color: var(--text-light); }
.kpi-trend.up { color: var(--success); }
.kpi-trend.down { color: var(--danger); }

.dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }

.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.cal-nav { display: flex; align-items: center; gap: 10px; }
.cal-month { font-size: 17px; font-weight: 700; min-width: 130px; text-align: center; }
.cal-grid { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--bg); border-bottom: 1px solid var(--border); }
.cal-weekday { padding: 8px; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-light); }
.cal-weekday:first-child { color: var(--danger); }
.cal-weekday:last-child { color: var(--primary); }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(95px, 1fr); }
.cal-day { border-right: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); padding: 6px; cursor: pointer; font-size: 12px; overflow: hidden; }
.cal-day:hover { background: var(--primary-lighter); }
.cal-day.other { color: var(--text-lighter); background: #FAFAFA; }
.cal-day.today { background: var(--primary-light); }
.cal-day.today .cal-date { color: var(--primary); font-weight: 700; }
.cal-date { font-weight: 600; margin-bottom: 4px; }
.cal-event { color: white; padding: 2px 6px; border-radius: 3px; margin-bottom: 2px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-event.blue { background: var(--primary); }
.cal-event.green { background: var(--success); }
.cal-event.orange { background: var(--warning); }
.cal-event.red { background: var(--danger); }

.kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: start; }
.kb-col { background: var(--bg); border-radius: var(--radius); padding: 12px; min-height: 200px; }
.kb-head { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 600; font-size: 13px; }
.kb-count { background: var(--white); border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--text-light); }
.task { background: var(--white); border-radius: 6px; padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--primary); cursor: pointer; }
.task:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.task-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.task-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-light); }
.task.high { border-left-color: var(--danger); }
.task.mid { border-left-color: var(--warning); }
.task.low { border-left-color: var(--success); }

.proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.proj { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; position: relative; transition: all .15s; }
.proj:hover { box-shadow: 0 4px 12px rgba(25, 118, 210, .15); border-color: var(--primary); transform: translateY(-1px); }
.proj-code { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
.proj-name { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.proj-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-light); margin-bottom: 8px; }
.proj-open-hint { position: absolute; top: 12px; right: 12px; font-size: 10px; color: var(--primary); opacity: 0; transition: opacity .15s; }
.proj:hover .proj-open-hint { opacity: 1; }
.bar { height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--primary); transition: width .3s; }

/* 프로젝트 카드 - 미니 간트차트 & 숨김 토글 (v0.6) */
.proj-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
.proj.proj-hidden { opacity: .55; background: #fafafa; }
.proj.proj-hidden .proj-name { text-decoration: line-through; }
.proj-hide-btn { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; border: 1px solid var(--border); background: var(--white); border-radius: 4px; cursor: pointer; font-size: 12px; padding: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; z-index: 2; }
.proj:hover .proj-hide-btn { opacity: 1; }
.proj-hide-btn:hover { background: var(--primary-lighter); border-color: var(--primary); }
.proj.proj-hidden .proj-hide-btn { opacity: 1; }
.proj-edit-btn, .proj-del-btn { position: absolute; top: 10px; width: 24px; height: 24px; border: 1px solid var(--border); background: var(--white); border-radius: 4px; cursor: pointer; font-size: 12px; padding: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; z-index: 2; }
.proj-edit-btn { right: 38px; }
.proj-del-btn { right: 66px; }
.proj:hover .proj-edit-btn, .proj:hover .proj-del-btn { opacity: 1; }
.proj-edit-btn:hover { background: var(--primary-lighter); border-color: var(--primary); }
.proj-del-btn:hover { background: #fef2f2; border-color: #fca5a5; }

.proj-mini-gantt { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
.proj-gantt-months { display: grid; grid-template-columns: repeat(12, 1fr); height: 14px; margin-bottom: 3px; }
.proj-gantt-mcell { font-size: 8px; color: var(--text-lighter); text-align: center; border-left: 1px solid var(--border-light); line-height: 14px; }
.proj-gantt-mcell:first-child { border-left: none; }
.proj-gantt-track { position: relative; height: 38px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.proj-gantt-today { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--danger); opacity: .6; z-index: 3; pointer-events: none; }

/* === 전체 프로젝트 일정 요약 (통합 간트) — v0.6.1 === */
.utl-wrap { margin-top: 22px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
.utl-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.utl-title { font-size: 14px; font-weight: 700; color: var(--text); }
.utl-legend { display: flex; gap: 12px; font-size: 11px; color: var(--text-light); }
.utl-legend span { display: inline-flex; align-items: center; gap: 4px; }
.utl-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
.utl-grid { display: flex; flex-direction: column; gap: 6px; }
.utl-row, .utl-month-row { display: grid; grid-template-columns: 260px 1fr; align-items: center; gap: 10px; }
.utl-row { cursor: pointer; padding: 6px 0; border-radius: 5px; transition: background .12s; }
.utl-row:hover { background: var(--primary-lighter); }
.utl-info { padding: 0 8px; min-width: 0; }
.utl-info-hdr { font-size: 11px; font-weight: 700; color: var(--text-light); letter-spacing: .5px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.utl-code { font-size: 10px; color: var(--primary); font-weight: 700; }
.utl-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.utl-meta { font-size: 10px; color: var(--text-light); margin-top: 1px; }
.utl-track { position: relative; height: 24px; background: var(--bg); border-radius: 4px; overflow: visible; }
.utl-month-hdr { display: grid; grid-template-columns: repeat(12, 1fr); height: 22px; background: transparent; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.utl-mcell { font-size: 10px; color: var(--text-light); text-align: center; line-height: 18px; border-left: 1px solid var(--border-light); }
.utl-mcell:first-child { border-left: none; }
.utl-bar { position: absolute; top: 4px; bottom: 4px; border-radius: 3px; overflow: hidden; min-width: 4px; }
.utl-bar-fill { position: absolute; top: 0; bottom: 0; left: 0; border-radius: 3px; transition: width .3s; }
.utl-bar-label { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 800; color: #0f172a; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 6px; pointer-events: none; letter-spacing: 0.3px; text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff, 0 1px 0 rgba(255,255,255,.9); }
.utl-today { position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--danger); z-index: 5; pointer-events: none; }
.utl-today::before { content: ''; position: absolute; top: -3px; left: -3px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; }

@media (max-width: 900px) {
  .utl-row, .utl-month-row { grid-template-columns: 140px 1fr; }
  .utl-name { font-size: 12px; }
}

/* === 📋 Traveller (제작 공정 관리) - v0.7 === */
.trav-fb { padding: 4px 10px; border: 1px solid var(--border); background: var(--white); border-radius: 4px; font-size: 11px; cursor: pointer; color: var(--text); }
.trav-fb:hover { background: var(--primary-lighter); }
.trav-fb.on { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 600; }
.trav-tbl { width: 100%; border-collapse: collapse; }
.trav-tbl th { padding: 8px 10px; font-size: 11px; font-weight: 700; color: var(--text-light); text-align: left; background: var(--bg); border-bottom: 1px solid var(--border); }
.trav-tbl td { padding: 10px 10px; font-size: 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
.trav-row { cursor: pointer; transition: background .12s; }
.trav-row:hover { background: var(--primary-lighter); }
.trav-bar { height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden; }
.trav-bar-fill { height: 100%; transition: width .3s; }
.pt-pill { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 800; letter-spacing: .3px; }
.ncr-pill { display: inline-block; padding: 2px 7px; background: #fee2e2; color: #dc2626; border-radius: 3px; font-size: 10px; font-weight: 800; }
.trav-phase { margin-bottom: 18px; }
.trav-phase-head { font-size: 13px; font-weight: 700; color: var(--text); padding: 8px 0 10px; border-bottom: 2px solid var(--primary); margin-bottom: 12px; letter-spacing: .3px; }
.trav-stages { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.trav-stage { background: var(--white); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; cursor: pointer; transition: all .15s; position: relative; }
.trav-stage:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px); border-color: var(--primary); }
.trav-stage.passed { border-left: 4px solid var(--success); background: linear-gradient(90deg, #f0fdf4 0%, #fff 8%); }
.trav-stage.rejected { border-left: 4px solid var(--danger); background: linear-gradient(90deg, #fef2f2 0%, #fff 8%); }
.trav-stage.pending { border-left: 4px solid var(--border); }
.trav-stage.current { box-shadow: 0 0 0 2px var(--primary), 0 4px 12px rgba(25,118,210,.15); border-color: var(--primary); }
.trav-stage-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.trav-stage-no { display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; background: var(--primary); color: #fff; border-radius: 50%; font-size: 10px; font-weight: 800; }
.trav-current-tag { margin-left: auto; padding: 2px 7px; background: var(--primary); color: #fff; border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: .3px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
.trav-stage-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
.trav-stage-crit { font-size: 10px; color: var(--text-light); line-height: 1.45; margin-bottom: 8px; min-height: 30px; }
.trav-stage-status { padding: 4px 8px; border-radius: 3px; font-size: 11px; font-weight: 700; text-align: center; }
.trav-sign { margin-top: 8px; padding: 8px 10px; background: var(--bg); border-radius: 4px; font-size: 11px; line-height: 1.6; }
.trav-sign div { display: flex; align-items: center; gap: 4px; }

/* === EPC Control Inline === */
.epc-bar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
.epc-crumb { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
.epc-crumb .sep { color: var(--text-lighter); }
.epc-crumb .pc { font-size: 11px; font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 2px 8px; border-radius: 3px; }
.epc-tabs { display: flex; gap: 4px; }
.epc-tab { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--white); color: var(--text-light); font-size: 12px; cursor: pointer; }
.epc-tab.on { background: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }
.epc-fbar { background: var(--white); border-bottom: 1px solid var(--border-light); padding: 6px 16px; display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.epc-fb { padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--white); color: var(--text-light); font-size: 11px; cursor: pointer; }
.epc-fb.on { background: var(--primary); color: white; border-color: var(--primary); font-weight: 700; }
.epc-cont { flex: 1; overflow: auto; padding: 8px; background: var(--bg); }

.wbs-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: auto; }
.wbs-tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
.wbs-tbl th { background: var(--bg); padding: 8px; font-size: 11px; font-weight: 600; color: var(--text-light); text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
.wbs-tbl td { padding: 6px 8px; font-size: 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
.wbs-tbl tr { cursor: pointer; }
.wbs-tbl tr:hover { background: var(--primary-lighter); }
.wbs-tbl tr.sel { background: var(--primary-light); }
.wbs-code { font-weight: 700; color: var(--primary); font-size: 11px; }
.wbs-lv0 { font-weight: 700; }
.wbs-lv1 { padding-left: 16px; font-size: 11.5px; color: var(--text); }
.wbs-status { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.wbs-status.done { background: #E8F5E9; color: #2E7D32; }
.wbs-status.doing { background: #FFF9C4; color: #B8860B; }
.wbs-status.todo { background: var(--border-light); color: var(--text-light); }
.wbs-status.delay { background: #FFEBEE; color: #C62828; }

.gantt-cell { position: relative; height: 22px; }
.gantt-bar { position: absolute; top: 4px; bottom: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
.gantt-fill { height: 100%; background: var(--success); }
.gantt-label { position: absolute; left: 4px; right: 4px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--text); font-weight: 600; text-align: center; pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-month-hdr { background: var(--bg); font-size: 10px; font-weight: 600; color: var(--text-light); text-align: center; padding: 4px 0; border-right: 1px solid var(--border-light); }
.today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--danger); z-index: 4; pointer-events: none; }

.epc-detail { background: var(--white); border: 1.5px solid #C3D6F0; border-radius: var(--radius); padding: 14px; margin-top: 10px; }
.epc-detail-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.epc-detail-fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
.epc-fld { background: var(--bg); border-radius: 6px; padding: 6px 10px; }
.epc-fld-lbl { font-size: 10px; color: var(--text-lighter); margin-bottom: 2px; }
.epc-fld-val { font-size: 12px; font-weight: 600; color: var(--text); }

/* === ITP Builder Inline === */
.itp-wrap { display: grid; grid-template-columns: 320px 1fr; gap: 12px; height: 100%; }
.itp-side { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; overflow-y: auto; }
.itp-main { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; overflow-y: auto; }
.itp-item-card { padding: 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: all .15s; }
.itp-item-card:hover { border-color: var(--primary); background: var(--primary-lighter); }
.itp-item-card.sel { border-color: var(--primary); background: var(--primary-light); }
.itp-tag { font-weight: 700; color: var(--primary); font-size: 13px; }
.itp-rows { width: 100%; border-collapse: collapse; font-size: 11px; }
.itp-rows th { background: var(--bg); padding: 6px 8px; font-size: 10px; font-weight: 600; color: var(--text-light); text-align: left; border: 1px solid var(--border-light); }
.itp-rows td { padding: 5px 8px; border: 1px solid var(--border-light); vertical-align: top; font-size: 11px; }
.pt-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; border: 1px solid; }
.pt-H { background: #FEF2F2; color: #C0392B; border-color: #F5C6C6; }
.pt-W { background: #FFFBEA; color: #B7791F; border-color: #F6E58D; }
.pt-R { background: #EEF3FB; color: #3A6BB5; border-color: #C3D6F0; }
.pt-S { background: #F5F5F5; color: #6B7280; border-color: #DDD; }

/* === QA Doc Generator Inline === */
.qa-tabs { display: flex; gap: 4px; margin-bottom: 14px; overflow-x: auto; padding: 2px; }
.qa-tab { padding: 8px 14px; font-size: 11px; font-weight: 600; background: var(--white); border: 1.5px solid var(--border); border-radius: 5px; cursor: pointer; white-space: nowrap; color: var(--text-light); }
.qa-tab:hover { color: var(--primary); border-color: var(--primary); }
.qa-tab.on { color: white; background: var(--primary); border-color: var(--primary); }
.qa-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.qa-table th { background: var(--bg); padding: 6px 8px; font-size: 10px; font-weight: 600; color: var(--text-light); border: 1px solid var(--border-light); text-align: left; }
.qa-table td { padding: 5px 8px; border: 1px solid var(--border-light); vertical-align: top; font-size: 11px; }
.qa-form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.qa-form-row label { min-width: 110px; font-size: 11px; color: var(--text-light); font-weight: 600; }
.qa-doc-head { background: var(--bg); padding: 12px 14px; border-radius: 6px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

/* ═══ 로그인 화면 (2단: 좌 소개 + 우 파란 패널) ═══ */
.login-wrap { position:absolute; inset:0; display:grid; grid-template-columns:1fr 480px; background:#fff; }
.login-left { padding:48px 56px; display:flex; flex-direction:column; }
.login-brand { flex-shrink:0; }
.login-logo { display:flex; align-items:center; gap:14px; font-size:30px; font-weight:800; color:var(--primary); white-space:nowrap; }
.login-logo-dot { width:26px; height:18px; border-radius:9px; background:linear-gradient(90deg,#2563eb,#7dd3fc); display:inline-block; }
.login-hero { flex:1; display:flex; flex-direction:column; justify-content:flex-start; padding-top:48px; }
.login-hero h1 { font-size:38px; font-weight:800; color:#1a2b3c; line-height:1.25; letter-spacing:-.5px; }
.login-feat { margin-top:18px; font-size:13px; color:#64748b; line-height:1.7; }
.login-foot { font-size:12px; color:#94a3b8; font-weight:600; }
.login-right { background:linear-gradient(160deg,#3b82f6 0%,#2563eb 100%); display:flex; align-items:center; justify-content:center; padding:40px; }
.login-form { width:100%; max-width:300px; }
.login-form h2 { color:#fff; font-size:22px; font-weight:700; }
.login-sub { color:rgba(255,255,255,.8); font-size:13px; margin:6px 0 26px; }
.login-label { display:block; color:rgba(255,255,255,.9); font-size:12px; font-weight:600; margin-bottom:6px; }
.login-input { width:100%; padding:11px 14px; border:none; border-radius:8px; background:rgba(255,255,255,.16); color:#fff; font-size:14px; margin-bottom:16px; box-sizing:border-box; }
.login-input::placeholder { color:rgba(255,255,255,.6); }
.login-input:focus { outline:2px solid rgba(255,255,255,.5); background:rgba(255,255,255,.22); }
.login-btn { width:100%; padding:12px; border:none; border-radius:8px; background:#fff; color:#2563eb; font-size:14px; font-weight:700; cursor:pointer; transition:.15s; }
.login-btn:hover { background:#f0f6ff; }
.login-quick { margin-top:26px; text-align:center; }
.login-quick-title { font-size:11px; color:rgba(255,255,255,.7); margin-bottom:10px; }
.login-quick-btns { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
.login-quick-btns button { padding:6px 10px; border:1px solid rgba(255,255,255,.4); border-radius:6px; background:rgba(255,255,255,.12); color:#fff; font-size:11px; cursor:pointer; transition:.15s; }
.login-quick-btns button:hover { background:rgba(255,255,255,.25); }
@media(max-width:768px){ .login-wrap{ grid-template-columns:1fr; } .login-left{ display:none; } }

.table { width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); border-collapse: collapse; overflow: hidden; }
.table th, .table td { padding: 11px 14px; text-align: left; border-bottom: 1px solid var(--border-light); font-size: 13px; }
.table th { background: var(--bg); font-weight: 600; font-size: 12px; color: var(--text-light); }
.table tr:hover { background: var(--primary-lighter); }

.b-pill { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.b-pill.green { background: #E8F5E9; color: #2E7D32; }
.b-pill.blue { background: #E3F2FD; color: #1565C0; }
.b-pill.orange { background: #FFF3E0; color: #E65100; }
.b-pill.red { background: #FFEBEE; color: #C62828; }
.b-pill.gray { background: var(--border-light); color: var(--text-light); }

.okr-tree { display: flex; flex-direction: column; gap: 10px; }
.okr { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.okr.dept { margin-left: 28px; border-left: 3px solid var(--primary); }
.okr.person { margin-left: 56px; border-left: 3px solid var(--success); }

.org-grid { display: grid; grid-template-columns: 220px 1fr; gap: 14px; }
.dept-tree-box { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; height: fit-content; }
.dept-item { padding: 7px 8px; cursor: pointer; font-size: 13px; border-radius: 4px; }
.dept-item:hover, .dept-item.active { background: var(--primary-light); color: var(--primary); }
.dept-item.sub { padding-left: 20px; font-size: 12px; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.overlay.active { display: flex; }
.modal { background: var(--white); border-radius: var(--radius); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-body { padding: 18px; }
.modal-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.fg { margin-bottom: 14px; }
.fl { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--text-light); }
.fi { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; box-sizing: border-box; font-family: inherit; }
.fi:focus { outline: none; border-color: var(--primary); }
.fs { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; box-sizing: border-box; font-family: inherit; background: var(--white); }
.fs:focus { outline: none; border-color: var(--primary); }
.fi, .fs, .ft { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; font-family: inherit; }
.ft { min-height: 70px; resize: vertical; }

.empty-soon { padding: 60px 30px; text-align: center; }
.empty-soon h3 { color: var(--primary); margin-bottom: 12px; }
.empty-soon p { color: var(--text-light); line-height: 1.7; }

.hamburger { display: none; }
@media (max-width: 900px) {
  .sidebar { position: fixed; left: -240px; top: 0; bottom: 0; z-index: 100; transition: left .3s; }
  .sidebar.mobile-open { left: 0; }
  .hamburger { display: flex; }
  .h-search { display: none; }
  .user-chip span:not(.avatar) { display: none; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-grid { grid-template-columns: 1fr; }
  .kanban { grid-template-columns: 1fr; }
  .org-grid { grid-template-columns: 1fr; }
  .itp-wrap { grid-template-columns: 1fr; }
  .content-pad { padding: 16px; }
  .cal-days { grid-auto-rows: minmax(70px, 1fr); }
  .h-title { font-size: 14px; gap: 4px; }
  .h-title .h-crumb-mid, .h-title .h-crumb-ver { display: none; }
  .h-title .h-back-label { display: none; }
  .h-title button { padding: 5px 8px !important; font-size: 13px !important; }
}
</style>

// 기본 부여 방식(defaultGrant) 별 판정 로직 + 사람 읽는 설명 (권한 창 렌더링용)
function grantSemantics(grantKey, mod) {
  const dept = mod?.baseDept || '';
  const table = {
    'none':                 { desc: '기본 부여 없음 (개별 지정만)', fn: () => false },
    'all':                  { desc: '전사',                          fn: () => true },
    'dept':                 { desc: `${dept}원`,                     fn: (u) => u.dept === dept },
    'dept-manager':         { desc: `${dept}장 이상`,                fn: (u) => u.dept === dept && (u.grade === 'manager' || u.grade === 'exec') },
    'manager':              { desc: '부서장 이상',                    fn: (u) => u.grade === 'manager' || u.grade === 'exec' },
    'exec':                 { desc: '임원 이상',                      fn: (u) => u.grade === 'exec' },
    'sales-or-exec':        { desc: '영업부 + 임원',                  fn: (u) => u.dept === '영업부' || u.grade === 'exec' },
    'sales-or-exec-or-pm':  { desc: '영업부 + 임원 + 해당 프로젝트 PM 본인', fn: (u, ctx) => u.dept === '영업부' || u.grade === 'exec' || (ctx?.pmId === u.id) },
  };
  return table[grantKey] || table['none'];
}

// 새 세분화 권한 체크 (도구별·액션별) — 슈퍼 무조건 O, 개별 오버라이드 우선, 아니면 기본 부여 판정
function canDo(moduleId, action, user, ctx) {
  user = user || getU(state.currentUser);
  if (!user) return false;
  if (user.grade === 'super') return true;
  const mod = PERM_MODULES[moduleId];
  if (!mod) return false;
  const act = mod.actions[action];
  if (!act) return false;
  const explicit = user.modulePerms && user.modulePerms[moduleId] && user.modulePerms[moduleId][action];
  if (explicit === true) return true;
  if (explicit === false) return false; // 명시적 차단
  return grantSemantics(act.defaultGrant, mod).fn(user, ctx);
}
// 사용자가 특정 추가권한을 가졌는지 (구) — 하위호환용
function hasPerm(perm, u) {
  u = u || getU(state.currentUser);
  if (!u) return false;
  if (u.grade === 'super') return true;
  return Array.isArray(u.extraPerms) && u.extraPerms.includes(perm);
}
// 프로젝트 생성/삭제 · PM 지정 권한: 영업부 + 슈퍼 + 임원 + (개별)project
function canEditProject() {
  const u = getU(state.currentUser);
  if (!u) return false;
  return u.grade === 'super' || u.grade === 'exec' || u.dept === '영업부' || hasPerm('project', u);
}
function canAssignPM() {
  const u = getU(state.currentUser);
  if (!u) return false;
  return u.grade === 'super' || u.dept === '영업부' || hasPerm('project', u);
}
// 특정 프로젝트의 스케줄(WBS·간트) 수정 권한
// → 영업부/슈퍼/임원 + 그 프로젝트의 PM 본인 + (개별)schedule
function canEditSchedule(projId) {
  const u = getU(state.currentUser);
  if (!u) return false;
  if (canEditProject()) return true;            // 전체 관리 권한자
  if (hasPerm('schedule', u)) return true;       // 개별 스케줄 관리 권한
  const p = getP(projId);
  if (p && p.pm === state.currentUser) return true; // 이 프로젝트 PM 본인
  return false;
}

// 부모(index.html)의 save()는 이 키들에 대해 "디스크(=iframe이 마지막으로 쓴 값)"를
// 항상 진실로 받아들이고, 부모 메모리의 (페이지 로드 시점 그대로인) stale 사본으로
// 절대 덮어쓰지 않는다. touchSession(마우스만 움직여도 20초마다 full save) 등
// 부모의 모든 save() 경로가 iframe이 방금 등록한 NCR/CAR를 지워버리던 근본 원인 수정.
const IFRAME_OWNED_KEYS = ['ncrs', 'ncrDeleteReqs', 'cars', 'carDeleteReqs'];
function save() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const disk = JSON.parse(raw);
      IFRAME_OWNED_KEYS.forEach(k => { if (disk[k] !== undefined) state[k] = disk[k]; });
    }
  } catch (e) { /* 디스크 파싱 실패 시엔 기존 동작(전체 저장) 유지 */ }
  localStorage.setItem(KEY, JSON.stringify(state));
}

function savePartial(key, value) {
  try {
    const raw = localStorage.getItem(KEY);
    const disk = raw ? JSON.parse(raw) : {};
    disk[key] = value;
    localStorage.setItem(KEY, JSON.stringify(disk));
  } catch (e) { console.warn('[savePartial]', key, e); }
}

// data/briefings.json (Cowork 아침 메일정리 루틴이 매일 덮어씀) → state.briefings 병합
// 로그인 후 자동 호출. 파일 없거나 오프라인이면 조용히 무시(기존 데이터 유지).
async function loadBriefings() {
  try {
    const res = await fetch('data/briefings.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    if (!data || typeof data !== 'object') return;
    state.briefings = state.briefings || {};
    Object.keys(data).forEach(k => {
      if (k.charAt(0) === '_') return;
      // 이메일 키 → Firebase UID 변환 (@ 포함 시 이메일로 간주)
      if (k.indexOf('@') !== -1) {
        const matched = state.users.find(u => u.email && u.email.toLowerCase() === k.toLowerCase());
        if (matched) { state.briefings[matched.id] = data[k]; return; }
      }
      state.briefings[k] = data[k];
    });
    save();
    console.info('[SJ FLOW] Cowork 브리핑 로드 완료:', Object.keys(state.briefings).length, '명');
    updateNotifBadge();
    if (view.cur === 'dashboard' && state.currentUser) render();
    autoRegisterPendingProjects();
  } catch (e) {
    console.warn('[SJ FLOW] Cowork 브리핑 로드 실패(무시):', e.message);
  }
}
// ══════════ pendingProjects 자동 등록 ══════════
// briefings.json에 pendingProjects 배열이 있으면 Firestore에 프로젝트+WBS 자동 생성
async function autoRegisterPendingProjects() {
  if (!state.currentUser || !window.fb || !fb.db) return;
  const b = state.briefings[state.currentUser];
  if (!b || !Array.isArray(b.pendingProjects) || !b.pendingProjects.length) return;

  const regKey = 'sjflow_registered_v3';
  const registered = JSON.parse(localStorage.getItem(regKey) || '[]');
  const toRegister = b.pendingProjects.filter(p => p.no && !registered.includes(p.no));
  if (!toRegister.length) return;

  let count = 0;
  for (const data of toRegister) {
    const errors = ciValidate(data);
    if (errors.length) { console.warn('[SJ FLOW] pendingProject 검증 실패:', data.no, errors); continue; }
    const scopes = Array.isArray(data.scopes) && data.scopes.length ? data.scopes : ['공정'];
    const _now = new Date(), _6mo = new Date(_now.getTime() + 180*86400000);
    let sd = data.s ? new Date(data.s) : _now;
    let ed = data.e ? new Date(data.e) : (data.s ? new Date(new Date(data.s).getTime() + 180*86400000) : _6mo);
    if (isNaN(sd.getTime())) sd = _now;
    if (isNaN(ed.getTime())) ed = _6mo;
    if (!data.s) data.s = sd.toISOString().slice(0,10);
    if (!data.e) data.e = ed.toISOString().slice(0,10);

    const existing = state.projects.find(p => p.code === data.no);
    const pid = existing ? existing.id : ('p' + Date.now() + '_' + Math.random().toString(36).slice(2, 6));
    const seg = (ed - sd) / scopes.length;
    const rows = scopes.map((sc, i) => {
      const isObj = sc && typeof sc === 'object';
      const nm = isObj ? sc.name : sc;
      const rs = (isObj && sc.s) ? sc.s : new Date(sd.getTime() + seg * i).toISOString().slice(0,10);
      const re = (isObj && sc.e) ? sc.e : new Date(sd.getTime() + seg * (i+1)).toISOString().slice(0,10);
      return { id: `w_${pid}_${i+1}`, code: String(i+1), name: nm, mgr: '',
        s: rs, e: re, status: 'todo', itpLink: null, lv: 0, projId: pid, vendor: '㈜세종기술', memo: '' };
    });
    const items = Array.isArray(data.items) ? data.items.map((it, i) => ({
      id: `i_${pid}_${i}`, tagNo: it.no || ('ITEM-'+(i+1)), name: it.name || '',
      type: '', spec: '', maker: it.vendor || '㈜세종기술', status: '대기', wbsLink: null, qty: it.qty || '', unit: it.unit || '',
    })) : [];
    try {
      if (existing) {
        if (data.s) await fb.setDoc(fb.doc(fb.db, 'projects', pid), { start: data.s, end: data.e }, { merge: true });
        await fb.setDoc(fb.doc(fb.db, 'wbsData', pid), { rows, items, updatedAt: Date.now() });
        console.info('[SJ FLOW] WO WBS 갱신:', data.no, rows.length + '개 대단락');
      } else {
        await fb.setDoc(fb.doc(fb.db, 'projects', pid), {
          code: data.no, name: data.name, client: data.client,
          pm: state.currentUser, start: data.s, end: data.e,
          progress: 0, status: 'active', hidden: false,
          remark: data.remark || '', createdBy: 'Cowork WO 자동등록',
        });
        await fb.setDoc(fb.doc(fb.db, 'wbsData', pid), { rows, items, updatedAt: Date.now() });
        ensureProjectChannel(pid, data.name).catch(() => {});
        console.info('[SJ FLOW] WO 자동등록:', data.no, data.name);
      }
      registered.push(data.no);
      count++;
    } catch (e) { console.error('[SJ FLOW] WO 자동등록 실패:', data.no, e); }
  }
  localStorage.setItem(regKey, JSON.stringify(registered));
  if (count > 0) {
    b.autoRegistered = (b.autoRegistered || 0) + count;
    b.newProjects = (b.newProjects || 0) + count;
    save();
    updateNotifBadge();
    if (view.cur === 'dashboard') render();
    console.info(`[SJ FLOW] ${count}개 워크오더 프로젝트 자동등록 완료`);
  }
}

let _lastSave = 0;
function touchSession() {
  if (!state.currentUser) return;
  state.lastActive = Date.now();

    stopFirestoreSync();

/* ═══════════════════════════════════════════════════════════════════
   v0.7.7 ★ window.SJP.bridge — 신과장 ITP Builder v1.4 자동 연동
   ═══════════════════════════════════════════════════════════════════
   신과장 ITP Builder는 ?embed=1 iframe 안에서 window.parent.SJP.bridge를
   250ms 주기로 폴링합니다. 여기서 노출하는 API를 통해:
   - SJ FLOW 좌측 Tag 클릭 → 우측 ITP Builder에 자동 Project + Items 입력
   - 우측 ITP Builder Export → SJ FLOW state로 데이터 역전송 (Traveller 등)
   ═══════════════════════════════════════════════════════════════════ */
window.SJP = window.SJP || {};
window.SJP.bridge = {
  // ── 연결 상태 ──
  isConnected: function() { return true; },
  
  // ── 신과장 빌더가 호출 (시작 시 + 250ms 폴링) ──
  // 현재 선택된 SJ FLOW 프로젝트 → 신과장 빌더 proj state 형식으로 변환
  getProject: function() {
    const pid = view.itpSelectedProj;
    const p = getP(pid);
    if (!p || !p.code) return null;
    // v1.1 — 워크오더 자동등록/Cowork 자동등록은 Scope를 별도 텍스트로 저장하지 않고
    // WBS 대단락(최상위 lv:0 행)으로만 저장한다. p.scope가 없으면 그 대단락 이름들을
    // "/"로 이어붙여 Scope 대용으로 사용 — ITP Builder에서 다시 타이핑할 필요 없게 한다.
    const wbsRows = (state.wbs && state.wbs[pid]) || [];
    const scopeFromWbs = wbsRows.filter(r => r.lv === 0 && r.name).map(r => r.name).join(' / ');
    return {
      no: p.code,
      name: p.name,
      customer: p.client || '',
      po: p.po || '',
      scope: p.scope || scopeFromWbs || '',
      codes: { KS:true, ASME:true, TEMA:true, EN:false, API:false, Others:false }
    };
  },
  
  // 현재 선택된 SJ FLOW Tag → 신과장 빌더 items 배열로 변환
  // (선택된 Tag 1개 + 같은 프로젝트의 다른 Tag들도 함께)
  getItems: function() {
    const pid = view.itpSelectedProj;
    if (!pid) return [];
    const items = getItems(pid);
    if (!items.length) return [];
    // 선택된 Tag를 맨 앞으로 정렬
    const selected = view.itpSelectedItem;
    const sorted = selected ? [
      ...items.filter(it => it.id === selected),
      ...items.filter(it => it.id !== selected)
    ] : items;
    // v29.9 fix: id 필드를 문자열 원본 그대로 사용. 이전엔 Date.parse(문자열 id)가 NaN이라
      // Math.random 폴백이 250ms 폴링마다 새 값 반환 → 다운스트림 안정성 해침.
      // 신과장 빌더는 tag 기준으로 매칭하므로 숫자 강제 변환 불필요.
    return sorted.map(it => ({
      id: it.id,
      tag: it.tag,
      name: it.name,
      type: it.type || 'Pressure Vessel',
      appl_code: it.spec || '',
      shell_mat: it.material || '',
      shell_id: '', shell_len: '', shell_thk: '',
      design_p: '', design_t: '',
      head_top_type: '2:1 Ellip.', head_top_mat: it.material || '',
      head_bot_type: '2:1 Ellip.', head_bot_mat: it.material || '',
      jacket: false, jacket_partition: false,
      incoil: false, incoil_double: false,
      halfcoil: false, halfcoil_partition: false,
      reactor_mount: false, reactor_impeller: false,
      remarks: it.wbsLink ? `WBS 연동: ${it.wbsLink}` : ''
    }));
  },
  
  // ── 신과장 빌더가 호출 (Export → QA Doc 시) ──
  // 신과장 빌더의 proj state → SJ FLOW state로 역동기화
  setProject: function(p) {
    if (!p || !p.no) return;
    // 현재 선택된 프로젝트의 정보 업데이트 (코드는 키이므로 변경 금지)
    const pid = view.itpSelectedProj;
    const proj = state.projects.find(x => x.id === pid);
    if (proj) {
      if (p.name) proj.name = p.name;
      if (p.customer) proj.client = p.customer;
      if (p.po) proj.po = p.po;
      if (p.scope) proj.scope = p.scope;
      save();
      console.log('[SJ FLOW ← ITP Builder] 프로젝트 정보 갱신:', proj.code);
    }
  },
  
  // 신과장 빌더의 items → SJ FLOW state.items[pid]로 역동기화
  setItems: function(epcItems) {
    if (!Array.isArray(epcItems) || !epcItems.length) return;
    const pid = view.itpSelectedProj;
    if (!pid) return;
    if (!state.items[pid]) state.items[pid] = [];
    epcItems.forEach(ei => {
      // tagNo로 매칭, 없으면 신규 추가
      // v3.3 fix: 제작공정관리(WBS 일괄등록) 아이템은 tag가 아니라 tagNo 필드를 씀 — 그 필드도 같이
      // 봐야 기존 아이템과 매칭됨. 안 그러면 매번 "못 찾음"으로 판정돼 중복 아이템이 계속 생성됐음.
      const tag = ei.tagNo || ei.tag;
      if (!tag) return;
      let existing = state.items[pid].find(x => (x.tag || x.tagNo) === tag);
      if (existing) {
        existing.type = ei.type || existing.type;
        existing.spec = ei.spec || existing.spec;
      } else {
        // 신규 Tag — SJ FLOW state에 추가
        const newId = 'i_' + pid + '_' + Date.now() + '_' + Math.floor(Math.random()*1000);
        state.items[pid].push({
          id: newId,
          tag: tag,
          name: tag,
          type: ei.type || 'Pressure Vessel',
          spec: ei.spec || '',
          material: '',
          vendor: ei.maker || '㈜세종기술',
          wbsLink: ''
        });
        // Traveller 데이터도 초기화 (모두 pending)
        if (!state.travellers) state.travellers = {};
        state.travellers[newId] = {};
        if (typeof ITP_BASE !== 'undefined') {
          ITP_BASE.forEach(b => {
            state.travellers[newId][b.id] = { status:'pending', worker:'', qc:'', witness:'', date:'', memo:'' };
          });
        }
      }
    });
    save();
    // v29.9 fix: state.items[pid]를 Firestore(wbsData/{pid})의 items 필드로도 반영.
    // 안 하면 부모의 onSnapshot(wbsData) 다음 발화 때 items가 서버 값(예전 값)으로 덮여 씀 → silent data loss.
    // wbsData 문서에 { rows, items } 형태로 저장돼 있으므로 items만 merge 업데이트.
    if (window.fb && fb.db) {
      fb.setDoc(fb.doc(fb.db, 'wbsData', pid), { items: state.items[pid] }, { merge: true })
        .catch(e => console.error('[SJ FLOW → Firestore wbsData items 동기화 실패]', e));
    }
    console.log('[SJ FLOW ← ITP Builder] items 동기화:', pid, epcItems.length, '개');
  },
  // v29.9: QA Doc Gen이 "EPC 합격품 가져오기"용으로 호출. 현재 프로젝트에서 traveller의
  // 모든 검사 단계가 'accepted'인 tag만 반환. wbs.html의 동일 이름 함수와 동일 동작.
  getAcceptedItems: function() {
    const pid = view.itpSelectedProj || view.qaSelectedProj;
    if (!pid) return [];
    const items = getItems(pid);
    const trvs = state.travellers || {};
    return items.filter(it => {
      const t = trvs[it.id];
      if (!t) return false;
      const stages = Object.values(t);
      if (!stages.length) return false;
      return stages.every(s => s && s.status === 'accepted');
    }).map(it => ({
      id: it.id, tag: it.tag, name: it.name, type: it.type || '',
      spec: it.spec || '', material: it.material || ''
    }));
  },

  // ITP 9~18개 항목 템플릿 → Traveller의 검사 단계로 연결 (선택)
  setItpTemplate: function(itemId, tplItems) {
    // tplItems = [{id, item, ph, pt, crit}, ...]
    // 현재는 console.log만 — Traveller 통합 강화 시 활용
    console.log('[SJ FLOW ← ITP Builder] ITP 템플릿 수신:', itemId, tplItems.length, '항목');
  },
  
  // ── 선택 메소드 ──
  generateDocNo: function(projNo, docType, seq) {
    const yr = new Date().getFullYear().toString().slice(-2);
    return `SJ-QA-${docType || 'ITP'}-${projNo}-${yr}-${String(seq||1).padStart(3,'0')}`;
  },
  
  renderTopbar: function(title, user) {
    // SJ FLOW에는 자체 topbar가 있으므로 no-op
    return;
  }
};

// v29.7.2: 팝업 기반(Firebase popup/redirect, GIS 토큰 클라이언트 popup) 방식 둘 다
// 아이폰 사파리/크롬에서 팝업창-원래창 간 통신이 막히며 "깜빡이고 여러 번 눌러야
// 로그인되는" 문제가 반복됨. sessionStorage/팝업 통신에 전혀 의존하지 않는 순수
// URL 이동(리디렉션) 방식으로 교체 — 정보는 URL 자체(해시)에 담아 돌아오므로
// 브라우저 저장소 정책의 영향을 받지 않음. 이게 현재 로그인의 기본 방식.
function doGoogleLoginRedirect() {
  // v29.7.3: 리디렉션 중임을 즉시 표시 (Google 도메인으로 넘어가기 전 UI 잔상 방지)
  showAuthLoading();
  const redirectUri = location.origin + '/';
  // v29.7.3: response_type을 'id_token token'으로 확장 — id_token은 Firebase가 서명 검증까지
  // 하므로 signInWithCredential이 더 빠르고 확실하게 동작함(access token만 넘길 때보다 안정적).
  // nonce는 CSRF/replay 방지용으로 랜덤 값을 생성해 sessionStorage에 저장 후 회수 시 검증.
  const nonce = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
  try { sessionStorage.setItem('sjLoginNonce', nonce); } catch(e) {}
  const params = new URLSearchParams({
    client_id: GCAL_CLIENT_ID,
    redirect_uri: redirectUri,
    response_type: 'id_token token',
    scope: 'openid email profile',
    hd: 'sejong-21c.com',
    prompt: 'select_account',
    include_granted_scopes: 'true',
    nonce,
  });
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}
// 구글에서 #access_token=...으로 돌아왔을 때 처리 — init()에서 가장 먼저 호출됨
async function processRedirectLogin() {
  const hash = location.hash || '';
  if (hash.indexOf('access_token=') === -1) return false;
  const p = new URLSearchParams(hash.slice(1));
  const accessToken = p.get('access_token');
  const idToken = p.get('id_token'); // v29.7.3: response_type=id_token token 도입으로 함께 옴
  const oauthError = p.get('error');
  history.replaceState(null, '', location.pathname + location.search); // URL에 토큰 남기지 않기
  if (oauthError || !accessToken) return false;
  try {
    const infoRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${accessToken}` } });
    const info = await infoRes.json();
    if (!info.email || !info.email.toLowerCase().endsWith('@sejong-21c.com')) {
      setTimeout(() => alert(`${COMPANY_DOMAIN} 계정만 로그인할 수 있습니다.`), 50);
      return false;
    }
    // v29.7.3: id_token이 있으면 그걸 우선 사용 — Firebase가 서명 검증까지 하므로 더 안전
    const credential = idToken
      ? fb.GoogleAuthProvider.credential(idToken, accessToken)
      : fb.GoogleAuthProvider.credential(null, accessToken);
    await fb.signInWithCredential(fb.auth, credential);
    // 이후 화면 전환은 onAuthStateChanged(handleAuthChange)가 담당
    return true;
  } catch (e) {
    console.error('[로그인] 리디렉션 처리 실패', e);
    return false;
  }
}

let _fsUnsubs = [];
function stopFirestoreSync() {
  _fsUnsubs.forEach(u => { try { u(); } catch (e) {} });

// WBS 행 하나의 진척률 계산 — wbs.html의 wCS()를 간이 포팅 (ITP 연동 부분 제외).
// pctManual 우선 → 자식(소단락) 롤업 → 상태 문자열 → 시작/완료일 경과율 순.
function _wbsRowPct(w, rows, idx) {
  if (w.pctManual != null && w.pctManual !== '') return Math.max(0, Math.min(100, Math.round(Number(w.pctManual)) || 0));
  const kids = [];
  for (let j = idx + 1; j < rows.length; j++) {
    if (rows[j].lv <= w.lv) break;
    if (rows[j].lv === w.lv + 1) kids.push(j);
  }
  if (kids.length) {
    const sum = kids.reduce((a, j) => a + _wbsRowPct(rows[j], rows, j), 0);
    return Math.round(sum / kids.length);
  }
  if (w.status === '완료') return 100;
  if (w.status === '미시작') return 0;
  if (w.pct != null) return w.pct;
  if (w.s && w.e) {

// Firebase 인증 상태가 바뀔 때마다(최초 로드·로그인·로그아웃) 호출되는 단일 진입점
async function handleAuthChange(fu) {
  if (!fu) { showLogin(); return; }
  if (!fu.email || !fu.email.toLowerCase().endsWith(COMPANY_DOMAIN)) {
    await fb.signOut(fb.auth);
    showLogin();
    setTimeout(() => {
      const err = document.getElementById('loginErr');
      if (err) { err.textContent = `${COMPANY_DOMAIN} 사내 계정으로만 로그인할 수 있습니다.`; err.style.display = 'block'; }
    }, 50);
    return;
  }
  if (sessionExpired()) {
    state.currentUser = null; state.lastActive = null; save();
    await fb.signOut(fb.auth); // 다시 onAuthStateChanged(null) → showLogin()
    return;
  }
  try {
    const snap = await fb.getDoc(fb.doc(fb.db, 'users', fu.uid));
    if (!snap.exists()) {
      // v29.9: 슈퍼관리자가 미리 등록한 pending 계정이 있는지 이메일로 조회.
      // 있으면 첫로그인 소속 입력 화면을 건너뛰고 즉시 프로필 생성.
      const promoted = await promotePendingUser(fu).catch(() => false);
      if (promoted) {
        await hydrateUsersAndEnter(fu.uid);
        return;
      }
      showProfileSetup(fu);
      return;
    }
    if (snap.data().disabled) {
      await fb.signOut(fb.auth);
      setTimeout(() => alert('비활성화된 계정입니다. 관리자에게 문의하세요.'), 50);
      return;
    }
    await hydrateUsersAndEnter(fu.uid);
  } catch (e) {
    console.error(e);
    showLogin();
  }
}

// v29.9: 슈퍼관리자가 pendingUsers 컬렉션에 미리 등록해둔 계정(이메일 기반) 을 실제
// users 컬렉션으로 승격 — 사용자가 처음 Google 로그인할 때 이메일 매칭되면 자동 실행.
// 성공하면 true 반환하고 pending 문서 삭제. 매칭 없으면 false.
async function promotePendingUser(fu) {
  if (!fu || !fu.email) return false;
  const email = fu.email.toLowerCase();
  const q = fb.query(fb.collection(fb.db, 'pendingUsers'), fb.where('email', '==', email));
  const snap = await fb.getDocs(q);
  if (snap.empty) return false;
  // 여러 개면 첫 번째만 사용 (같은 이메일로 중복 등록됐다면 이후 정리 필요)
  const doc = snap.docs[0];
  const p = doc.data();
  const userDoc = {
    name:  p.name || fu.displayName || '',
    email,
    dept:  p.dept  || '',
    title: p.title || '사원',
    grade: p.grade || gradeByTitle(p.title || '사원'),
    disabled: false,
    createdAt: Date.now(),
    createdVia: 'preRegistered',
    preRegisteredBy: p.createdBy || null,
  };
  if (Array.isArray(p.extraPerms) && p.extraPerms.length) userDoc.extraPerms = p.extraPerms;
  if (p.modulePerms && Object.keys(p.modulePerms).length) userDoc.modulePerms = p.modulePerms;
  await fb.setDoc(fb.doc(fb.db, 'users', fu.uid), userDoc);
  try { await fb.deleteDoc(fb.doc(fb.db, 'pendingUsers', doc.id)); } catch (e) { console.warn('pending 삭제 실패(무시)', e); }
  try { ensureDeptChannel(userDoc.dept); } catch(e) {}
  return true;
}

  if (menu && !menu.contains(e.target) && chip && !chip.contains(e.target)) {
    menu.style.display = 'none';
    document.removeEventListener('click', closeUserMenuOutside);
  }
}
function goOrg() { view.cur = 'org'; view.selectedTool = null; renderNav(); render(); }

// v29: iframe 기반 화면(프로젝트 WBS·부서 스케줄·QA·Mobile·Manday·Traveller Tag)의 "대상 키".
// Firestore 실시간 구독(startFirestoreSync)의 배경 render() 호출이 iframe을 통째로 재생성해
// 무한 리로드(깜빡임) 루프를 일으키던 문제 → 대상이 같으면 render()에서 재생성을 건너뛴다.
function iframeViewKey() {
  const v = view;
  if (v.selectedTool === 'epc' || (v.selectedProj && v.cur === 'projects')) return 'epc:' + (v.selectedProj && v.selectedProj.id);
  if (v.selectedTool === 'qa' && v.qaSelectedProj) return 'qa:' + v.qaSelectedProj;
  if (v.selectedTool === 'mobile' && v.mobileSelectedProj) return 'mobile:' + v.mobileSelectedProj;
  if (v.selectedTool === 'deptsch' && v.deptSchedProj) return 'deptsch:' + v.deptSchedDept + ':' + v.deptSchedProj;
  // v29.9-fix: ncr/car/qadash iframe도 재생성 방지 가드에 포함 — 이 세 도구가 누락되어
  // Firestore onSnapshot이 발화할 때마다 iframe이 재로드되어 진행 중이던 발행/수정 모달이 사라짐.
  if (v.selectedTool === 'ncr') return 'ncr';
  if (v.selectedTool === 'car') return 'car';
  if (v.selectedTool === 'qadash') return 'qadash';
  if (v.cur === 'manday') return 'manday';
  if (v.cur === 'messenger') return 'messenger';
  if (v.travProj && !v.selectedTraveller) return 'travtag:' + v.travProj;
  return null;
}
// v29.3: 브라우저 뒤로가기/앞으로가기 지원.
// 이 앱은 History API를 전혀 안 써서, 뒤로가기를 누르면 SPA 내부 이동이 아니라
// 사이트 진입 이전(빈 상태)으로 튕겨나가던 문제. render()가 호출될 때마다 내비게이션에
// 유의미한 변화(현재 화면, 선택된 프로젝트/도구 등)가 있는지 확인해서, 바뀐 경우에만
// history에 한 단계 기록한다. popstate(뒤로/앞으로가기)가 발생하면 그 기록으로 view를
// 복원해서 "전 단계로 이동"이 실제로 동작하게 함.
let _lastNavSig = null;
function navSnapshot() {
  // selectedProj는 전체 프로젝트 객체라 그대로 저장하면 나중에(Firestore 갱신 후) 되돌아왔을 때
  // 오래된 스냅샷이 잠깐 보일 수 있음 → id만 저장해두고 복원 시 state.projects에서 다시 조회.
  return {
    cur: view.cur, selectedProjId: view.selectedProj ? view.selectedProj.id : null, selectedTool: view.selectedTool,
    epcTab: view.epcTab, itpSelectedProj: view.itpSelectedProj, itpSelectedItem: view.itpSelectedItem,
    qaSelectedProj: view.qaSelectedProj, qaSelectedDoc: view.qaSelectedDoc, mobileSelectedProj: view.mobileSelectedProj,
    travProj: view.travProj || null, selectedTraveller: view.selectedTraveller || null,
    deptSchedDept: view.deptSchedDept || null, deptSchedProj: view.deptSchedProj || null,
  };
}
function syncNavHistory() {
  let snap, sig;
  try { snap = navSnapshot(); sig = JSON.stringify(snap); } catch (e) { return; }
  if (sig === _lastNavSig) return;
  _lastNavSig = sig;
  try { history.pushState({ sjNav: snap }, ''); } catch (e) {}
}
window.addEventListener('popstate', (e) => {
  if (!e.state || !e.state.sjNav) return;
  _lastNavSig = JSON.stringify(e.state.sjNav); // 복원 중 render()가 또 push하지 않도록 먼저 동기화
  const s = e.state.sjNav;
  Object.assign(view, s, { selectedProj: s.selectedProjId ? getP(s.selectedProjId) : null });
  delete view.selectedProjId;
  renderNav();
  render();
});

function render() {
  syncNavHistory();
  const content = document.getElementById('content');
  // v29: 동일 iframe이 이미 떠 있으면 재생성 스킵 (배경 실시간 갱신에 의한 iframe 깜빡임 방지)
  const _ifKey = iframeViewKey();
  if (_ifKey && content.dataset.ifkey === _ifKey) return;
  content.dataset.ifkey = _ifKey || '';
  if (view.selectedTool === 'epc' || (view.selectedProj && view.cur === 'projects')) {
    // EPC Control 뷰 (도구함에서 또는 프로젝트 카드 클릭)
    content.innerHTML = renderEPCControl();
    return;
  }
  if (view.selectedTool === 'itp') {
    // ITP Builder 2단계: 프로젝트 미선택 → 카드 / 선택됨 → 빌더 화면
    if (!view.itpSelectedProj) { content.innerHTML = `<div class="content-pad">${renderITPProjects()}</div>`; return; }
    content.innerHTML = renderITPBuilder(); return;
  }
  if (view.selectedTool === 'qa') {
    // QA Doc 2단계: 프로젝트 미선택 → 카드 / 선택됨 → 도구
    if (!view.qaSelectedProj) { content.innerHTML = `<div class="content-pad">${renderQAProjects()}</div>`; return; }
    content.innerHTML = renderQADocFrame(); return;
  }
  if (view.selectedTool === 'mobile') {
    // Mobile 2단계: 프로젝트 미선택 → 카드 / 선택됨 → 도구
    if (!view.mobileSelectedProj) { content.innerHTML = `<div class="content-pad">${renderMobileProjects()}</div>`; return; }
    content.innerHTML = renderMobileFrame(); return;
  }
  // v29.9-fix: 원래대로 innerHTML로 설정하되, iframeViewKey()가 이제 ncr/car/qadash를 반환하므로
  // 위쪽의 dataset.ifkey 가드가 재render를 스킵해 iframe이 재로드되지 않음.
  if (view.selectedTool === 'ncr') { content.innerHTML = `<div style="flex:1;position:relative;overflow:hidden;"><iframe src="modules/ncr/ncr.html?v=${NCR_BUILD}" style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;" title="NCR 관리"></iframe></div>`; return; }
  if (view.selectedTool === 'car') { content.innerHTML = `<div style="flex:1;position:relative;overflow:hidden;"><iframe src="modules/car/car.html?v=${CAR_BUILD}" style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;" title="CAR 관리"></iframe></div>`; return; }
  if (view.selectedTool === 'qadash') { content.innerHTML = `<div style="flex:1;position:relative;overflow:hidden;"><iframe src="modules/quality/qa-dashboard.html?v=${QADASH_BUILD}" style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;" title="품질종합분석표"></iframe></div>`; return; }
  if (view.selectedTool === 'deptsch') {
    // 부서 스케줄 2단계: 프로젝트/자체업무 미선택 → 카드 / 선택됨 → WBS iframe
    if (!view.deptSchedProj) { content.innerHTML = `<div class="content-pad">${renderDeptSchedProjects()}</div>`; return; }
    content.innerHTML = renderDeptSchedFrame(); return;
  }
  // Traveller 3단계 라우팅: ① 프로젝트 카드 → ② Tag 리스트(iframe=MM) → ③ Tag 상세
  if (view.cur === 'traveller' || view.selectedTraveller || view.travProj) {
    if (view.selectedTraveller) { content.innerHTML = renderTravellerDetail(); return; }
    if (view.travProj) { content.innerHTML = renderTravellerTagList(); return; }
    content.innerHTML = `<div class="content-pad">${renderTravellerProjects()}</div>`;
    return;
  }
  if (view.cur === 'manday') { content.innerHTML = renderMandayFrame(); return; }
  // 준비중(wip) 메뉴 처리
  const curNav = NAV.find(n => n.id === view.cur);
  if (curNav && curNav.wip) {
    content.innerHTML = `<div class="content-pad"><div class="card empty-soon" style="text-align:center;padding:60px 20px;">
      <div style="font-size:52px;margin-bottom:16px;">${curNav.icon}</div>
      <h3 style="font-size:18px;margin-bottom:8px;">${curNav.label}</h3>
      <p style="color:var(--text-light);margin-bottom:6px;">현재 준비 중인 기능입니다.</p>
      <p style="color:var(--text-lighter);font-size:12px;">${view.cur==='okr'?'NCR · CAR 연동 등 업무 데이터와 연계하여 개발 예정입니다.':'사내 메신저 기능을 준비하고 있습니다.'}</p>
      <span class="b-pill" style="background:#fef3c7;color:#92400e;margin-top:16px;display:inline-block;">🚧 준비중</span>
    </div></div>`;
    return;
  }
  if (view.cur === 'messenger') {
    content.innerHTML = renderMessengerFrame();
    return;
  }
  const renderers = { dashboard, calendar, projects, tasks, quotes, okr, org, approval };
  content.innerHTML = `<div class="content-pad">${renderers[view.cur]()}</div>`;
}

/* ═════════════ 수동 작성 초안 (프로젝트 등록 전 · 계약 전 선작업용) ═════════════
   프로젝트 카드가 아직 없거나(WBS 초기화 등) 계약/등록 전에 ITP·QA 문서를 먼저 써야 할
   때를 위한 임시 초안. draft_<timestamp>를 임시 pid로 써서 ITP Builder / QA Doc Generator가
   이미 갖고 있는 "프로젝트별(pid) localStorage" 구조를 그대로 재사용한다 — 즉 하나의 초안이
   ITP Builder와 QA Doc Generator 양쪽에서 같은 pid로 이어서 작업된다. 나중에 실제 프로젝트가
   생기면 그 pid로 데이터를 옮겨서 "연동" — ITP뿐 아니라 QA Doc Generator 데이터(및 WPS/Welder
   목록)도 같은 방식으로 함께 옮겨진다. Firestore에는 올리지 않는, 이 브라우저 로컬 전용 목록. */
const MANUAL_ITP_DRAFTS_KEY = 'sjp_itp_manual_drafts';
// pid 하나에 딸려있는 로컬 저장 키 전부 — 초안 삭제/연동 시 함께 처리.
// sjp_qa_doc_generator_v1__{pid}는 QA Doc Generator의 "last-work" 자동복원 키(pid별로 분리됨) —
// qa-doc-generator.html 쪽에서도 동일한 pid로 자동저장/자동복원되므로 그대로 옮기면 이어서 작업 가능.
const DRAFT_LOCAL_KEY_PREFIXES = ['sjp_itp_builder_v1', 'sjp_master_wps_list', 'sjp_master_welder_list', 'sjp_qa_doc_generator_v1'];
function loadManualDrafts() {
  try { return JSON.parse(localStorage.getItem(MANUAL_ITP_DRAFTS_KEY) || '[]'); } catch(e) { return []; }
}
function saveManualDrafts(list) {
  try { localStorage.setItem(MANUAL_ITP_DRAFTS_KEY, JSON.stringify(list)); } catch(e) {}
}
function createManualDraft(openTool) {
  const label = prompt('임시 초안 이름을 입력하세요 (예: 계약전 검토용 · 고객사명 등)', `임시 초안 ${new Date().toISOString().slice(0,10)}`);
  if (label === null) return;
  const draftId = 'draft_' + Date.now();
  const drafts = loadManualDrafts();
  drafts.unshift({ id: draftId, label: label.trim() || draftId, createdAt: Date.now() });
  saveManualDrafts(drafts);
  openDraftTool(draftId, openTool);
  render();
}
function openDraftTool(draftId, tool) {
  const path = tool === 'qa' ? 'modules/qa-doc-generator/qa-doc-generator.html' : 'modules/itp-builder/itp-builder.html';
  window.open(`${path}?pid=${draftId}`, '_blank');
}
function deleteManualDraft(draftId) {
  if (!confirm('이 임시 초안을 삭제하시겠습니까? (ITP·QA Doc 양쪽에 저장된 작성 내용도 함께 삭제됩니다)')) return;
  DRAFT_LOCAL_KEY_PREFIXES.forEach(prefix => {
    try { localStorage.removeItem(`${prefix}__${draftId}`); } catch(e) {}
  });
  saveManualDrafts(loadManualDrafts().filter(d => d.id !== draftId));
  render();
}
// 실제 프로젝트가 생기면, 임시 초안에 저장된 ITP·QA Doc 데이터를 그 프로젝트의 pid로 복사.
function linkManualDraftToProject(draftId, realPid) {
  DRAFT_LOCAL_KEY_PREFIXES.forEach(prefix => {
    const v = localStorage.getItem(`${prefix}__${draftId}`);
    if (v) localStorage.setItem(`${prefix}__${realPid}`, v);
  });
  saveManualDrafts(loadManualDrafts().filter(d => d.id !== draftId));
  closeModal();
  const p = getP(realPid);
  alert(`✓ 연동 완료 — "${p ? p.code : realPid}" 프로젝트로 ITP·QA Doc 작성 내용을 옮겼습니다.\n이제 해당 프로젝트 카드에서 ITP Builder / QA Doc Generator를 열면 이어서 작성할 수 있습니다.`);
  render();
}
function openLinkDraftPicker(draftId) {
  const projs = state.projects.filter(p => !p.hidden);
  if (projs.length === 0) {
    alert('연동할 수 있는 프로젝트가 아직 없습니다. 프로젝트를 먼저 생성해주세요.');
    return;
  }
  const rows = projs.map((p, i) => `
    <label style="display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;">
      <input type="radio" name="linkTargetPid" value="${p.id}" ${i===0?'checked':''}>
      <span><b>${p.code}</b> — ${p.name}</span>
    </label>`).join('');
  openModal('🔗 프로젝트와 연동', `
    <div style="font-size:12px;color:var(--text-light);margin-bottom:10px;">
      이 임시 초안(ITP·QA Doc)을 어떤 프로젝트로 옮길까요? 대상 프로젝트에 이미 작성 내용이 있다면 지금 초안 내용으로 덮어씌워집니다.
    </div>
    ${rows}
  `, () => {
    const sel = document.querySelector('input[name="linkTargetPid"]:checked');
    if (!sel) return;
    linkManualDraftToProject(draftId, sel.value);
  });
}
// ITP/QA 프로젝트 선택 화면 공용 — 임시 초안 목록 카드 (현재 도구의 "열기" 링크를 강조)

      ${drafts.map(d => `
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;flex-wrap:wrap;">

/* ─── ITP Builder 2단계: 신과장 ITP Builder v1.4 iframe 통합 ─── */
function renderITPBuilder() {
  const pid = view.itpSelectedProj;
  const p = getP(pid);
  if (!p) { view.itpSelectedProj = null; return `<div class="content-pad">${renderITPProjects()}</div>`; }
  const items = getItems(pid);
  const selectedItem = view.itpSelectedItem ? items.find(i => i.id === view.itpSelectedItem) : items[0];
  if (selectedItem && view.itpSelectedItem !== selectedItem.id) view.itpSelectedItem = selectedItem.id;
  
  // 신과장이 만든 ITP Builder v1.4 — 선택된 Tag 정보를 URL 파라미터로 전달
  const itpParams = new URLSearchParams({
    embed: '1',
    proj: p.code,
    pid: p.id,
  });
  if (selectedItem) {
    itpParams.set('tag', selectedItem.tag);
    itpParams.set('itemId', selectedItem.id);
    itpParams.set('type', selectedItem.type);
    itpParams.set('spec', selectedItem.spec);
    itpParams.set('material', selectedItem.material || '');
  }
  const itpPath = `modules/itp-builder/itp-builder.html?${itpParams.toString()}`;
  // iframe key: 선택 Tag 바뀔 때 iframe 새로고침
  const frameKey = selectedItem ? `${p.id}_${selectedItem.id}` : `${p.id}_none`;
  
  return `<div class="content-pad" style="height:100%;display:flex;flex-direction:column;">
    <div class="mod-head">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <button class="back-btn" onclick="closeITPProj()">← 프로젝트 목록</button>
        <div>
          <div class="mod-title" style="font-size:16px;">
            <span style="color:var(--primary);font-size:13px;font-weight:700;background:var(--primary-lighter);padding:2px 8px;border-radius:4px;vertical-align:middle;">${p.code}</span>
            ${p.name}
            <span style="font-size:12px;color:var(--text-light);font-weight:400;">— ITP Builder v1.4</span>
          </div>
          <div class="mod-sub">${p.client} · PM ${getU(p.pm).name} ${getU(p.pm).title} · Rev. 0</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <a class="btn btn-sm" href="${itpPath}" target="_blank" rel="noopener" style="text-decoration:none;color:var(--text);">↗ 새 창</a>
        <button class="btn" onclick="itpFrameAction('import')">📥 Import</button>
        <button class="btn btn-primary" onclick="itpFrameAction('export')">💾 Export → QA Doc</button>
      </div>
    </div>

    <div class="itp-wrap" style="flex:1;min-height:0;">
      <!-- 좌측: 검사 대상 아이템(Tag) 카드 리스트 -->
      <div class="itp-side">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <strong style="font-size:13px;">📦 검사 대상 아이템 (${items.length})</strong>
          <button class="btn btn-sm btn-primary" onclick="openNewTag('${p.id}')">+ 추가</button>
        </div>
        ${items.length === 0 ? `
          <div style="padding:30px 14px;text-align:center;color:var(--text-lighter);font-size:12px;line-height:1.6;">
            <div style="font-size:32px;margin-bottom:8px;">📦</div>
            아이템이 없습니다.<br>
            <button class="btn btn-sm btn-primary" style="margin-top:10px;" onclick="openNewTag('${p.id}')">+ 첫 아이템 등록</button>
          </div>
        ` : items.map(it => `
          <div class="itp-item-card${selectedItem && selectedItem.id===it.id?' sel':''}" onclick="setITPItem('${it.id}')">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span class="itp-tag">${it.tag}</span>
              <span style="font-size:10px;background:var(--bg);padding:1px 6px;border-radius:3px;">${it.type}</span>
            </div>
            <div style="font-size:12px;font-weight:500;margin-bottom:2px;">${it.name}</div>
            <div style="font-size:10px;color:var(--text-light);">${it.material||'-'}</div>
            <div style="font-size:10px;color:var(--text-lighter);margin-top:3px;">${it.spec}</div>
          </div>
        `).join('')}
        
        ${selectedItem ? `
          <div style="margin-top:14px;padding:10px;background:var(--primary-lighter);border-radius:5px;font-size:10px;line-height:1.6;">
            <div style="font-weight:700;color:var(--primary);margin-bottom:4px;">→ 우측 ITP Builder에서</div>
            <div style="color:var(--text-light);">
              현재 선택: <b style="color:var(--primary);">${selectedItem.tag}</b><br>
              이 Tag를 기준으로 ITP를 작성하세요.
            </div>
          </div>
        ` : ''}
      </div>
      
      <!-- 우측: 신과장 ITP Builder v1.4 iframe -->
      <div class="itp-main" style="padding:0;position:relative;overflow:hidden;">
        <iframe id="itpFrame" key="${frameKey}" src="${itpPath}"
                style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:#fff;"
                title="ITP Builder v1.4 - ${p.code}${selectedItem?` · ${selectedItem.tag}`:''}"
                onload="this.nextElementSibling && this.nextElementSibling.remove();"></iframe>
        <div id="itpFallback" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:30px;background:#fff;">

              <strong>${p.code}</strong> ${p.name}${selectedItem?`<br>현재 Tag: <b>${selectedItem.tag}</b>`:''}<br>
              신과장 ITP Builder가 이 자리에 로드됩니다.
            </p>
            <div style="background:var(--bg);padding:10px 12px;border-radius:5px;font-family:monospace;font-size:10px;color:var(--text-light);margin-bottom:12px;word-break:break-all;">

            <div style="background:#fef3c7;border-left:4px solid #f59e0b;padding:10px 12px;border-radius:4px;text-align:left;font-size:11px;color:#92400e;line-height:1.6;">
              <strong>⚠ 미리보기 환경 안내</strong><br>

              <strong>실제 서버 배포 시</strong> ITP Builder가 그대로 표시됩니다.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

          <div class="proj-name">${dept} 자체 업무 일정</div>
          <div class="proj-meta"><span style="color:var(--text-lighter);">프로젝트에 속하지 않는 부서 내부 업무</span></div>
        </div>
      </div>
    </div>
    ${(() => {
      const did = (DEPTS.find(d => d.name === dept) || {}).id || '';
      const bEvents = getDeptBriefingEvents(did).filter(e => e.date >= new Date().toISOString().slice(0,10)).sort((a,b) => a.date.localeCompare(b.date));
      if (!bEvents.length) return '';
      return '<div style="margin-bottom:14px;"><div style="font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:8px;">📬 Cowork 메일 자동 연동 일정 (' + bEvents.length + ')</div>' +
        '<div class="card" style="border-left:3px solid #f59e0b;">' + bEvents.map(function(e) {
          return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);"><div style="font-size:13px;font-weight:500;">' + e.title + '</div><div style="font-size:12px;color:' + (e.color==='red'?'var(--danger)':e.color==='orange'?'var(--warning)':'var(--text-light)') + ';font-weight:600;white-space:nowrap;margin-left:8px;">' + e.date + (e.time ? ' ' + e.time : '') + '</div></div>';
        }).join('') + '</div></div>';
    })()}
    <div style="font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:8px;">📊 프로젝트별 ${dept} 스케줄</div>
    <div class="proj-grid">${projCards || '<div style="color:var(--text-lighter);font-size:12px;padding:20px;">등록된 프로젝트가 없습니다.</div>'}</div>
  `;
}
