<title>QA Doc Generator v1.4 (V25 form) · Sejong-Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════
   EPC Control System 디자인 토큰 (인라인 정의)
   v1.2 — 부장님 EPC Control 톤 통일 + sjp-tokens.css 의존성 제거
═══════════════════════════════════════════════════════════ */
:root {
  --sjp-primary:        #4a7fc1;
  --sjp-primary-hover:  #3a6bb5;
  --sjp-primary-light:  #eef3fb;
  --sjp-success:        #16a34a;
  --sjp-success-bg:     #f0fdf4;
  --sjp-warning:        #f59e0b;
  --sjp-warning-bg:     #fef3c7;
  --sjp-danger:         #dc2626;
  --sjp-danger-bg:      #fee2e2;
  --sjp-border:         #e4e7ec;
  --sjp-border-strong:  #c3d6f0;
  --sjp-bg-card:        #ffffff;
  --sjp-bg-app:         #f0f4f8;
  --sjp-bg-table-head:  #f8fafc;
  --sjp-bg-row-hover:   #f9fafb;
  --sjp-text-main:      #1a2332;
  --sjp-text-body:      #4b5563;
  --sjp-text-sub:       #6b7280;
  --sjp-text-muted:     #9ca3af;
  --sjp-radius-sm:      4px;
  --sjp-radius:         5px;
  --sjp-radius-lg:      8px;
  --sjp-shadow:         0 1px 3px rgba(0,0,0,.05);
  --sjp-shadow-md:      0 2px 8px rgba(0,0,0,.08);
}

/* 글로벌 */
*{box-sizing:border-box;margin:0;padding:0}
body {
  margin: 0;
  padding: 0;
  background: var(--sjp-bg-app);
  font-family: 'Segoe UI','Malgun Gothic',Arial,sans-serif;
  color: var(--sjp-text-main);
  font-size: 12px;
  line-height: 1.5;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#c4cdd8;border-radius:3px}

/* v1.2 EPC Control 톤 Topbar */
.epc-topbar {
  background: #fff;
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius-lg);
  padding: 12px 18px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--sjp-shadow);
}
.epc-topbar-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--sjp-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  flex-shrink: 0;
}
.epc-topbar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--sjp-text-main);
}
.epc-topbar-sub { font-size: 10px; color: var(--sjp-text-sub); }
.epc-topbar-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

/* v1.2 ITP 연동 안내 */
.itp-link-info {
  padding: 10px 14px;
  background: var(--sjp-primary-light);
  border: 1px solid var(--sjp-border-strong);
  border-radius: var(--sjp-radius-lg);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--sjp-text-main);
}
.itp-link-info-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--sjp-primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.itp-link-info-text { flex: 1; }
.itp-link-info-title { font-weight: 700; color: var(--sjp-primary); margin-bottom: 2px; }
.itp-link-info-sub { color: var(--sjp-text-sub); font-size: 10px; line-height: 1.5; }

/* 버튼 */
.btn-primary {
  padding: 6px 14px;
  background: var(--sjp-primary);
  color: #fff;
  border: none;
  border-radius: var(--sjp-radius);
  font-size: 11px;
  cursor: pointer;
  font-weight: 600;
  transition: background .12s;
}
.btn-primary:hover { background: var(--sjp-primary-hover); }
.btn-secondary {
  padding: 6px 12px;
  background: #fff;
  color: var(--sjp-text-body);
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius);
  font-size: 11px;
  cursor: pointer;
}
.btn-secondary:hover { background: var(--sjp-primary-light); border-color: var(--sjp-border-strong); color: var(--sjp-primary); }
.btn-success {
  padding: 6px 12px;
  background: var(--sjp-success);
  color: #fff;
  border: none;
  border-radius: var(--sjp-radius);
  font-size: 11px;
  cursor: pointer;
  font-weight: 600;
}
.btn-success:hover { background: #15803d; }

/* 카드 */
.epc-card {
  background: #fff;
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius-lg);
  overflow: hidden;
  box-shadow: var(--sjp-shadow);
  margin-bottom: 12px;
}
.epc-card-h {
  padding: 10px 16px;
  background: var(--sjp-bg-table-head);
  border-bottom: 1px solid var(--sjp-border);
  font-size: 12px;
  font-weight: 700;
  color: var(--sjp-text-main);
}
.epc-card-b { padding: 14px 16px; }

/* 빈 상태 */
.empty-state {
  padding: 40px;
  text-align: center;
  background: #fff;
  border: 2px dashed var(--sjp-border-strong);
  border-radius: var(--sjp-radius-lg);
  color: var(--sjp-text-sub);
  box-shadow: var(--sjp-shadow);
}

/* 입력 */
input:focus, select:focus, textarea:focus { outline: none; }

@media print {
  /* v2.0 A안 풀-블리드: A4 한 페이지를 보고서가 꽉 채우도록 강제 */
  @page { size: A4 portrait; margin: 0 }
  html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
  .no-print, .epc-topbar, .itp-link-info, .ic, .fc, .bc, .vc { display: none !important; }

  /* v2.2 — max-height/overflow:hidden 제거 (잘림 원인이었음).
     min-height만 275mm로 줄여 자연 하단 버퍼 확보 + 서명·표 보호 */
  .qa-report-body {
    box-sizing: border-box !important;
    padding: 10mm 8mm !important;
    min-height: 275mm !important;
    display: flex !important;
    flex-direction: column !important;
  }
  /* 마지막 페이지 끝에서 빈 페이지 생성 방지 */
  .qa-report-body:last-child { page-break-after: avoid !important; }

  /* Final VI 페이지 2 (PHOTO REPORT) — 명시적 페이지 분리 + 동일 사이즈 */
  .qa-report-body > div[style*="pageBreakBefore"] {
    box-sizing: border-box !important;
    padding: 10mm 8mm !important;
    min-height: 275mm !important;
    display: flex !important;
    flex-direction: column !important;
    page-break-before: always !important;
  }

  /* 서명·표·핵심 블록은 페이지 중간에서 잘리지 않도록 */
  table { page-break-inside: avoid !important; }
  div[style*="borderTop"] { page-break-inside: avoid !important; }
  /* v2.8 — Fitup Joint 20+ 케이스: Joint 표는 페이지 분할 허용, end-block은 함께 유지 */
  table.fitup-joint-many {
    page-break-inside: auto !important;
  }
  table.fitup-joint-many tr {
    page-break-inside: avoid !important;   /* 개별 row는 잘리지 않음 */
  }
  table.fitup-joint-many thead {
    display: table-header-group;            /* 페이지마다 헤더 자동 반복 */
  }
  .fitup-end-block {
    page-break-inside: avoid !important;    /* 측정장비 + 서명은 마지막 페이지에 함께 */
  }

  /* v2.6 — 이미지 높이 90mm로 감축 (Bending/Hydro 표·계산 콘텐츠 무거움 대응)
     계산: 90mm 이미지 + 평균 콘텐츠 180mm + 패딩 20mm ≈ 290mm (안전 마진 7mm) */
  .pf-img {
    height: 90mm !important;
    min-height: 90mm !important;
    max-height: 90mm !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    overflow: hidden !important;
  }
  /* Final VI 페이지 2: 사진 2매 각 90mm — 헤더 25 + 90*2 + gap 12 = 217mm + padding 20 = 237mm (38mm 버퍼) */
  .qa-report-body > div[style*="pageBreakBefore"] .pf-img {
    height: 90mm !important;
    min-height: 90mm !important;
    max-height: 90mm !important;
  }
  /* v2.6 — IDZ UI 오버레이 인쇄 숨김 ("✕ 클릭 초기화", "클릭 후 Ctrl+V 붙여넣기" 등) */
  .pf-img > span,
  .pf-img > div[style*="position:absolute"],
  .pf-img div[style*="color:red"],
  .pf-img div[style*="color:#aaa"] {
    display: none !important;
  }
  /* 이미지가 로딩된 경우만 표시 — img가 있으면 placeholder span은 자동 숨김 (조건부 렌더) */
  /* Final VI 페이지 2 wrapper의 marginTop 무력화 (페이지 3 넘김 방지) */
  .qa-report-body > div[style*="pageBreakBefore"] {
    margin-top: 0 !important;
  }
  /* Nozzle 15+ 노즐: 이미지 영역 페이지 1 풀로 */
  .noz-big .pf-img {
    height: 220mm !important;
    min-height: 220mm !important;
    max-height: 220mm !important;
  }
  /* v2.7 — PinImg/IDZ 내부 wrapper 무력화 + img는 absolute 중앙정렬
     중첩 wrapper(.pf-img > div > div ...)들이 flex 중앙정렬 안 통과시키는 문제 해결 */
  .pf-img > div {
    width: 100% !important;
    height: 100% !important;
    position: relative !important;
    min-height: 0 !important;
    flex: none !important;
  }
  .pf-img > div > div {
    width: 100% !important;
    height: 100% !important;
    position: relative !important;
  }
  /* 핵심: img를 .pf-img 안에 absolute 중앙정렬 (어떤 중첩에서도 동작) */
  .pf-img {
    position: relative !important;
  }
  .pf-img img {
    position: absolute !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: auto !important;
    height: auto !important;
    max-width: 100% !important;
    max-height: 100% !important;
    object-fit: contain !important;
    display: block !important;
  }
  /* PinImg의 핀 표시는 인쇄에서도 유지 (pins은 image와 함께 표시) */

  /* 표는 그대로 (자연 높이 유지) */
  table { page-break-inside: avoid; }
}
</style>
</head>

const {useState, useEffect, useRef, useCallback} = React;

// ════════════ 0. iframe 임베드 모드 — parent window의 EPC Control 데이터 자동 사용 ════════════
// v1.3 (sejong-platform Phase 2):
// - window.opener (새 창에서 열린 경우) 와 window.parent (iframe 임베드) 모두 지원
// - 250ms 폴링으로 EPC Control의 데이터 변경을 자동 반영
(function inheritFromHost(){
  function getHost(){
    try {
      if (window.opener && !window.opener.closed && window.opener.SJP) return window.opener;
    } catch(e){}
    try {
      if (window.parent && window.parent !== window && window.parent.SJP) return window.parent;
    } catch(e){}
    return null;
  }
  function syncOnce(){
    const host = getHost();
    if (!host) return false;
    try {
      window.SJP = host.SJP;
      window.EPC_PROJECT = host.EPC_PROJECT;
      window.EPC_ITEMS = host.EPC_ITEMS;
      window.EPC_DOC_NO_GENERATOR = host.EPC_DOC_NO_GENERATOR;
      window.EPC_INSPECTOR_MASTER = host.EPC_INSPECTOR_MASTER;
      window.WPS_LIST = host.WPS_LIST;
      window.WELDER_LIST = host.WELDER_LIST;
      return true;
    } catch(e){
      console.warn("[QA Doc Generator] host 접근 실패", e.message);
      return false;
    }
  }
  const ok = syncOnce();
  console.log("[QA Doc Generator v1.4] 호스트 연결 " + (ok ? "성공 — EPC Control 데이터 상속 완료" : "실패 (Standalone 모드)"));
  if (ok) setInterval(syncOnce, 250);
})();

function parsePipe(spec){if(!spec)return{isPipe:false,od:"",display:""};let a="";const B=spec.match(/(\d+(?:\.\d+)?)\s*[Bb]/),A=spec.match(/(\d+)\s*[Aa]/);if(B){a=NPS_B[B[1]]||String(Math.round(parseFloat(B[1])*25.4));}else if(A){a=A[1];}else{const m=spec.match(/^(\d+)/);if(m)a=m[1];}const od=NPS_OD[a];if(od)return{isPipe:true,od:String(od),display:`${od}mm (${spec})`};return{isPipe:!!(B||A||spec.toUpperCase().includes("SCH")),od:"",display:spec};}

const HEAD_OPTIONS = ["2:1 Ellip.","10% (F&D)","Hemispherical","Flat","Conical","Dished","CAP","Torispherical"];
const normalizeHeadType = (raw) => {
  if(!raw) return "2:1 Ellip.";
  const r = String(raw).toUpperCase().replace(/[\s_-]/g,"");
  if(/2[:.]?1|2TO1|ELLIP/.test(r)) return "2:1 Ellip.";
  if(/10%?(F&?D|FAD|FANDDISH|FANDD)|FANDD/.test(r) || /F&D/.test(raw||"")) return "10% (F&D)";
  if(/HEMI|HEMISPHE/.test(r)) return "Hemispherical";
  if(/FLAT/.test(r)) return "Flat";
  if(/CONICAL|CONE/.test(r)) return "Conical";
  if(/TORI|TORISPHE/.test(r)) return "Torispherical";
  if(/CAP|B16\.?9|PIPECAP/.test(r)) return "CAP";
  if(/DISH/.test(r)) return "Dished";
  return raw;
};
const headEFFactor = (headType) => {
  const h = normalizeHeadType(headType);
  if(h === "2:1 Ellip.") return 0.25;
  if(h === "10% (F&D)")  return 0.194;
  if(h === "Hemispherical") return 0.5;
  if(h === "Torispherical") return 0.20;
  return 0.25;
};

const headTolerance = (headType, nominalD) => {
  const t = String(headType||"").toUpperCase();
  const D = parseFloat(nominalD)||0;
  if(t.includes("CAP"))   return {height:"메이커 사양", crown:"메이커 사양", knuckle:"메이커 사양", note:"PIPE CAP — 별도 검사 없음"};
  if(t.includes("FLAT"))  return {height:"±2", crown:"—", knuckle:"—", note:"Flat Head"};
  if(t.includes("HEMI"))  return {height:"±5", crown:`R = ${(D/2).toFixed(0)} ±${Math.max(3,(D*0.0125).toFixed(1))}`, knuckle:"—", note:"Hemispherical R=D/2"};
  if(t.includes("2:1"))   return {height:`${(D/4).toFixed(0)} ±${Math.max(3,(D*0.005).toFixed(1))}`, crown:`R ≈ 0.9·D = ${(D*0.9).toFixed(0)}`, knuckle:`r ≈ 0.17·D = ${(D*0.17).toFixed(0)}`, note:"2:1 Semi-Ellip. (h=D/4)"};
  if(t.includes("10%"))   return {height:`${(D*0.194).toFixed(0)} ±${Math.max(3,(D*0.005).toFixed(1))}`, crown:`L = D = ${D.toFixed(0)}`, knuckle:`r = 0.1·D = ${(D*0.1).toFixed(0)}`, note:"10% F&D (Torispherical L=D, r=0.1D)"};
  if(t.includes("CONIC")) return {height:"각도 ±1°", crown:"—", knuckle:"—", note:"Conical Head"};
  return {height:"±5", crown:"—", knuckle:"—", note:headType};
};

  return <input value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%", fontSize:12, padding:"5px 7px", borderRadius:5, border:"0.5px solid #ccc", ...style}}/>;
}
function FS({value, onChange, options}){
  return <select value={value} onChange={e=>onChange(e.target.value)}
    style={{fontSize:12, padding:"5px 7px", borderRadius:5, width:"100%", border:"0.5px solid #ccc"}}>
    {options.map(o => <option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}

}
function FR({label, children}){
  return <div style={{display:"flex", alignItems:"flex-start", gap:6, marginBottom:8}}>
    <label style={{minWidth:115, fontSize:11, color:"#555", paddingTop:6}}>{label}</label>
    <div style={{flex:1}}>{children}</div>

}
function PC({title, children, badge, color}){

    {src?<img src={src} alt={label} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}}/>:<span className="no-print" style={{fontSize:9,color:"#aaa",textAlign:"center",padding:"0 8px"}}>[ {label} ]<br/>클릭 후 Ctrl+V 붙여넣기</span>}

  </div>;
}
function PinImg({src,cps,pk,onPinChange}){
  const PK=pk+"_pins";
  const[pins,sP]=useState(()=>IMG_STORE.get(PK)||[]);
  const[mode,sM]=useState(false);
  const[next,sN]=useState("A");
  const ref=useRef(null);
  const LBLS=cps.map(c=>c.p);
  const sync=np=>{sP(np);IMG_STORE.set(PK,np);if(onPinChange)onPinChange(np);};
  const addPin=useCallback(e=>{
    if(!mode||!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    const np=[...pins,{x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height,label:next}];
    sync(np);
    const i=LBLS.indexOf(next);if(i<LBLS.length-1)sN(LBLS[i+1]);
  },[mode,pins,next,LBLS]);
  const clr=()=>{sync([]);sN(LBLS[0]||"A");};
  return <div style={{flex:1,position:"relative",border:"1px dashed #bbb",borderRadius:4,minHeight:140,background:"#fafafa",overflow:"hidden",height:"100%"}}>
    {src?<div style={{position:"relative",width:"100%",height:"100%"}}>
      <img ref={ref} src={src} style={{width:"100%",maxHeight:440,objectFit:"contain",display:"block",cursor:mode?"crosshair":"default"}} onClick={addPin}/>
      {pins.map((pin,i)=> <div key={i} onClick={e=>{e.stopPropagation();sync(pins.filter((_,j)=>j!==i));}} style={{position:"absolute",left:`${pin.x*100}%`,top:`${pin.y*100}%`,transform:"translate(-50%,-50%)",background:"#e53e3e",color:"#fff",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,cursor:"pointer",zIndex:10,border:"1.5px solid #fff"}}>{pin.label}</div>)}
    </div>:<span style={{fontSize:9,color:"#aaa",display:"flex",alignItems:"center",justifyContent:"center",height:140}}>Ctrl+V 붙여넣기 후 📍핀 배치</span>}
    <div className="fc" style={{position:"absolute",bottom:4,right:4,display:"flex",gap:3,zIndex:20}}>
      <button onClick={()=>sM(p=>!p)} style={{fontSize:9,padding:"2px 7px",background:mode?"#e53e3e":SJB,color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>{mode?`📍${next} 배치중(OFF)`:"📍핀 배치 ON"}</button>
      {pins.length>0&&<button onClick={()=>{const np=pins.slice(0,-1);sync(np);if(np.length<LBLS.length)sN(LBLS[np.length]||"A");}} style={{fontSize:9,padding:"2px 6px",background:"#888",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>↶ 마지막 핀 취소</button>}
      {pins.length>0&&<button onClick={clr} style={{fontSize:9,padding:"2px 6px",background:"#666",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>핀 초기화</button>}
    </div>
  </div>;
}

function BOMPreview({doc}){
  const{item:it,proj:p}=doc;
  const isC=it.type.includes("Condenser")||it.type.includes("Heat"),isR=it.type.includes("Reactor"),isEPC=p.clientType==="epc";
  // 모든 행에 heat 필드와 qty 추가
  const mkRow=(name,mat,sz,qty="1")=>({name,mat:mat||"",sz:sz||"",qty,heat:"",remark:""});
  const odVal=(it.shell_od&&it.shell_od!=="N/A")?it.shell_od:"";
  const odDisp=(it.shell_od_display&&it.shell_od_display!=="N/A")?it.shell_od_display:odVal;
  // DETAIL OF BODY에서 파싱된 bom_rows가 있으면 우선 사용
  const parsedBom=(it.bom_rows||[]).filter(r=>r&&r.name).map(r=>({
    name:r.name||"",
    mat:r.mat||"",
    sz:r.sz||(r.thk?`t${r.thk}`:""),
    qty:r.qty||"1",
    heat:"",
    remark:r.remark||""
  }));
  // Head Type 상/하 분리 (호환: head_type_top/bottom 없으면 head_type로 fallback)
  const htTop=it.head_type_top||it.head_type||"2:1 Ellip.";
  const htBtm=it.head_type_bottom||it.head_type||"2:1 Ellip.";
  const hMatTop=it.head_mat_top||it.head_mat||it.shell_mat||"";

function MountFlangeTable({rows:initialRows,supportType,onChange,hc,tc}){
  const[rows,setRows]=useState(initialRows);
  const upd=(i,k,v)=>{
    const nr=rows.map((r,j)=>j===i?{...r,[k]:v}:r);
    setRows(nr);onChange&&onChange(nr);
  };
  const cellC={...tc,textAlign:"center",fontSize:10,verticalAlign:"middle"};
  const ci={width:"100%",border:"none",background:"transparent",fontSize:10,padding:"1px 3px",boxSizing:"border-box",textAlign:"center"};
  return <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,marginBottom:6}}>
    <thead><tr>{["Check Item","Design","Tolerance","Actual","Result"].map((h,k)=> <th key={h} style={{...hc,background:"#f0eeff",width:k===0?"38%":k===4?"14%":"16%"}}>{h}</th>)}</tr></thead>
    <tbody>{rows.map((r,i)=> <tr key={i}>
      <td style={cellC}>{r.item}</td>
      <td style={cellC}><input value={r.design} onChange={e=>upd(i,"design",e.target.value)} placeholder="—" style={ci}/></td>
      <td style={cellC}><input value={r.tol} onChange={e=>upd(i,"tol",e.target.value)} style={{...ci,fontWeight:500,color:"#1a6fa8"}}/></td>
      <td style={cellC}><input value={r.actual} onChange={e=>upd(i,"actual",e.target.value)} style={ci}/></td>
      <td style={{...cellC,padding:0}}>
        <select value={r.result} onChange={e=>upd(i,"result",e.target.value)} style={{width:"100%",border:"none",fontSize:10,padding:"3px",cursor:"pointer",fontWeight:500,background:r.result==="Accept"?"#e6f7f0":r.result==="Reject"?"#fee":"transparent",color:r.result==="Accept"?"#1d9e75":r.result==="Reject"?"#c33":"inherit",textAlign:"center",textAlignLast:"center"}}>
          <option value="">—</option>
          <option value="Accept">✓ Accept</option>
          <option value="Reject">✗ Reject</option>
        </select>
      </td>
    </tr>)}</tbody>
    {supportType&&<tfoot><tr><td colSpan={5} style={{fontSize:9,padding:"3px 6px",background:"#f8fafc",color:"#1d9e75",borderTop:"0.5px solid #ddd"}}>✓ BOM에서 "{supportType.toUpperCase()}" 자동 감지 → 해당 측정 항목 추가됨. 공차값은 직접 수정 가능 (고객사별 사양 반영).</td></tr></tfoot>}
  </table>;
}
function DIMPreview({doc}){
  const{item:it,proj:p}=doc;const isR=it.type.includes("Reactor"),isC=it.type.includes("Condenser")||it.type.includes("Heat");
  const tNo=tagId(it.tag);const hc=hdr(),tc=bdr();const HC1={...hc,whiteSpace:"nowrap"};
  const dk=`dim_${it.id||it.tag}`;
  const[dImg,sDI]=useState(()=>IMG_STORE.get(dk)||null);
  const handleDI=v=>{sDI(v);IMG_STORE.set(dk,v);};
  // 핀 데이터 동기화 - PinImg가 IMG_STORE에 저장한 핀 배열 읽기
  const PK=dk+"_pins";
  const[pinTick,sTick]=useState(0);
  const pins=IMG_STORE.get(PK)||[];
  // ── 영속화 키 ──
  const dimSetKey=`dim_set_${it.id||it.tag}`;
  const dimRowsKey=`dim_rows_${it.id||it.tag}`;
  const savedDimSet=IMG_STORE.get(dimSetKey)||{};
  // 표준 (ASME / TEMA) 선택
  const[tolStd,sTS]=useState(savedDimSet.tolStd||(isC?"TEMA":"ASME"));
  const tolFn=tolStd==="TEMA"?dimTolTEMA:dimTolASME;
  // CheckPoint Row: 사용자가 추가/편집 가능, 기본은 핀 개수에 맞게 채움
  // v1.5 — A~Z (26) + AA~ZZ (676) = 총 702개 라벨
  const LBL = (() => {
    const arr = [];
    for(let i=0;i<26;i++) arr.push(String.fromCharCode(65+i));
    for(let i=0;i<26;i++) for(let j=0;j<26;j++) arr.push(String.fromCharCode(65+i)+String.fromCharCode(65+j));
    return arr;
  })();
  const isST=it.type.includes("Storage Tank");
  // ── Head Type 상/하 분리 (호환) ──
  const dimHtTop=it.head_type_top||it.head_type||"2:1 Ellip.";
  const dimHtBtm=it.head_type_bottom||it.head_type||"2:1 Ellip.";
  const dimD=parseFloat(it.shell_id)||parseFloat(it.shell_od)||0;
  const tolTop=headTolerance(dimHtTop,dimD);
  const tolBtm=headTolerance(dimHtBtm,dimD);
  const initRows=()=>{
    const saved=IMG_STORE.get(dimRowsKey);
    if(saved&&Array.isArray(saved)&&saved.length>0)return saved;
    const def=isC?[
      {desc:"Shell ID",dwg:it.shell_id||"",tol:"±5"},
      {desc:"Channel ID",dwg:it.shell_id||"",tol:"±5"},
      {desc:"Tube Sheet OD",dwg:"",tol:"±2"},
      {desc:"Girth Flange",dwg:"",tol:"±2"},
      {desc:"Shell Length",dwg:it.shell_len||"",tol:"±10"},
      // CAP인 경우 Head Height/Crown 검사 불필요
      ...(dimHtTop==="CAP"?[]:[{desc:`TOP Head Height (${dimHtTop})`,dwg:tolTop.height!=="메이커 사양"?String(tolTop.height).replace(/[±\s]/g,"").split("±")[0]:"",tol:`${tolTop.height} mm`,remark:tolTop.note}]),
      ...(dimHtBtm==="CAP"?[]:[{desc:`BTM Head Height (${dimHtBtm})`,dwg:tolBtm.height!=="메이커 사양"?String(tolBtm.height).replace(/[±\s]/g,"").split("±")[0]:"",tol:`${tolBtm.height} mm`,remark:tolBtm.note}])
    ]:isST?[
      {desc:"Shell ID (Top)",dwg:it.shell_id||"",tol:"±5"},
      {desc:"Shell ID (Mid)",dwg:it.shell_id||"",tol:"±5"},
      {desc:"Shell ID (Btm)",dwg:it.shell_id||"",tol:"±5"},
      {desc:"Shell Length",dwg:it.shell_len||"",tol:"±10"},
      ...(dimHtTop==="CAP"?[]:[{desc:`TOP Head Height (${dimHtTop})`,dwg:"",tol:`${tolTop.height} mm`,remark:tolTop.note}]),
      ...(dimHtBtm==="CAP"?[]:[{desc:`BTM Head Height (${dimHtBtm})`,dwg:"",tol:`${tolBtm.height} mm`,remark:tolBtm.note}])
    ]:[
      {desc:"Shell ID",dwg:it.shell_id||"",tol:"±5"},
      {desc:"Shell Length",dwg:it.shell_len||"",tol:"±10"},
      ...(dimHtTop==="CAP"?[]:[{desc:`TOP Head Height (${dimHtTop})`,dwg:"",tol:`${tolTop.height} mm`,remark:tolTop.note}]),
      ...(dimHtBtm==="CAP"?[]:[{desc:`BTM Head Height (${dimHtBtm})`,dwg:"",tol:`${tolBtm.height} mm`,remark:tolBtm.note}])
    ];
    return def.map((d,i)=>({p:LBL[i],desc:d.desc,dwg:d.dwg||"",actual:"",remark:d.remark||"",customTol:d.tol||""}));
  };
  const[rows,sRows]=useState(initRows);

    if(pins.length>rows.length){
      const newRows=[...rows];
      for(let i=rows.length;i<pins.length;i++){newRows.push({p:LBL[i]||`P${i+1}`,desc:"",dwg:"",actual:"",remark:""});}
      sRows(newRows);
    }
  };
  const upR=(i,k,v)=>sRows(p=>p.map((x,j)=>j===i?{...x,[k]:v}:x));
  const addRow=()=>sRows(p=>[...p,{p:LBL[p.length]||`P${p.length+1}`,desc:"",dwg:"",actual:"",remark:""}]);
  const delRow=i=>sRows(p=>p.filter((_,j)=>j!==i).map((r,j)=>({...r,p:LBL[j]||`P${j+1}`})));
  // v2.0 — 11열 단위 chunk + overflow 시 마지막 chunk를 placeholder로 padding

        <tr><td style={{...hc,fontSize:9}}>Description</td>{chunk.map((r,i)=> <td key={i} style={{...tc,fontSize:9,padding:"2px"}}><select value={r.desc} onChange={e=>upR(startIdx+i,"desc",e.target.value)} style={{width:"100%",border:"none",background:"transparent",fontSize:9,textAlign:"center"}}><option value="">— 선택 —</option>{DIM_LIB.map(d=> <option key={d}>{d}</option>)}<option value="custom">[ 직접입력 ]</option></select>{r.desc==="custom"&&<input value={r.descCustom||""} onChange={e=>upR(startIdx+i,"descCustom",e.target.value)} placeholder="custom" style={{width:"100%",border:"none",fontSize:9,marginTop:1}}/>}</td>)}<td className="fc" style={{...tc,padding:"2px",textAlign:"center"}}><button onClick={addRow} style={{fontSize:10,padding:"0 5px",background:SJB,color:"#fff",border:"none",borderRadius:2,cursor:"pointer"}}>+</button></td></tr>
      </thead>
      <tbody>
        <tr><td style={hc}>D.W.G</td>{chunk.map((r,i)=> <td key={i} style={{...tc,padding:"2px"}}><input value={r.dwg} onChange={e=>upR(startIdx+i,"dwg",e.target.value)} placeholder="mm" style={{width:"100%",border:"none",background:"transparent",fontSize:10,textAlign:"center"}}/></td>)}<td className="fc" style={tc}></td></tr>
        <tr><td style={hc}>Actual</td>{chunk.map((r,i)=> <td key={i} style={{...tc,padding:"2px"}}><input value={r.actual} onChange={e=>upR(startIdx+i,"actual",e.target.value)} style={{width:"100%",border:"none",background:"transparent",fontSize:10,textAlign:"center"}}/></td>)}<td className="fc" style={tc}></td></tr>
        <tr><td style={hc}>Tolerance</td>{chunk.map((r,i)=> <td key={i} style={{...tc,fontSize:9,color:r.customTol?"#1a6fa8":"#888",textAlign:"center",fontWeight:r.customTol?500:"normal"}}>{r.customTol||tolFn(r.dwg)||"—"}</td>)}<td className="fc" style={tc}></td></tr>
        <tr><td style={hc}>Remark</td>{chunk.map((r,i)=> <td key={i} style={{...tc,padding:"2px"}}><input value={r.remark} onChange={e=>upR(startIdx+i,"remark",e.target.value)} style={{width:"100%",border:"none",background:"transparent",fontSize:9}}/></td>)}<td className="fc" style={{...tc,textAlign:"center"}}><button onClick={()=>chunk.length>0&&delRow(startIdx+chunk.length-1)} style={{fontSize:10,padding:"0 5px",background:"#fff0f0",color:"#c00",border:"none",borderRadius:2,cursor:"pointer"}}>−</button></td></tr>
      </tbody>

  return <div style={{fontFamily:"sans-serif",fontSize:11}}>
    <style>{`@media print{@page{size:A4 portrait;margin:10mm}.fc{display:none!important}}`}</style>

    <table style={{width:"100%",borderCollapse:"collapse",marginBottom:6}}>

          </div>
        </div>
        {/* ② Photo 2 — 독립 붙여넣기 */}
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
          <div style={{fontSize:11,fontWeight:600,color:"#666",marginBottom:3,borderBottom:"1px solid #ddd",paddingBottom:2}}>② Photo 2 — Nozzle Orientation / 추가 사진</div>
          <div style={{flex:1,minHeight:0,display:"flex"}}>
            <IDZ label="Photo 2 — Ctrl+V 붙여넣기" persistKey={`final_p2b_${it.id||it.tag}`}/>
          </div>
        </div>
      </div>
      {/* v1.6 — 페이지 2는 사진대지이므로 서명란 제거 */}
    </div>
  </div>;
}
function SignatureBlock({inspector}){
  return <div style={{display:"flex", gap:18, marginTop:12, fontSize:10}}>
    {[
      {label:"Prepared by", value:inspector.internal || ""},
      {label:"Reviewed by", value:""},
      {label:"Approved by", value:""},
      {label:"Witnessed by", value:inspector.client || inspector.thirdParty || ""}
    ].map(s =>
      <div key={s.label} style={{flex:1, borderTop:"0.5px solid #999", paddingTop:4}}>
        <div style={{fontSize:9, color:"#666"}}>{s.label}</div>
        <div style={{minHeight:24, fontSize:10, fontWeight:500}}>{s.value}</div>
        <div style={{fontSize:9, color:"#888"}}>Date:</div>
      </div>
    )}
  </div>;
}

// ════════════ 14. PrintBar ════════════
function PrintBar({title}){
  // v2.0 Hybrid — 인쇄 다이얼로그 옵션 안내문 (Safari·Default margin 대비)
  return <div className="no-print" style={{marginBottom:8}}>
    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 10px", background:"#f0f4f8", borderRadius:5}}>
      <span style={{fontSize:11, fontWeight:500}}>📄 {title}</span>
      <button onClick={()=>window.print()} style={{padding:"4px 12px", background:SJB, color:"#fff", border:"none", borderRadius:4, cursor:"pointer", fontSize:11}}>🖨 인쇄</button>
    </div>
    <div style={{fontSize:10, color:"#666", padding:"4px 10px", marginTop:3, background:"#fffdf5", border:"0.5px dashed #ecd6a3", borderRadius:4}}>
      <span style={{color:"#996b04", fontWeight:600}}>🖨 인쇄 시 권장 옵션:</span>
      &nbsp;Chrome/Edge 다이얼로그 → <strong>여백(Margins): "기본값" 또는 "없음"</strong> &nbsp;|&nbsp;
      <strong>"머리글 및 바닥글" 체크 해제</strong> &nbsp;|&nbsp;
      <strong>"배경 그래픽" 체크</strong>
    </div>
  </div>;
}

// ════════════ 15. 메인 App ════════════
function App(){
  const [proj, setProj] = useState({
    no: "SJ2026-030",
    name: "(VDS)ESTER 공정용 수평콘덴서 교체공사",
    customer: "㈜동성케미컬",
    po: "SJT-WO-2026-030"
  });
  const [items, setItems] = useState([{
    id: "i_dong_e101",
    tagNo: "E-101",
    type: "Condenser / Heat Exchanger",
    spec: "ASME Sec.VIII Div.1 · TEMA Class R",
    maker: "㈜세종기술",
    status: "진행중"
  }]);
  const [activeItemId, setActiveItemId] = useState("i_dong_e101");
  const [activeDoc, setActiveDoc] = useState("BOM");
  const [hydroPart, sHydroPart] = useState("Shell");
  const [docData, setDocData] = useState({}); // {itemId: {BOM:{rows:[]}, BENDING:{}, ...}}
  const [inspectors, setInspectors] = useState(INSPECTOR_SEED);
  const [inspector, setInspector] = useState({
    internal: "신채완 과장",
    client: "동성케미컬 김OO 차장",
    thirdParty: "",
    thirdPartyCustom: "",
    vendor: "㈜세종기술"
  });
  const [msg, setMsg] = useState("");

  useEffect(() => {
    // v1.2 sjp-bridge optional chaining (외부 의존성 안전 처리)
    if (window.SJP?.bridge?.renderTopbar) {
      window.SJP.bridge.renderTopbar("QA Doc Generator v1.4", "신채완 과장");
    }
    const s = loadLS();
    if (s) {
      if (s.proj) setProj(s.proj);
      if (s.items) setItems(s.items);
      if (s.docData) setDocData(s.docData);
      if (s.inspectors) setInspectors(s.inspectors);
      if (s.inspector) setInspector(s.inspector);
      if (s.activeItemId) setActiveItemId(s.activeItemId);
      if (s.activeDoc) setActiveDoc(s.activeDoc);
    }
    // ITP Builder가 sjp-bridge에 저장한 데이터 자동 인식 (안전 처리)
    if (window.SJP?.bridge) {
      const bridgeProj = window.SJP.bridge.getProject?.();
      const bridgeItems = window.SJP.bridge.getItems?.();
      if (bridgeProj && (!s || !s.proj || !s.proj.no)) {
        setProj(bridgeProj);
        setTimeout(()=>showMsg("✓ ITP Builder의 프로젝트 데이터를 자동 인식했습니다", 4000), 100);
      }
      if (bridgeItems?.length && (!s || !s.items || s.items.length === 0)) {
        setItems(bridgeItems);
        if (bridgeItems[0]) setActiveItemId(bridgeItems[0].id);
        setTimeout(()=>showMsg(`✓ ITP Builder에서 ${bridgeItems.length}개 아이템 자동 동기화`, 4000), 200);
      }
    }
  }, []);
  useEffect(() => {
    const t = setTimeout(() => saveLS({proj, items, docData, inspectors, inspector, activeItemId, activeDoc}), 1000);
    return () => clearTimeout(t);
  }, [proj, items, docData, inspectors, inspector, activeItemId, activeDoc]);

  // Inspector master 편집 핸들러
  const updateInspector = (next) => {
    if (next._addInspector) {
      setInspectors(p => [...p, {id:"INS-"+Date.now(), ...next._addInspector, role:"QA"}]);
      const {_addInspector, ...rest} = next;
      setInspector(rest);
      return;
    }
    if (next._removeId) {
      setInspectors(p => p.filter(i => i.id !== next._removeId));
      const {_removeId, ...rest} = next;
      setInspector(rest);
      return;
    }
    setInspector(next);
  };

  const showMsg = (text, ms=4000) => { setMsg(text); setTimeout(() => setMsg(""), ms); };

  const handleImport = (file) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (d.proj) setProj(d.proj);
        if (d.items) { setItems(d.items); if (d.items.length > 0) setActiveItemId(d.items[0].id); }
        showMsg(`✓ ITP Builder에서 Import 완료 — ${d.items?.length||0}개 아이템`);
      } catch(err) {
        showMsg(`⚠ Import 실패: ${err.message}`);
      }
    };
    r.readAsText(file);
  };

  const handleExportData = () => {
    const data = {proj, items, docData, inspectors, inspector, exported_at: new Date().toISOString(), version:"qc_generator_v1"};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${proj.no || "project"}_qc_data.json`;
    a.click();
    URL.revokeObjectURL(url);
    showMsg(`✓ 데이터 Export 완료`);
  };

  const handleNew = () => {
    if (!confirm("새 프로젝트로 초기화하시겠습니까?")) return;
    setProj({no:"", name:"", customer:"", po:""});
    setItems([]); setActiveItemId(null);
    setDocData({});
    setInspector({internal:"", client:"", thirdParty:"", thirdPartyCustom:"", vendor:""});
    showMsg("✓ 새 프로젝트");
  };

  const activeItem = items.find(i => i.id === activeItemId);
  const itemDocs = activeItemId ? (docData[activeItemId] || {}) : {};
  const setDocFor = (key, val) => {
    if (!activeItemId) return;
    setDocData(p => ({...p, [activeItemId]: {...(p[activeItemId]||{}), [key]:val}}));
  };

  // 만료 임박 용접사 카운트
  const expiringWelders = getWelders().filter(w => welderStatus(w.dueDate).label === "expiring_soon").length;
  const expiredWelders = getWelders().filter(w => welderStatus(w.dueDate).label === "expired").length;

  return <div style={{maxWidth:1200, margin:"0 auto", padding:"14px"}}>
    {/* v1.2 EPC Control 톤 Topbar */}
    <div className="epc-topbar no-print">
      <div className="epc-topbar-icon">🛠</div>
      <div>
        <div className="epc-topbar-title">QA Doc Generator v1.4</div>
        <div className="epc-topbar-sub">신채완 과장 · ㈜세종기술 품질관리부</div>
      </div>
      <div className="epc-topbar-actions">
        {(expiringWelders > 0 || expiredWelders > 0) &&
          <span style={{fontSize:10, padding:"4px 10px", background:"var(--sjp-warning-bg)", color:"#996b04", borderRadius:5, fontWeight:700, border:"1px solid var(--sjp-warning)"}}>
            ⚠ 만료임박 {expiringWelders}명 / 만료 {expiredWelders}명
          </span>}
        <input type="file" accept=".json" id="impFile" style={{display:"none"}}
          onChange={e => e.target.files[0] && handleImport(e.target.files[0])}/>
        <button onClick={()=>document.getElementById("impFile").click()} className="btn-success">📥 ITP에서 Import</button>
        <button onClick={handleExportData} className="btn-secondary">💾 Export</button>
        <button onClick={handleNew} className="btn-secondary">🗋 New</button>
      </div>
    </div>

    {/* v1.2 ITP Builder 연동 안내 */}
    <div className="itp-link-info no-print">
      <div className="itp-link-info-icon">🔗</div>
      <div className="itp-link-info-text">
        <div className="itp-link-info-title">ITP Builder 연동</div>
        <div className="itp-link-info-sub">
          ITP Builder에서 작성한 프로젝트·아이템 정보가 자동으로 동기화됩니다. EPC Control System과 연결 시 WBS 진척률·검사 기록이 양방향으로 갱신됩니다.
        </div>
      </div>
    </div>

    <EPCSlots/>

    {msg && <div className="no-print" style={{
      padding:"9px 14px", marginBottom:10, fontSize:11, fontWeight:500,
      background: msg.startsWith("✓") ? "var(--sjp-success-bg)" : msg.startsWith("⚠") ? "var(--sjp-warning-bg)" : "var(--sjp-primary-light)",
      color: msg.startsWith("✓") ? "#155724" : msg.startsWith("⚠") ? "#856404" : "#004085",
      border: `1px solid ${msg.startsWith("✓") ? "#c3e6cb" : msg.startsWith("⚠") ? "#ffe69c" : "var(--sjp-border-strong)"}`,
      borderRadius:5
    }}>{msg}</div>}

    {/* 프로젝트 정보 + 검사자 */}
    <div className="no-print" style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10}}>
      <PC title="프로젝트 정보">
        <FR label="Project No."><FI value={proj.no} onChange={v=>setProj(p=>({...p, no:v}))}/></FR>
        <FR label="프로젝트명"><FI value={proj.name} onChange={v=>setProj(p=>({...p, name:v}))}/></FR>
        <FR label="발주처"><FI value={proj.customer} onChange={v=>setProj(p=>({...p, customer:v}))}/></FR>
        <FR label="PO No."><FI value={proj.po} onChange={v=>setProj(p=>({...p, po:v}))}/></FR>
      </PC>
      <InspectorPanel inspectors={inspectors} value={inspector} onChange={updateInspector}/>
    </div>

    {items.length === 0 ?
      <div className="empty-state">
        <div style={{fontSize:14, marginBottom:8, fontWeight:600, color:"var(--sjp-text-main)"}}>📥 아이템이 없습니다</div>
        <div style={{fontSize:11, lineHeight:1.7}}>상단의 <strong style={{color:"var(--sjp-success)"}}>"📥 ITP에서 Import"</strong> 버튼으로 ITP Builder에서 Export한 JSON을 불러오거나,<br/>
        EPC Control System 연결 시 자동으로 동기화됩니다.</div>
      </div>
      :
      <div className="no-print" style={{marginBottom:12, padding:"12px 14px", background:"#fff", border:"1px solid var(--sjp-border)", borderRadius:"var(--sjp-radius-lg)", boxShadow:"var(--sjp-shadow)"}}>
        <div style={{fontSize:11, fontWeight:700, marginBottom:8, color:"var(--sjp-text-main)"}}>📦 아이템 선택 ({items.length}개):</div>
        <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>{items.map(it =>
          <button key={it.id} onClick={()=>setActiveItemId(it.id)}
            style={{padding:"8px 14px", fontSize:11, background: activeItemId===it.id?SJB:"#fff", color:activeItemId===it.id?"#fff":"var(--sjp-text-body)", border:`1px solid ${activeItemId===it.id?SJB:"var(--sjp-border)"}`, borderRadius:5, cursor:"pointer", fontWeight: activeItemId===it.id?700:500, transition:"all .12s"}}>
            <strong>{it.tag}</strong> · {it.name}
            {(it.head_top_type === "CAP (B16.9)" || it.head_bot_type === "CAP (B16.9)") &&
              <span style={{marginLeft:5, fontSize:9, color: activeItemId===it.id?"#fff":"var(--sjp-warning)", fontWeight:700, padding:"1px 5px", background:activeItemId===it.id?"rgba(255,255,255,.2)":"var(--sjp-warning-bg)", borderRadius:3}}>CAP</span>}
          </button>
        )}</div>
      </div>
    }

    {activeItem && <>
      <div className="no-print" style={{marginBottom:10, padding:"10px 14px", background:"var(--sjp-primary-light)", borderRadius:"var(--sjp-radius-lg)", fontSize:11, border:"1px solid var(--sjp-border-strong)"}}>
        <strong style={{color:SJB, fontSize:12}}>{activeItem.tag}</strong> · {activeItem.name} · <em style={{color:"var(--sjp-text-sub)"}}>{activeItem.type}</em>
        <div style={{marginTop:4, color:"var(--sjp-text-sub)", fontSize:10}}>
          Top: <b style={{color:"var(--sjp-text-main)"}}>{activeItem.head_top_type}</b> &nbsp;|&nbsp; Bot: <b style={{color:"var(--sjp-text-main)"}}>{activeItem.head_bot_type}</b>
          {activeItem.shell_mat && <> &nbsp;|&nbsp; Material: <b style={{color:"var(--sjp-text-main)"}}>{activeItem.shell_mat}</b></>}
        </div>
      </div>

      <div className="no-print" style={{display:"flex", gap:4, marginBottom:12, overflowX:"auto", padding:"4px"}}>
        {DOC_TYPES.map(d => {
          const isBendingExcluded = d.key === "BENDING" && activeItem.head_top_type === "CAP (B16.9)" && activeItem.head_bot_type === "CAP (B16.9)";
          return <button key={d.key} onClick={()=>setActiveDoc(d.key)}
            style={{padding:"8px 14px", fontSize:11, background: activeDoc===d.key?d.color:"#fff", color:activeDoc===d.key?"#fff":d.color, border:`1.5px solid ${d.color}`, borderRadius:5, cursor:"pointer", whiteSpace:"nowrap", fontWeight:activeDoc===d.key?700:600, opacity: isBendingExcluded?0.5:1, transition:"all .12s", boxShadow: activeDoc===d.key?`0 2px 4px ${d.color}40`:"none"}}>
            {d.label}
            {isBendingExcluded && <span style={{marginLeft:4, fontSize:9}}>⊘</span>}
          </button>;
        })}
      </div>

      <PrintBar title={`${DOC_TYPES.find(d=>d.key===activeDoc)?.label} — ${activeItem.tag}`}/>

      <div className="qa-report-body" style={{border:"1px solid var(--sjp-border)", borderRadius:"var(--sjp-radius-lg)", padding:16, background:"#fff", boxShadow:"var(--sjp-shadow)"}}>
        {(() => {
          // V25 doc 객체 합성 어댑터 — V25 Preview는 {doc:{type,item,proj,...}} 시그니처
          const doc = { type: activeDoc, item: activeItem, proj };
          if (activeDoc === "BOM")     return <BOMPreview doc={doc}/>;
          if (activeDoc === "BENDING") {
            if (activeItem.head_top_type === "CAP (B16.9)" && activeItem.head_bot_type === "CAP (B16.9)") {
              return <div style={{padding:24, textAlign:"center", color:"#888", fontSize:12}}>
                ⊘ Bending Report 생략 (Top/Bot 모두 CAP — Pipe Cap은 메이커 사양품)
              </div>;
            }
            return <BendingPreview doc={doc}/>;
          }
          if (activeDoc === "FITUP")   return <FitupPreview doc={doc}/>;
          if (activeDoc === "DIM")     return <DIMPreview doc={doc}/>;
          if (activeDoc === "NOZZLE")  return <NozzlePreview doc={doc}/>;
          if (activeDoc === "HYDRO") {
            // HYDRO는 part별 별도 보고서. part 서브탭 표시.
            const hp = ["Shell"];
            if ((activeItem.type||"").includes("Condenser") || (activeItem.type||"").includes("Heat")) hp.push("Tube Side");
            if (activeItem.jacket) { if(activeItem.jacket_partition){ hp.push("Jacket Upper"); hp.push("Jacket Lower"); } else hp.push("Jacket"); }
            if (activeItem.incoil) { hp.push(activeItem.incoil_double?"In-Coil #1":"In-Coil"); if(activeItem.incoil_double) hp.push("In-Coil #2"); }
            if (activeItem.halfcoil) { if(activeItem.halfcoil_partition){ hp.push("Half-Coil Upper"); hp.push("Half-Coil Lower"); } else hp.push("Half-Coil"); }
            const curPart = hp.includes(hydroPart) ? hydroPart : hp[0];
            return <>
              <div className="no-print" style={{display:"flex", gap:6, marginBottom:10, flexWrap:"wrap"}}>
                {hp.map(p => <button key={p} onClick={()=>sHydroPart(p)}
                  style={{padding:"6px 12px", fontSize:11, background: curPart===p?"#a32d2d":"#fff", color: curPart===p?"#fff":"#a32d2d", border:"1px solid #a32d2d", borderRadius:4, cursor:"pointer", fontWeight: curPart===p?700:500}}>
                  {p}
                </button>)}
              </div>
              <HydroPreview doc={{...doc, part: curPart}}/>
            </>;
          }
          if (activeDoc === "FINAL")   return <FinalPreview doc={doc}/>;
          return null;
        })()}
      </div>
    </>}

    <div className="no-print" style={{textAlign:"center", marginTop:20, fontSize:9, color:"var(--sjp-text-muted)"}}>
      QA Doc Generator v1.4 · ㈜세종기술 품질관리부 · ⓒ Designed by Cwkim · 신채완 과장
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// (sejong-platform 헤더 버튼 제거됨 — SJ FLOW iframe 통합 구조로 전환)
</script>
</body>
</html>
