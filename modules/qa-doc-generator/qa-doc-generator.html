<style>
/* ═══════════════════════════════════════════════════════════
   EPC Control System 디자인 토큰 (인라인 정의)
   v1.2 — 부장님 EPC Control 톤 통일 + sjp-tokens.css 의존성 제거
═══════════════════════════════════════════════════════════ */
:root {
  --sjp-primary:        #4a7fc1;
  --sjp-primary-hover:  #3a6bb5;
  --sjp-primary-light:  #eef3fb;
  --sjp-success:        #16a34a;
  --sjp-success-bg:     #f0fdf4;
  --sjp-warning:        #f59e0b;
  --sjp-warning-bg:     #fef3c7;
  --sjp-danger:         #dc2626;
  --sjp-danger-bg:      #fee2e2;
  --sjp-border:         #e4e7ec;
  --sjp-border-strong:  #c3d6f0;
  --sjp-bg-card:        #ffffff;
  --sjp-bg-app:         #f0f4f8;
  --sjp-bg-table-head:  #f8fafc;
  --sjp-bg-row-hover:   #f9fafb;
  --sjp-text-main:      #1a2332;
  --sjp-text-body:      #4b5563;
  --sjp-text-sub:       #6b7280;
  --sjp-text-muted:     #9ca3af;
  --sjp-radius-sm:      4px;
  --sjp-radius:         5px;
  --sjp-radius-lg:      8px;
  --sjp-shadow:         0 1px 3px rgba(0,0,0,.05);
  --sjp-shadow-md:      0 2px 8px rgba(0,0,0,.08);
}

/* 글로벌 */
*{box-sizing:border-box;margin:0;padding:0}
body {
  margin: 0;
  padding: 0;
  background: var(--sjp-bg-app);
  font-family: 'Segoe UI','Malgun Gothic',Arial,sans-serif;
  color: var(--sjp-text-main);
  font-size: 12px;
  line-height: 1.5;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#c4cdd8;border-radius:3px}

/* v1.2 EPC Control 톤 Topbar */
.epc-topbar {
  background: #fff;
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius-lg);
  padding: 12px 18px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--sjp-shadow);
}
.epc-topbar-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--sjp-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  flex-shrink: 0;
}
.epc-topbar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--sjp-text-main);
}
.epc-topbar-sub { font-size: 10px; color: var(--sjp-text-sub); }
.epc-topbar-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

/* v1.2 ITP 연동 안내 */
.itp-link-info {
  padding: 10px 14px;
  background: var(--sjp-primary-light);
  border: 1px solid var(--sjp-border-strong);
  border-radius: var(--sjp-radius-lg);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--sjp-text-main);
}
.itp-link-info-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--sjp-primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.itp-link-info-text { flex: 1; }
.itp-link-info-title { font-weight: 700; color: var(--sjp-primary); margin-bottom: 2px; }
.itp-link-info-sub { color: var(--sjp-text-sub); font-size: 10px; line-height: 1.5; }

/* 버튼 */
.btn-primary {
  padding: 6px 14px;
  background: var(--sjp-primary);
  color: #fff;
  border: none;
  border-radius: var(--sjp-radius);
  font-size: 11px;
  cursor: pointer;
  font-weight: 600;
  transition: background .12s;
}
.btn-primary:hover { background: var(--sjp-primary-hover); }
.btn-secondary {
  padding: 6px 12px;
  background: #fff;
  color: var(--sjp-text-body);
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius);
  font-size: 11px;
  cursor: pointer;
}
.btn-secondary:hover { background: var(--sjp-primary-light); border-color: var(--sjp-border-strong); color: var(--sjp-primary); }
.btn-success {
  padding: 6px 12px;
  background: var(--sjp-success);
  color: #fff;
  border: none;
  border-radius: var(--sjp-radius);
  font-size: 11px;
  cursor: pointer;
  font-weight: 600;
}
.btn-success:hover { background: #15803d; }

/* 카드 */
.epc-card {
  background: #fff;
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius-lg);
  overflow: hidden;
  box-shadow: var(--sjp-shadow);
  margin-bottom: 12px;
}
.epc-card-h {
  padding: 10px 16px;
  background: var(--sjp-bg-table-head);
  border-bottom: 1px solid var(--sjp-border);
  font-size: 12px;
  font-weight: 700;
  color: var(--sjp-text-main);
}
.epc-card-b { padding: 14px 16px; }

/* 빈 상태 */
.empty-state {
  padding: 40px;
  text-align: center;
  background: #fff;
  border: 2px dashed var(--sjp-border-strong);
  border-radius: var(--sjp-radius-lg);
  color: var(--sjp-text-sub);
  box-shadow: var(--sjp-shadow);
}

/* 입력 */
input:focus, select:focus, textarea:focus { outline: none; }

@media print {
  /* v2.0 A안 풀-블리드: A4 한 페이지를 보고서가 꽉 채우도록 강제 */
  @page { size: A4 portrait; margin: 0 }
  /* v2.1 [C-1] — print-color-adjust: 배경·핀·테두리 색상 인쇄에 보존 */
  *, *::before, *::after {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }
  html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
  .no-print, .epc-topbar, .itp-link-info, .ic, .fc, .bc, .vc { display: none !important; }

  /* v2.2 — max-height/overflow:hidden 제거 (잘림 원인이었음).
     min-height만 275mm로 줄여 자연 하단 버퍼 확보 + 서명·표 보호 */
  .qa-report-body {
    box-sizing: border-box !important;
    padding: 10mm 8mm !important;
    min-height: 275mm !important;
    display: flex !important;
    flex-direction: column !important;
  }
  /* 마지막 페이지 끝에서 빈 페이지 생성 방지 */
  .qa-report-body:last-child { page-break-after: avoid !important; }

  /* v3.4 — 페이지 2(Final VI/Nozzle/DIM/Fitup 분할) 공통 wrapper.
     예전엔 .qa-report-body > div[style*="pageBreakBefore"] 로 잡으려 했지만 두 가지 이유로 전혀
     매칭되지 않고 있었음: (1) React가 inline style을 "break-before: page" 형태로 직렬화해서
     문자열 "pageBreakBefore"가 실제로는 존재하지 않음 (2) 이 div는 .qa-report-body의 직계 자식이
     아니라 손자(각 Preview 컴포넌트 자체 wrapper 밑)라서 > 선택자로도 안 잡힘 → padding/min-height가
     한 번도 적용된 적이 없어서 페이지 2 제목이 용지 맨 위에 바싹 붙어 나오던 버그. className으로 교체.
     ⚠ v3.5 회귀 주의 — Nozzle/DIM/Fitup은 실제 분할 여부(isSplit)가 있을 때만 이 className을
     붙여야 함. 무조건 붙이면 !important 규칙이 항상 이겨서(isSplit이 false라 inline style이
     "auto"여도) 강제로 다음 페이지로 넘어가버림 — 체크포인트 5개짜리처럼 분할이 필요 없는
     문서까지 페이지가 갈라지던 실제 버그로 확인됨. Final VI만 항상 2페이지라서 무조건 적용이 맞음. */
  .qa-page2 {
    box-sizing: border-box !important;
    padding: 10mm 8mm !important;
    min-height: 275mm !important;
    display: flex !important;
    flex-direction: column !important;
    page-break-before: always !important;
  }

  /* 서명·표·핵심 블록은 페이지 중간에서 잘리지 않도록 */
  table { page-break-inside: avoid !important; }
  div[style*="borderTop"] { page-break-inside: avoid !important; }
  /* v2.8 — Fitup Joint 20+ 케이스: Joint 표는 페이지 분할 허용, end-block은 함께 유지 */
  table.fitup-joint-many {
    page-break-inside: auto !important;
  }
  table.fitup-joint-many tr {
    page-break-inside: avoid !important;   /* 개별 row는 잘리지 않음 */
  }
  table.fitup-joint-many thead {
    display: table-header-group;            /* 페이지마다 헤더 자동 반복 */
  }
  .fitup-end-block {
    page-break-inside: avoid !important;    /* 측정장비 + 서명은 마지막 페이지에 함께 */
  }

  /* v2.6 — 이미지 높이 90mm로 감축 (Bending/Hydro 표·계산 콘텐츠 무거움 대응)
     계산: 90mm 이미지 + 평균 콘텐츠 180mm + 패딩 20mm ≈ 290mm (안전 마진 7mm) */
  .pf-img {
    height: 90mm !important;
    min-height: 90mm !important;
    max-height: 90mm !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    overflow: hidden !important;
  }
  /* Final VI 페이지 2: 사진 2매 각 90mm — 헤더 25 + 90*2 + gap 12 = 217mm + padding 20 = 237mm (38mm 버퍼) */
  .qa-page2 .pf-img {
    height: 90mm !important;
    min-height: 90mm !important;
    max-height: 90mm !important;
  }
  /* v3.3 — 위 .pf-img 축소는 IDZ 내부 div만 줄이고, 그걸 감싸는 height:440(px) 바깥 wrapper는
     그대로 440px를 차지해서 사진 2장이 도합 880px(≈233mm)+헤더까지 A4 한 장을 넘겨 3페이지로
     밀리던 버그 수정 — wrapper도 똑같이 90mm로 강제 */
  .fi-photo-box {
    height: 90mm !important;
    min-height: 90mm !important;
    max-height: 90mm !important;
    flex: none !important;
  }
  /* v2.6 — IDZ UI 오버레이 인쇄 숨김 ("✕ 클릭 초기화", "클릭 후 Ctrl+V 붙여넣기" 등) */
  .pf-img > span,
  .pf-img > div[style*="position:absolute"],
  .pf-img div[style*="color:red"],
  .pf-img div[style*="color:#aaa"] {
    display: none !important;
  }
  /* v2.9 — 사진 영역의 모든 button(X 클릭 초기화·삭제·핀배치·핀초기화 등) 인쇄에서 강제 숨김
     ※ pin label(div with borderRadius:50%)은 영향 없음. button 태그만 대상 */
  .pf-img button,
  .pf-img button[style*="position:absolute"] {
    display: none !important;
  }
  /* 이미지가 로딩된 경우만 표시 — img가 있으면 placeholder span은 자동 숨김 (조건부 렌더) */
  /* 페이지 2 wrapper의 marginTop 무력화 (페이지 3 넘김 방지) */
  .qa-page2 {
    margin-top: 0 !important;
  }
  /* Nozzle 15+ 노즐: 이미지 영역 페이지 1 풀로 */
  .noz-big .pf-img {
    height: 220mm !important;
    min-height: 220mm !important;
    max-height: 220mm !important;
  }
  /* v3.2 — DIM Check Point 11+ (2 chunk 이상): 이미지 영역 페이지 1 풀로 */
  .pf-img.dim-big {
    height: 220mm !important;
    min-height: 220mm !important;
    max-height: 220mm !important;
  }
  /* v2.7 — PinImg/IDZ 내부 wrapper 무력화 + img는 absolute 중앙정렬
     중첩 wrapper(.pf-img > div > div ...)들이 flex 중앙정렬 안 통과시키는 문제 해결 */
  .pf-img > div {
    width: 100% !important;
    height: 100% !important;
    position: relative !important;
    min-height: 0 !important;
    flex: none !important;
  }
  .pf-img > div > div {
    width: 100% !important;
    height: 100% !important;
    position: relative !important;
  }
  /* 핵심: img를 .pf-img 안에 absolute 중앙정렬 (어떤 중첩에서도 동작) */
  .pf-img {
    position: relative !important;
  }
  .pf-img img {
    position: absolute !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: auto !important;
    height: auto !important;
    max-width: 100% !important;
    max-height: 100% !important;
    object-fit: contain !important;
    display: block !important;
  }
  /* PinImg의 핀 표시는 인쇄에서도 유지 (pins은 image와 함께 표시) */

  /* 표는 그대로 (자연 높이 유지) */
  table { page-break-inside: avoid; }
}
</style>

// ════════════ 0. iframe 임베드 모드 — parent window의 EPC Control 데이터 자동 사용 ════════════
// v1.3 (sejong-platform Phase 2):
// - window.opener (새 창에서 열린 경우) 와 window.parent (iframe 임베드) 모두 지원
// - 250ms 폴링으로 EPC Control의 데이터 변경을 자동 반영
(function inheritFromHost(){
  function getHost(){
    try {
      if (window.opener && !window.opener.closed && window.opener.SJP) return window.opener;
    } catch(e){}
    try {
      if (window.parent && window.parent !== window && window.parent.SJP) return window.parent;
    } catch(e){}
    return null;
  }
  function syncOnce(){
    const host = getHost();
    if (!host) return false;
    try {
      window.SJP = host.SJP;
      window.EPC_PROJECT = host.EPC_PROJECT;
      window.EPC_ITEMS = host.EPC_ITEMS;
      window.EPC_DOC_NO_GENERATOR = host.EPC_DOC_NO_GENERATOR;
      window.EPC_INSPECTOR_MASTER = host.EPC_INSPECTOR_MASTER;
      // v1.5 — host 값이 비어있을 때 ITP Builder가 올린 로컬 목록을 지우지 않도록 가드
      if (host.WPS_LIST) window.WPS_LIST = host.WPS_LIST;
      if (host.WELDER_LIST) window.WELDER_LIST = host.WELDER_LIST;
      return true;
    } catch(e){
      console.warn("[QA Doc Generator] host 접근 실패", e.message);
      return false;
    }
  }
  const ok = syncOnce();
  console.log("[QA Doc Generator v1.4] 호스트 연결 " + (ok ? "성공 — EPC Control 데이터 상속 완료" : "실패 (Standalone 모드)"));
  if (ok) setInterval(syncOnce, 250);
})();

// v3.0 [패치 1] — 엑셀식 표 입력 헬퍼 (Tab/Enter/방향키 이동 + 엑셀 붙여넣기)
function makeGrid(onCellPaste){
  const findInput=(container,row,col)=>container.querySelector(`input[data-r="${row}"][data-c="${col}"]`);
  const moveTo=(el,dr,dc)=>{
    const container=el.closest("[data-grid]");if(!container)return;
    const r=parseInt(el.dataset.r),c=parseInt(el.dataset.c);
    let nr=r+dr,nc=c+dc;
    let target=findInput(container,nr,nc);
    if(!target&&dc!==0){target=findInput(container,r+(dc>0?1:-1),0);}
    if(target){target.focus();target.select&&target.select();}
  };
  const onKeyDown=(e)=>{
    const el=e.target;if(!el.dataset||el.dataset.r===undefined)return;
    if(e.key==="Enter"){e.preventDefault();moveTo(el,1,0);}
    else if(e.key==="Tab"){e.preventDefault();moveTo(el,0,e.shiftKey?-1:1);}
    else if(e.key==="ArrowDown"){e.preventDefault();moveTo(el,1,0);}
    else if(e.key==="ArrowUp"){e.preventDefault();moveTo(el,-1,0);}
    else if(e.key==="ArrowRight"&&el.selectionStart===el.value.length){e.preventDefault();moveTo(el,0,1);}
    else if(e.key==="ArrowLeft"&&el.selectionStart===0){e.preventDefault();moveTo(el,0,-1);}
  };
  const onPaste=(e)=>{
    const el=e.target;if(!el.dataset||el.dataset.r===undefined)return;
    const text=(e.clipboardData||window.clipboardData).getData("text");
    if(!text||(!text.includes("\t")&&!text.includes("\n"))){return;}
    e.preventDefault();
    const rows=text.replace(/\r/g,"").replace(/\n$/,"").split("\n").map(line=>line.split("\t"));
    const startR=parseInt(el.dataset.r),startC=parseInt(el.dataset.c);
    onCellPaste&&onCellPaste(startR,startC,rows);
  };
  return {gridProps:{"data-grid":"1",onKeyDown,onPaste},cellProps:(r,c)=>({"data-r":r,"data-c":c})};
}

const normalizeHeadType = (raw) => {
  if(!raw) return "2:1 Ellip.";
  const r = String(raw).toUpperCase().replace(/[\s_-]/g,"");
  if(/2[:.]?1|2TO1|ELLIP/.test(r)) return "2:1 Ellip.";
  if(/10%?(F&?D|FAD|FANDDISH|FANDD)|FANDD/.test(r) || /F&D/.test(raw||"")) return "10% (F&D)";
  if(/HEMI|HEMISPHE/.test(r)) return "Hemispherical";
  if(/FLAT/.test(r)) return "Flat";
  if(/CONICAL|CONE/.test(r)) return "Conical";
  if(/TORI|TORISPHE/.test(r)) return "Torispherical";
  if(/CAP|B16\.?9|PIPECAP/.test(r)) return "CAP";
  if(/DISH/.test(r)) return "Dished";
  return raw;
};

function DIMPreview({doc}){

  const PK=dk+"_pins";

  const savedDimSet=IMG_STORE.get(dimSetKey)||{};
  // 표준 (ASME / TEMA) 선택
  const[tolStd,sTS]=useState(savedDimSet.tolStd||(isC?"TEMA":"ASME"));
  const tolFn=tolStd==="TEMA"?dimTolTEMA:dimTolASME;
  // CheckPoint Row: 사용자가 추가/편집 가능, 기본은 핀 개수에 맞게 채움
  // v1.5 — A~Z (26) + AA~ZZ (676) = 총 702개 라벨
  const LBL = (() => {
    const arr = [];
    for(let i=0;i<26;i++) arr.push(String.fromCharCode(65+i));
    for(let i=0;i<26;i++) for(let j=0;j<26;j++) arr.push(String.fromCharCode(65+i)+String.fromCharCode(65+j));
    return arr;
  })();
  const isST=it.type.includes("Storage Tank");

  const dimHtBtm=it.head_bot_type||it.head_type_bottom||it.head_type||"2:1 Ellip.";
  const dimD=parseFloat(it.shell_id)||parseFloat(it.shell_od)||0;
  const tolTop=headTolerance(dimHtTop,dimD);
  const tolBtm=headTolerance(dimHtBtm,dimD);
  const initRows=()=>{
    const saved=IMG_STORE.get(dimRowsKey);
    if(saved&&Array.isArray(saved)&&saved.length>0){
      // v2.1 [A-1] — 구버전 마이그레이션: desc==="custom"이면 descCustom 값을 desc로 이동
      return saved.map(r=>{
        if(r.desc==="custom") return {...r,desc:r.descCustom||"",descCustom:undefined};
        return r;
      });
    }
    const def=isC?[
      // v2.1 [A-2] — 일반 치수 행: tol 제거 → tolFn(D.W.G) 동적 계산
      {desc:"Shell ID",dwg:it.shell_id||""},
      {desc:"Channel ID",dwg:it.shell_id||""},
      {desc:"Tube Sheet OD",dwg:""},
      {desc:"Girth Flange",dwg:""},
      {desc:"Shell Length",dwg:it.shell_len||""},
      // CAP인 경우 Head Height/Crown 검사 불필요. Head Height만 fixedTol(customTol) 유지

      ...(dimHtBtm==="CAP"?[]:[{desc:`BTM Head Height (${dimHtBtm})`,dwg:tolBtm.height!=="메이커 사양"?String(tolBtm.height).replace(/[±\s]/g,"").split("±")[0]:"",tol:`${tolBtm.height} mm`,remark:tolBtm.note,fixedTol:true}])
    ]:isST?[
      // v2.1 [A-2] — Storage Tank 일반 치수 동적

      {desc:"Shell ID (Mid)",dwg:it.shell_id||""},
      {desc:"Shell ID (Btm)",dwg:it.shell_id||""},
      {desc:"Shell Length",dwg:it.shell_len||""},
      ...(dimHtTop==="CAP"?[]:[{desc:`TOP Head Height (${dimHtTop})`,dwg:"",tol:`${tolTop.height} mm`,remark:tolTop.note,fixedTol:true}]),
      ...(dimHtBtm==="CAP"?[]:[{desc:`BTM Head Height (${dimHtBtm})`,dwg:"",tol:`${tolBtm.height} mm`,remark:tolBtm.note,fixedTol:true}])

// ════════════ 15. 메인 App ════════════
function App(){
  const [proj, setProj] = useState({
    no: "SJ2026-030",
    name: "(VDS)ESTER 공정용 수평콘덴서 교체공사",
    customer: "㈜동성케미컬",
    po: "SJT-WO-2026-030"
  });
  const [items, setItems] = useState([{
    id: "i_dong_e101",
    tag: "E-101",
    type: "Condenser / Heat Exchanger",
    spec: "ASME Sec.VIII Div.1 · TEMA Class R",
    maker: "㈜세종기술",
    status: "진행중"
  }]);
  const [activeItemId, setActiveItemId] = useState("i_dong_e101");
  const [itemSearch, setItemSearch] = useState(""); // v1.6 — 아이템 30~40개 이상일 때 검색으로 좁히기
  const [activeDoc, setActiveDoc] = useState("BOM");
  const [hydroPart, sHydroPart] = useState("Shell");
  const [docData, setDocData] = useState({}); // {itemId: {BOM:{rows:[]}, BENDING:{}, ...}}
  const [msg, setMsg] = useState("");
  // v3.0 — 저장/불러오기 상태
  const [currentProjId, setCurrentProjId] = useState(null);
  // v3.1 — 불러오기 시 같은 아이템 id라도 Preview를 강제로 다시 마운트시켜 IMG_STORE(그림/표)를 새로 읽게 함
  const [loadNonce, setLoadNonce] = useState(0);
  const [savedList, setSavedList] = useState(() => projIndexLoad());
  const [showLoadModal, setShowLoadModal] = useState(false);
  const [showSaveDialog, setShowSaveDialog] = useState(false);
  const [saveAsName, setSaveAsName] = useState("");
  const refreshSavedList = () => setSavedList(projIndexLoad());

  // v1.7 — ITP Builder localStorage에서 프로젝트/아이템을 읽어온다. 마운트 시(force:false)에는
  // QA Gen에 아직 아무것도 없을 때만 채우고, "🔄 ITP 정보 끌어오기" 버튼(force:true)에서는
  // 사용자가 명시적으로 눌렀을 때만 현재 내용을 덮어쓴다 — 도면 등 갱신 내용이 자동으로는
  // 한 번만 반영되고 그 뒤로는 반영 안 되던 문제(항상 "처음 비어있을 때만" 였음)의 수동 해결책.
  const pullFromItpBuilder = ({force=false, silent=false, noOwnItemsYet=null, noOwnProjectYet=null}={}) => {
    try {
      const itpRaw = localStorage.getItem(`sjp_itp_builder_v1__${QAG_PID}`);
      if (!itpRaw) { if (!silent) showMsg("⚠ 이 프로젝트로 저장된 ITP Builder 데이터가 없습니다", 4000); return; }
      const itpData = JSON.parse(itpRaw);
      let touched = false;
      // 마운트 시점의 proj/items는 데모 값("SJ2026-030"·아이템 1개)으로 시작하므로,
      // "QA Gen 자체 저장 데이터가 있었는지"는 라이브 state가 아니라 loadLS() 결과(noOwn...Yet)로 판단.
      const noOwnProject = noOwnProjectYet===null ? !proj.no : noOwnProjectYet;
      if (itpData.proj && itpData.proj.no && (force || noOwnProject)) {
        setProj(p => ({...p, no: itpData.proj.no, name: itpData.proj.name||p.name, customer: itpData.proj.customer||p.customer, po: itpData.proj.po||p.po}));
        touched = true;
      }
      const noOwnItems = noOwnItemsYet===null ? (items.length===0) : noOwnItemsYet;
      if (Array.isArray(itpData.items) && itpData.items.length > 0 && (force || noOwnItems)) {
        // ITP Builder 아이템은 이미 tag/shell_mat/design_p 등 QA Gen Preview들이 그대로 쓰는
        // 필드명을 쓰므로 그대로 옮긴다 (id만 문자열로 통일 — docData는 id로 연결되므로 유지됨).
        const mapped = itpData.items.map(it => ({ ...it, id: String(it.id) }));
        setItems(mapped);
        if (mapped[0]) setActiveItemId(mapped[0].id);
        touched = true;
      }
      if (!silent) showMsg(touched ? `✓ ITP Builder 최신 정보를 반영했습니다 (${itpData.proj?.no||"—"} · 아이템 ${itpData.items?.length||0}개)` : "ℹ 반영할 새 내용이 없습니다 (이미 최신)", 5000);
    } catch(e) {
      console.warn("[QA Doc Generator] ITP Builder 데이터 로드 실패", e.message);
      if (!silent) showMsg("⚠ 불러오기 실패 — " + e.message, 5000);
    }
  };
  const refreshFromItpBuilder = () => {
    if (items.length > 0 && !confirm("ITP Builder의 최신 내용으로 현재 프로젝트 정보·아이템 목록을 덮어씁니다.\n(각 문서에 이미 입력한 검사 내용은 그대로 유지됩니다.) 계속할까요?")) return;
    pullFromItpBuilder({force:true, silent:false});
  };

  useEffect(() => {
    // v1.2 sjp-bridge optional chaining (외부 의존성 안전 처리)
    if (window.SJP?.bridge?.renderTopbar) {
      window.SJP.bridge.renderTopbar("QA Doc Generator v1.4", "신채완 과장");
    }
    const s = loadLS();
    if (s) {
      // v3.1 — 그림/표 데이터(IMG_STORE)를 다른 state보다 먼저 복원해야 Preview가 마운트될 때 바로 읽어간다.
      if (s.imgStore) Object.entries(s.imgStore).forEach(([k,v]) => IMG_STORE.set(k, v));
      if (s.proj) setProj(s.proj);
      if (s.items) setItems(s.items);
      if (s.docData) setDocData(s.docData);
      if (s.activeItemId) setActiveItemId(s.activeItemId);
      if (s.activeDoc) setActiveDoc(s.activeDoc);
      if (s.currentProjId) setCurrentProjId(s.currentProjId);  // v3.0 — 프로젝트 ID 복원
    }
    // ITP Builder가 sjp-bridge에 저장한 데이터 자동 인식 (안전 처리)
    if (window.SJP?.bridge) {
      const bridgeProj = window.SJP.bridge.getProject?.();
      const bridgeItems = window.SJP.bridge.getItems?.();
      if (bridgeProj && (!s || !s.proj || !s.proj.no)) {
        setProj(bridgeProj);
        setTimeout(()=>showMsg("✓ ITP Builder의 프로젝트 데이터를 자동 인식했습니다", 4000), 100);
      }
      if (bridgeItems?.length && (!s || !s.items || s.items.length === 0)) {
        setItems(bridgeItems);
        if (bridgeItems[0]) setActiveItemId(bridgeItems[0].id);
        setTimeout(()=>showMsg(`✓ ITP Builder에서 ${bridgeItems.length}개 아이템 자동 동기화`, 4000), 200);
      }
    }
    // v1.6 — 같은 ?pid=...(프로젝트 등록 전 임시 초안 포함)로 ITP Builder를 먼저 작성해뒀다면,
    // 이 pid에 대한 QA Doc 자체 저장이 아직 없을 때 ITP Builder의 localStorage를 그대로 읽어와
    // 기본 프로젝트 정보·아이템을 채운다. 브라우저 로컬 전용(같은 pid를 같은 브라우저에서 열 때만 동작).
    if (!s || !s.proj || !s.proj.no) {
      pullFromItpBuilder({force:false, silent:false, noOwnItemsYet: !(s && s.items && s.items.length>0), noOwnProjectYet: true});
    }
  }, []);
  // v3.0 — 자동저장은 "마지막 작업" 자동 복원용으로만 유지 (프로젝트 저장은 수동 Save/Save As로 분리)
  useEffect(() => {
    const t = setTimeout(() => saveLS({proj, items, docData, activeItemId, activeDoc, currentProjId, imgStore: Object.fromEntries(IMG_STORE)}), 1000);
    return () => clearTimeout(t);
  }, [proj, items, docData, activeItemId, activeDoc, currentProjId]);

  const showMsg = (text, ms=4000) => { setMsg(text); setTimeout(() => setMsg(""), ms); };

  // v3.0 — 프로젝트 저장 / 불러오기 / 삭제
  // v3.1 — 각 보고서 Preview가 그림/표/핀 데이터를 저장해두는 IMG_STORE(그동안 저장/불러오기에서
  // 완전히 누락되어 있었음 — "불러오기 하면 그림·데이터가 사라진다"는 버그의 원인)를 payload에 포함.
  const collectPayload = () => ({ proj, items, docData, activeItemId, activeDoc, imgStore: Object.fromEntries(IMG_STORE) });

  // Save — 현재 프로젝트에 덮어쓰기 (없으면 Save As 대화상자)
  const handleSaveOverwrite = () => {
    if (!currentProjId) { setSaveAsName(proj.no || proj.name || ""); setShowSaveDialog(true); return; }
    if (!confirm("현재 프로젝트에 덮어쓰시겠습니까?")) return;
    const idx = projIndexLoad().find(x => x.id === currentProjId);
    const name = idx ? idx.name : (proj.no || "프로젝트");
    const ok = projSave(currentProjId, name, collectPayload());
    if (ok) { refreshSavedList(); showMsg(`✓ 저장 완료 — ${name}`); }
    else { showMsg("⚠ 저장 실패 (용량 초과 가능)"); }
  };

  // Save As — 새 이름으로 저장 (대화상자 표시)
  const handleSaveAs = () => {
    setSaveAsName(proj.no || proj.name || "");
    setShowSaveDialog(true);
  };
  const handleSaveAsConfirm = () => {
    const name = saveAsName.trim();
    if (!name) { alert("프로젝트 이름을 입력해 주세요"); return; }
    // 같은 이름이 이미 있으면 확인
    const existing = projIndexLoad().find(x => x.name === name);
    let id;
    if (existing) {
      if (!confirm(`"${name}" 이름의 프로젝트가 이미 있습니다. 덮어쓰시겠습니까?\n(취소하면 저장 안 됨)`)) return;
      id = existing.id;
    } else {
      id = projGenId(name);
    }
    const ok = projSave(id, name, collectPayload());
    if (ok) {
      setCurrentProjId(id);
      refreshSavedList();
      setShowSaveDialog(false);
      setSaveAsName("");
      showMsg(`✓ 저장 완료 — ${name}`);
    } else {
      showMsg("⚠ 저장 실패 (용량 초과 가능)");
    }
  };

  // Load — 저장된 프로젝트 불러오기
  const handleLoadProj = (id) => {
    const data = projLoadOne(id);
    if (!data) { showMsg("⚠ 데이터 없음"); return; }
    if (proj.no && items.length > 0 && !confirm("현재 작업 내용이 사라집니다. 계속하시겠습니까?\n(저장하지 않은 변경사항은 유실됨)")) return;
    // v3.1 — 그림/표 데이터(IMG_STORE) 복원. 다른 state보다 먼저 채워둬야 Preview 재마운트 시 바로 읽어간다.
    IMG_STORE.clear();
    if (data.imgStore) Object.entries(data.imgStore).forEach(([k,v]) => IMG_STORE.set(k, v));
    setLoadNonce(n => n + 1);
    if (data.proj) setProj(data.proj);
    if (data.items) { setItems(data.items); if (data.items.length > 0) setActiveItemId(data.items[0].id); }
    if (data.docData) setDocData(data.docData);
    if (data.activeItemId) setActiveItemId(data.activeItemId);
    if (data.activeDoc) setActiveDoc(data.activeDoc);
    setCurrentProjId(id);
    setShowLoadModal(false);
    const idx = projIndexLoad().find(x => x.id === id);
    showMsg(`✓ 불러오기 완료 — ${idx?.name || id}`);
  };

  // Delete — 저장된 프로젝트 삭제 (모달 안에서 호출)
  const handleDeleteProj = (id) => {
    const idx = projIndexLoad().find(x => x.id === id);
    const name = idx ? idx.name : id;
    if (!confirm(`정말 "${name}" 프로젝트를 삭제하시겠습니까?\n(복구 불가)`)) return;
    const ok = projDeleteOne(id);
    if (ok) {
      if (currentProjId === id) setCurrentProjId(null);
      refreshSavedList();
      showMsg(`🗑 삭제 완료 — ${name}`);
    } else {
      showMsg(`⚠ 삭제 실패`);
    }
  };

  const handleNew = () => {
    if (!confirm("새 프로젝트로 초기화하시겠습니까?\n(현재 작업은 저장하지 않으면 사라집니다)")) return;
    setProj({no:"", name:"", customer:"", po:""});
    setItems([]); setActiveItemId(null);
    setDocData({});
    IMG_STORE.clear();   // v3.1 — 이전 프로젝트의 사진/표 데이터가 새 프로젝트로 새어들지 않도록 초기화
    setCurrentProjId(null);   // v3.0 — 프로젝트 컨텍스트도 초기화
    showMsg("✓ 새 프로젝트");
  };

  // v3.1 — 아이템 선택 목록에서 더 이상 필요 없는 아이템을 뺄 수 있게 삭제 기능 추가
  const removeSelectedItem = (id) => {
    const it = items.find(i => i.id === id);
    if (!confirm(`"${it?.tag||""} · ${it?.name||""}" 아이템을 선택 목록에서 삭제하시겠습니까?\n(이미 작성한 검사 데이터/사진은 남아있을 수 있으나 이 화면에서 다시 선택할 수 없게 됩니다)`)) return;
    setItems(prev => prev.filter(i => i.id !== id));
    if (activeItemId === id) {
      const next = items.find(i => i.id !== id);
      setActiveItemId(next ? next.id : null);
    }
  };

  const activeItem = items.find(i => i.id === activeItemId);
  const itemDocs = activeItemId ? (docData[activeItemId] || {}) : {};
  const setDocFor = (key, val) => {
    if (!activeItemId) return;
    setDocData(p => ({...p, [activeItemId]: {...(p[activeItemId]||{}), [key]:val}}));
  };

  return <div style={{maxWidth:1200, margin:"0 auto", padding:"14px"}}>
    {/* v1.2 EPC Control 톤 Topbar */}
    <div className="epc-topbar no-print">
      <div className="epc-topbar-icon">🛠</div>
      <div>
        <div className="epc-topbar-title">QA Doc Generator v1.4</div>
        <div className="epc-topbar-sub">신채완 과장 · ㈜세종기술 품질관리부</div>
      </div>
      <div className="epc-topbar-actions">
        <button onClick={refreshFromItpBuilder} className="btn-secondary" title="같은 프로젝트(pid)로 열린 ITP Builder의 최신 프로젝트 정보·아이템을 끌어옵니다 (ITP Builder의 '🚀 QA Doc Generator로 바로 전송'과 같은 내용을 QA Gen 쪽에서 요청하는 것)">🔄 ITP 정보 끌어오기</button>
        <button onClick={handleSaveOverwrite} className="btn-secondary" title="현재 프로젝트에 덮어쓰기">💾 저장{currentProjId&&<span style={{fontSize:9,marginLeft:4,color:"#1d9e75"}}>*</span>}</button>
        <button onClick={handleSaveAs} className="btn-secondary" title="새 이름으로 저장">💾+ 다른 이름</button>
        <button onClick={()=>{refreshSavedList();setShowLoadModal(true);}} className="btn-secondary" title="저장된 프로젝트 불러오기">📂 불러오기 ({savedList.length})</button>
        <button onClick={handleNew} className="btn-secondary" title="현재 화면을 비우고 새 프로젝트를 시작합니다 (저장된 프로젝트 목록에는 영향 없음)">🗋 New</button>
      </div>
    </div>

    {/* v1.2 ITP Builder 연동 안내 */}
    <div className="itp-link-info no-print">
      <div className="itp-link-info-icon">🔗</div>
      <div className="itp-link-info-text">
        <div className="itp-link-info-title">ITP Builder 연동</div>
        <div className="itp-link-info-sub">
          ITP Builder에서 작성한 프로젝트·아이템 정보는 처음 열 때 비어있으면 자동으로 채워집니다. 이후 ITP Builder에서 도면 등 내용을 갱신했다면
          상단 <strong>"🔄 ITP 정보 끌어오기"</strong> 버튼으로 다시 불러와야 반영됩니다 (자동 실시간 동기화는 아님).
          EPC Control System과 연결 시 WBS 진척률·검사 기록이 양방향으로 갱신됩니다.
        </div>
      </div>
    </div>

    <EPCSlots jobNo={proj.no}/>

    {msg && <div className="no-print" style={{
      padding:"9px 14px", marginBottom:10, fontSize:11, fontWeight:500,
      background: msg.startsWith("✓") ? "var(--sjp-success-bg)" : msg.startsWith("⚠") ? "var(--sjp-warning-bg)" : "var(--sjp-primary-light)",
      color: msg.startsWith("✓") ? "#155724" : msg.startsWith("⚠") ? "#856404" : "#004085",
      border: `1px solid ${msg.startsWith("✓") ? "#c3e6cb" : msg.startsWith("⚠") ? "#ffe69c" : "var(--sjp-border-strong)"}`,
      borderRadius:5
    }}>{msg}</div>}

    {/* v1.6 — 검사자 정보 패널 삭제(Mobile Inspection으로 이전). 프로젝트 정보는 단독 카드로. */}
    <div className="no-print" style={{marginBottom:10}}>
      <PC title="프로젝트 정보 (ITP Builder·PJT 연동)">
        <FR label="Project No."><FI value={proj.no} onChange={v=>setProj(p=>({...p, no:v}))}/></FR>
        <FR label="프로젝트명"><FI value={proj.name} onChange={v=>setProj(p=>({...p, name:v}))}/></FR>
        <FR label="발주처"><FI value={proj.customer} onChange={v=>setProj(p=>({...p, customer:v}))}/></FR>
        <FR label="PO No."><FI value={proj.po} onChange={v=>setProj(p=>({...p, po:v}))}/></FR>
      </PC>
    </div>

    {items.length === 0 ?
      <div className="empty-state">
        <div style={{fontSize:14, marginBottom:8, fontWeight:600, color:"var(--sjp-text-main)"}}>📥 아이템이 없습니다</div>
        <div style={{fontSize:11, lineHeight:1.7}}>같은 프로젝트의 ITP Builder에서 <strong style={{color:"var(--sjp-primary)"}}>"🚀 QA Doc Generator로 바로 전송"</strong>을 누르거나,<br/>
        상단의 <strong style={{color:"var(--sjp-primary)"}}>"🔄 ITP 정보 끌어오기"</strong> 버튼으로 직접 불러올 수 있습니다.</div>
      </div>
      :
      <div className="no-print" style={{marginBottom:12, padding:"12px 14px", background:"#fff", border:"1px solid var(--sjp-border)", borderRadius:"var(--sjp-radius-lg)", boxShadow:"var(--sjp-shadow)"}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8, flexWrap:"wrap", gap:6}}>
          <div style={{fontSize:11, fontWeight:700, color:"var(--sjp-text-main)"}}>📦 아이템 선택 ({items.length}개)</div>
          {items.length > 8 && <input value={itemSearch} onChange={e=>setItemSearch(e.target.value)} placeholder="🔍 Tag/이름 검색..." style={{fontSize:11, padding:"4px 8px", border:"1px solid var(--sjp-border)", borderRadius:5, width:180}}/>}
        </div>
        {(() => {
          const q = itemSearch.trim().toLowerCase();
          const filtered = q ? items.filter(it => (it.tag||"").toLowerCase().includes(q) || (it.name||"").toLowerCase().includes(q)) : items;
          if (filtered.length === 0) return <div style={{fontSize:11, color:"var(--sjp-text-sub)", padding:"8px 0"}}>"{itemSearch}"와 일치하는 아이템이 없습니다.</div>;
          return <div style={{display:"flex", gap:6, flexWrap:"wrap", maxHeight: items.length>12 ? 160 : "none", overflowY: items.length>12 ? "auto" : "visible", padding: items.length>12 ? "2px 2px 4px" : 0}}>
            {filtered.map(it =>
              <div key={it.id} style={{position:"relative", flexShrink:0}}>
                <button onClick={()=>setActiveItemId(it.id)}
                  style={{padding:"8px 22px 8px 14px", fontSize:11, background: activeItemId===it.id?SJB:"#fff", color:activeItemId===it.id?"#fff":"var(--sjp-text-body)", border:`1px solid ${activeItemId===it.id?SJB:"var(--sjp-border)"}`, borderRadius:5, cursor:"pointer", fontWeight: activeItemId===it.id?700:500, transition:"all .12s"}}>
                  <strong>{it.tag}</strong> · {it.name}
                  {(it.head_top_type === "CAP (B16.9)" || it.head_bot_type === "CAP (B16.9)") &&
                    <span style={{marginLeft:5, fontSize:9, color: activeItemId===it.id?"#fff":"var(--sjp-warning)", fontWeight:700, padding:"1px 5px", background:activeItemId===it.id?"rgba(255,255,255,.2)":"var(--sjp-warning-bg)", borderRadius:3}}>CAP</span>}
                </button>
                <button onClick={(e)=>{e.stopPropagation(); removeSelectedItem(it.id);}} title="선택 목록에서 삭제"
                  style={{position:"absolute", top:3, right:3, width:15, height:15, lineHeight:"13px", padding:0, fontSize:10, border:"none", borderRadius:"50%", background: activeItemId===it.id?"rgba(255,255,255,.35)":"var(--sjp-danger-bg)", color: activeItemId===it.id?"#fff":"var(--sjp-danger)", cursor:"pointer"}}>✕</button>
              </div>
            )}
          </div>;
        })()}
      </div>
    }

    {activeItem && <>
      <div className="no-print" style={{marginBottom:10, padding:"10px 14px", background:"var(--sjp-primary-light)", borderRadius:"var(--sjp-radius-lg)", fontSize:11, border:"1px solid var(--sjp-border-strong)"}}>
        <strong style={{color:SJB, fontSize:12}}>{activeItem.tag}</strong> · {activeItem.name} · <em style={{color:"var(--sjp-text-sub)"}}>{activeItem.type}</em>
        <div style={{marginTop:4, color:"var(--sjp-text-sub)", fontSize:10}}>
          Top: <b style={{color:"var(--sjp-text-main)"}}>{activeItem.head_top_type}</b> &nbsp;|&nbsp; Bot: <b style={{color:"var(--sjp-text-main)"}}>{activeItem.head_bot_type}</b>
          {activeItem.shell_mat && <> &nbsp;|&nbsp; Material: <b style={{color:"var(--sjp-text-main)"}}>{activeItem.shell_mat}</b></>}
        </div>
      </div>

      <div className="no-print" style={{display:"flex", gap:4, marginBottom:12, overflowX:"auto", padding:"4px"}}>
        {DOC_TYPES.map(d => {
          const isBendingExcluded = d.key === "BENDING" && activeItem.head_top_type === "CAP (B16.9)" && activeItem.head_bot_type === "CAP (B16.9)";
          return <button key={d.key} onClick={()=>setActiveDoc(d.key)}
            style={{padding:"8px 14px", fontSize:11, background: activeDoc===d.key?d.color:"#fff", color:activeDoc===d.key?"#fff":d.color, border:`1.5px solid ${d.color}`, borderRadius:5, cursor:"pointer", whiteSpace:"nowrap", fontWeight:activeDoc===d.key?700:600, opacity: isBendingExcluded?0.5:1, transition:"all .12s", boxShadow: activeDoc===d.key?`0 2px 4px ${d.color}40`:"none"}}>
            {d.label}
            {isBendingExcluded && <span style={{marginLeft:4, fontSize:9}}>⊘</span>}
          </button>;
        })}
      </div>

      <PrintBar title={`${DOC_TYPES.find(d=>d.key===activeDoc)?.label} — ${activeItem.tag}`}/>

      <div className="qa-report-body" style={{border:"1px solid var(--sjp-border)", borderRadius:"var(--sjp-radius-lg)", padding:16, background:"#fff", boxShadow:"var(--sjp-shadow)"}}>
        {(() => {
          // V25 doc 객체 합성 어댑터 — V25 Preview는 {doc:{type,item,proj,...}} 시그니처
          const doc = { type: activeDoc, item: activeItem, proj };
          // v2.1 [B-1] — Preview 컴포넌트에 key 부여 (Item/Part 전환 시 React 재마운트 → useState 재초기화)
          const dKey = `${activeDoc}_${activeItem.id||activeItem.tag||""}_${loadNonce}`;
          if (activeDoc === "BOM")     return <BOMPreview key={dKey} doc={doc}/>;
          if (activeDoc === "BENDING") {
            if (activeItem.head_top_type === "CAP (B16.9)" && activeItem.head_bot_type === "CAP (B16.9)") {
              return <div style={{padding:24, textAlign:"center", color:"#888", fontSize:12}}>
                ⊘ Bending Report 생략 (Top/Bot 모두 CAP — Pipe Cap은 메이커 사양품)
              </div>;
            }
            return <BendingPreview key={dKey} doc={doc}/>;
          }
          if (activeDoc === "FITUP")   return <FitupPreview key={dKey} doc={doc}/>;
          if (activeDoc === "DIM")     return <DIMPreview key={dKey} doc={doc}/>;
          if (activeDoc === "NOZZLE")  return <NozzlePreview key={dKey} doc={doc}/>;
          if (activeDoc === "HYDRO") {
            // HYDRO는 part별 별도 보고서. part 서브탭 표시.
            const hp = ["Shell"];
            if ((activeItem.type||"").includes("Condenser") || (activeItem.type||"").includes("Heat")) hp.push("Tube Side");
            if (activeItem.jacket) { if(activeItem.jacket_partition){ hp.push("Jacket Upper"); hp.push("Jacket Lower"); } else hp.push("Jacket"); }
            if (activeItem.incoil) { hp.push(activeItem.incoil_double?"In-Coil #1":"In-Coil"); if(activeItem.incoil_double) hp.push("In-Coil #2"); }
            if (activeItem.halfcoil) { if(activeItem.halfcoil_partition){ hp.push("Half-Coil Upper"); hp.push("Half-Coil Lower"); } else hp.push("Half-Coil"); }
            const curPart = hp.includes(hydroPart) ? hydroPart : hp[0];
            return <>
              <div className="no-print" style={{display:"flex", gap:6, marginBottom:10, flexWrap:"wrap"}}>
                {hp.map(p => <button key={p} onClick={()=>sHydroPart(p)}
                  style={{padding:"6px 12px", fontSize:11, background: curPart===p?"#a32d2d":"#fff", color: curPart===p?"#fff":"#a32d2d", border:"1px solid #a32d2d", borderRadius:4, cursor:"pointer", fontWeight: curPart===p?700:500}}>
                  {p}
                </button>)}
              </div>
              <HydroPreview key={`HYDRO_${activeItem.id||activeItem.tag||""}_${curPart}_${loadNonce}`} doc={{...doc, part: curPart, partSeq: hp.indexOf(curPart)+1}}/>
            </>;
          }
          if (activeDoc === "FINAL")   return <FinalPreview key={dKey} doc={doc}/>;
          return null;
        })()}
      </div>
    </>}

    <div className="no-print" style={{textAlign:"center", marginTop:20, fontSize:9, color:"var(--sjp-text-muted)"}}>
      QA Doc Generator v1.4 · ㈜세종기술 품질관리부 · ⓒ Designed by Cwkim · 신채완 과장
    </div>
    {/* v3.0 — 저장 대화상자 (Save As) */}
    {showSaveDialog && <div className="no-print" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={{background:"#fff",borderRadius:8,padding:20,minWidth:400,maxWidth:520,boxShadow:"0 4px 20px rgba(0,0,0,.15)"}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:12,color:"var(--sjp-text-main)"}}>💾 다른 이름으로 저장</h3>
        <label style={{display:"block",fontSize:11,color:"var(--sjp-text-sub)",marginBottom:5}}>프로젝트 이름</label>
        <input value={saveAsName} onChange={e=>setSaveAsName(e.target.value)} placeholder="예: SJ2026-030 동성케미컬 콘덴서" autoFocus
          onKeyDown={e=>{if(e.key==="Enter")handleSaveAsConfirm();else if(e.key==="Escape")setShowSaveDialog(false);}}
          style={{width:"100%",padding:"9px 12px",fontSize:13,border:"1px solid var(--sjp-border)",borderRadius:5,marginBottom:14}}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={()=>{setShowSaveDialog(false);setSaveAsName("");}} className="btn-secondary">취소</button>
          <button onClick={handleSaveAsConfirm} className="btn-primary" style={{background:"var(--sjp-primary)",color:"#fff",padding:"7px 16px",border:"none",borderRadius:5,fontSize:12,fontWeight:600,cursor:"pointer"}}>💾 저장</button>
        </div>
      </div>
    </div>}

    {/* v3.0 — 저장된 프로젝트 불러오기 모달 */}
    {showLoadModal && <div className="no-print" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={{background:"#fff",borderRadius:8,padding:20,minWidth:520,maxWidth:720,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 4px 20px rgba(0,0,0,.15)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h3 style={{fontSize:15,fontWeight:700,color:"var(--sjp-text-main)"}}>📂 저장된 프로젝트 ({savedList.length})</h3>
          <button onClick={()=>setShowLoadModal(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#888"}}>✕</button>
        </div>
        {savedList.length === 0 ? (
          <div style={{padding:30,textAlign:"center",color:"var(--sjp-text-muted)",fontSize:12}}>저장된 프로젝트가 없습니다.<br/>먼저 <strong>💾+ 다른 이름</strong>으로 저장하세요.</div>
        ) : (
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
            {[...savedList].sort((a,b)=>(b.updatedAt||"").localeCompare(a.updatedAt||"")).map(p =>
              <div key={p.id} style={{border:`1.5px solid ${currentProjId===p.id?"var(--sjp-primary)":"var(--sjp-border)"}`,background:currentProjId===p.id?"var(--sjp-primary-light)":"#fff",borderRadius:6,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--sjp-text-main)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {p.name} {currentProjId===p.id && <span style={{fontSize:9,color:"var(--sjp-primary)",marginLeft:4}}>● 현재</span>}
                  </div>
                  <div style={{fontSize:10,color:"var(--sjp-text-sub)",marginTop:2}}>
                    {p.projNo && <>{p.projNo} · </>}{p.itemCount||0}개 아이템 · {p.updatedAt ? new Date(p.updatedAt).toLocaleString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}) : "—"}
                  </div>
                </div>
                <button onClick={()=>handleLoadProj(p.id)} className="btn-primary" style={{background:"var(--sjp-primary)",color:"#fff",padding:"6px 12px",border:"none",borderRadius:4,fontSize:11,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap"}}>📂 불러오기</button>
                <button onClick={()=>handleDeleteProj(p.id)} title="삭제" style={{background:"var(--sjp-danger-bg)",color:"var(--sjp-danger)",padding:"6px 10px",border:"1px solid #fbb",borderRadius:4,fontSize:12,fontWeight:600,cursor:"pointer"}}>🗑</button>
              </div>
            )}
          </div>
        )}
        <div style={{marginTop:12,paddingTop:10,borderTop:"0.5px solid var(--sjp-border)",display:"flex",justifyContent:"flex-end"}}>
          <button onClick={()=>setShowLoadModal(false)} className="btn-secondary">닫기</button>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// ── 헤더 인라인 sejong-platform 버튼 (topbar 맨 앞) ──
// React가 재렌더링할 때마다 .epc-topbar-actions가 새로 그려지므로 폴링 자동 재부착
(function(){
  let _qaDropdown = null;

  function attachQaDocBtn() {
    const actions = document.querySelector(".epc-topbar-actions");
    if (!actions) return false;
    if (actions.querySelector("#sjpq-hdr-btn")) return true;

    const btn = document.createElement("button");
    btn.id = "sjpq-hdr-btn";
    btn.type = "button";
    btn.textContent = "🏢 Sejong-Platform +";
    btn.title = "Sejong-Platform 도구 메뉴";
    btn.style.cssText = [
      "padding:5px 11px",
      "background:#4a7fc1",
      "color:#fff",
      "border:none",
      "border-radius:5px",
      "font-size:11px",
      "font-weight:600",
      "cursor:pointer",
      "white-space:nowrap"
    ].join(";");
    btn.onclick = (e) => { e.stopPropagation(); toggleQaDropdown(); };

    // 가장 앞에 삽입
    const firstBtn = actions.querySelector("button");
    if (firstBtn) {
      actions.insertBefore(btn, firstBtn);
    } else {
      actions.appendChild(btn);
    }
    return true;
  }

  function toggleQaDropdown() {
    if (_qaDropdown) { closeQaDropdown(); return; }
    const btn = document.getElementById("sjpq-hdr-btn");
    if (!btn) return;
    const rect = btn.getBoundingClientRect();
    _qaDropdown = document.createElement("div");
    _qaDropdown.id = "sjpq-dropdown";
    _qaDropdown.style.cssText = [
      "position:fixed",
      "top:" + (rect.bottom + 5) + "px",
      "left:" + rect.left + "px",
      "z-index:9999",
      "background:#fff",
      "border:1.5px solid #4a7fc1",
      "border-radius:8px",
      "box-shadow:0 4px 14px rgba(74,127,193,0.18)",
      "padding:6px",
      "font-family:'Segoe UI',Arial,sans-serif",
      "font-size:11px",
      "min-width:200px"
    ].join(";");
    _qaDropdown.innerHTML =
      '<button id="sjpq-refresh" style="display:block;width:100%;text-align:left;padding:6px 9px;margin:2px 0;border:none;background:#dcfce7;color:#1a2332;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500">🔄 EPC 합격품 가져오기</button>' +
      '<button id="sjpq-epc" style="display:block;width:100%;text-align:left;padding:6px 9px;margin:2px 0;border:none;background:#eef3fb;color:#1a2332;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500">📊 EPC Control로 이동</button>' +
      '<div style="height:1px;background:#e4e7ec;margin:5px 2px"></div>' +
      '<button id="sjpq-reset" style="display:block;width:100%;text-align:left;padding:6px 9px;margin:2px 0;border:none;background:#fee2e2;color:#7c1d1d;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500">🔄 데모 데이터 초기화</button>' +
      '<button id="sjpq-home" style="display:block;width:100%;text-align:left;padding:6px 9px;margin:2px 0;border:none;background:#f3f4f6;color:#1a2332;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500">🏠 메인 메뉴</button>';
    document.body.appendChild(_qaDropdown);
    btn.textContent = "🏢 Sejong-Platform −";

    document.getElementById("sjpq-refresh").onclick = () => {
      closeQaDropdown();
      if (!window.SJP || !window.SJP.bridge || !window.SJP.bridge.getAcceptedItems) {
        alert("⚠️ EPC Control 연결이 안 되어 있습니다.\n\nEPC Control에서 '📄 QA Doc Generator 열기' 버튼을 사용해서 이 창을 열어주세요.");
        return;
      }
      const accepted = window.SJP.bridge.getAcceptedItems();
      if (accepted.length === 0) {
        alert("ℹ️ EPC에 합격 처리된 검사 항목이 아직 없습니다.\n\nEPC Manufacture Manager에서 검사 결과를 'Accept'로 변경하면\n여기서 자동 인식됩니다 (워크플로우 단계 9).");
        return;
      }
      const totalChecks = accepted.reduce((s, a) => s + a.accepted.length, 0);
      const summary = accepted.map(a =>
        "• " + a.item.tagNo + " (" + a.item.type + ") — " + a.accepted.length + "개 합격"
      ).join("\n");
      alert(
        "✅ EPC 합격품 동기화 완료\n\n" +
        "• 아이템 수: " + accepted.length + "개\n" +
        "• 합격 검사 항목 총합: " + totalChecks + "개\n\n" +
        summary + "\n\n" +
        "→ 좌측 사이드바에서 해당 아이템 선택 후\n  8가지 QA/QC 문서 작성 가능합니다."
      );
      window.EPC_ACCEPTED_ITEMS = accepted;
    };

    document.getElementById("sjpq-epc").onclick = () => {
      closeQaDropdown();
      try { if (window.opener && !window.opener.closed) { window.opener.focus(); return; } } catch(e){}
      // v29.9 fix: modules/epc-control/ 경로는 존재 안 함. 실제 EPC 화면은 프로젝트 상세(부모 index.html)
      // → 프로젝트 카드 클릭 → WBS. 부모 창으로 돌아가면 사용자가 프로젝트 선택 가능.
      window.location.href = "../../index.html";
    };

    document.getElementById("sjpq-reset").onclick = () => {
      closeQaDropdown();
      const ok = confirm(
        "⚠️ 데모 데이터 초기화\n\n" +
        "다음 데이터를 모두 삭제하고 페이지를 새로고침합니다:\n\n" +
        "• QA Doc Generator 작성 중인 문서\n" +
        "• EPC Control 데이터 (가능 시)\n" +
        "• ITP Builder 데이터 (가능 시)\n\n" +
        "삭제 후 SJ2026-030 동성케미컬 데모 데이터가\n자동 복원됩니다.\n\n계속하시겠습니까?"
      );
      if (!ok) return;
      try {
        // v29.9 fix: 실제 사용되는 키들은 PID-scoped 형식(`sjp_qa_doc_generator_v1__${PID}` 등).
        // 이전엔 옛날 flat 키만 지워서 실질적으로 아무것도 초기화되지 않았음. 전체 순회하며
        // 관련 prefix를 가진 키를 다 정리.
        const kills = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (!k) continue;
          if (k.startsWith('sjp_qa_doc_generator_v1__')) kills.push(k);
          else if (k.startsWith('sjp_qa_gen_proj:')) kills.push(k);
          else if (k.startsWith('sjp_itp_builder_v1__')) kills.push(k);
          else if (k === 'sjp_qa_doc_generator_v1') kills.push(k);
          else if (k === 'sjp_itp_builder_v1') kills.push(k);
          else if (k === 'epc_control_v28_state') kills.push(k);
          else if (k === 'sjp_mail_drafts') kills.push(k);
        }
        kills.forEach(k => { try { localStorage.removeItem(k); } catch(e){} });
      } catch(e){}
      alert("✅ 초기화 완료 — 페이지를 새로고침합니다.");
      window.location.reload();
    };

    document.getElementById("sjpq-home").onclick = () => {
      closeQaDropdown();
      if (confirm("메인 메뉴로 이동하시겠습니까?\n저장하지 않은 작업이 있다면 먼저 JSON 백업하세요.")) {
        // v29.9 fix: 경로 오버슛(../../../) → 실제 파일은 ../../index.html
        window.location.href = "../../index.html";
      }
    };

    setTimeout(() => document.addEventListener("click", closeOnQaOutside, true), 30);
  }

  function closeQaDropdown() {
    if (_qaDropdown && _qaDropdown.parentNode) _qaDropdown.parentNode.removeChild(_qaDropdown);
    _qaDropdown = null;
    document.removeEventListener("click", closeOnQaOutside, true);
    const btn = document.getElementById("sjpq-hdr-btn");
    if (btn) btn.textContent = "🏢 Sejong-Platform +";
  }

  function closeOnQaOutside(e) {
    if (!_qaDropdown) return;
    if (e.target.closest && (e.target.closest("#sjpq-dropdown") || e.target.closest("#sjpq-hdr-btn"))) return;
    closeQaDropdown();
  }

  setInterval(attachQaDocBtn, 300);
})();
</script>
</body>
</html>
