<script type="module">
  // Firebase Firestore — NCR/CAR/프로젝트 데이터를 index.html과 공유 (같은 오리진).
  // 이 대시보드는 읽기 전용(never writes ncrs/cars) — 실시간 구독만 한다.
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, doc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCmGyObjPd20Qf1MX0XAijYzSR4VitrjRg",
    authDomain: "sejong-platform.firebaseapp.com",
    projectId: "sejong-platform",
    storageBucket: "sejong-platform.firebasestorage.app",
    messagingSenderId: "884301297710",
    appId: "1:884301297710:web:82b2e065119f7c5d9d87bf",
    measurementId: "G-8LJDWYVJ5G"
  };
  const fbApp = initializeApp(firebaseConfig);
  window.fb = { auth: getAuth(fbApp), db: getFirestore(fbApp), collection, onSnapshot, doc, getDoc, getDocs };
</script>
<style>
:root {
  --primary: #1976D2; --primary-hover: #1565C0; --primary-light: #E3F2FD; --primary-lighter: #F0F7FF;
  --success: #4CAF50; --warning: #FF9800; --danger: #F44336;
  --bg: #F5F7FA; --white: #FFFFFF;
  --border: #E0E0E0; --border-light: #F0F0F0;
  --text: #333; --text-light: #666; --text-lighter: #999;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Malgun Gothic", "맑은 고딕", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
#app { flex: 1; overflow-y: auto; padding: 20px 24px 40px; }

.btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.back-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); cursor: pointer; font-size: 12px; font-family: inherit; }
.back-btn:hover { background: var(--bg); }
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
.mod-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 12px; }
.mod-title { font-size: 17px; font-weight: 700; }
.mod-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }

.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; }
.filter-bar select { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 12px; background: #fff; font-family: inherit; }
.filter-bar .cnt { margin-left: auto; font-size: 12px; color: var(--text-light); }

.kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 16px; }
.kpi { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.kpi-label { font-size: 10.5px; color: var(--text-light); margin-bottom: 4px; }
.kpi-value { font-size: 22px; font-weight: 800; }
.kpi-note { font-size: 10px; color: var(--text-lighter); margin-top: 2px; }

/* v29.19: 2열 → 3열 — 카드 폭이 절반 가까이 줄어 차트가 NCR 품질경향분석과 비슷한 크기로 표시됨 */
.qd-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
.qd-chart-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.qd-chart-title { font-size: 12.5px; font-weight: 700; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.qd-chart-title .hint { font-size: 10px; font-weight: 400; color: var(--text-lighter); }
.qd-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 16px; }
.qd-section h4 { font-size: 13.5px; margin-bottom: 10px; }

.org-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.org-table thead th { background: var(--bg); padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-light); border-bottom: 1px solid var(--border); white-space: nowrap; }
.org-table td { padding: 7px 10px; border-bottom: 1px solid var(--border-light); vertical-align: middle; white-space: nowrap; }
.org-table tbody tr:hover { background: var(--bg); }

.b-pill { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 10.5px; font-weight: 600; }
.b-pill.green  { background: #E8F5E9; color: #2E7D32; }
.b-pill.blue   { background: #E3F2FD; color: #1565C0; }
.b-pill.orange { background: #FFF3E0; color: #E65100; }
.b-pill.red    { background: #FFEBEE; color: #C62828; }
.b-pill.gray   { background: var(--border-light); color: var(--text-light); }

.empty-note { text-align: center; padding: 30px; color: var(--text-lighter); font-size: 12px; }
.caveat { font-size: 11px; color: var(--text-lighter); line-height: 1.6; background: var(--bg); border-radius: 6px; padding: 8px 12px; margin-top: 10px; }

@media (max-width: 1400px) {
  .qd-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 1100px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .qd-grid { grid-template-columns: 1fr; }
}

<div id="app">로딩 중...</div>

<script>
const KEY = 'SJ_FLOW_V04';
const NCR_GRADE  = { major:['red','중대'], minor:['orange','일반'], obs:['gray','경미'] };
const NCR_STATUS = { open:['red','진행중'], closed:['green','종결'], pending:['orange','조치대기'] };
const CAR_STATUS = { 'in-progress':['orange','조치중'], 'replied':['blue','회신완료'], 'closed':['green','완료'] };
const DISPOSITION_DEFECT = ['재작업','수리','폐기','반송']; // '현상태사용'은 실질 불량으로 안 침
const COLORS = ['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#0891b2','#84cc16','#f59e0b','#ec4899','#6366f1','#14b8a6'];

let state = {};
let qf = { year: '', quarter: '', proj: '' }; // 품질분석 필터

function loadState() {
  try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { state = {}; }
  if (!state.ncrs)     state.ncrs = [];
  if (!state.cars)     state.cars = [];
  if (!state.projects) state.projects = [];
  if (!state.users)    state.users = [];
}

function startFirestoreSync() {
  if (!window.fb || !fb.db) { setTimeout(startFirestoreSync, 300); return; }
  // v29.9.1: 인증 세션 복원 전에 구독하면 permission-denied로 리스너가 영구 종료됨 → 로그인 확인 후 구독
  if (!fb.auth || !fb.auth.currentUser) { setTimeout(startFirestoreSync, 400); return; }
  subscribeNcrsColl();
  subscribeCarsColl();
  subscribeProjectsColl();
}
// v29.17 fix: 인증 확인 후에도 토큰 리프레시 타이밍 등으로 아주 드물게
// permission-denied가 한 번 나면 그 뒤론 재구독 없이 리스너가 영구히 죽어
// 특정 사용자만 대시보드 데이터가 조용히 멈추는 사고가 있었다(ncr.html/
// car.html과 동일 원인). 에러가 나면 해당 구독만 몇 초 뒤 자동으로 다시 건다.
function subscribeNcrsColl() {
  fb.onSnapshot(fb.collection(fb.db, 't_ncrs'), snap => {
    // v29.13.4: NCR/CAR 첨부파일을 같은 컬렉션에 'chunk__'로 시작하는 id로 조각
    // 저장하므로(별도 컬렉션이 Firestore 보안 규칙에 막혀있어 우회), 대시보드
    // 집계/표에 섞여 보이지 않도록 걸러낸다.
    state.ncrs = snap.docs.filter(d => !d.id.startsWith('chunk__')).map(d => ({ ...d.data(), id: d.id }));
    render();
  }, e => { console.error('[ncrs 구독]', e); setTimeout(subscribeNcrsColl, 3000); });
}
function subscribeCarsColl() {
  fb.onSnapshot(fb.collection(fb.db, 't_cars'), snap => {
    state.cars = snap.docs.filter(d => !d.id.startsWith('chunk__')).map(d => ({ ...d.data(), id: d.id }));
    render();
  }, e => { console.error('[cars 구독]', e); setTimeout(subscribeCarsColl, 3000); });
}
function subscribeProjectsColl() {
  fb.onSnapshot(fb.collection(fb.db, 'projects'), snap => {
    state.projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, e => { console.error('[projects 구독]', e); setTimeout(subscribeProjectsColl, 3000); });
}

function getP(id) { return (state.projects||[]).find(p => p.id === id) || null; }
function projLabel(n) {
  if (n.proj === '__direct__') return n.meta?.projDirect || '직접입력';
  const p = getP(n.proj);
  return p ? `${p.code}` : (n.proj || '미지정');
}
function projFullLabel(n) {
  if (n.proj === '__direct__') return n.meta?.projDirect || '직접입력';
  const p = getP(n.proj);
  return p ? `${p.code} ${p.name}` : (n.proj || '미지정');
}
function quarterOf(dateStr) {
  if (!dateStr || dateStr.length < 7) return null;
  const mo = parseInt(dateStr.slice(5,7), 10);
  return Math.ceil(mo / 3);
}
function daysBetween(a, b) {
  if (!a || !b) return null;
  const d1 = new Date(a), d2 = new Date(b);
  if (isNaN(d1) || isNaN(d2)) return null;
  return Math.round((d2 - d1) / 86400000);
}
function count(arr, key) {
  return arr.reduce((acc, x) => { const k = x[key] || '(미입력)'; acc[k] = (acc[k]||0) + 1; return acc; }, {});
}

/* ═══ 필터 적용 ═══ */
function filteredNcrs() {
  return (state.ncrs || []).filter(n => {
    const d = n.issuedAt || '';
    if (qf.year && !d.startsWith(qf.year)) return false;
    if (qf.quarter && quarterOf(d) !== parseInt(qf.quarter, 10)) return false;
    if (qf.proj && n.proj !== qf.proj) return false;
    return true;
  });
}
function filteredCars() {
  const ncrIds = new Set(filteredNcrs().map(n => n.id));
  return (state.cars || []).filter(c => {
    // NCR 연계 CAR는 필터된 NCR 목록 기준, 단독 발행 CAR는 자체 날짜/프로젝트로 필터
    if (c.ncrId) return ncrIds.has(c.ncrId);
    const d = c.issuedAt || '';
    if (qf.year && !d.startsWith(qf.year)) return false;
    if (qf.quarter && quarterOf(d) !== parseInt(qf.quarter, 10)) return false;
    if (qf.proj && c.proj !== qf.proj) return false;
    return true;
  });
}

/* v29.22: 차트 클릭 <i data-lucide="arrow-right"></i> 이 화면 안에서 자체 드릴다운 처리 (모듈 이동 없음).
   qdDrill = { ncr: {location:'사내'}, car: {status:'closed'} } 형태로 여러 필터 동시 적용,
   같은 값을 다시 클릭하면 해제. 필터가 걸리면 하단에 상세 목록 섹션이 표시되고
   행 클릭 시 등록된 보고서 파일을 새 탭으로 연다. */
function _qdEsc(v) {
  return String(v).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}
function _qdHtmlEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
let qdDrill = { ncr: {}, car: {} };
function qdDrillToggle(tool, field, val) {
  if (!qdDrill[tool]) qdDrill[tool] = {};
  if (qdDrill[tool][field] === val) delete qdDrill[tool][field];
  else qdDrill[tool][field] = val;
  render();
  // 드릴 결과 섹션으로 부드럽게 스크롤 (있을 때만)
  setTimeout(() => { const el = document.getElementById('qd-drill-section'); if (el) el.scrollIntoView({ behavior:'smooth', block:'start' }); }, 40);
}
function qdDrillClear(tool) {
  if (tool) qdDrill[tool] = {};
  else qdDrill = { ncr: {}, car: {} };
  render();
}
function _qdClickAttr(clickSpec, val) {
  if (!clickSpec || val == null || val === '(미입력)') return '';
  const selected = qdDrill[clickSpec.tool] && qdDrill[clickSpec.tool][clickSpec.field] === val;
  const extraStyle = selected ? 'outline:2px solid var(--primary);outline-offset:2px;' : '';
  return ` style="cursor:pointer;${extraStyle}" onclick="qdDrillToggle('${clickSpec.tool}','${clickSpec.field}','${_qdEsc(val)}')"`;
}

/* ═══ SVG 차트 (NCR 모듈과 동일한 방식 — 외부 라이브러리 없이 순수 SVG) ═══ */
function barSvg(entries, colors, clickSpec) {
  if (!entries.length) return '<div class="empty-note">데이터 없음</div>';
  const max = Math.max(...entries.map(e=>e[1]), 1);
  const n = entries.length;
  const W = 320, PL = 10, PR = 10, PT = 28, PB = n > 5 ? 62 : 38;
  const H = 180;
  const iW = W - PL - PR, iH = H - PT - PB;
  const gap = iW / n;
  const bW = Math.max(8, Math.min(40, Math.floor(gap * 0.55)));
  const rotate = n > 5;
  const bars = entries.map(([label, val], i) => {
    const bH = val === 0 ? 0 : Math.max(4, Math.round(val / max * iH));
    const cx = PL + Math.round(i * gap + gap / 2);
    const by = PT + iH - bH;
    const valY = by - 6;
    const lblY = H - PB + (rotate ? 4 : 14);
    const lbl = String(label).length > 8 ? String(label).slice(0, 7) + '…' : label;
    const anchor = rotate ? 'end' : 'middle';
    const clickAttr = _qdClickAttr(clickSpec, entries[i][2] !== undefined ? entries[i][2] : label);
    return `<g${clickAttr}><rect x="${cx - bW/2}" y="${by}" width="${bW}" height="${bH}" rx="3" fill="${colors[i % colors.length]}"/>
      <text x="${cx}" y="${valY}" text-anchor="middle" font-size="10" fill="#333">${val}</text>
      <text x="${cx}" y="${lblY}" text-anchor="${anchor}" font-size="9" fill="#666"${rotate ? ` transform="rotate(-40,${cx},${lblY})"` : ''}>${lbl}</text></g>`;
  }).join('');
  return `<svg viewBox="-2 -4 ${W+4} ${H+8}" style="width:100%;max-width:400px;margin:0 auto;display:block;overflow:visible;">
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="#e0e0e0" stroke-width="1"/>
    ${bars}
  </svg>`;
}
function donutSvg(entries, colors, clickSpec) {
  if (!entries.length) return '<div class="empty-note">데이터 없음</div>';
  const total = entries.reduce((s,[,v])=>s+v,0);
  if (!total) return '<div class="empty-note">데이터 없음</div>';
  const cx=75, cy=75, R=58, ri=34;
  const mid_r = (R + ri) / 2;
  const LX = 158, rowH = 20;
  const H = Math.max(160, entries.length * rowH + 24);
  let angle = -Math.PI/2;
  const slices = entries.map(([label,val],i) => {
    const a = (val/total)*2*Math.PI;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    angle += a;
    const x2=cx+R*Math.cos(angle), y2=cy+R*Math.sin(angle);
    const lg = a>Math.PI?1:0;
    const midA = angle - a/2;
    const tx = cx + mid_r * Math.cos(midA);
    const ty = cy + mid_r * Math.sin(midA);
    const pct = Math.round(val/total*100);
    const clickAttr = _qdClickAttr(clickSpec, entries[i][2] !== undefined ? entries[i][2] : label);
    return `<g${clickAttr}><path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg} 1 ${x2.toFixed(1)},${y2.toFixed(1)} L${cx},${cy} Z" fill="${colors[i%colors.length]}"/>
    ${a > 0.4 ? `<text x="${tx.toFixed(1)}" y="${(ty+3.5).toFixed(1)}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">${pct}%</text>` : ''}</g>`;
  });
  const legend = entries.map(([label,val],i) => {
    const lbl = String(label).length > 9 ? String(label).slice(0,8)+'…' : label;
    const clickAttr = _qdClickAttr(clickSpec, entries[i][2] !== undefined ? entries[i][2] : label);
    return `<g transform="translate(${LX},${(H-entries.length*rowH)/2+i*rowH})"${clickAttr}>
      <rect width="10" height="10" rx="2" fill="${colors[i%colors.length]}"/>
      <text x="15" y="9" font-size="11" fill="#444">${lbl} (${val})</text>
    </g>`;
  });
  return `<svg viewBox="0 0 290 ${H}" style="width:100%;max-width:380px;margin:0 auto;display:block;overflow:visible;">
    <circle cx="${cx}" cy="${cy}" r="${R+1}" fill="#f5f5f5"/>
    ${slices.join('')}
    <circle cx="${cx}" cy="${cy}" r="${ri}" fill="#fff"/>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="13" fill="#444" font-weight="700">${total}</text>
    <text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="10" fill="#999">건</text>
    ${legend.join('')}
  </svg>`;
}
function lineSvg(periodData) {
  const keys = Object.keys(periodData).sort();
  if (!keys.length) return '<div class="empty-note">데이터 없음</div>';
  const vals = keys.map(k => periodData[k]);
  const maxV = Math.max(...vals, 1);
  const W=680, PL=40, PR=20, PT=26, PB=30, H=140;
  const iW=W-PL-PR, iH=H-PT-PB;
  const xs = keys.length===1 ? [PL+Math.round(iW/2)] : keys.map((_,i)=>PL+Math.round(i/(keys.length-1)*iW));
  const ys = vals.map(v=>PT+iH-Math.round(v/maxV*iH));
  const path = xs.map((x,i)=>`${i===0?'M':'L'}${x},${ys[i]}`).join(' ');
  const area = path+` L${xs[xs.length-1]},${PT+iH} L${xs[0]},${PT+iH} Z`;
  const pts = xs.map((x,i) => {
    const atTop = ys[i] <= PT + 18;
    const valY = atTop ? ys[i] + 15 : ys[i] - 8;
    const anchor = i===0 ? 'start' : i===xs.length-1 ? 'end' : 'middle';
    const lx = i===0 ? Math.max(x, PL) : i===xs.length-1 ? Math.min(x, W-PR) : x;
    return `<circle cx="${x}" cy="${ys[i]}" r="3.5" fill="#1976D2"/>
    <text x="${x}" y="${valY}" text-anchor="middle" font-size="10" fill="#333">${vals[i]}</text>
    <text x="${lx}" y="${H-10}" text-anchor="${anchor}" font-size="9" fill="#888">${keys[i]}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:760px;margin:0 auto;display:block;overflow:visible;">
    <path d="${area}" fill="#1976D2" opacity="0.08"/>
    <path d="${path}" fill="none" stroke="#1976D2" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="#e0e0e0" stroke-width="1"/>
  </svg>`;
}

/* ═══ 필터 옵션 갱신 ═══ */
function setFilter(key, val) { qf[key] = val; render(); }

/* ═══ 메인 렌더 ═══ */
function render() {
  loadState();
  const ncrs = filteredNcrs();
  const cars = filteredCars();

  const years = [...new Set((state.ncrs||[]).map(n => (n.issuedAt||'').slice(0,4)).filter(Boolean))].sort().reverse();
  const projIds = [...new Set((state.ncrs||[]).map(n => n.proj))];

  // ── KPI ──
  const openNcr = ncrs.filter(n => n.status !== 'closed').length;
  const majorNcr = ncrs.filter(n => n.grade === 'major').length;
  const openCar = cars.filter(c => c.status !== 'closed').length;
  const closedCars = cars.filter(c => c.status === 'closed' && c.issuedAt && c.closedAt);
  const avgCarDays = closedCars.length
    ? Math.round(closedCars.reduce((s,c) => s + (daysBetween(c.issuedAt, c.closedAt) || 0), 0) / closedCars.length)
    : null;
  const withDisposition = ncrs.filter(n => n.disposition);
  const defectRate = withDisposition.length
    ? Math.round(withDisposition.filter(n => DISPOSITION_DEFECT.includes(n.disposition)).length / withDisposition.length * 100)
    : null;

  // ── 프로젝트별 요약 ──
  const byProj = {};
  ncrs.forEach(n => {
    const key = n.proj;
    if (!byProj[key]) byProj[key] = { proj: key, total:0, major:0, minor:0, obs:0, open:0, closed:0, latest:'', carCount:0, carOpen:0 };
    const b = byProj[key];
    b.total++;
    b[n.grade || 'obs'] = (b[n.grade || 'obs']||0) + 1;
    if (n.status === 'closed') b.closed++; else b.open++;
    if (!b.latest || (n.issuedAt||'') > b.latest) b.latest = n.issuedAt || '';
  });
  cars.forEach(c => {
    const n = c.ncrId ? (state.ncrs||[]).find(x=>x.id===c.ncrId) : null;
    const key = n ? n.proj : c.proj;
    if (!byProj[key]) byProj[key] = { proj: key, total:0, major:0, minor:0, obs:0, open:0, closed:0, latest:'', carCount:0, carOpen:0 };
    byProj[key].carCount++;
    if (c.status !== 'closed') byProj[key].carOpen++;
  });
  const projRows = Object.values(byProj).sort((a,b) => b.total - a.total);

  // ── 기간 추이 (연도-분기별, 필터에 연도가 없으면 연-분기 라벨, 있으면 연-월) ──
  const periodData = {};
  ncrs.forEach(n => {
    const d = n.issuedAt || '';
    if (!d) return;
    const key = qf.year ? d.slice(0,7) : `${d.slice(0,4)}-Q${quarterOf(d)}`;
    periodData[key] = (periodData[key]||0) + 1;
  });

  // ── 제작단계(검사공정)별 — Traveller 경유 NCR만 travStage 보유 ──
  const stageNcrs = ncrs.filter(n => n.source === 'traveller' && n.travStage);
  const stageEntries = Object.entries(count(stageNcrs, 'travStage')).sort((a,b)=>b[1]-a[1]);

  // ── 데이터 정합성 검사 (전체 데이터 기준 — 필터 무시) ──
  const allNcrs = state.ncrs || [], allCars = state.cars || [];
  const ncrIdSet = new Set(allNcrs.map(n => n.id));
  const carIdSet = new Set(allCars.map(c => c.id));
  const projIdSet = new Set((state.projects||[]).map(p => p.id));
  const issues = [];
  allCars.forEach(c => {
    if (c.ncrId && !ncrIdSet.has(c.ncrId)) issues.push({ sev:'red', text:`${c.id} — 연계된 NCR "${c.ncrId}"이(가) 존재하지 않습니다 (삭제됐거나 오타).` });
  });
  allNcrs.forEach(n => {
    if (n.carId && !carIdSet.has(n.carId)) issues.push({ sev:'red', text:`${n.id} — 연계된 CAR "${n.carId}"이(가) 존재하지 않습니다 (삭제됐거나 오타).` });
    if (n.proj && n.proj !== '__direct__' && !projIdSet.has(n.proj)) issues.push({ sev:'orange', text:`${n.id} — 참조하는 프로젝트 "${n.proj}"가 존재하지 않습니다 (프로젝트 삭제됨).` });
    if (n.status === 'closed' && !n.disposition) issues.push({ sev:'orange', text:`${n.id} — 종결 처리됐지만 처리방안이 입력되지 않았습니다.` });
    const daysOpen = n.status !== 'closed' ? daysBetween(n.issuedAt, new Date().toISOString().slice(0,10)) : null;
    if (daysOpen != null && daysOpen > 30) issues.push({ sev:'orange', text:`${n.id} — 발행 후 ${daysOpen}일째 미종결 상태입니다 (30일 초과).` });
  });

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="mod-head">
      <div>
        <div class="mod-title"><i data-lucide="chart-column"></i> 품질종합분석표 <span style="font-size:13px;color:var(--text-light);font-weight:400;">전사 NCR·CAR 종합 분석</span></div>
        <div class="mod-sub">프로젝트·연도·분기별 부적합/시정조치 현황 및 불량 경향 분석</div>
      </div>
      <button class="back-btn" onclick="try{window.parent.closeTool()}catch(e){}"><i data-lucide="arrow-left"></i> 도구함 닫기</button>
    </div>

    <div class="filter-bar">
      <select onchange="setFilter('year', this.value)">
        <option value="">전체 연도</option>
        ${years.map(y => `<option value="${y}" ${qf.year===y?'selected':''}>${y}년</option>`).join('')}
      </select>
      <select onchange="setFilter('quarter', this.value)">
        <option value="">전체 분기</option>
        ${[1,2,3,4].map(q => `<option value="${q}" ${qf.quarter==String(q)?'selected':''}>${q}분기</option>`).join('')}
      </select>
      <select onchange="setFilter('proj', this.value)">
        <option value="">전체 프로젝트</option>
        ${projIds.map(pid => `<option value="${pid}" ${qf.proj===pid?'selected':''}>${projFullLabel({proj:pid, meta:(state.ncrs||[]).find(n=>n.proj===pid)?.meta})}</option>`).join('')}
      </select>
      <span class="cnt">NCR ${ncrs.length}건 · CAR ${cars.length}건</span>
    </div>

    <div class="kpi-grid">
      ${_qdKpiCard('ncr','all',    'NCR 전체',        ncrs.length,                  '',                '건')}
      ${_qdKpiCard('ncr','open',   'NCR 진행중',      openNcr,                      'var(--danger)',    '미종결')}
      ${_qdKpiCard('ncr','major',  '중대 등급',       majorNcr,                     'var(--danger)',    'Major')}
      ${_qdKpiCard('car','all',    'CAR 전체',        cars.length,                  '',                '건')}
      ${_qdKpiCard('car','open',   'CAR 진행중',      openCar,                      'var(--warning)',   '미완료')}
      ${_qdKpiCard('car','closed', '평균 CAR 처리일', avgCarDays!=null?avgCarDays:'-', '',              '완료건 기준(일)')}
    </div>

    <div class="qd-section" style="">
      <h4>🚢 종합 불량 영향률 (추정) — ${defectRate!=null?defectRate+'%':'데이터 없음'}</h4>
      <div style="font-size:12px;color:var(--text-light);">처리방안이 입력된 NCR ${withDisposition.length}건 중 재작업·수리·폐기·반송으로 이어진 비율입니다.</div>
      <div class="caveat"><i data-lucide="alert-triangle"></i>️ 실제 "출고 불량률"(생산·출고 수량 대비 불량 수량)을 계산하려면 프로젝트별 생산/출고 수량 데이터가 필요한데, 현재 시스템에는 이 데이터가 없습니다. 위 수치는 NCR의 처리방안을 기준으로 한 근사치이며, 정확한 출고 불량률을 원하시면 WBS 또는 프로젝트에 "출고 수량" 항목을 추가하는 걸 권장드립니다.</div>
    </div>

    <div class="qd-section" style="">
      <h4>${issues.length ? '<i data-lucide="siren"></i>' : '<i data-lucide="check-circle"></i>'} 데이터 정합성 검사 (${issues.length}건) <span style="font-size:11px;color:var(--text-lighter);font-weight:400;">— 필터와 무관하게 전체 NCR/CAR 대상, 자동 점검</span></h4>
      ${issues.length ? `<div style="display:flex;flex-direction:column;gap:6px;margin-top:8px;">
        ${issues.map(i => `<div style="font-size:12px;padding:6px 10px;border-radius:6px;background:${i.sev==='red'?'#FFEBEE':'#FFF3E0'};color:${i.sev==='red'?'#C62828':'#E65100'};">${i.sev==='red'?'⛔':'<i data-lucide="alert-triangle"></i>️'} ${i.text}</div>`).join('')}
      </div>` : `<div style="font-size:12px;color:var(--text-light);">깨진 참조·누락 항목이 발견되지 않았습니다.</div>`}
    </div>

    <div class="qd-section">
      <h4><i data-lucide="trending-up"></i> 기간별 NCR 발생 추이 ${qf.year ? '(월별)' : '(연도-분기별)'}</h4>
      ${lineSvg(periodData)}
    </div>

    <div class="qd-section">
      <h4><i data-lucide="hard-hat"></i>️ 프로젝트별 종합 현황</h4>
      <div style="overflow-x:auto;">
      <table class="org-table">
        <thead><tr><th>프로젝트</th><th>NCR 전체</th><th>중대</th><th>일반</th><th>경미</th><th>진행중</th><th>종결</th><th>CAR</th><th>CAR 진행중</th><th>최근 발생일</th></tr></thead>
        <tbody>
          ${projRows.length ? projRows.map(r => {
            const projLabel = r.proj==='__direct__' ? ((state.ncrs||[]).find(n=>n.proj==='__direct__')?.meta?.projDirect||'직접입력') : ((state.projects||[]).find(p=>p.id===r.proj)?.code||'미지정');
            const isSel = qdDrill.ncr && qdDrill.ncr.projLabel === projLabel;
            return `<tr style="cursor:pointer;${isSel?'background:#F0F7FF;outline:2px solid var(--primary);outline-offset:-2px;':''}" onclick="qdDrillToggle('ncr','projLabel','${_qdEsc(projLabel)}')" title="클릭하면 이 프로젝트의 NCR 상세 목록이 아래에 표시됩니다">
            <td style="font-weight:700;color:var(--primary);">${projFullLabel({proj:r.proj, meta:(state.ncrs||[]).find(n=>n.proj===r.proj)?.meta})} ${isSel?'●':'↓'}</td>
            <td>${r.total}</td>
            <td style="color:var(--danger);">${r.major||0}</td>
            <td style="color:var(--warning);">${r.minor||0}</td>
            <td style="color:var(--text-light);">${r.obs||0}</td>
            <td>${r.open}</td>
            <td>${r.closed}</td>
            <td>${r.carCount}</td>
            <td style="color:${r.carOpen?'var(--warning)':'var(--text-lighter)'};">${r.carOpen}</td>
            <td>${r.latest||'-'}</td>
          </tr>`;
          }).join('') : `<tr><td colspan="10" class="empty-note">해당 조건의 데이터가 없습니다</td></tr>`}
        </tbody>
      </table>
      </div>
    </div>

    <div style="font-size:11px;color:var(--text-lighter);margin-bottom:8px;"><i data-lucide="lightbulb"></i> 상단 <b>KPI 카드</b>·차트 막대·조각·프로젝트 행을 클릭하면 이 화면 하단에 해당 조건의 <b>상세 목록</b>이 표시됩니다 (다시 클릭하면 해제).</div>
    <div class="qd-grid">
      <div class="qd-chart-wrap">
        <div class="qd-chart-title">발생장소별</div>
        ${barSvg(Object.entries(count(ncrs,'location')).sort((a,b)=>b[1]-a[1]), COLORS, {tool:'ncr',field:'location'})}
      </div>
      <div class="qd-chart-wrap">
        <div class="qd-chart-title">불량원인별</div>
        ${barSvg(Object.entries(count(ncrs,'cause')).sort((a,b)=>b[1]-a[1]), COLORS, {tool:'ncr',field:'cause'})}
      </div>
      <div class="qd-chart-wrap">
        <div class="qd-chart-title">불량원인 상세별</div>
        ${barSvg(Object.entries(count(ncrs,'causeDetail')).sort((a,b)=>b[1]-a[1]), COLORS, {tool:'ncr',field:'causeDetail'})}
      </div>
      <div class="qd-chart-wrap">
        <div class="qd-chart-title">처리방안별</div>
        ${donutSvg(Object.entries(count(ncrs,'disposition')).sort((a,b)=>b[1]-a[1]), COLORS, {tool:'ncr',field:'disposition'})}
      </div>
      <div class="qd-chart-wrap">
        <div class="qd-chart-title">등급별<span class="hint">중대/일반/경미</span></div>
        ${donutSvg(Object.entries(count(ncrs,'grade')).map(([k,v])=>[NCR_GRADE[k]?.[1]||k, v, k]).sort((a,b)=>b[1]-a[1]), COLORS, {tool:'ncr',field:'grade'})}
      </div>
      <div class="qd-chart-wrap">
        <div class="qd-chart-title">CAR 상태별</div>
        ${donutSvg(Object.entries(count(cars,'status')).map(([k,v])=>[CAR_STATUS[k]?.[1]||k, v, k]).sort((a,b)=>b[1]-a[1]), COLORS, {tool:'car',field:'status'})}
      </div>
    </div>

    <div class="qd-section">
      <h4><i data-lucide="wrench"></i> 제작단계(검사공정)별 부적합 <span style="font-size:11px;color:var(--text-lighter);font-weight:400;">— Traveller 검사부적합으로 등록된 NCR ${stageNcrs.length}건 기준</span></h4>
      ${stageEntries.length ? barSvg(stageEntries, COLORS) : '<div class="empty-note">검사부적합(Traveller) 경로로 등록된 NCR이 없습니다</div>'}
    </div>

    <div class="qd-section">
      <h4><i data-lucide="clock"></i> 회신기한 초과 CAR ${(() => {
        const today = new Date().toISOString().slice(0,10);
        const overdue = cars.filter(c => c.status !== 'closed' && c.replyDue && c.replyDue < today);
        return `(${overdue.length}건)`;
      })()}</h4>
      ${(() => {
        const today = new Date().toISOString().slice(0,10);
        const overdue = cars.filter(c => c.status !== 'closed' && c.replyDue && c.replyDue < today)
          .sort((a,b) => a.replyDue.localeCompare(b.replyDue));
        if (!overdue.length) return '<div class="empty-note">회신기한 초과된 CAR이 없습니다 <i data-lucide="thumbs-up"></i></div>';
        return `<div style="overflow-x:auto;"><table class="org-table">
          <thead><tr><th>CAR No.</th><th>연계 NCR</th><th>프로젝트</th><th>시정조치요구부서</th><th>발생분야</th><th>회신기한</th><th>지연일</th><th>상태</th></tr></thead>
          <tbody>${overdue.map(c => {
            const n = c.ncrId ? (state.ncrs||[]).find(x=>x.id===c.ncrId) : null;
            const st = CAR_STATUS[c.status] || CAR_STATUS['in-progress'];
            const lateDays = daysBetween(c.replyDue, today);
            return `<tr>
              <td style="font-weight:700;">${c.id}</td>
              <td style="color:var(--primary);">${c.ncrId || '단독'}</td>
              <td>${n ? projLabel(n) : (getP(c.proj)?.code || '-')}</td>
              <td>${c.reqDept || '-'}</td>
              <td>${c.field || '-'}</td>
              <td style="color:var(--danger);">${c.replyDue}</td>
              <td style="color:var(--danger);font-weight:700;">${lateDays}일</td>
              <td><span class="b-pill ${st[0]}">${st[1]}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`;
      })()}
    </div>

    ${qdRenderDrillSection(ncrs, cars)}
  `;
}

// v29.22: 차트에서 클릭한 드릴 필터가 걸린 NCR/CAR 상세 목록 섹션.
// 필터가 하나도 없으면 렌더하지 않음. 필터 값과 무관하게 전체 목록에서 다시 필터링
// (섹션 상단 필터 - 연도/분기/프로젝트 - 는 이미 ncrs/cars에 적용된 상태로 넘어옴).
const QD_DRILL_LABELS = {
  location:'발생장소', cause:'불량원인', causeDetail:'불량원인 상세',
  disposition:'처리방안', grade:'등급', status:'상태', projLabel:'프로젝트', quick:'구분'
};
// v29.23: KPI 카드 <i data-lucide="arrow-right"></i> quick 필터로 매핑. 값은 사람이 읽는 라벨(칩에 그대로 노출됨).
const QD_QUICK_LABELS = {
  ncr: { all:'전체 NCR', open:'진행중 NCR', major:'중대 등급 NCR' },
  car: { all:'전체 CAR', open:'진행중 CAR', closed:'완료 CAR' }
};
function _qdKpiCard(tool, quick, label, value, valColor, note) {
  const cur = qdDrill[tool] && qdDrill[tool].quick;
  const active = cur === QD_QUICK_LABELS[tool][quick];
  const style = `cursor:pointer;transition:transform .1s,box-shadow .1s;${active?'outline:2px solid var(--primary);background:var(--primary-lighter);':''}`;
  const onclick = `onclick="qdDrillToggle('${tool}','quick','${_qdEsc(QD_QUICK_LABELS[tool][quick])}')"`;
  const onhover = `onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 3px 8px rgba(0,0,0,.08)';" onmouseout="this.style.transform='';this.style.boxShadow='';"`;
  return `<div class="kpi" style="${style}" ${onclick} ${onhover} title="클릭하면 하단에 이 조건의 상세 목록이 표시됩니다">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value"${valColor?` style="color:${valColor};"`:''}>${value}</div>
    <div class="kpi-note">${note}</div>
  </div>`;
}
function _qdFilterNcrs(ncrs) {
  const d = qdDrill.ncr || {};
  return ncrs.filter(n => {
    if (d.location && n.location !== d.location) return false;
    if (d.cause && n.cause !== d.cause) return false;
    if (d.causeDetail && n.causeDetail !== d.causeDetail) return false;
    if (d.disposition && n.disposition !== d.disposition) return false;
    if (d.grade && n.grade !== d.grade) return false;
    if (d.projLabel) {
      const lbl = n.proj==='__direct__' ? (n.meta?.projDirect||'직접입력') : (getP(n.proj)?.code||'미지정');
      if (lbl !== d.projLabel) return false;
    }
    // v29.23: KPI 카드에서 온 quick 필터 (전체/진행중/중대)
    if (d.quick === QD_QUICK_LABELS.ncr.open  && n.status === 'closed') return false;
    if (d.quick === QD_QUICK_LABELS.ncr.major && n.grade  !== 'major')  return false;
    // 'all'은 필터 없음 (모든 NCR 노출)
    return true;
  });
}
function _qdFilterCars(cars) {
  const d = qdDrill.car || {};
  return cars.filter(c => {
    if (d.status && c.status !== d.status) return false;
    // v29.23: KPI 카드에서 온 quick 필터
    if (d.quick === QD_QUICK_LABELS.car.open   && c.status === 'closed') return false;
    if (d.quick === QD_QUICK_LABELS.car.closed && c.status !== 'closed') return false;
    // 'all'은 필터 없음
    return true;
  });
}
function _qdDrillChips() {
  const chips = [];
  ['ncr','car'].forEach(tool => {
    Object.entries(qdDrill[tool] || {}).forEach(([field, val]) => {
      chips.push(`<span style="display:inline-flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary-hover);border-radius:14px;padding:4px 10px 4px 12px;font-size:11px;font-weight:600;cursor:pointer;" onclick="qdDrillToggle('${tool}','${field}','${_qdEsc(val)}')" title="클릭하면 이 필터를 해제합니다"><span style="opacity:.7;font-size:10px;">[${tool.toUpperCase()}]</span> ${QD_DRILL_LABELS[field]||field}: <b>${_qdHtmlEsc(val)}</b> <span style="opacity:.65;">✕</span></span>`);
    });
  });
  return chips.join(' ');
}
function qdRenderDrillSection(ncrs, cars) {
  const hasNcrDrill = Object.keys(qdDrill.ncr||{}).length > 0;
  const hasCarDrill = Object.keys(qdDrill.car||{}).length > 0;
  if (!hasNcrDrill && !hasCarDrill) return '';
  const filteredN = hasNcrDrill ? _qdFilterNcrs(ncrs) : [];
  const filteredC = hasCarDrill ? _qdFilterCars(cars) : [];
  const ncrRows = filteredN.map(n => {
    const p = n.proj==='__direct__' ? (n.meta?.projDirect||'직접입력') : (getP(n.proj)?.code||'-');
    const hasFile = !!(n.meta?.fileChunkId || n.meta?.fileUrl || n.meta?.fileDataUrl);
    return `<tr style="cursor:pointer;" onclick="qdOpenReport('ncr','${_qdEsc(n.id)}')" title="${hasFile?'클릭하면 등록된 보고서를 새 탭으로 엽니다':'첨부 보고서가 없습니다'}">
      <td style="font-weight:700;color:var(--primary);">${_qdHtmlEsc(n.id)} ${hasFile?'<i data-lucide="file"></i>':'—'}</td>
      <td>${_qdHtmlEsc(p)}</td>
      <td>${_qdHtmlEsc(n.item||'-')}</td>
      <td>${_qdHtmlEsc(n.location||'-')}</td>
      <td>${_qdHtmlEsc(n.cause||'-')}</td>
      <td>${_qdHtmlEsc(n.causeDetail||'-')}</td>
      <td>${_qdHtmlEsc(n.disposition||'-')}</td>
      <td>${n.issuedAt||'-'}</td>
      <td>${n.closedAt||'-'}</td>
      <td><span class="b-pill ${n.status==='closed'?'green':'red'}">${n.status==='closed'?'종결':'진행중'}</span></td>
    </tr>`;
  }).join('');
  const carRows = filteredC.map(c => {
    const st = CAR_STATUS[c.status] || CAR_STATUS['in-progress'];
    const hasFile = !!(c.meta?.fileChunkId || c.meta?.fileUrl || c.meta?.fileDataUrl);
    return `<tr style="cursor:pointer;" onclick="qdOpenReport('car','${_qdEsc(c.id)}')" title="${hasFile?'클릭하면 등록된 보고서를 새 탭으로 엽니다':'첨부 보고서가 없습니다'}">
      <td style="font-weight:700;color:var(--primary);">${_qdHtmlEsc(c.id)} ${hasFile?'<i data-lucide="file"></i>':'—'}</td>
      <td>${_qdHtmlEsc(c.ncrId||'단독')}</td>
      <td>${_qdHtmlEsc(c.reqDept||'-')}</td>
      <td>${_qdHtmlEsc(c.field||'-')}</td>
      <td>${_qdHtmlEsc(c.cause||'-')}</td>
      <td>${c.issuedAt||'-'}</td>
      <td>${c.replyDue||'-'}</td>
      <td>${c.closedAt||'-'}</td>
      <td><span class="b-pill ${st[0]}">${st[1]}</span></td>
    </tr>`;
  }).join('');
  return `<div id="qd-drill-section" class="qd-section" style="">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <h4 style="margin:0;"><i data-lucide="search"></i> 드릴다운 상세 목록 <span style="font-size:11px;color:var(--text-lighter);font-weight:400;">— 아래 필터 조건에 해당하는 NCR/CAR입니다. 행을 클릭하면 등록된 보고서가 새 탭으로 열립니다.</span></h4>
      <button class="btn" onclick="qdDrillClear()" style="font-size:11px;padding:4px 10px;">✕ 전체 필터 해제</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">${_qdDrillChips()}</div>
    ${hasNcrDrill ? `
      <div style="font-size:12px;font-weight:700;margin:8px 0;color:var(--text-light);"><i data-lucide="clipboard-list"></i> NCR (${filteredN.length}건)</div>
      <div style="overflow-x:auto;"><table class="org-table">
        <thead><tr><th>NCR No.</th><th>프로젝트</th><th>아이템</th><th>발생장소</th><th>불량원인</th><th>원인상세</th><th>처리방안</th><th>발행일</th><th>종결일</th><th>상태</th></tr></thead>
        <tbody>${ncrRows || '<tr><td colspan="10" class="empty-note">해당 조건의 NCR이 없습니다</td></tr>'}</tbody>
      </table></div>
    ` : ''}
    ${hasCarDrill ? `
      <div style="font-size:12px;font-weight:700;margin:14px 0 8px;color:var(--text-light);"><i data-lucide="clipboard-list"></i> CAR (${filteredC.length}건)</div>
      <div style="overflow-x:auto;"><table class="org-table">
        <thead><tr><th>CAR No.</th><th>연계 NCR</th><th>시정조치요구부서</th><th>발생분야</th><th>원인</th><th>발행일</th><th>회신기한</th><th>종결일</th><th>상태</th></tr></thead>
        <tbody>${carRows || '<tr><td colspan="9" class="empty-note">해당 조건의 CAR이 없습니다</td></tr>'}</tbody>
      </table></div>
    ` : ''}
  </div>`;
}

// v29.22: NCR/CAR에 등록된 첨부 보고서를 새 탭으로 오픈.
// Firestore 첨부 chunk 방식(v29.12+) · 구버전 fileUrl · fileDataUrl 모두 지원.
async function qdOpenReport(tool, id) {
  const arr = tool === 'ncr' ? (state.ncrs||[]) : (state.cars||[]);
  const rec = arr.find(x => x.id === id);
  if (!rec) return alert('항목을 찾을 수 없습니다.');
  if (rec.meta?.fileChunkId) {
    try {
      const dataUrl = await qdLoadAttachment(tool === 'ncr' ? 't_ncrs' : 't_cars', rec.meta.fileChunkId, rec.meta.fileChunks || 0);
      if (!dataUrl) { alert('보고서 파일을 불러오지 못했습니다.'); return; }
      window.open(_qdToBlobUrl(dataUrl), '_blank');
    } catch (e) { alert('보고서 파일을 여는 중 오류: ' + (e.message || e)); }
    return;
  }
  if (rec.meta?.fileUrl) { window.open(rec.meta.fileUrl, '_blank'); return; }
  if (rec.meta?.fileDataUrl) { window.open(_qdToBlobUrl(rec.meta.fileDataUrl), '_blank'); return; }
  alert('이 ' + tool.toUpperCase() + '에는 등록된 보고서 파일이 없습니다.');
}
// chunk 문서 병합 (ncr.html의 loadAttachmentDataUrl 이식). 컬렉션에 chunk__<id>__<i> 형식으로 저장됨.
async function qdLoadAttachment(coll, chunkId, totalChunks) {
  const jobs = [];
  for (let i = 0; i < totalChunks; i++) {
    jobs.push(fb.getDoc(fb.doc(fb.db, coll, `${chunkId}__${i}`)));
  }
  const snaps = await Promise.all(jobs);
  const pieces = [];
  for (const s of snaps) { if (!s.exists()) return null; pieces.push(s.data().data || ''); }
  return pieces.join('');
}
// dataURL을 blob URL로 변환(브라우저 탭 오픈 시 base64 파싱 부담 완화 + 큰 파일 지원)
function _qdToBlobUrl(dataUrl) {
  try {
    const m = /^data:([^;]+);base64,(.*)$/.exec(dataUrl);
    if (!m) return dataUrl;
    const mime = m[1];
    const bin = atob(m[2]);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return URL.createObjectURL(new Blob([buf], { type: mime }));
  } catch(e) { return dataUrl; }
}

loadState();
render();
startFirestoreSync();
