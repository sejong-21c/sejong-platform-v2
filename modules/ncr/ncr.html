<script type="module">
  // Firebase Firestore — NCR/CAR 데이터를 index.html과 공유 (같은 오리진이라 로그인 세션도 자동 공유됨)
  // v29.8: 이전엔 localStorage에만 저장되어 기기/브라우저마다 NCR 목록이 따로 놀았음(전사 공유 안 됨).
  // 품질종합분석표가 전사 데이터를 봐야 하므로 Firestore 실시간 동기화로 전환.
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  // v29.12: 첨부파일을 Firestore 문서에 base64로 통째로 넣던 방식(1MB 제한에 걸려
  // 조용히 저장 실패)을 버리고, 메신저 모듈과 동일하게 Firebase Storage에 실제
  // 업로드 후 다운로드 URL만 Firestore에 저장하는 방식으로 전환.
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCmGyObjPd20Qf1MX0XAijYzSR4VitrjRg",
    authDomain: "sejong-platform.firebaseapp.com",
    projectId: "sejong-platform",
    storageBucket: "sejong-platform.firebasestorage.app",
    messagingSenderId: "884301297710",
    appId: "1:884301297710:web:82b2e065119f7c5d9d87bf",
    measurementId: "G-8LJDWYVJ5G"
  };
  const fbApp = initializeApp(firebaseConfig);
  window.fb = { auth: getAuth(fbApp), db: getFirestore(fbApp), storage: getStorage(fbApp), doc, setDoc, deleteDoc, collection, onSnapshot, ref, uploadBytes, getDownloadURL };
</script>
<style>

<script>
/* ═══ 상수 ═══ */
const KEY = 'SJ_FLOW_V04';
const NCR_GRADE  = { major:['red','중대'], minor:['orange','일반'], obs:['gray','경미'] };
const NCR_STATUS = { open:['red','진행중'], closed:['green','종결'], pending:['orange','조치대기'] };
const NCR_SOURCE = { manual:'✍️ 직접발행', mail:'📧 메일접수', traveller:'🔧 검사부적합' };
const NCR_DISP   = { '현상태사용':['blue','현상태사용'], '재작업':['orange','재작업'], '수리':['orange','수리'], '폐기':['red','폐기'], '반송':['gray','반송'] };
const NCR_LOCATION_DEF = ['사내','협력사','설치현장'];
const NCR_CAUSE_DEF    = ['원자재불량','절차미준수','작업자실수','검사미흡','설계불량'];
const NCR_DETAIL_DEF   = ['설계에러','발주에러','제관불량','각인에러','성형불량','개선불량','조립불량','전처리불량','도장불량','용접불량','관리불량'];

/* ═══ 상태 관리 ═══ */
let state = {};
let filterState = { proj: '', grade: '', status: '', search: '' };

function loadState() {
  try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { state = {}; }
  if (!state.ncrs)        state.ncrs = [];
  if (!state.ncrDeleteReqs) state.ncrDeleteReqs = [];
  if (!state.ncrLists)    state.ncrLists = { location: [...NCR_LOCATION_DEF], cause: [...NCR_CAUSE_DEF], detail: [...NCR_DETAIL_DEF] };
  else {
    if (!state.ncrLists.location) state.ncrLists.location = [...NCR_LOCATION_DEF];
    if (!state.ncrLists.cause)    state.ncrLists.cause    = [...NCR_CAUSE_DEF];
    if (!state.ncrLists.detail)   state.ncrLists.detail   = [...NCR_DETAIL_DEF];
    // 잘못된 항목 정리
    const junk = ['우리집'];
    state.ncrLists.location = state.ncrLists.location.filter(v => !junk.includes(v));
  }
  if (!state.projects)    state.projects = [];
  if (!state.users)       state.users = [];
  if (!state.travellers)  state.travellers = {};
  if (!state.items)       state.items = {};
}

// v29.8: 도구별·액션별 권한 체크 (부모 index.html의 canDo와 동일한 규칙을 iframe 내에서 재현).
// 개별 오버라이드(u.modulePerms[mid][act]) 최우선, 슈퍼는 무조건 O.
function canDoLocal(moduleId, action, user) {
  user = user || (state.users||[]).find(x => x.id === state.currentUser);
  if (!user) return false;
  if (user.grade === 'super') return true;
  const explicit = user.modulePerms && user.modulePerms[moduleId] && user.modulePerms[moduleId][action];
  if (explicit === true) return true;
  if (explicit === false) return false;
  // NCR/CAR 기본 부여: register=품질관리부원, delete=품질관리부장 이상
  const dept = '품질관리부';
  if (moduleId === 'ncr' || moduleId === 'car') {
    if (action === 'register') return user.dept === dept;
    if (action === 'delete')   return user.dept === dept && (user.grade === 'manager' || user.grade === 'exec');
  }
  return false;
}

// v29.8: state.ncrs / state.ncrDeleteReqs를 Firestore와 실시간 동기화.
// 개별 CRUD 지점마다 손대는 대신 save()를 감싸서, 직전에 동기화한 스냅샷과 비교해
// 바뀐 문서만 Firestore에 반영 (원격에서 받은 변경은 스냅샷도 같이 갱신해서
// 되돌려쓰기(핑퐁) 방지).
// v29.10 fix: 이전에는 "로컬 배열에 없으면 삭제"로 판단해서, 등록 직후 onSnapshot이
// 서버에 아직 반영 안 된 구버전 스냅샷으로 state.ncrs를 되돌리는 순간 방금 등록한
// 문서가 즉시 삭제되는 버그가 있었음. 이제 삭제는 여기서 추론하지 않고, 실제 삭제가
// 확정되는 지점(deleteFirestoreDoc 호출부)에서만 명시적으로 수행한다.
const _lastSynced = { ncrs: [], ncrDeleteReqs: [], cars: [] };
async function syncArrayToFirestore(coll, arr) {
  if (!window.fb || !fb.db) return;
  const current = arr || [];
  const prevMap = new Map((_lastSynced[coll]||[]).map(x => [x.id, x]));
  const currMap = new Map(current.map(x => [x.id, x]));
  const jobs = [];
  currMap.forEach((x, id) => {
    const prev = prevMap.get(id);
    if (!prev || JSON.stringify(prev) !== JSON.stringify(x)) {
      jobs.push(fb.setDoc(fb.doc(fb.db, coll, id), x).catch(e => console.error(`[${coll} 동기화]`, e)));
    }
  });
  if (jobs.length) await Promise.all(jobs);
  _lastSynced[coll] = JSON.parse(JSON.stringify(current));
}
// v29.9.1: localStorage 소유권 분리 — 이 iframe이 소유한 키(ncrs/ncrDeleteReqs/cars)만
// merge-write 한다. 이전처럼 state 전체를 통째로 쓰면 iframe이 로드 시점에 읽어둔 stale
// projects/tasks/users가 부모(index.html)가 그 사이 Firestore에서 받아 저장한 최신 값을
// 역으로 덮어써 양방향 데이터 유실 race가 생김 (부모 touchSession full save와 동일 병).
function writeOwnedKeysToDisk() {
  const raw = localStorage.getItem(KEY);
  const disk = raw ? JSON.parse(raw) : {};
  disk.ncrs = state.ncrs;
  disk.ncrDeleteReqs = state.ncrDeleteReqs;
  disk.cars = state.cars;
  localStorage.setItem(KEY, JSON.stringify(disk));
}
// 실제 삭제가 확정된 순간에만 호출 — 배열 diff로는 절대 삭제를 추론하지 않는다.
function deleteFirestoreDoc(coll, id) {
  if (!window.fb || !fb.db) return;
  fb.deleteDoc(fb.doc(fb.db, coll, id)).catch(e => console.error(`[${coll} 삭제]`, e));
}
// v29.11 fix: 연달아 여러 건을 빠르게 등록하면, 방금 등록한 항목이 서버에 아직
// 반영되기 전에 onSnapshot이 옛 스냅샷으로 state.ncrs를 통째로 교체해버려 그 항목이
// 잠깐 배열에서 빠지고, 그 사이 다음 항목의 번호(NCR-YYYY-NNN)가 배열 길이 기준으로
// 계산되면서 방금 사라진 항목과 같은 번호를 만들어 서로 덮어쓰는 사고가 있었음.
// 서버 스냅샷에 없는 로컬 항목이라도, 이전에 한 번도 동기화 확인된 적이 없다면(=이제
// 막 로컬에서 추가돼 아직 서버 왕복이 안 끝난 것) 지우지 않고 합쳐서 유지한다.
// 반대로 이전에 동기화 확인됐던 항목이 서버에서 사라졌다면 실제 삭제이므로 반영한다.
function mergeServerSnapshot(localArr, serverDocs, prevSynced) {
  const serverIds = new Set(serverDocs.map(d => d.id));
  const prevSyncedIds = new Set((prevSynced||[]).map(d => d.id));
  const notYetSynced = (localArr||[]).filter(n => !serverIds.has(n.id) && !prevSyncedIds.has(n.id));
  return [...serverDocs, ...notYetSynced];
}
function startNcrFirestoreSync() {
  if (!window.fb || !fb.db) { setTimeout(startNcrFirestoreSync, 300); return; }
  // v29.9.1: 인증 세션 복원 전에 구독을 걸면 permission-denied로 리스너가 영구 종료되어
  // 이후 실시간 동기화가 조용히 죽음 → 로그인 사용자 확인될 때까지 대기 후 구독.
  // (로컬 테스트 모드처럼 Firebase 로그인이 없으면 구독하지 않음 — 오류 스팸 방지)
  if (!fb.auth || !fb.auth.currentUser) { setTimeout(startNcrFirestoreSync, 400); return; }
  fb.onSnapshot(fb.collection(fb.db, 'ncrs'), snap => {
    const serverDocs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
    state.ncrs = mergeServerSnapshot(state.ncrs, serverDocs, _lastSynced.ncrs);
    _lastSynced.ncrs = JSON.parse(JSON.stringify(serverDocs));
    try { writeOwnedKeysToDisk(); } catch(e) {}
    render();
  }, e => console.error('[ncrs 동기화 구독]', e));
  fb.onSnapshot(fb.collection(fb.db, 'ncrDeleteReqs'), snap => {
    const serverDocs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
    state.ncrDeleteReqs = mergeServerSnapshot(state.ncrDeleteReqs, serverDocs, _lastSynced.ncrDeleteReqs);
    _lastSynced.ncrDeleteReqs = JSON.parse(JSON.stringify(serverDocs));
    try { writeOwnedKeysToDisk(); } catch(e) {}
    render();
  }, e => console.error('[ncrDeleteReqs 동기화 구독]', e));
  // v29.9 fix: cars 컬렉션도 구독. NCR에서 CAR 발행할 때 서버 최신 상태를 알아야
  // syncArrayToFirestore의 diff 계산이 정확하고, 다른 사용자가 CAR 발행한 것도 즉시 반영됨.
  fb.onSnapshot(fb.collection(fb.db, 'cars'), snap => {
    const serverDocs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
    state.cars = mergeServerSnapshot(state.cars, serverDocs, _lastSynced.cars);
    _lastSynced.cars = JSON.parse(JSON.stringify(serverDocs));
    try { writeOwnedKeysToDisk(); } catch(e) {}
    render();
  }, e => console.error('[cars(참조) 동기화 구독]', e));
}

function save() {
  try {
    writeOwnedKeysToDisk();
    try { window.parent.render(); } catch(e) {}
    syncArrayToFirestore('ncrs', state.ncrs);
    syncArrayToFirestore('ncrDeleteReqs', state.ncrDeleteReqs);
    // v29.9 fix: NCR에서 CAR 발행(createCARfromNCR)이 state.cars에 push하는데 여기서
    // 동기화 안 되면 발행자 로컬에만 남고 다른 사용자한테는 안 보였음.
    syncArrayToFirestore('cars', state.cars);
  } catch(e) {
    if (e.name === 'QuotaExceededError' || e.code === 22) {
      alert('⚠️ 저장 공간 부족 — 파일 첨부 없이 저장하거나 오래된 데이터를 정리하세요.');
    }
  }
}

function getU(id) { return (state.users||[]).find(u => u.id === id) || {}; }
function getP(id) { return (state.projects||[]).find(p => p.id === id) || {}; }

// v29.11 fix: 배열 길이(state.ncrs.length + 1) 기준 채번은 항목이 삭제되어 있거나
// (길이만 줄어들어 이미 쓰인 번호와 겹침) 동기화 지연으로 배열이 잠깐 짧아지는 경우
// 기존 번호와 충돌해 서로 덮어쓰는 사고로 이어졌음. 실제 존재하는 최대 번호+1로 계산해
// 결번(삭제) 유무와 무관하게 항상 미사용 번호를 반환한다.
function nextNcrNo(year) {
  const prefix = `NCR-${year}-`;
  const maxNum = (state.ncrs||[]).reduce((max, n) => {
    if (typeof n.id !== 'string' || !n.id.startsWith(prefix)) return max;
    const v = parseInt(n.id.slice(prefix.length), 10);
    return Number.isFinite(v) && v > max ? v : max;
  }, 0);
  return String(maxNum + 1).padStart(3, '0');
}
// createCARfromNCR가 이 iframe(NCR)에서 state.cars에 직접 push하므로 동일한 안전 채번 필요.
function nextCarNo(year) {
  const prefix = `CAR-${year}-`;
  const maxNum = (state.cars||[]).reduce((max, c) => {
    if (typeof c.id !== 'string' || !c.id.startsWith(prefix)) return max;
    const v = parseInt(c.id.slice(prefix.length), 10);
    return Number.isFinite(v) && v > max ? v : max;
  }, 0);
  return String(maxNum + 1).padStart(3, '0');
}

function findItemById(itemId) {
  for (const pid in (state.items||{})) {
    const it = (state.items[pid]||[]).find(i => i.id === itemId);
    if (it) return it;
  }
  return null;
}

function _toBlobUrl(dataUrl) {
  const [header, b64] = dataUrl.split(',');
  const mime = header.match(/:(.*?);/)?.[1] || 'application/octet-stream';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return URL.createObjectURL(new Blob([arr], { type: mime }));
}

/* ═══ Traveller 부적합 수집 ═══ */
function getTravellerNCRs() {
  const result = [];
  Object.keys(state.travellers||{}).forEach(itemId => {
    const trav = state.travellers[itemId];
    Object.entries(trav).forEach(([stage, data]) => {
      if (data && data.status === 'rejected') {
        const exists = (state.ncrs||[]).some(n => n.travItemId === itemId && n.travStage === stage);
        if (!exists) result.push({ itemId, stage, memo: data.memo||'검사 부적합', date: data.date, qc: data.qc });
      }
    });
  });
  return result;
}

/* ═══ 필터 ═══ */
function getNCRFiltered() {
  return (state.ncrs||[]).filter(n => {
    const { proj, grade, status, search } = filterState;
    if (grade  && n.grade  !== grade)  return false;
    if (status && n.status !== status) return false;
    if (proj) {
      if (proj.startsWith('__direct__::')) {
        const name = proj.slice('__direct__::'.length);
        if (!(n.proj === '__direct__' && (n.meta?.projDirect||'') === name)) return false;
      } else {
        if (n.proj !== proj) return false;
      }
    }
    if (search) {
      const q = search.toLowerCase();
      const projName = n.proj === '__direct__' ? (n.meta?.projDirect||'') : (getP(n.proj)?.name||'');
      if (!([n.id, n.item, n.desc, projName, n.meta?.client||''].join(' ').toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

  if (_prevFocusId) {
    const el = document.getElementById(_prevFocusId);
    if (el) { el.focus(); if (_prevCursor != null) try { el.setSelectionRange(_prevCursor, _prevCursor); } catch(e){} }
  }
}

// v29.12: Firestore 문서 하나의 최대 크기는 1MB라, 첨부파일을 meta.fileDataUrl에
// base64로 통째로 넣으면 조용히 저장 실패(콘솔에만 에러)해서 "등록 즉시 사라지는"
// 것처럼 보였음. 메신저 모듈과 동일하게 Firebase Storage에 실제 업로드하고
// 다운로드 URL만 Firestore에 저장하는 방식으로 전환 — Firestore 용량 제한과 무관해짐.
const MAX_ATTACH_MB = 25; // Storage 자체 한도가 아니라, 느린 회선에서의 실사용 배려용 상한
async function uploadAttachmentOrNull(coll, id, file) {
  if (!file) return { ok: true, url: null, name: null };
  if (file.size > MAX_ATTACH_MB * 1024 * 1024) {
    alert(`첨부 파일이 너무 큽니다(${(file.size/1024/1024).toFixed(1)}MB). ${MAX_ATTACH_MB}MB 이하 파일만 첨부할 수 있습니다.`);
    return { ok: false, url: null, name: null };
  }
  try {
    const storageRef = fb.ref(fb.storage, `${coll}-attachments/${id}/${Date.now()}_${file.name}`);
    await fb.uploadBytes(storageRef, file);
    const url = await fb.getDownloadURL(storageRef);
    return { ok: true, url, name: file.name };
  } catch (e) {
    console.error(`[${coll} 첨부파일 업로드]`, e);
    const proceed = confirm(`첨부 파일 업로드에 실패했습니다: ${e.message || e}\n파일 없이 저장하시겠습니까?\n(취소를 누르면 저장이 중단됩니다)`);
    return { ok: proceed, url: null, name: null };
  }
}

/* ═══ 삭제 플로우 ═══ */
// v29.10: NCR/CAR 삭제는 즉시 실행되지 않는다 — 품질관리부가 삭제를 요청하면
// 24시간 삭제 대기 상태가 되고, 그 사이 품질관리부장이 조기승인(즉시삭제)하거나
// 반려(취소)할 수 있다. 아무 조치가 없으면 24시간 경과 후 자동으로 삭제된다.
const NCR_DELETE_WAIT_MS = 24 * 60 * 60 * 1000;

function requestNCRDelete(ncrId) {
  openModal(`🗑️ NCR 삭제 요청 — ${ncrId}`, `
    <div style="font-size:12px;color:var(--text-light);margin-bottom:12px;">삭제 요청 후 24시간 동안 삭제 대기 상태가 되며, 그 사이 품질관리부장이 조기승인(즉시삭제) 또는 반려할 수 있습니다. 아무 조치가 없으면 24시간 후 자동 삭제됩니다.</div>
    <div class="fg"><label class="fl">삭제 사유</label><textarea class="fi" id="del-reason" rows="3" placeholder="삭제 사유를 입력하세요"></textarea></div>
  `, () => {
    const reason = document.getElementById('del-reason').value.trim();
    if (!reason) { alert('삭제 사유를 입력하세요.'); return; }
    if (!state.ncrDeleteReqs) state.ncrDeleteReqs = [];
    const now = Date.now();
    state.ncrDeleteReqs.push({ id:'dr'+now, ncrId, requestedBy:state.currentUser, requestedAt:new Date().toISOString().slice(0,10), scheduledDeleteAt: now + NCR_DELETE_WAIT_MS, reason, status:'pending' });
    save(); closeModal(); render();
  });
}

// 요청 당사자 또는 품질관리부장이 대기 중인 삭제 요청을 취소(철회)한다.
function cancelNCRDelete(reqId) {
  const req = (state.ncrDeleteReqs||[]).find(r => r.id === reqId);
  if (!req) return;
  req.status = 'cancelled';
  save(); render();
}

// 품질관리부장의 조기승인 — 24시간을 기다리지 않고 즉시 삭제를 확정한다.
function approveNCRDelete(reqId) {
  const req = (state.ncrDeleteReqs||[]).find(r => r.id === reqId);
  if (!req || !confirm(`NCR [${req.ncrId}] 을 24시간 대기 없이 즉시 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
  state.ncrs = (state.ncrs||[]).filter(n => n.id !== req.ncrId);
  deleteFirestoreDoc('ncrs', req.ncrId);
  req.status = 'approved';
  save(); render();
}

function rejectNCRDelete(reqId) {
  const req = (state.ncrDeleteReqs||[]).find(r => r.id === reqId);
  if (!req) return;
  req.status = 'rejected';
  save(); render();
}

// 대기 시간이 지난 삭제 요청을 자동으로 확정 삭제한다. render()마다, 그리고
// 주기적으로(setInterval) 호출되어 브라우저를 오래 열어둔 경우에도, 다음에
// 모듈을 열었을 때도 대기 시간이 지난 요청은 즉시 정리된다.
function finalizeExpiredNCRDeletes() {
  const now = Date.now();
  let changed = false;
  (state.ncrDeleteReqs||[]).forEach(r => {
    if (r.status === 'pending' && r.scheduledDeleteAt && now >= r.scheduledDeleteAt) {
      state.ncrs = (state.ncrs||[]).filter(n => n.id !== r.ncrId);
      deleteFirestoreDoc('ncrs', r.ncrId);
      r.status = 'auto-deleted';
      changed = true;
    }
  });
  if (changed) save();
}

function fmtNCRRemain(ms) {
  if (ms <= 0) return '곧 자동삭제';
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return `자동삭제까지 ${h}시간 ${m}분`;
}

/* ═══ 분류 목록 관리 ═══ */
function addToNcrList(type, selectId) {
  const labels = { location:'발생장소', cause:'불량원인', detail:'불량원인 상세' };
  const list = state.ncrLists[type] || [];
  openModal(`📋 ${labels[type]||type} 목록 관리`, `
    <div style="margin-bottom:12px;">
      ${list.map(v => `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-bottom:1px solid var(--border-light);">
        <span style="font-size:13px;">${v}</span>
        <button onclick="removeNcrListItem('${type}','${v.replace(/'/g,"\\'")}','${selectId}')" style="border:none;background:none;color:var(--danger);cursor:pointer;font-size:16px;padding:0 4px;">×</button>
      </div>`).join('')}
      ${list.length === 0 ? '<div style="font-size:12px;color:var(--text-light);padding:8px 0;">항목이 없습니다</div>' : ''}
    </div>
    <div style="display:flex;gap:8px;">
      <input class="fi" id="new-list-item" placeholder="새 항목 입력" style="flex:1;">
      <button class="btn btn-primary btn-sm" onclick="confirmAddNcrListItem('${type}','${selectId}')">추가</button>
    </div>
  `, null);
  document.getElementById('new-list-item').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAddNcrListItem(type, selectId); });
}

function confirmAddNcrListItem(type, selectId) {
  const input = document.getElementById('new-list-item');
  const v = (input?.value||'').trim();
  if (!v) return;
  if (!state.ncrLists[type].includes(v)) {
    state.ncrLists[type].push(v);
    save();
    const sel = document.getElementById(selectId);
    if (sel) { const opt = document.createElement('option'); opt.value = v; opt.textContent = v; sel.appendChild(opt); sel.value = v; }
  }
  closeModal();
}

function removeNcrListItem(type, val, selectId) {
  state.ncrLists[type] = state.ncrLists[type].filter(v => v !== val);
  save();
  const sel = document.getElementById(selectId);
  if (sel) { const opt = [...sel.options].find(o => o.value === val); if (opt) sel.removeChild(opt); }
  addToNcrList(type, selectId);
}

function viewNCRFile(ncrId) {
  const n = (state.ncrs||[]).find(x => x.id === ncrId);
  if (n?.meta?.fileUrl) { window.open(n.meta.fileUrl, '_blank'); return; }
  if (n?.meta?.fileDataUrl) { window.open(_toBlobUrl(n.meta.fileDataUrl), '_blank'); return; } // 구버전 레코드(용량 제한 이전) 호환
  alert('저장된 파일이 없습니다.');
}

/* ═══ 경향분석 ═══ */
function openNCRTrend() {
  loadState();
  const ncrs = state.ncrs || [];
  const years = [...new Set(ncrs.map(n => (n.issuedAt||'').slice(0,4)).filter(Boolean))].sort();
  const yrSel = document.getElementById('ntr-year');
  yrSel.innerHTML = '<option value="">전체 연도</option>' + years.map(y=>`<option value="${y}">${y}년</option>`).join('');
  const projs = [...new Set(ncrs.map(n => n.proj))];
  const pSel = document.getElementById('ntr-proj');
  pSel.innerHTML = '<option value="">전체 프로젝트</option>' + projs.map(pid => {
    if (pid === '__direct__') {
      return [...new Set(ncrs.filter(n=>n.proj==='__direct__').map(n=>n.meta?.projDirect||'직접입력'))]
        .map(name=>`<option value="__direct__::${name}">${name}</option>`).join('');
    }
    const p = getP(pid);
    return p?.id ? `<option value="${pid}">${p.code} ${p.name}</option>` : '';
  }).join('');
  document.getElementById('ncr-trend-modal').classList.add('open');
  renderNCRTrend();
}

function closeNCRTrend() { document.getElementById('ncr-trend-modal').classList.remove('open'); }

function _ntrFiltered() {
  const yr = document.getElementById('ntr-year')?.value || '';
  const mo = document.getElementById('ntr-month')?.value || '';
  const pj = document.getElementById('ntr-proj')?.value || '';
  return (state.ncrs||[]).filter(n => {
    const d = n.issuedAt || '';
    if (yr && !d.startsWith(yr)) return false;
    if (mo && d.slice(5,7) !== mo.padStart(2,'0')) return false;
    if (pj) {
      if (pj.startsWith('__direct__::')) { if (!(n.proj==='__direct__' && (n.meta?.projDirect||'')===pj.slice('__direct__::'.length))) return false; }
      else if (n.proj !== pj) return false;
    }
    return true;
  });
}

function _count(arr, key) {
  return arr.reduce((acc, n) => { acc[n[key]] = (acc[n[key]]||0)+1; return acc; }, {});
}

function _barSvg(entries, colors) {
  if (!entries.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:#aaa;">데이터 없음</div>';
  const max = Math.max(...entries.map(e=>e[1]), 1);
  const n = entries.length;
  const W = 300, PL = 10, PR = 10, PT = 28, PB = n > 5 ? 60 : 38;
  const H = 170;
  const iW = W - PL - PR, iH = H - PT - PB;
  const gap = iW / n;
  const bW = Math.max(8, Math.min(40, Math.floor(gap * 0.55)));
  const rotate = n > 5;
  const bars = entries.map(([label, val], i) => {
    const bH = val === 0 ? 0 : Math.max(4, Math.round(val / max * iH));
    const cx = PL + Math.round(i * gap + gap / 2);
    const by = PT + iH - bH;
    const valY = by - 6;   // always above bar; SVG overflow:visible handles if near top
    const lblY = H - PB + (rotate ? 4 : 14);
    const lbl = label.length > 7 ? label.slice(0, 6) + '…' : label;
    const anchor = rotate ? 'end' : 'middle';
    return `<rect x="${cx - bW/2}" y="${by}" width="${bW}" height="${bH}" rx="3" fill="${colors[i % colors.length]}"/>
      <text x="${cx}" y="${valY}" text-anchor="middle" font-size="10" fill="#333">${val}</text>
      <text x="${cx}" y="${lblY}" text-anchor="${anchor}" font-size="9" fill="#666"${rotate ? ` transform="rotate(-40,${cx},${lblY})"` : ''}>${lbl}</text>`;
  }).join('');
  return `<svg viewBox="-2 -4 ${W+4} ${H+8}" style="width:100%;display:block;overflow:visible;">
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="#e0e0e0" stroke-width="1"/>
    ${bars}
  </svg>`;
}

function _donutSvg(entries, colors) {
  if (!entries.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:#aaa;">데이터 없음</div>';
  const total = entries.reduce((s,[,v])=>s+v,0);
  if (!total) return '<div style="text-align:center;padding:20px;font-size:12px;color:#aaa;">데이터 없음</div>';
  const cx=75, cy=75, R=58, ri=34;
  const mid_r = (R + ri) / 2;   // label placed at ring midpoint — never inside hole
  const LX = 148, rowH = 20;
  const H = Math.max(160, entries.length * rowH + 24);
  let angle = -Math.PI/2;
  const slices = entries.map(([label,val],i) => {
    const a = (val/total)*2*Math.PI;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    angle += a;
    const x2=cx+R*Math.cos(angle), y2=cy+R*Math.sin(angle);
    const lg = a>Math.PI?1:0;
    const midA = angle - a/2;
    const tx = cx + mid_r * Math.cos(midA);
    const ty = cy + mid_r * Math.sin(midA);
    const pct = Math.round(val/total*100);
    return `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg} 1 ${x2.toFixed(1)},${y2.toFixed(1)} L${cx},${cy} Z" fill="${colors[i%colors.length]}"/>
    ${a > 0.4 ? `<text x="${tx.toFixed(1)}" y="${(ty+3.5).toFixed(1)}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">${pct}%</text>` : ''}`;
  });
  const legend = entries.map(([label,val],i) => {
    const lbl = label.length > 8 ? label.slice(0,7)+'…' : label;
    return `<g transform="translate(${LX},${(H-entries.length*rowH)/2+i*rowH})">
      <rect width="10" height="10" rx="2" fill="${colors[i%colors.length]}"/>
      <text x="15" y="9" font-size="11" fill="#444">${lbl} (${val})</text>
    </g>`;
  });
  return `<svg viewBox="0 0 280 ${H}" style="width:100%;display:block;overflow:visible;">
    <circle cx="${cx}" cy="${cy}" r="${R+1}" fill="#f5f5f5"/>
    ${slices.join('')}
    <circle cx="${cx}" cy="${cy}" r="${ri}" fill="#fff"/>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="13" fill="#444" font-weight="700">${total}</text>
    <text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="10" fill="#999">건</text>
    ${legend.join('')}
  </svg>`;
}

function _fillMonths(raw, yr) {
  const out={};
  if (yr) {
    for (let m=1;m<=12;m++) { const k=yr+'-'+String(m).padStart(2,'0'); out[k]=raw[k]||0; }
  } else {
    const ks=Object.keys(raw).sort();
    if (!ks.length) return out;
    let [y,m]=[parseInt(ks[0].slice(0,4)),parseInt(ks[0].slice(5))];
    const [ey,em]=[parseInt(ks[ks.length-1].slice(0,4)),parseInt(ks[ks.length-1].slice(5))];
    while (y<ey||(y===ey&&m<=em)) {
      const k=y+'-'+String(m).padStart(2,'0'); out[k]=raw[k]||0;
      m++; if(m>12){m=1;y++;}
    }
  }
  return out;
}

function _lineSvg(monthData) {
  const keys = Object.keys(monthData).sort();
  if (!keys.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:#aaa;">데이터 없음</div>';
  const vals = keys.map(k => monthData[k]);
  const maxV = Math.max(...vals, 1);
  const n = keys.length;
  const sameYr = new Set(keys.map(k=>k.slice(0,4))).size===1;
  const W=300, PL=40, PR=20, PT=30, PB=46, H=160;
  const iW=W-PL-PR, iH=H-PT-PB;
  const xs = n===1 ? [PL+Math.round(iW/2)] : keys.map((_,i)=>PL+Math.round(i/(n-1)*iW));
  const ys = vals.map(v=>PT+iH-Math.round(v/maxV*iH));
  const path = xs.map((x,i)=>`${i===0?'M':'L'}${x},${ys[i]}`).join(' ');
  const area = path+` L${xs[xs.length-1]},${PT+iH} L${xs[0]},${PT+iH} Z`;
  const BASE = H-PB;
  const pts = xs.map((x,i) => {
    const lbl = sameYr ? (parseInt(keys[i].slice(5))+'월') : keys[i].slice(2);
    const v = vals[i];
    return `<circle cx="${x}" cy="${ys[i]}" r="3.5" fill="#7c3aed"/>
    <text x="${x}" y="${BASE+13}" text-anchor="middle" font-size="8" fill="#888">${lbl}</text>
    <text x="${x}" y="${BASE+27}" text-anchor="middle" font-size="9" font-weight="${v>0?'700':'400'}" fill="${v>0?'#7c3aed':'#bbb'}">(${v})</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible;">
    <path d="${area}" fill="#7c3aed" opacity="0.08"/>
    <path d="${path}" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${BASE}" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="${PL}" y1="${BASE}" x2="${W-PR}" y2="${BASE}" stroke="#e0e0e0" stroke-width="1"/>
  </svg>`;
}

/* ═══ 파일 등록 ═══ */
function loadPdfJs(cb) {
  if (window.pdfjsLib) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
  s.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'; cb(); };
  document.head.appendChild(s);
}

function loadMammoth(cb) {
  if (window.mammoth) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js';
  s.onload = cb;
  document.head.appendChild(s);
}

function handleNCRFile(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const ext = file.name.split('.').pop().toLowerCase();
  const frDataUrl = new FileReader();
  frDataUrl.onload = evDU => {
    const fileDataUrl = evDU.target.result;
    const done = (text, ocrFailed, imgDataUrl) => {
      const parsed = parseNCRText(text, file.name);
      parsed.ocrFailed  = ocrFailed  || false;
      parsed.imgDataUrl = imgDataUrl || null;
      parsed.fileDataUrl = fileDataUrl; // 등록 전 미리보기 전용(저장은 Storage 업로드로 처리)
      parsed.fileName    = file.name;
      parsed.rawFile     = file;
      showNCRParseModal(parsed);
    };
    if (ext === 'pdf') {
      loadPdfJs(() => extractPdfText(file, done));
    } else if (ext === 'docx') {
      loadMammoth(() => {
        const reader = new FileReader();
        reader.onload = e => window.mammoth.extractRawText({ arrayBuffer: e.target.result }).then(r => done(r.value, false));
        reader.readAsArrayBuffer(file);
      });
    } else {
      alert('PDF 또는 Word(.docx) 파일만 지원합니다.');
    }
  };
  frDataUrl.readAsDataURL(file);
}

async function extractPdfText(file, cb) {
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  if (text.replace(/\s+/g,'').length < 80) {
    await extractPdfOCR(file, cb);
  } else {
    cb(text);
  }
}

async function extractPdfOCR(file, cb) {
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2.5 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  const imgDataUrl = canvas.toDataURL('image/jpeg', 0.9);
  let ocrText = '';
  try {
    if (!window.Tesseract) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const worker = await Tesseract.createWorker('kor+eng', 1, {
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/worker.min.js',
      langPath: 'https://tessdata.projectnaptha.com/4.0.0',
      corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@4.0.4/tesseract-core-simd-lstm.wasm.js',
    });
    const result = await worker.recognize(canvas);
    await worker.terminate();
    ocrText = result.data.text || '';
  } catch(e) { ocrText = ''; }
  cb(ocrText, ocrText.replace(/\s+/g,'').length < 30, imgDataUrl);
}

function parseNCRText(text, filename) {
  const cl = s => (s||'').replace(/\s+/g,' ').trim();
  const fname = (filename||'').replace(/\.[^.]+$/,'');
  const fnNcrNo = fname.match(/(SJ-NCR-\d{4}-\d+|NCR[-\s]?\d+)/i)?.[1]?.replace(/\s/g,'-')||'';
  const ncrNo = text.match(/NCR\s*No\.?\s*[：:]\s*([\w\-]+)/i)?.[1] ||
                text.match(/(SJ-NCR-\d{4}-\d+)/i)?.[1] || fnNcrNo;
  const dateRaw = text.match(/Discovery\s*Date\s*[：:]?\s*(\d{4}[.\-\/]\d{1,2}[.\-\/]\d{1,2})/i)?.[1] ||
                  text.match(/발\s*견\s*일\s*자[^0-9]*(\d{4}[.\-\/]\d{1,2}[.\-\/]\d{1,2})/i)?.[1]||'';
  const issuedAt = dateRaw ? dateRaw.split(/[.\-\/]/).map((v,i)=>i>0&&v.length===1?'0'+v:v).join('-') : '';
  const projTitle = cl(text.match(/Project\s*Title\s*[：:]\s*(.+?)(?=\s*고객명|\s*Client\s*[：:])/i)?.[1]||'');
  const client = cl(text.match(/Client\s*[：:]\s*(.+?)(?=\s*부품명|\s*Part\s*Name)/i)?.[1]||'');
  const partName = cl(text.match(/Part\s*Name\s*\(No\.?\)\s*[：:]\s*(.+?)(?=\s*도면번호|\s*Dwg\s*No)/i)?.[1]||'');
  const dwgNo = cl(text.match(/Dwg\s*No\.?\s*[：:]\s*(.+?)(?=\s*개정|\s*Rev\.?\s*[：:])/i)?.[1]||'');
  const wrNo  = cl(text.match(/W\.R\s*No\.?\s*[：:]\s*(.+?)(?=\s*공정관리표|\s*TRAVELLER)/i)?.[1]||'');
  const descRaw = text.match(/무\(No\)[^\d]*([\s\S]+?)(?=조치\(관련\)팀장|Action\s*Team\s*Leader|발생원인)/i)?.[1]||
                  text.match(/Nonconforming\s*Condition\)?[^\n]*\n([\s\S]+?)(?=조치\(관련\)|Action\s*Team|발생원인)/i)?.[1]||'';
  const desc = cl(descRaw).replace(/□\s*(현상태사용|재작업|수리|폐기|반송)[^\s]*/gi,'').replace(/유첨\s*\(Attach\)[^\n]*/gi,'').trim() ||
               fname.match(/\)\s+[A-Z][A-Z\s]+?\s+(.+)$/)?.[1]?.trim()||'';
  const dispMatch = text.match(/☑\s*(현상태사용|재작업|수리|폐기|반송)/)?.[1]||'';
  const afterConfirm = text.split(/조치확인|Confirmtion\s*of\s*Action/i)[1]||'';
  const hasAction = afterConfirm.replace(/[\s□\-|]+/g,'').length > 20;
  const status = hasAction ? 'closed' : (dispMatch ? 'pending' : 'open');
  const grade = text.match(/경미|obs/i)?'obs': text.match(/일반|minor/i)?'minor':'major';
  return { ncrNo, issuedAt, projTitle, client, partName, dwgNo, wrNo, desc, dispMatch, status, grade };
}

function showNCRParseModal(p) {
  const titleKey = (p.projTitle||'').toLowerCase().split(' ')[0];
  let matched = false;
  const projOpts = (state.projects||[]).filter(pr=>!pr.hidden).map(pr => {
    const isMatch = titleKey && (pr.name+' '+pr.code).toLowerCase().includes(titleKey);
    if (isMatch) matched = true;
    return `<option value="${pr.id}" ${isMatch?'selected':''}>${pr.code} ${pr.name}</option>`;
  }).join('');
  const gradeOpts  = [['major','중대'],['minor','일반'],['obs','경미']].map(([v,l])=>`<option value="${v}" ${p.grade===v?'selected':''}>${l}</option>`).join('');
  const statusOpts = [['open','진행중'],['pending','조치대기'],['closed','종결']].map(([v,l])=>`<option value="${v}" ${p.status===v?'selected':''}>${l}</option>`).join('');
  const mkOpts = (arr, sel='') => ['', ...arr].map(v=>`<option value="${v}" ${v===sel?'selected':''}>${v||'— 미선택 —'}</option>`).join('');
  const locOpts  = mkOpts(state.ncrLists?.location||NCR_LOCATION_DEF);
  const causeOpts= mkOpts(state.ncrLists?.cause   ||NCR_CAUSE_DEF);
  const detailOpts=mkOpts(state.ncrLists?.detail  ||NCR_DETAIL_DEF);
  const dispOpts = mkOpts(Object.keys(NCR_DISP));
  const addBtn = (type, sid) => `<button type="button" onclick="addToNcrList('${type}','${sid}')" style="padding:0 7px;border:1.5px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:16px;line-height:1;color:var(--primary);flex-shrink:0;height:36px;">+</button>`;
  const badge = v => v ? '<span class="npm-parse-badge found">자동감지</span>' : '<span class="npm-parse-badge manual">직접입력</span>';

  const filePanel = document.getElementById('ncr-parse-file');
  if (filePanel) {
    if (p.ocrFailed && p.imgDataUrl) {
      filePanel.innerHTML = `<div style="padding:6px 10px;background:#fff3e0;font-size:11px;color:#e65100;font-weight:600;flex-shrink:0;">⚠️ 스캔본 — OCR 인식 불가, 직접 입력하세요</div>
        <div class="npm-left-img-wrap"><img src="${p.imgDataUrl}" style="width:100%;border-radius:4px;"></div>`;
    } else if (p.fileDataUrl?.startsWith('data:application/pdf')) {
      filePanel.innerHTML = `<iframe src="${_toBlobUrl(p.fileDataUrl)}" style="flex:1;border:none;width:100%;height:100%;"></iframe>`;
    } else if (p.fileDataUrl) {
      filePanel.innerHTML = `<div style="padding:12px;font-size:12px;color:var(--text-light);">📄 ${p.fileName||'파일'}<br><span style="font-size:11px;">PDF가 아닌 파일은 미리보기를 지원하지 않습니다.</span></div>`;
    }
  }
  window._ncrParseFileDataUrl = p.fileDataUrl||null;
  window._ncrParseFileName    = p.fileName   ||null;
  window._ncrParseRawFile     = p.rawFile    ||null;

  document.getElementById('ncr-parse-modal').classList.add('open');
  document.getElementById('ncr-parse-body').innerHTML = `
    <div style="background:${p.ocrFailed?'#fff3e0':'#e8f5e9'};border-radius:8px;padding:8px 12px;font-size:12px;color:${p.ocrFailed?'#e65100':'#2e7d32'};font-weight:600;">
      ${p.ocrFailed?'⚠️ 스캔본 자동 인식 불가 — 직접 입력하세요':'✅ 문서 파싱 완료 — 확인 후 등록하세요'}
    </div>
    <div class="npm-row">
      <div class="npm-field"><label>NCR No. ${badge(p.ncrNo)}</label><input id="np-ncrno" value="${p.ncrNo||''}" placeholder="예: SJ-NCR-2026-01"></div>
      <div class="npm-field"><label>발행일자 ${badge(p.issuedAt)}</label><input id="np-date" type="date" value="${p.issuedAt||''}"></div>
    </div>
    <div class="npm-field">
      <label>프로젝트 (계약명: ${p.projTitle||'미감지'}) ${badge(p.projTitle)}</label>
      <select id="np-proj" onchange="document.getElementById('np-proj-direct').style.display=this.value==='__direct__'?'block':'none'">
        <option value="__direct__" ${!matched?'selected':''}>✏️ 직접 입력</option>${projOpts}
      </select>
      <input id="np-proj-direct" placeholder="프로젝트명 직접 입력" value="${p.projTitle||''}" style="margin-top:6px;display:${!matched?'block':'none'};">
    </div>
    <div class="npm-row">
      <div class="npm-field"><label>고객명 ${badge(p.client)}</label><input id="np-client" value="${p.client||''}" placeholder="예: ASK CHEMICALS"></div>
      <div class="npm-field"><label>부품명(번호) ${badge(p.partName)}</label><input id="np-item" value="${p.partName||''}" placeholder="예: CD-02-703"></div>
    </div>
    <div class="npm-row">
      <div class="npm-field"><label>도면번호 ${badge(p.dwgNo)}</label><input id="np-dwg" value="${p.dwgNo||''}" placeholder="예: 25-ASK-CD02703-01"></div>
      <div class="npm-field"><label>W.R No. ${badge(p.wrNo)}</label><input id="np-wr" value="${p.wrNo||''}" placeholder="예: SJ433-25"></div>
    </div>
    <div class="npm-field"><label>불일치 내용 ${badge(p.desc)}</label><textarea id="np-desc" rows="3">${p.desc||''}</textarea></div>
    <div class="npm-row">
      <div class="npm-field"><label>등급</label><select id="np-grade">${gradeOpts}</select></div>
      <div class="npm-field"><label>상태</label><select id="np-status">${statusOpts}</select></div>
    </div>
    <div class="npm-row">
      <div class="npm-field"><label>발생장소</label><div style="display:flex;gap:4px;"><select id="np-loc" style="flex:1;">${locOpts}</select>${addBtn('location','np-loc')}</div></div>
      <div class="npm-field"><label>처리방안</label><select id="np-disp">${dispOpts}</select></div>
    </div>
    <div class="npm-row">
      <div class="npm-field"><label>불량원인</label><div style="display:flex;gap:4px;"><select id="np-cause" style="flex:1;">${causeOpts}</select>${addBtn('cause','np-cause')}</div></div>
      <div class="npm-field"><label>불량원인 상세</label><div style="display:flex;gap:4px;"><select id="np-detail" style="flex:1;">${detailOpts}</select>${addBtn('detail','np-detail')}</div></div>
    </div>
  `;
}

async function confirmNCRParse() {
  const ncrNo      = document.getElementById('np-ncrno').value.trim();
  const date       = document.getElementById('np-date').value;
  const projSel    = document.getElementById('np-proj').value;
  const proj       = projSel;
  const projDirect = document.getElementById('np-proj-direct').value.trim();
  const item       = document.getElementById('np-item').value.trim();
  const desc       = document.getElementById('np-desc').value.trim();
  const grade      = document.getElementById('np-grade').value;
  const status     = document.getElementById('np-status').value;
  const dwgNo      = document.getElementById('np-dwg').value.trim();
  const wrNo       = document.getElementById('np-wr').value.trim();
  const client     = document.getElementById('np-client').value.trim();
  const location   = document.getElementById('np-loc').value;
  const cause      = document.getElementById('np-cause').value;
  const causeDetail= document.getElementById('np-detail').value;
  const disposition= document.getElementById('np-disp').value;
  if (!desc) { alert('불일치 내용을 입력하세요.'); return; }
  const num = nextNcrNo(new Date().getFullYear());
  const id = ncrNo || `NCR-${new Date().getFullYear()}-${num}`;
  if ((state.ncrs||[]).some(n => n.id === id)) {
    alert(`NCR No. [${id}] 가 이미 등록되어 있습니다.\nNCR No. 를 다르게 입력하세요.`);
    return;
  }
  const btn = document.getElementById('ncr-parse-confirm-btn');
  const rawFile = window._ncrParseRawFile || null;
  let attach = { ok: true, url: null, name: null };
  if (rawFile) {
    if (btn) { btn.disabled = true; btn.textContent = '⏳ 파일 업로드 중...'; }
    attach = await uploadAttachmentOrNull('ncr', id, rawFile);
    if (btn) { btn.disabled = false; btn.textContent = '✅ NCR 등록'; }
  }
  if (!attach.ok) return;
  if (!state.ncrs) state.ncrs = [];
  state.ncrs.push({
    id, proj, item, source:'file', grade, desc, status,
    location, cause, causeDetail, disposition,
    issuedBy: state.currentUser,
    issuedAt: date||new Date().toISOString().slice(0,10),
    carId:null,
    meta: { client, dwgNo, wrNo, projDirect: proj==='__direct__'?projDirect:'', fileUrl: attach.url, fileName: attach.name }
  });
  window._ncrParseFileDataUrl = null;
  window._ncrParseFileName    = null;
  window._ncrParseRawFile     = null;
  save(); closeNCRParseModal(); render();
}

function closeNCRParseModal() { document.getElementById('ncr-parse-modal').classList.remove('open'); }
