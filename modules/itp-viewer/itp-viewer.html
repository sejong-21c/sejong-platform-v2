<style>
:root {
  --primary:#7c3aed; --primary-light:#f5f3ff; --primary-lighter:#faf5ff;
  --bg:#F5F7FA; --white:#fff; --border:#E0E0E0; --border-light:#F0F0F0;
  --text:#333; --text-light:#666; --text-lighter:#999; --danger:#dc2626;
  --success:#059669; --radius:8px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,"Malgun Gothic","맑은 고딕",sans-serif; background:var(--bg); color:var(--text); font-size:13px; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
#app { flex:1; overflow-y:auto; padding:20px 24px 40px; }
.hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
.hd h1 { font-size:16px; font-weight:700; }
.hd .sub { font-size:11px; color:var(--text-light); margin-top:2px; }
.btn { padding:6px 12px; border:1px solid var(--border); border-radius:6px; background:var(--white); cursor:pointer; font-size:12px; font-family:inherit; display:inline-flex; align-items:center; gap:5px; }
.btn:hover { background:var(--bg); }
.btn-primary { background:var(--primary); color:#fff; border-color:var(--primary); }
.btn-primary:hover { background:#6d28d9; }
.filter-bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; margin-bottom:14px; }
.filter-bar input, .filter-bar select { padding:6px 10px; border:1.5px solid var(--border); border-radius:6px; font-size:12px; font-family:inherit; background:#fff; }
.filter-bar .cnt { margin-left:auto; font-size:11px; color:var(--text-light); }

.proj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.proj-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; cursor:pointer; transition:transform .1s, box-shadow .1s, border-color .1s; }
.proj-card:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(124,58,237,.10); border-color:var(--primary); }
.proj-card .code { font-size:11px; color:var(--primary); font-weight:700; letter-spacing:.5px; }
.proj-card .name { font-size:14px; font-weight:700; margin-top:4px; color:var(--text); }
.proj-card .client { font-size:11px; color:var(--text-light); margin-top:6px; }
.proj-card .meta { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid var(--border-light); }
.proj-card .item-cnt { font-size:12px; color:var(--text); }
.proj-card .item-cnt b { color:var(--primary); font-size:15px; }
.proj-card .stamp { font-size:10px; color:var(--text-lighter); }

.section { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:14px; }
.section h3 { font-size:14px; margin-bottom:10px; }

.item-list { display:flex; flex-direction:column; gap:8px; }
.item-row { display:flex; align-items:center; gap:12px; padding:11px 14px; border:1px solid var(--border-light); border-radius:6px; cursor:pointer; background:#fff; transition:background .1s, border-color .1s; }
.item-row:hover { background:var(--primary-lighter); border-color:var(--primary); }
.item-row .no { font-size:12px; font-weight:700; color:var(--primary); min-width:70px; }
.item-row .nm { font-size:13px; font-weight:600; color:var(--text); flex:1; }
.item-row .badges { display:flex; gap:6px; }
.badge { font-size:10px; padding:2px 8px; border-radius:10px; background:var(--primary-light); color:var(--primary); font-weight:600; }
.badge.gray { background:var(--border-light); color:var(--text-light); }
.item-row .arrow { color:var(--text-lighter); font-size:14px; }

.itp-table { width:100%; border-collapse:collapse; font-size:11.5px; }
.itp-table thead th { background:var(--primary-lighter); padding:8px 10px; text-align:left; font-size:10.5px; font-weight:700; color:var(--primary); border-bottom:1px solid var(--primary-light); white-space:nowrap; position:sticky; top:0; }
.itp-table td { padding:7px 10px; border-bottom:1px solid var(--border-light); vertical-align:top; }
.itp-table td.center { text-align:center; }
.itp-table tbody tr:hover { background:#fafafa; }

.breadcrumb { font-size:12px; color:var(--text-light); margin-bottom:12px; }
.breadcrumb a { color:var(--primary); text-decoration:none; cursor:pointer; }
.breadcrumb a:hover { text-decoration:underline; }
.breadcrumb span.sep { margin:0 6px; color:var(--text-lighter); }

.empty { text-align:center; padding:40px; color:var(--text-lighter); font-size:13px; background:var(--white); border:1px dashed var(--border); border-radius:var(--radius); }
.loading { text-align:center; padding:40px; color:var(--text-lighter); font-size:13px; }

/* v1.4: ITP Builder 미리보기와 동일한 공식 문서 양식 · A4 세로 비율(210mm) 컨테이너 */
.itp-doc { background:#fff; border:1px solid var(--border); border-radius:8px; padding:18mm 12mm; width:210mm; max-width:100%; margin:0 auto; font-family:Arial,'Malgun Gothic',sans-serif; box-shadow:0 2px 10px rgba(0,0,0,.06); }
.itp-hdr { width:100%; border-collapse:collapse; }
.itp-hdr td { border:1px solid #555; padding:3px 6px; font-size:10px; vertical-align:middle; }
.itp-hdr td.k { font-weight:500; white-space:nowrap; }
.itp-hdr td.itp-logo { padding:4px 6px; }
.itp-grid { width:100%; border-collapse:collapse; margin-top:-1px; }
.itp-grid th { border:1px solid #555; padding:5px 6px; background:#fff; font-size:10px; font-weight:500; text-align:center; vertical-align:middle; }
.itp-grid td { border:1px solid #888; padding:4px 5px; font-size:9px; vertical-align:top; line-height:1.5; }
.itp-grid td.ish-no { text-align:center; vertical-align:middle; font-weight:600; font-size:11px; }
.itp-grid td.ish-c { text-align:center; }
.itp-grid td.ish-l { text-align:left; }
.itp-grid td.ish-sm { font-size:9px; }
.itp-note { margin-top:4px; font-size:9px; color:#444; line-height:1.7; }
@media print {
  body { background:#fff; } #app { padding:0; } .no-print, .breadcrumb { display:none !important; }
  .itp-doc { border:none; padding:0; }
  @page { size:A4 portrait; margin:10mm; }
}
</style>
</head>

const state = { itpDocs: [], projects: [], selectedPid: null, selectedItem: null, filter: '' };

function startSync() {
  if (!window.fb || !fb.db) { setTimeout(startSync, 300); return; }
  if (!fb.auth || !fb.auth.currentUser) { setTimeout(startSync, 400); return; }
  fb.onSnapshot(fb.collection(fb.db, 't_itpBuilderDocs'), snap => {
    // v29.24: 첨부/도면 조각 문서(chunk__로 시작하는 id)와 dwg_로 시작하는 임시 캐시는 제외.
    state.itpDocs = snap.docs
      .filter(d => !d.id.startsWith('chunk__') && !d.id.startsWith('dwg_'))
      .map(d => ({ pid: d.id, ...d.data() }));
    render();
  }, e => { document.getElementById('app').innerHTML = `<div class="empty">불러오기 실패: ${e.message||e}<br><small>페이지를 새로고침해 주세요.</small></div>`; });
  fb.onSnapshot(fb.collection(fb.db, 'projects'), snap => {
    state.projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, e => console.warn('[projects]', e));
}

function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function projLabel(doc) {
  const p = state.projects.find(x => x.id === doc.pid);
  const proj = doc.proj || {};
  return {
    code: proj.no || p?.code || '-',
    name: proj.name || p?.name || doc.pid,
    client: proj.client || p?.client || ''
  };
}
function goProj(pid) { state.selectedPid = pid; state.selectedItem = null; render(); scrollToTop(); }
function goItem(idx) { state.selectedItem = idx; render(); scrollToTop(); }
function goBack() {
  if (state.selectedItem != null) { state.selectedItem = null; render(); scrollToTop(); }
  else if (state.selectedPid) { state.selectedPid = null; render(); scrollToTop(); }
}
function scrollToTop() { document.getElementById('app').scrollTop = 0; }

function openBuilder(pid, itemIdx) {
  const q = itemIdx != null ? `?pid=${encodeURIComponent(pid)}&item=${itemIdx}` : `?pid=${encodeURIComponent(pid)}`;
  window.open('../itp-builder/itp-builder.html' + q, '_blank', 'noopener');
}

function renderList() {
  const filter = state.filter.trim().toLowerCase();
  const docs = state.itpDocs
    .filter(d => (d.items||[]).length > 0)          // 아이템 하나도 없는 문서는 숨김
    .filter(d => d.approvalStatus === 'approved')   // v1.5: 승인 완료된 ITP만 조회에 노출 (작성→상신→승인 후)
    .map(d => ({ ...d, ...projLabel(d) }))
    .filter(d => !filter || d.code.toLowerCase().includes(filter) || d.name.toLowerCase().includes(filter) || d.client.toLowerCase().includes(filter))
    .sort((a,b) => (a.code||'').localeCompare(b.code||''));

  const cards = docs.map(d => {
    const items = d.items || [];
    const savedAt = d.savedAt ? new Date(d.savedAt).toISOString().slice(0,10) : '';
    return `<div class="proj-card" onclick="goProj('${esc(d.pid)}')">
      <div class="code">${esc(d.code)}</div>
      <div class="name">${esc(d.name)}</div>
      ${d.client ? `<div class="client">${esc(d.client)}</div>` : ''}
      <div class="meta">
        <div class="item-cnt">아이템 <b>${items.length}</b>개</div>
        <div class="stamp">${savedAt}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="hd">
      <div>
        <h1>📚 ITP 조회</h1>
        <div class="sub">결재 <b>승인 완료</b>된 ITP만 조회됩니다 · 작성 → 결재 상신 → PM·부서장 승인 후 여기에 표시 (읽기 전용)</div>
      </div>
    </div>
    <div class="filter-bar">
      <input type="text" placeholder="프로젝트 코드·이름·발주처로 검색" value="${esc(state.filter)}"
             oninput="state.filter=this.value;render()" style="flex:1;min-width:220px;">
      <span class="cnt">승인 완료 ${docs.length}건</span>
    </div>
    ${docs.length ? `<div class="proj-grid">${cards}</div>`
                  : `<div class="empty">${state.filter ? '검색 조건에 해당하는 승인 ITP가 없습니다.' : '아직 <b>승인 완료된</b> ITP가 없습니다.<br>ITP Builder에서 작성 후 결재 상신 → 승인하면 여기에 표시됩니다.'}</div>`}
  `;
}

function renderProj() {
  const doc = state.itpDocs.find(d => d.pid === state.selectedPid);
  if (!doc) return renderList();
  const lbl = projLabel(doc);
  const items = doc.items || [];
  const savedAt = doc.savedAt ? new Date(doc.savedAt).toISOString().replace('T',' ').slice(0,16) : '';

  const rows = items.map((it, i) => {
    const rowCount = _itpRows(doc, it).length;
    const label = ((it.name || it.tag || '아이템') + (it.tag ? ' · ' + it.tag : '')).replace(/'/g,'');
    return `<div class="item-row" onclick="goItem(${i})">
      <div class="no">#${i+1}</div>
      <div class="nm">${esc(it.name || it.tag || '(이름 없음)')} ${it.tag ? `<span style="font-weight:400;color:var(--text-light);">· ${esc(it.tag)}</span>` : ''}</div>
      <div class="badges">
        ${it.type ? `<span class="badge">${esc(it.type)}</span>` : ''}
        <span class="badge gray">${rowCount}행</span>
        ${_itpDocNo(doc, it) ? `<span class="badge">${esc(_itpDocNo(doc, it))}${_itpRev(doc,it)?' Rev.'+esc(_itpRev(doc,it)):''}</span>` : ''}
      </div>
      <button onclick="event.stopPropagation();deleteItpItem('${esc(doc.pid)}','${esc(it.id||'')}',${i},'${esc(label)}')" title="이 아이템만 삭제" style="flex-shrink:0;background:#fff5f5;color:#dc2626;border:1px solid #fca5a5;border-radius:5px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;">🗑</button>
      <div class="arrow">›</div>
    </div>`;
  }).join('');

  // v1.1: 결재 상태 배지
  const AP = { pending:['결재중','#fef3c7','#92400e'], approved:['✅ 승인 완료','#dcfce7','#166534'], rejected:['반려됨','#fee2e2','#b91c1c'] };
  const apInfo = AP[doc.approvalStatus];
  const apBadge = apInfo ? `<span style="display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:11px;background:${apInfo[1]};color:${apInfo[2]};margin-left:8px;vertical-align:middle;">${apInfo[0]}</span>` : '';

  return `
    <div class="breadcrumb"><a onclick="goBack()">📚 ITP 조회</a><span class="sep">›</span><b>${esc(lbl.code)} ${esc(lbl.name)}</b></div>
    <div class="hd">
      <div>
        <h1>${esc(lbl.code)} · ${esc(lbl.name)}${apBadge}</h1>
        <div class="sub">${lbl.client ? esc(lbl.client) + ' · ' : ''}${savedAt ? '최근 저장 ' + savedAt : ''}</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn" onclick="goBack()">← 목록</button>
        <button class="btn btn-primary" onclick="openBuilder('${esc(doc.pid)}')">📋 Builder 열기</button>
      </div>
    </div>
    <div class="section">
      <h3>📦 아이템 (${items.length}개) <span style="font-size:11px;color:var(--text-lighter);font-weight:400;">— 행 클릭 시 상세, 🗑 클릭 시 그 아이템만 삭제</span></h3>
      ${items.length ? `<div class="item-list">${rows}</div>` : '<div class="empty">이 프로젝트에는 등록된 아이템이 없습니다.</div>'}
    </div>
  `;
}

// v1.3: ITP Builder 저장 구조에 맞춘 행/헤더 접근 헬퍼.
//   검사항목은 item.rows가 아니라 doc.itpRowsByItem[itemId]에 저장됨(빌더 v2.1+ 구조).
//   행 필드: {activity, code, criteria, doc, witness:{sj,qc,client}, remarks}
//   Document No/Rev도 doc.itpDocNoByItem / itpRevByItem 맵에 아이템별로 저장.
function _itpRows(doc, it) {
  const m = doc.itpRowsByItem || {};
  const r = m[it.id] || m[String(it.id)];
  if (Array.isArray(r)) return r;
  return Array.isArray(it.rows) ? it.rows : [];   // 구버전 폴백
}
function _itpDocNo(doc, it) { const m = doc.itpDocNoByItem||{}; return m[it.id] || m[String(it.id)] || it.docNo || ''; }
function _itpRev(doc, it) { const m = doc.itpRevByItem||{}; return m[it.id] || m[String(it.id)] || it.rev || ''; }

function renderItem() {
  const doc = state.itpDocs.find(d => d.pid === state.selectedPid);
  if (!doc) return renderList();
  const items = doc.items || [];
  const it = items[state.selectedItem];
  if (!it) return renderProj();
  const lbl = projLabel(doc);
  const rows = _itpRows(doc, it).filter(r => r && r.active !== false);
  const docNo = _itpDocNo(doc, it), rev = _itpRev(doc, it);
  const hdr = (doc.itpHdrByItem && (doc.itpHdrByItem[it.id] || doc.itpHdrByItem[String(it.id)])) || {};
  // 헤더 자동값 (override 우선) — ITP Builder ITPPreview와 동일
  const proj = doc.proj || {};
  const isHX = (it.type||"").includes("Condenser") || (it.type||"").includes("Heat");
  const isSUS = !isHX && /(316|304|sus|sts)/i.test(it.shell_mat||"");
  const titleFor = isHX ? "HEAT EXCHANGER" : isSUS ? "SUS TANK" : "CARBON TANK";
  const hProjName = hdr.projName || proj.name || lbl.name || "";
  const hJobNo    = hdr.jobNo    || proj.no   || lbl.code || "";
  const hItemLbl  = hdr.itemLabel || `${it.name||it.tag||""} / ${it.tag||""}`;
  const hCustomer = hdr.customer || proj.customer || lbl.client || "";

  // 검사표 행 (SJ/QC/Client 입회 표시)
  const bodyRows = rows.map((r, i) => {
    const w = r.witness || {};
    return `<tr${r.specOnly ? ' style="background:#fffbe5;"' : ''}>
      <td class="ish-no">${i+1}</td>
      <td class="ish-l">${esc(r.activity || r.act || r.item || '')}</td>
      <td class="ish-l ish-sm" style="white-space:pre-line;">${esc(r.code || '')}</td>
      <td class="ish-l ish-sm" style="white-space:pre-line;">${esc(r.criteria || r.spec || '')}</td>
      <td class="ish-c ish-sm">${esc(r.doc || r.method || '')}</td>
      <td class="ish-c">${esc(w.sj || '')}</td>
      <td class="ish-c">${esc(w.qc || '')}</td>
      <td class="ish-c">${esc(w.client || '')}</td>
      <td class="ish-l ish-sm">${esc(r.remarks || r.remark || '')}</td>
    </tr>`;
  }).join('');

  return `
    <div class="breadcrumb">
      <a onclick="state.selectedPid=null;state.selectedItem=null;render();scrollToTop()">📚 ITP 조회</a><span class="sep">›</span>
      <a onclick="goBack()">${esc(lbl.code)}</a><span class="sep">›</span>
      <b>${esc(it.name || it.tag || '아이템 #'+(state.selectedItem+1))}</b>
    </div>
    <div class="hd no-print">
      <div><div class="sub">아래는 ITP Builder에서 승인·저장된 원본 그대로입니다. (읽기 전용)</div></div>
      <div style="display:flex;gap:8px;">
        <button class="btn" onclick="goBack()">← 아이템 목록</button>
        <button class="btn" onclick="window.print()">🖨 인쇄</button>
        <button class="btn btn-primary" onclick="openBuilder('${esc(doc.pid)}', ${state.selectedItem})">📋 Builder 편집</button>
      </div>
    </div>
    <div class="itp-doc">
      <table class="itp-hdr">
        <colgroup><col style="width:30%"><col style="width:15%"><col style="width:25%"><col style="width:10%"><col style="width:20%"></colgroup>
        <tbody>
          <tr>
            <td rowspan="4" class="itp-logo">
              <div style="display:flex;align-items:center;gap:8px;">
                <img src="${ITP_LOGO}" alt="㈜세종기술" style="max-width:96px;max-height:50px;object-fit:contain;flex-shrink:0;">
                <div style="font-size:8.5px;line-height:1.5;color:#222;white-space:nowrap;"><div style="font-weight:700;font-size:10px;">㈜세종기술</div><div>Sejong Tech Co., Ltd.</div></div>
              </div>
            </td>
            <td colspan="4" style="font-size:13px;font-weight:700;text-align:center;">${esc(hdr.title!=null&&hdr.title!==""?hdr.title:("Inspection and Test Plan for "+titleFor))}</td>
          </tr>
          <tr>
            <td class="k">Document No.</td><td>${esc(docNo)}</td>
            <td class="k">Rev.</td><td class="ish-c">${esc(rev||'0')}</td>
          </tr>
          <tr>
            <td class="k">Project Name / Job No.</td><td colspan="3">${esc(hProjName)} / ${esc(hJobNo)}</td>
          </tr>
          <tr>
            <td class="k">Item Name / Tag No.</td><td>${esc(hItemLbl)}</td>
            <td class="k">Customer</td><td>${esc(hCustomer)}</td>
          </tr>
        </tbody>
      </table>
      ${rows.length ? `
      <table class="itp-grid">
        <thead><tr>
          <th style="width:5%;">No.</th>
          <th style="width:13%;">Inspection Activity</th>
          <th style="width:21%;">Applicable Code / DWG / Reference</th>
          <th style="width:28%;">Acceptance Criteria</th>
          <th style="width:9%;">Verifying Doc.</th>
          <th style="width:6%;">SJ</th>
          <th style="width:6%;">QC</th>
          <th style="width:6%;">Client</th>
          <th style="width:6%;">Remarks</th>
        </tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
      <div class="itp-note">
        1. The inspection process may be changed by the supplier's manufacturing condition.<br>
        2. I&amp;T Activities: S-Supplier, R-Report Review, W-Witness, SW-Spot Witness, H-Hold Point, N/A-Not Applicable<br>
        3. 노란색 행은 고객 시방서에서 추출한 추가 요구사항입니다.
      </div>` : '<div class="empty" style="margin-top:14px;">이 아이템에는 아직 등록된 ITP 항목이 없습니다.</div>'}
    </div>
  `;
}

function render() {
  const app = document.getElementById('app');
  if (state.selectedPid && state.selectedItem != null) app.innerHTML = renderItem();
  else if (state.selectedPid) app.innerHTML = renderProj();
  else app.innerHTML = renderList();
}

// v1.2: 아이템 단위 삭제 — 프로젝트 ITP에서 선택한 아이템 하나만 제거 (전체 삭제 아님).
// Firestore 최신 문서를 다시 읽어 해당 아이템만 items 배열에서 빼고 저장(merge).
// id 매칭을 우선, 없으면 인덱스로 폴백. 마지막 1개를 지우면 프로젝트가 목록에서 사라짐(items 0).
async function deleteItpItem(pid, itemId, idx, label){
  if(!fb.auth || !fb.auth.currentUser){ alert('로그인 후 삭제할 수 있습니다.'); return; }
  if(!confirm(`"${label}" 아이템 1개를 이 ITP에서 삭제합니다.\n\n· 이 아이템의 검사항목만 지워집니다 (다른 아이템은 유지)\n· 되돌릴 수 없습니다\n\n계속할까요?`)) return;
  try{
    const snap = await fb.getDoc(fb.doc(fb.db, 't_itpBuilderDocs', pid));
    if(!snap.exists()){ alert('ITP 문서를 찾지 못했습니다. 이미 삭제된 것 같습니다.'); render(); return; }
    const d = snap.data();
    const items = Array.isArray(d.items) ? d.items.slice() : [];
    // id 우선 매칭, 실패 시 인덱스
    let rm = itemId ? items.findIndex(x => x && x.id === itemId) : -1;
    if(rm < 0) rm = idx;
    if(rm < 0 || rm >= items.length){ alert('삭제할 아이템을 찾지 못했습니다. 새로고침 후 다시 시도해주세요.'); return; }
    items.splice(rm, 1);
    await fb.setDoc(fb.doc(fb.db, 't_itpBuilderDocs', pid), { items, savedAt: Date.now() }, { merge: true });
    // 로컬 상태 즉시 반영 (onSnapshot이 곧 덮어쓰지만 UX상 바로 갱신)
    const localDoc = state.itpDocs.find(x => x.pid === pid);
    if(localDoc) localDoc.items = items;
    state.selectedItem = null;
    if(!items.length){ state.selectedPid = null; }   // 다 지웠으면 목록으로
    render(); scrollToTop();
    alert('✅ 아이템을 삭제했습니다.' + (items.length ? '' : ' (남은 아이템이 없어 목록으로 돌아갑니다)'));
  }catch(e){ alert('삭제 실패: ' + (e.message||e)); }
}

window.goProj = goProj;
window.goItem = goItem;
window.goBack = goBack;
window.openBuilder = openBuilder;
window.deleteItpItem = deleteItpItem;
window.state = state;
window.render = render;
window.scrollToTop = scrollToTop;

startSync();
</script>
</body>
</html>
