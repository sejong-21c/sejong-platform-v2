<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메신저 - SJ FLOW</title>
<script type="module">
  // Firebase Auth + Firestore + Storage — index.html과 동일한 프로젝트/설정 (모듈은 자체 초기화를 갖는다)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, getDocs, collection, onSnapshot,
    query, where, orderBy, limit
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import {
    getStorage, ref, uploadBytes, getDownloadURL
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCmGyObjPd20Qf1MX0XAijYzSR4VitrjRg",
    authDomain: "sejong-platform.firebaseapp.com",
    projectId: "sejong-platform",
    storageBucket: "sejong-platform.firebasestorage.app",
    messagingSenderId: "884301297710",
    appId: "1:884301297710:web:82b2e065119f7c5d9d87bf",
    measurementId: "G-8LJDWYVJ5G"
  };
  const fbApp = initializeApp(firebaseConfig);
  window.fb = {
    auth: getAuth(fbApp), db: getFirestore(fbApp), storage: getStorage(fbApp),
    onAuthStateChanged, doc, getDoc, setDoc, getDocs, collection, onSnapshot,
    query, where, orderBy, limit, ref, uploadBytes, getDownloadURL,
  };
</script>
<style>
:root {
  --primary: #1976D2;
  --primary-hover: #1565C0;
  --primary-light: #E3F2FD;
  --primary-lighter: #F0F7FF;
  --accent: #42A5F5;
  --success: #4CAF50;
  --warning: #FF9800;
  --danger: #F44336;
  --bg: #F5F7FA;
  --white: #FFFFFF;
  --border: #E0E0E0;
  --border-light: #F0F0F0;
  --text: #333;
  --text-light: #666;
  --text-lighter: #999;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: -apple-system, "Malgun Gothic", "맑은 고딕", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
#app { height: 100%; }

.mod-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.mod-title { font-size: 22px; font-weight: 700; }
.mod-sub { color: var(--text-light); font-size: 13px; margin-top: 4px; }

.btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

.avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.icon-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; position: relative; }
.icon-btn:hover { background: var(--primary-light); }

/* Messenger */
.msg-layout { display: grid; grid-template-columns: 260px 1fr; height: 100%; min-height: 0; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.msg-side { border-right: 1px solid var(--border); overflow-y: auto; background: #fafbfc; }
.msg-sec { padding: 12px 12px 5px; font-size: 11px; font-weight: 700; color: var(--text-light); }
.msg-sec-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
.msg-sec-toggle:hover { color: var(--primary); }
.msg-sec-caret { display: inline-block; font-size: 9px; transition: transform .15s; }
.msg-sec-caret.open { transform: rotate(90deg); }
.msg-sec-count { font-weight: 400; color: var(--text-lighter); }
.msg-ch { display: flex; align-items: center; gap: 9px; padding: 8px 12px; cursor: pointer; font-size: 13px; }
.msg-ch:hover { background: var(--primary-light); }
.msg-ch.active { background: var(--primary-light); border-left: 3px solid var(--primary); }
.msg-ch-ico { flex-shrink: 0; width: 26px; text-align: center; }
.msg-ch-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-ch-last { font-size: 11px; color: var(--text-lighter); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-unread-badge { flex-shrink: 0; background: #dc2626; color: #fff; font-size: 10px; font-weight: 700; min-width: 16px; height: 16px; line-height: 16px; text-align: center; border-radius: 8px; padding: 0 4px; }
.msg-main { display: flex; flex-direction: column; min-height: 0; }
.msg-head { padding: 13px 18px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; background: var(--white); }
.msg-body { flex: 1; overflow-y: auto; padding: 18px; background: #eef1f5; }
.msg-row { display: flex; gap: 9px; margin-bottom: 14px; align-items: flex-start; }
.msg-row.mine { flex-direction: row-reverse; }
.msg-bubble-wrap { display: flex; flex-direction: column; max-width: 72%; }
.msg-row.mine .msg-bubble-wrap { align-items: flex-end; }
.msg-author { font-size: 11px; color: var(--text-light); margin-bottom: 3px; font-weight: 600; }
.msg-bubble { background: var(--white); padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.45; word-break: break-word; box-shadow: 0 1px 1px rgba(0,0,0,.04); border-top-left-radius: 3px; }
.msg-bubble.mine { background: #fae100; color: #1a1a1a; border-top-left-radius: 12px; border-top-right-radius: 3px; }
.msg-time { font-size: 10px; color: var(--text-lighter); white-space: nowrap; margin-bottom: 2px; }
.msg-file { display: flex; align-items: center; gap: 6px; }
.msg-input-bar { border-top: 1px solid var(--border); padding: 10px 14px; display: flex; gap: 8px; align-items: center; background: var(--white); }
.msg-input { flex: 1; padding: 9px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-family: inherit; }
.msg-input:focus { outline: none; border-color: var(--primary); }
.msg-file-btn { border: none; background: var(--bg); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 16px; flex-shrink: 0; }
.msg-file-btn:hover { background: var(--primary-light); }
.msg-pick { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; }
.msg-pick:hover { background: var(--bg); }
.msg-body { position: relative; }
.msg-drop-hint { display: none; position: absolute; inset: 10px; border: 2.5px dashed var(--primary); border-radius: 12px; background: rgba(74,127,193,.08); align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: var(--primary); pointer-events: none; z-index: 5; }
.msg-drop-hint.show { display: flex; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.overlay.active { display: flex; }
.modal { background: var(--white); border-radius: var(--radius); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-body { padding: 18px; }
.modal-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.fg { margin-bottom: 14px; }
.fl { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--text-light); }
.fi { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; box-sizing: border-box; font-family: inherit; }
.fi:focus { outline: none; border-color: var(--primary); }
.fs { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; box-sizing: border-box; font-family: inherit; background: var(--white); }
.fs:focus { outline: none; border-color: var(--primary); }

@media (max-width: 900px) {
  .msg-layout { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="app"></div>

<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="mTitle">Modal</div>
      <button class="icon-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="mOk">확인</button>
    </div>
  </div>
</div>

<script>
// ══════════ 모달 헬퍼 (index.html과 동일) ══════════
function openModal(title, bodyHtml, onConfirm) {
  const m = document.getElementById('modal');
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mBody').innerHTML = bodyHtml;
  const ok = document.getElementById('mOk');
  const newOk = ok.cloneNode(true);
  ok.parentNode.replaceChild(newOk, ok);
  if (typeof onConfirm === 'function') {
    newOk.style.display = '';
    newOk.onclick = onConfirm;
  } else {
    newOk.style.display = 'none';
  }
  m.style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}
document.addEventListener('click', function(e){
  const m = document.getElementById('modal');
  if (m && e.target === m) closeModal();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeModal();
});

// ══════════ 로컬 상태 (부모 index.html의 state와 별개 — 이 모듈이 직접 Firestore에서 채운다) ══════════
let state = { currentUser: null, users: [], channels: [], messages: [], channelReads: {} };
let _fsUnsubs = [];
function getU(id) { return state.users.find(u => u.id === id) || {}; }

function render() {
  document.getElementById('app').innerHTML = `<div style="height:100vh;padding:20px;box-sizing:border-box;">${messenger()}</div>`;
  const b = document.getElementById('msgBody');
  if (b) b.scrollTop = b.scrollHeight;
}

let activeCh = 'c1';

// ══════════ 메신저 — Firestore 동기화 헬퍼 ══════════
let uploadingFiles = false; // 파일 업로드 중 중복 클릭 방지 (템플릿에서 매 렌더마다 반영)
let pendingMessages = []; // 낙관적 전송 중인 임시 메시지 (Firestore 확정 전까지만 표시)

// 사이드바 섹션(공지/부서/프로젝트/그룹/DM) 접기 상태 — 브라우저에 저장해 다음에 열어도 유지
let collapsedSections = {};
try { collapsedSections = JSON.parse(localStorage.getItem('sjMsgCollapsed') || '{}'); } catch (e) {}
function toggleSection(key) {
  collapsedSections[key] = !collapsedSections[key];
  try { localStorage.setItem('sjMsgCollapsed', JSON.stringify(collapsedSections)); } catch (e) {}
  render();
}

// 스냅샷 이벤트로 인한 전역 render() 호출이 메신저 입력창(타이핑 중인 값·커서·포커스)을
// 날려버리지 않도록 보존한 뒤 복원한다. render() 자체는 이미 msgBody를 하단으로 스크롤한다.
function renderPreservingMsgInput() {
  const inp = document.getElementById('msgInput');
  const hadFocus = inp && document.activeElement === inp;
  const val = inp ? inp.value : '';
  const selStart = inp ? inp.selectionStart : null;
  const selEnd = inp ? inp.selectionEnd : null;
  render();
  const inp2 = document.getElementById('msgInput');
  if (inp2 && val) {
    inp2.value = val;
    if (hadFocus) { inp2.focus(); if (selStart != null) inp2.setSelectionRange(selStart, selEnd); }
  }
}

// 로그인 시 1회 로드 — 본인 읽음 상태만 필요하므로 실시간 리스너 대신 쿼리 1회
async function loadChannelReads() {
  const me = state.currentUser;
  if (!me) return;
  try {
    const q = fb.query(fb.collection(fb.db, 'channelReads'), fb.where('uid', '==', me));
    const snaps = await fb.getDocs(q);
    const reads = {};
    snaps.forEach(s => { const d = s.data(); reads[d.channel] = d.lastRead; });
    state.channelReads = reads;
  } catch (e) { console.error('[Firestore] channelReads 로드 오류:', e); }
}

function getUnreadCount(channelId) {
  const me = state.currentUser;
  const lastRead = state.channelReads[channelId] || 0;
  return state.messages.filter(m => m.channel === channelId && m.author !== me && (m.createdAt || 0) > lastRead).length;
}

function messenger() {
  const me = state.currentUser;
  const meU = getU(me);
  const ch = getChannel(activeCh);
  // 채널 분류
  const announceChs = state.channels.filter(c => c.type === 'announce');
  // 부서 채널: 슈퍼관리자는 전체, 일반 사용자는 본인 소속 부서만
  const deptChsAll = state.channels.filter(c => c.type === 'dept');
  const deptChs = meU.grade === 'super' ? deptChsAll : deptChsAll.filter(c => c.name === meU.dept);
  const projChs = state.channels.filter(c => c.type === 'project');
  const groupChs = state.channels.filter(c => c.type === 'group' && (c.members||[]).includes(me));
  // DM 목록 (나와 1:1)
  const dmChs = state.channels.filter(c => c.type === 'dm' && (c.members||[]).includes(me));

  const chItem = (c) => {
    const ico = c.type==='announce'?'📢':c.type==='dept'?'🏢':c.type==='project'?'🏗️':c.type==='group'?'👥':'💬';
    const last = [...state.messages].reverse().find(m => m.channel === c.id);
    const unread = getUnreadCount(c.id);
    let label = c.name;
    if (c.type === 'dm') {
      const other = (c.members||[]).find(id => id !== me);
      const ou = getU(other);
      label = ou ? `${ou.name} ${ou.title}` : c.name;
    }
    return `<div class="msg-ch ${c.id===activeCh?'active':''}" onclick="setCh('${c.id}')">
      <span class="msg-ch-ico">${c.type==='dm'? `<span class="avatar" style="width:26px;height:26px;font-size:11px;">${label.charAt(0)}</span>` : ico}</span>
      <div style="flex:1;min-width:0;">
        <div class="msg-ch-name">${c.type==='dm'?'':'# '}${label}</div>
        ${last?`<div class="msg-ch-last">${last.file?'📎 파일':escapeHtmlMsg(last.text).slice(0,22)}</div>`:''}
      </div>
      ${unread>0?`<span class="msg-unread-badge">${unread>99?'99+':unread}</span>`:''}
    </div>`;
  };

  // 접고 펼 수 있는 섹션 헤더 — collapsedSections에 저장된 상태에 따라 목록을 감춘다
  const sectionBlock = (key, label, chs, emptyHtml) => {
    const collapsed = !!collapsedSections[key];
    const body = collapsed ? '' : (chs.length ? chs.map(chItem).join('') : (emptyHtml || ''));
    return `<div class="msg-sec msg-sec-toggle" onclick="toggleSection('${key}')">
      <span class="msg-sec-caret${collapsed?'':' open'}">▸</span>${label}${chs.length?` <span class="msg-sec-count">${chs.length}</span>`:''}
    </div>${body}`;
  };

  return `<div style="height:100%;display:flex;flex-direction:column;">
    <div class="mod-head">
      <div><div class="mod-title">💬 메신저</div><div class="mod-sub">사내 메신저 · 채널 · 1:1 · 그룹 · 파일 공유</div></div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="openNewDM()">+ 1:1 채팅</button>
        <button class="btn btn-primary btn-sm" onclick="openNewGroup()">+ 그룹 만들기</button>
      </div>
    </div>
    <div class="msg-layout" style="flex:1;min-height:0;">
      <div class="msg-side">
        ${sectionBlock('announce', '📢 공지', announceChs)}
        ${sectionBlock('dept', '🏢 부서', deptChs)}
        ${sectionBlock('project', '🏗️ 프로젝트', projChs)}
        ${groupChs.length?sectionBlock('group', '👥 그룹', groupChs):''}
        ${sectionBlock('dm', '💬 다이렉트 메시지', dmChs, '<div style="font-size:11px;color:var(--text-lighter);padding:4px 10px;">+ 1:1 채팅으로 시작</div>')}
      </div>
      <div class="msg-main">
        ${ch ? `
        <div class="msg-head">
          <span>${ch.type==='dm'?'💬 '+dmTitle(ch):'# '+ch.name}</span>
          ${ch.type==='group'||ch.type==='project'?`<span style="font-size:11px;color:var(--text-light);font-weight:400;">${(ch.members||[]).length||state.users.length}명</span>`:''}
        </div>
        <div class="msg-body" id="msgBody"
             ondragover="msgDragOver(event)" ondragleave="msgDragLeave(event)" ondrop="msgDrop(event)">
          ${renderMessages(ch)}
          <div id="msgDropHint" class="msg-drop-hint">📎 여기에 파일을 놓으면 전송됩니다</div>
        </div>
        <div class="msg-input-bar">
          <button class="msg-file-btn" onclick="msgAttachFile()" title="파일 첨부" ${uploadingFiles?'disabled style="opacity:.5;cursor:not-allowed;"':''}>${uploadingFiles?'⏳':'📎'}</button>
          <input type="text" id="msgInput" class="msg-input" placeholder="메시지 입력... (Enter로 전송)" onkeydown="if(event.key==='Enter')sendMsg()">
          <button class="btn btn-primary btn-sm" onclick="sendMsg()">전송</button>
        </div>
        ` : `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-lighter);">채널을 선택하세요</div>`}
      </div>
    </div>
  </div>`;
}

function escapeHtmlMsg(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getChannel(cid){ return state.channels.find(c=>c.id===cid); }
function dmTitle(ch){ const other=(ch.members||[]).find(id=>id!==state.currentUser); const ou=getU(other); return ou?`${ou.name} ${ou.title}`:''; }

function renderMessages(ch) {
  const msgs = [...state.messages.filter(m => m.channel === ch.id), ...pendingMessages.filter(m => m.channel === ch.id)];
  if (!msgs.length) return '<div style="text-align:center;color:var(--text-lighter);font-size:12px;padding:30px;">첫 메시지를 보내보세요 👋</div>';
  return msgs.map(m => {
    const u = getU(m.author);
    const mine = m.author === state.currentUser;
    const body = m.file
      ? `<div class="msg-file">📎 ${m.fileUrl ? `<a href="${m.fileUrl}" target="_blank" rel="noopener">${escapeHtmlMsg(m.file)}</a>` : `<span>${escapeHtmlMsg(m.file)}</span>`}<span style="font-size:10px;color:var(--text-lighter);">(${m.fileSize||'파일'}${m._pending?' · 업로드 중...':''})</span></div>`
      : escapeHtmlMsg(m.text);
    const pendingStyle = m._pending ? ' style="opacity:.55;"' : '';
    if (mine) {
      return `<div class="msg-row mine"${pendingStyle}><div class="msg-bubble-wrap">
        <div class="msg-time">${m._pending?'전송 중...':(m.at?.slice(11)||'')}</div>
        <div class="msg-bubble mine">${body}</div>
      </div></div>`;
    }
    return `<div class="msg-row"${pendingStyle}><div class="avatar" style="width:30px;height:30px;font-size:12px;flex-shrink:0;">${u.name?.charAt(0)||'?'}</div>
      <div class="msg-bubble-wrap">
        <div class="msg-author">${u.name||'?'} ${u.title||''}</div>
        <div style="display:flex;align-items:flex-end;gap:6px;">
          <div class="msg-bubble">${body}</div>
          <div class="msg-time">${m._pending?'전송 중...':(m.at?.slice(11)||'')}</div>
        </div>
      </div></div>`;
  }).join('');
}

function setCh(cid) { activeCh = cid; markChannelRead(cid); render(); }

// 채널을 열람했음을 기록 — 로컬은 즉시 반영(배지 즉시 사라짐), Firestore는 백그라운드에서 upsert
async function markChannelRead(cid) {
  const me = state.currentUser;
  if (!me) return;
  const now = Date.now();
  state.channelReads[cid] = now;
  try {
    await fb.setDoc(fb.doc(fb.db, 'channelReads', cid + '_' + me), { channel: cid, uid: me, lastRead: now }, { merge: true });
  } catch (e) { console.error('[Firestore] 읽음 처리 오류:', e); }
}

async function sendMsg() {
  const inp = document.getElementById('msgInput');
  const text = inp?.value.trim();
  if (!text) return;
  const ch = activeCh;
  inp.value = '';
  const tempId = 'pending' + Date.now() + Math.random().toString(36).slice(2, 5);
  pendingMessages.push({ id: tempId, channel: ch, author: state.currentUser, text, at: nowStamp(), createdAt: Date.now(), _pending: true });
  renderPreservingMsgInput();
  try {
    await fb.setDoc(fb.doc(fb.collection(fb.db, 'messages')), { channel: ch, author: state.currentUser, text, at: nowStamp(), createdAt: Date.now() });
  } catch (e) {
    alert('메시지 전송에 실패했습니다: ' + (e.message || e));
  } finally {
    pendingMessages = pendingMessages.filter(m => m.id !== tempId);
    renderPreservingMsgInput();
  }
}

function nowStamp(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }

const MSG_FILE_MAX_MB = 25;

function msgAttachFile() {
  if (uploadingFiles) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.onchange = () => { sendFiles(input.files); };
  input.click();
}

// 파일 메시지 전송 (공통) — Firebase Storage에 실제 업로드 후 다운로드 URL을 메시지에 저장
async function sendFiles(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length || uploadingFiles) return;
  const oversized = files.filter(f => f.size > MSG_FILE_MAX_MB * 1024 * 1024);
  if (oversized.length) {
    alert(`파일당 최대 ${MSG_FILE_MAX_MB}MB까지 첨부할 수 있습니다: ` + oversized.map(f => f.name).join(', '));
    return;
  }
  const ch = activeCh;
  uploadingFiles = true;
  renderPreservingMsgInput();
  for (const f of files) {
    const kb = f.size / 1024;
    const size = kb >= 1024 ? (kb/1024).toFixed(1)+'MB' : kb.toFixed(0)+'KB';
    const tempId = 'pending' + Date.now() + Math.random().toString(36).slice(2, 5);
    pendingMessages.push({ id: tempId, channel: ch, author: state.currentUser, file: f.name, fileSize: size, at: nowStamp(), createdAt: Date.now(), _pending: true });
    renderPreservingMsgInput();
    try {
      const storageRef = fb.ref(fb.storage, `messages/${ch}/${Date.now()}_${f.name}`);
      await fb.uploadBytes(storageRef, f);
      const fileUrl = await fb.getDownloadURL(storageRef);
      await fb.setDoc(fb.doc(fb.collection(fb.db, 'messages')), { channel: ch, author: state.currentUser, file: f.name, fileUrl, fileSize: size, at: nowStamp(), createdAt: Date.now() });
    } catch (e) {
      alert(`"${f.name}" 업로드에 실패했습니다: ` + (e.message || e));
    } finally {
      pendingMessages = pendingMessages.filter(m => m.id !== tempId);
    }
  }
  uploadingFiles = false;
  renderPreservingMsgInput();
}

// 드래그 앤 드롭
function msgDragOver(e) { e.preventDefault(); const h=document.getElementById('msgDropHint'); if(h) h.classList.add('show'); }
function msgDragLeave(e) { const h=document.getElementById('msgDropHint'); if(h) h.classList.remove('show'); }
function msgDrop(e) {
  e.preventDefault();
  const h=document.getElementById('msgDropHint'); if(h) h.classList.remove('show');
  if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
    sendFiles(e.dataTransfer.files);
  }
}

// 1:1 DM 시작
function openNewDM() {
  const others = state.users.filter(u => u.id !== state.currentUser);
  openModal('+ 1:1 채팅 상대 선택', `
    <div style="max-height:340px;overflow-y:auto;">
      ${others.map(u=>`<div class="msg-pick" onclick="startDM('${u.id}')">
        <div class="avatar" style="width:30px;height:30px;font-size:12px;">${u.name.charAt(0)}</div>
        <div><div style="font-weight:600;font-size:13px;">${u.name} ${u.title}</div><div style="font-size:11px;color:var(--text-light);">${u.dept}</div></div>
      </div>`).join('')}
    </div>
  `);
}
function startDM(otherId) {
  const me = state.currentUser;
  // 기존 DM 있으면 재사용
  let dm = state.channels.find(c => c.type==='dm' && (c.members||[]).includes(me) && (c.members||[]).includes(otherId));
  if (!dm) {
    dm = { id:'dm'+Date.now(), name:'DM', type:'dm', members:[me, otherId] };
    state.channels.push(dm); // 낙관적 반영 — 곧 도착할 channels 스냅샷이 동일 id로 덮어씀
    fb.setDoc(fb.doc(fb.db, 'channels', dm.id), { name: dm.name, type: dm.type, members: dm.members })
      .catch(e => alert('채팅방 생성에 실패했습니다: ' + (e.message || e)));
  }
  activeCh = dm.id;
  closeModal();
  render();
}

// 그룹 채팅 만들기
function openNewGroup() {
  const others = state.users.filter(u => u.id !== state.currentUser);
  openModal('+ 그룹 채팅 만들기', `
    <div class="fg"><label class="fl">그룹 이름</label><input class="fi" id="grpName" placeholder="예: 국도화학 TF"></div>
    <div class="fg"><label class="fl">멤버 선택</label>
      <div style="max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:6px;">
        ${others.map(u=>`<label class="msg-pick" style="cursor:pointer;">
          <input type="checkbox" name="grpMember" value="${u.id}" style="margin-right:4px;">
          <div class="avatar" style="width:26px;height:26px;font-size:11px;">${u.name.charAt(0)}</div>
          <div><span style="font-weight:600;font-size:12px;">${u.name} ${u.title}</span> <span style="font-size:11px;color:var(--text-light);">${u.dept}</span></div>
        </label>`).join('')}
      </div>
    </div>
  `, () => {
    const name = document.getElementById('grpName').value.trim();
    const members = Array.from(document.querySelectorAll('input[name="grpMember"]:checked')).map(c=>c.value);
    if (!name) { alert('그룹 이름을 입력하세요.'); return; }
    if (!members.length) { alert('멤버를 1명 이상 선택하세요.'); return; }
    const grp = { id:'g'+Date.now(), name, type:'group', members:[state.currentUser, ...members] };
    state.channels.push(grp); // 낙관적 반영 — 곧 도착할 channels 스냅샷이 동일 id로 덮어씀
    fb.setDoc(fb.doc(fb.db, 'channels', grp.id), { name: grp.name, type: grp.type, members: grp.members })
      .catch(e => alert('그룹 생성에 실패했습니다: ' + (e.message || e)));
    activeCh = grp.id;
    closeModal();
    render();
  });
}

// ══════════ 부팅 시퀀스 ══════════
async function startSync() {
  _fsUnsubs.forEach(u => { try { u(); } catch (e) {} });
  _fsUnsubs = [];
  _fsUnsubs.push(fb.onSnapshot(fb.collection(fb.db, 'channels'), snap => {
    state.channels = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPreservingMsgInput();
  }, err => console.error('[Firestore] channels 동기화 오류:', err)));
  const msgQuery = fb.query(fb.collection(fb.db, 'messages'), fb.orderBy('createdAt', 'desc'), fb.limit(500));
  _fsUnsubs.push(fb.onSnapshot(msgQuery, snap => {
    state.messages = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    renderPreservingMsgInput();
  }, err => console.error('[Firestore] messages 동기화 오류:', err)));
}

async function boot() {
  const fu = await new Promise(resolve => {
    const unsub = fb.onAuthStateChanged(fb.auth, u => { unsub(); resolve(u); });
  });
  if (!fu) {
    document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-lighter);">로그인이 필요합니다.</div>';
    return;
  }
  state.currentUser = fu.uid;
  try {
    const snaps = await fb.getDocs(fb.collection(fb.db, 'users'));
    state.users = snaps.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error('[Firestore] users 로드 오류:', e); }
  await loadChannelReads();
  startSync();
  render();
}
function init() {
  if (!window.fb) { setTimeout(init, 100); return; } // Firebase SDK(모듈 스크립트) 로딩 대기 — index.html과 동일한 패턴
  boot();
}
init();
</script>
