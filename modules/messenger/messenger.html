<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사내 메신저 - SJ FLOW</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

<script type="module">
  window.onerror = function(msg, url, line, col, error) {
    document.body.innerHTML = `<div style="padding:20px;color:red;font-size:14px;background:#fee;height:100vh;">
      <b>메신저 로드 중 치명적 오류 발생:</b><br><br>${msg}<br><br>${error ? error.stack : ''}
    </div>`;
  };
  window.addEventListener('unhandledrejection', function(e) {
    document.body.innerHTML = `<div style="padding:20px;color:red;font-size:14px;background:#fee;height:100vh;">
      <b>메신저 비동기 오류 발생:</b><br><br>${e.reason}
    </div>`;
  });

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, getDocs, collection, onSnapshot, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCmGyObjPd20Qf1MX0XAijYzSR4VitrjRg",
    authDomain: "sejong-platform.firebaseapp.com",
    projectId: "sejong-platform",
    storageBucket: "sejong-platform.firebasestorage.app",
    messagingSenderId: "884301297710",
    appId: "1:884301297710:web:82b2e065119f7c5d9d87bf",
    measurementId: "G-8LJDWYVJ5G"
  };
  const fbApp = initializeApp(firebaseConfig);
  window.fb = {
    auth: getAuth(fbApp), db: getFirestore(fbApp), storage: getStorage(fbApp),
    onAuthStateChanged, doc, getDoc, setDoc, getDocs, collection, onSnapshot,
    query, where, orderBy, limit, ref, uploadBytes, getDownloadURL,
  };
</script>

<style>
:root {
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --primary-light: #eff6ff;
  --primary-lighter: #f8fafc;
  --accent: #3b82f6;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  
  --sidebar-bg: #f8fafc;
  --sidebar-card: #ffffff;
  --sidebar-hover: #f1f5f9;
  --sidebar-text: #1e293b;
  --sidebar-text-muted: #64748b;
  --sidebar-active: #eff6ff;
  
  --bg: #f1f5f9;
  --white: #ffffff;
  --border: #cbd5e1;
  --border-light: #e2e8f0;
  --text: #0f172a;
  --text-light: #475569;
  --text-lighter: #94a3b8;
  
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  -webkit-font-smoothing: antialiased;
}

#app { height: 100%; display: flex; flex-direction: column; }

/* Main Wrapper */
.msg-wrapper {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 12px 16px 16px;
  box-sizing: border-box;
}

.mod-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  flex-shrink: 0;
}
.mod-title-group { display: flex; align-items: center; gap: 10px; }
.mod-title-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  color: #fff; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(37,99,235,0.2);
}
.mod-title { font-size: 18px; font-weight: 700; color: #0f172a; letter-spacing: -0.3px; }
.mod-sub { color: #64748b; font-size: 11.5px; font-weight: 400; margin-top: 1px; }

.head-actions { display: flex; gap: 8px; align-items: center; }

/* Buttons */
.btn {
  padding: 7px 12px;
  border: 1px solid #cbd5e1;
  border-radius: var(--radius-sm);
  background: var(--white);
  color: var(--text-light);
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: inherit;
  transition: background 0.1s ease;
}
.btn:hover { background: #f1f5f9; color: var(--text); border-color: #94a3b8; }
.btn-primary {
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  color: white;
  border: none;
  box-shadow: 0 2px 4px rgba(37,99,235,0.2);
}
.btn-primary:hover { background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%); }

/* Layout Grid */
.msg-layout {
  display: grid;
  grid-template-columns: 270px 1fr;
  flex: 1;
  min-height: 0;
  background: var(--white);
  border: 1px solid #cbd5e1;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.04);
}

/* Light Sidebar */
.msg-side {
  background: var(--sidebar-bg);
  color: var(--sidebar-text);
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e2e8f0;
  min-height: 0;
}

.side-search {
  padding: 10px 12px;
  border-bottom: 1px solid #e2e8f0;
  background: #ffffff;
}
.side-search-input {
  width: 100%;
  padding: 7px 10px 7px 30px;
  background: #f1f5f9;
  border: 1px solid #cbd5e1;
  border-radius: var(--radius-sm);
  color: #0f172a;
  font-size: 12px;
  font-family: inherit;
  outline: none;
}
.side-search-input::placeholder { color: #94a3b8; }
.side-search-input:focus { border-color: #2563eb; background: #ffffff; }
.side-search-wrap { position: relative; }
.side-search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #94a3b8; display: flex; }

.side-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.side-scroll::-webkit-scrollbar { width: 5px; }
.side-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

.msg-sec-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 8px;
  margin-top: 6px;
  margin-bottom: 2px;
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
  color: #475569;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.2px;
  text-transform: uppercase;
}
.msg-sec-toggle:hover { color: #0f172a; background: #e2e8f0; }
.sec-title-left { display: flex; align-items: center; gap: 6px; }
.msg-sec-caret { display: flex; align-items: center; transition: transform 0.15s ease; color: #64748b; }
.msg-sec-caret.open { transform: rotate(90deg); }
.msg-sec-count {
  font-size: 10px;
  background: #e2e8f0;
  color: #475569;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
}

.msg-ch {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 9px;
  margin-bottom: 2px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: #334155;
  transition: background 0.1s ease;
}
.msg-ch:hover { background: #e2e8f0; color: #0f172a; }
.msg-ch.active {
  background: #dbeafe;
  color: #1d4ed8;
  font-weight: 700;
}

.msg-ch-ico {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #e2e8f0;
  color: #475569;
}
.msg-ch.active .msg-ch-ico { background: #dbeafe; color: #1d4ed8; }

.avatar-wrapper { position: relative; flex-shrink: 0; }
.avatar {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  color: #ffffff; display: flex; align-items: center; justify-content: center;
  font-size: 11.5px; font-weight: 700; flex-shrink: 0;
}
.avatar.other {
  background: linear-gradient(135deg, #64748b 0%, #475569 100%);
}
.online-dot {
  position: absolute; right: -2px; bottom: -2px; width: 8px; height: 8px;
  background: #10b981; border: 1.5px solid #ffffff; border-radius: 50%;
}

.msg-ch-info { flex: 1; min-width: 0; }
.msg-ch-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-ch.active .msg-ch-name { font-weight: 700; }
.msg-ch-last { font-size: 11px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

.msg-unread-badge {
  flex-shrink: 0;
  background: #ef4444;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 17px;
  height: 17px;
  line-height: 17px;
  text-align: center;
  border-radius: 8.5px;
  padding: 0 4px;
}

/* Main Chat Window */
.msg-main { display: flex; flex-direction: column; min-height: 0; background: #ffffff; }

.msg-head {
  padding: 11px 18px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #ffffff;
}
.msg-head-left { display: flex; align-items: center; gap: 8px; }
.msg-head-title { font-size: 15px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 6px; }
.msg-head-right { display: flex; align-items: center; gap: 8px; }

/* 멤버 목록 보기 클릭 가능한 전용 뱃지 버튼 */
.members-tag {
  display: flex; align-items: center; gap: 5px; padding: 4px 10px;
  background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px;
  font-size: 12px; color: #1d4ed8; font-weight: 600; cursor: pointer;
  transition: all 0.15s ease;
}
.members-tag:hover { background: #dbeafe; border-color: #93c5fd; }

/* Message List */
.msg-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  background: #f8fafc;
  position: relative;
}
.msg-body::-webkit-scrollbar { width: 6px; }
.msg-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

.msg-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-start; }
.msg-row.mine { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg, #64748b 0%, #475569 100%);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 12.5px; font-weight: 700; flex-shrink: 0;
}
.msg-row.mine .msg-avatar { display: none; }

.msg-bubble-wrap { display: flex; flex-direction: column; max-width: 70%; }
.msg-row.mine .msg-bubble-wrap { align-items: flex-end; }

.msg-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.msg-author { font-size: 12px; font-weight: 700; color: #334155; }
.msg-dept { font-size: 11px; color: #64748b; font-weight: 400; }
.msg-time { font-size: 10.5px; color: #94a3b8; font-weight: 400; }

.msg-bubble {
  background: #ffffff;
  padding: 10px 14px;
  border-radius: 12px;
  border-top-left-radius: 2px;
  font-size: 13.5px;
  line-height: 1.5;
  color: #1e293b;
  word-break: break-word;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  border: 1px solid #e2e8f0;
}
.msg-bubble.mine {
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  color: #ffffff;
  border: none;
  border-radius: 12px;
  border-top-right-radius: 2px;
  box-shadow: 0 2px 6px rgba(37,99,235,0.2);
}

.msg-file-card {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: rgba(255,255,255,0.15);
  border-radius: 6px;
}
.msg-bubble:not(.mine) .msg-file-card { background: #f1f5f9; }
.msg-file-icon { width: 28px; height: 28px; border-radius: 5px; background: rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: center; }
.msg-bubble.mine .msg-file-icon { background: rgba(255,255,255,0.2); }
.msg-file-name { font-weight: 600; font-size: 12px; color: inherit; text-decoration: none; word-break: break-all; }
.msg-file-name:hover { text-decoration: underline; }
.msg-file-size { font-size: 10px; opacity: 0.8; margin-top: 1px; }

/* Input Bar */
.msg-input-container {
  padding: 12px 18px;
  background: #ffffff;
  border-top: 1px solid #e2e8f0;
}
.msg-input-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f8fafc;
  border: 1.5px solid #cbd5e1;
  border-radius: 12px;
  padding: 5px 6px 5px 12px;
}
.msg-input-box:focus-within {
  border-color: #2563eb;
  background: #ffffff;
}

.msg-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 13.5px;
  font-family: inherit;
  color: #0f172a;
  outline: none;
}
.msg-input::placeholder { color: #94a3b8; }

.input-tool-btn {
  width: 32px; height: 32px; border-radius: 6px; border: none;
  background: transparent; color: #64748b; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.input-tool-btn:hover { background: #e2e8f0; color: #0f172a; }

.msg-send-btn {
  width: 34px; height: 34px; border-radius: 8px; border: none;
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  color: #ffffff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* Drop Hint */
.msg-drop-hint {
  display: none; position: absolute; inset: 10px;
  border: 2px dashed #2563eb; border-radius: 14px;
  background: rgba(37,99,235,0.06);
  align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #2563eb; gap: 8px;
  pointer-events: none; z-index: 20;
}
.msg-drop-hint.show { display: flex; }

/* Modals */
.overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.overlay.active { display: flex; }
.modal { background: #ffffff; border-radius: var(--radius-lg); width: 100%; max-width: 440px; max-height: 90vh; overflow: hidden; border: 1px solid #cbd5e1; display: flex; flex-direction: column; }
.modal-head { padding: 14px 18px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
.modal-title { font-size: 15px; font-weight: 700; color: #0f172a; }
.modal-body { padding: 18px; overflow-y: auto; flex: 1; }
.modal-foot { padding: 12px 18px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 8px; background: #f8fafc; }
.fg { margin-bottom: 14px; }
.fl { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #475569; }
.fi, .fs { width: 100%; padding: 9px 11px; border: 1px solid #cbd5e1; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; }
.fi:focus, .fs:focus { outline: none; border-color: #2563eb; }

.msg-pick {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  border-radius: 8px; cursor: pointer; margin-bottom: 3px;
}
.msg-pick:hover { background: #f1f5f9; }

@media (max-width: 850px) {
  .msg-layout { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="app"></div>

<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="mTitle">알림</div>
      <button class="input-tool-btn" onclick="closeModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="mOk">확인</button>
    </div>
  </div>
</div>

<script>
// 부모 인스턴스와 100% 동일한 Firebase 객체 사용 (단일 소스)
const getFB = () => (window.parent && window.parent.fb) ? window.parent.fb : window.fb;

// ══════════ 크로스 윈도우 객체 프로토타입 불일치(custom Object 오류) 해결 헬퍼 ══════════
function makeParentPlainObject(obj) {
  try {
    if (window.parent && window.parent.JSON) {
      return window.parent.JSON.parse(JSON.stringify(obj));
    }
  } catch (e) { console.error('[makeParentPlainObject] 오류:', e); }
  return obj;
}

// ══════════ 모달 헬퍼 ══════════
function openModal(title, bodyHtml, onConfirm) {
  const m = document.getElementById('modal');
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mBody').innerHTML = bodyHtml;
  const ok = document.getElementById('mOk');
  const newOk = ok.cloneNode(true);
  ok.parentNode.replaceChild(newOk, ok);
  if (typeof onConfirm === 'function') {
    newOk.style.display = '';
    newOk.onclick = onConfirm;
  } else {
    newOk.style.display = 'none';
  }
  m.classList.add('active');
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
}
document.addEventListener('click', function(e){
  const m = document.getElementById('modal');
  if (m && e.target === m) closeModal();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeModal();
});

// ══════════ 로컬 상태 ══════════
let state = { currentUser: null, users: [], channels: [], projects: [], messages: [], channelReads: {} };
let searchFilter = '';
let uploadingFiles = false;
let pendingMessages = [];

let collapsedSections = { announce: true, dept: true, project: true, group: true, dm: true };

function toggleSection(key) {
  collapsedSections[key] = !collapsedSections[key];
  render();
}

function getAllUsers() {
  if (state.users && state.users.length) return state.users;
  if (window.parent && window.parent.state && window.parent.state.users && window.parent.state.users.length) {
    return window.parent.state.users;
  }
  return [];
}

function getU(idOrName) {
  if (!idOrName) return { name: '알 수 없음' };
  const users = getAllUsers();
  return users.find(u => u.id === idOrName || u.name === idOrName || u.email === idOrName) || { name: String(idOrName) };
}

function getCurrentUserUid() {
  if (state.currentUser) return state.currentUser;
  if (window.parent && window.parent.state && window.parent.state.currentUser) return window.parent.state.currentUser;
  const pFb = getFB();
  if (pFb && pFb.auth && pFb.auth.currentUser) return pFb.auth.currentUser.uid;
  return 'cwkim';
}

let activeCh = 'c1';

function render() {
  const side = document.querySelector('.side-scroll');
  const sideScroll = side ? side.scrollTop : null;
  const appEl = document.getElementById('app');
  if (appEl) {
    appEl.innerHTML = `<div class="msg-wrapper">${messenger()}</div>`;
  }
  const b = document.getElementById('msgBody');
  if (b) b.scrollTop = b.scrollHeight;
  const side2 = document.querySelector('.side-scroll');
  if (side2 && sideScroll != null) side2.scrollTop = sideScroll;
}

function filterChannelsDOM(keyword) {
  searchFilter = (keyword || '').trim().toLowerCase();
  const items = document.querySelectorAll('.msg-ch');
  items.forEach(el => {
    const text = (el.dataset.search || '').toLowerCase();
    el.style.display = (!searchFilter || text.includes(searchFilter)) ? 'flex' : 'none';
  });
}

function renderPreservingMsgInput() {
  const inp = document.getElementById('msgInput');
  const hadFocus = inp && document.activeElement === inp;
  const val = inp ? inp.value : '';
  const selStart = inp ? inp.selectionStart : null;
  const selEnd = inp ? inp.selectionEnd : null;
  render();
  const inp2 = document.getElementById('msgInput');
  if (inp2 && val) {
    inp2.value = val;
    if (hadFocus) { inp2.focus(); if (selStart != null) inp2.setSelectionRange(selStart, selEnd); }
  }
}

async function loadChannelReads() {
  const me = getCurrentUserUid();
  if (!me) return;
  try {
    const pFb = getFB();
    if (!pFb || !pFb.db) return;
    const q = pFb.query(pFb.collection(pFb.db, 'channelReads'), pFb.where('uid', '==', me));
    const snaps = await pFb.getDocs(q);
    const reads = {};
    snaps.forEach(s => { const d = s.data(); reads[d.channel] = d.lastRead; });
    state.channelReads = reads;
  } catch (e) { console.error('[Firestore] channelReads 로드 오류:', e); }
}

function getUnreadCount(channelId) {
  const me = getCurrentUserUid();
  const lastRead = state.channelReads[channelId] || 0;
  return state.messages.filter(m => {
    if (m.channel !== channelId || m.author === me) return false;
    let ts = m.createdAt || 0;
    if (!ts && m.at) {
      const parsed = Date.parse(m.at.replace(' ', 'T'));
      if (!isNaN(parsed)) ts = parsed;
    }
    return ts > lastRead;
  }).length;
}

// ══════════ 프로젝트 리스트 100% 통합 수집 함수 ══════════
function getProjectChannels() {
  const map = new Map();
  
  (state.channels || []).filter(c => c.type === 'project').forEach(c => {
    map.set(c.id, { ...c });
  });
  
  const parentProjs = (window.parent && window.parent.state && window.parent.state.projects) || [];
  let localProjs1 = [], localProjs2 = [];
  try { localProjs1 = JSON.parse(localStorage.getItem('sj_projects') || '[]'); } catch(e) {}
  try { localProjs2 = JSON.parse(localStorage.getItem('sjProjects') || '[]'); } catch(e) {}
  
  const combined = [...(state.projects || []), ...parentProjs, ...localProjs1, ...localProjs2];
  const uniqueMap = new Map();
  combined.forEach(p => {
    if (p && p.id && !uniqueMap.has(p.id)) uniqueMap.set(p.id, p);
  });
  
  uniqueMap.forEach((p, pid) => {
    const cid = 'proj_' + pid;
    const existing = map.get(cid) || map.get(pid);
    const pName = p.name || p.code || ('프로젝트 ' + pid);
    const pm = p.pm || p.manager || '';
    let teamRaw = p.members || p.assignees || p.users || p.team || [];
    const team = Array.isArray(teamRaw) ? teamRaw : (typeof teamRaw === 'string' ? [teamRaw] : []);
    const members = Array.from(new Set([pm, ...team])).filter(Boolean);
    
    if (existing) {
      existing.name = existing.name || pName;
      existing.projectId = pid;
      existing.members = Array.from(new Set([...(existing.members || []), ...members]));
      map.set(existing.id, existing);
    } else {
      map.set(cid, {
        id: cid,
        name: pName,
        type: 'project',
        projectId: pid,
        members
      });
    }
  });
  
  return Array.from(map.values());
}

// ══════════ 각 채널 타입별 정확한 참여 멤버 목록 ══════════
function getChannelMembers(ch) {
  if (!ch) return [];
  const users = getAllUsers();
  
  if (ch.type === 'announce') {
    return users;
  }
  if (ch.type === 'dept') {
    const dName = ch.name || ch.id.replace('dept_', '');
    const deptUsers = users.filter(u => u.dept === dName || u.deptId === dName);
    return deptUsers;
  }
  if (ch.type === 'project') {
    const pid = ch.projectId || ch.id.replace('proj_', '');
    const parentProjs = (window.parent && window.parent.state && window.parent.state.projects) || [];
    const p = (state.projects || []).find(x => x.id === pid) || parentProjs.find(x => x.id === pid);
    if (p) {
      const pmId = p.pm || p.manager || p.pmUid;
      let teamRaw = p.members || p.assignees || p.users || p.team || [];
      const teamList = Array.isArray(teamRaw) ? teamRaw : (typeof teamRaw === 'string' ? [teamRaw] : []);
      const memberIds = Array.from(new Set([pmId, ...teamList])).filter(Boolean);
      const matched = memberIds.map(id => getU(id)).filter(u => u.name);
      return matched.length ? matched : users.filter(u => u.dept === p.dept);
    }
  }
  if (ch.type === 'group' || ch.type === 'dm') {
    const memberIds = ch.members || [];
    return memberIds.map(id => getU(id)).filter(u => u.name);
  }
  return users;
}

function escapeHtmlMsg(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getChannel(cid){
  if (!cid) cid = 'c1';
  let found = state.channels.find(c => c.id === cid);
  if (!found && cid === 'c1') {
    found = { id: 'c1', name: '전사 공지', type: 'announce' };
  }
  if (!found && cid && cid.startsWith('dept_')) {
    const dName = cid.replace('dept_', '');
    found = { id: cid, name: dName, type: 'dept' };
  }
  if (!found && cid && cid.startsWith('proj_')) {
    const pid = cid.replace('proj_', '');
    const parentProjs = (window.parent && window.parent.state && window.parent.state.projects) || [];
    const p = (state.projects || []).find(x => x.id === pid) || parentProjs.find(x => x.id === pid);
    found = { id: cid, name: (p ? (p.name || p.code) : ('프로젝트 ' + pid)), type: 'project', projectId: pid };
  }
  return found || { id: 'c1', name: '전사 공지', type: 'announce' };
}

function dmTitle(ch){ const other=(ch.members||[]).find(id=>id!==getCurrentUserUid()); const ou=getU(other); return ou?`${ou.name} ${ou.title}`:''; }

function renderMessages(ch) {
  if (!ch) return '';
  const msgs = [...state.messages.filter(m => m.channel === ch.id), ...pendingMessages.filter(m => m.channel === ch.id)];
  if (!msgs.length) return `
    <div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;gap:8px;">

      <div style="font-size:12px;color:#94a3b8;">팀원들과 실시간 업무 소통을 시작할 수 있습니다.</div>
    </div>`;
  
  const me = getCurrentUserUid();
  
  return msgs.map(m => {
    const u = getU(m.author);
    const mine = m.author === me || m.author === state.currentUser;
    
    let contentHtml = '';
    if (m.file) {
      contentHtml = `
        <div class="msg-file-card">
          <div class="msg-file-icon">${ICONS.fileText}</div>
          <div>
            ${m.fileUrl ? `<a href="${m.fileUrl}" target="_blank" rel="noopener" class="msg-file-name">${escapeHtmlMsg(m.file)}</a>` : `<span class="msg-file-name">${escapeHtmlMsg(m.file)}</span>`}
            <div class="msg-file-size">${m.fileSize||'파일'} ${m._pending?'· 업로드 중...':''}</div>
          </div>
        </div>`;
    } else {
      contentHtml = escapeHtmlMsg(m.text);
    }
    
    const pendingStyle = m._pending ? ' style="opacity:.65;"' : '';
    
    if (mine) {
      return `
        <div class="msg-row mine"${pendingStyle}>
          <div class="msg-bubble-wrap">
            <div class="msg-meta" style="justify-content:flex-end;align-items:center;">
              ${!m._pending ? `<button onclick="deleteMsg('${m.id}')" style="background:none;border:none;color:#cbd5e1;cursor:pointer;padding:0;margin-right:6px;display:flex;" title="메시지 삭제" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#cbd5e1'">${ICONS.trash}</button>` : ''}
              <span class="msg-time">${m._pending?'전송 중...':(m.at?.slice(11)||'')}</span>
            </div>
            <div class="msg-bubble mine">${contentHtml}</div>
          </div>
        </div>`;
    }

    return `
      <div class="msg-row"${pendingStyle}>
        <div class="msg-avatar">${(u.name||'?').charAt(0)}</div>
        <div class="msg-bubble-wrap">
          <div class="msg-meta">
            <span class="msg-author">${escapeHtmlMsg(u.name||'?')} ${escapeHtmlMsg(u.title||'')}</span>
            <span class="msg-dept">${escapeHtmlMsg(u.dept||'')}</span>
            <span class="msg-time">${m._pending?'전송 중...':(m.at?.slice(11)||'')}</span>
          </div>
          <div class="msg-bubble">${contentHtml}</div>
        </div>
      </div>`;
  }).join('');
}

function setCh(cid) { activeCh = cid; markChannelRead(cid); render(); }

async function markChannelRead(cid) {
  const me = getCurrentUserUid();
  if (!me) return;
  const now = Date.now();
  state.channelReads[cid] = now;
  try {
    const pFb = getFB();
    if (!pFb || !pFb.db) return;
    const payload = makeParentPlainObject({ channel: String(cid), uid: String(me), lastRead: Number(now) });
    await pFb.setDoc(pFb.doc(pFb.db, 'channelReads', cid + '_' + me), payload, { merge: true });
  } catch (e) { console.error('[Firestore] 읽음 처리 오류:', e); }
}

async function leaveChannel(cid) {
  if (!confirm('이 대화방에서 나가시겠습니까?\n방을 나가면 더 이상 대화 목록에 표시되지 않습니다.')) return;
  const ch = state.channels.find(c => c.id === cid);
  if (!ch || !ch.members) return;
  
  const me = getCurrentUserUid();
  const newMembers = ch.members.filter(id => id !== me);
  
  try {
    const pFb = getFB();
    if (!pFb || !pFb.db) return;
    // 부모 객체 영역 문제 방지를 위해 makeParentPlainObject로 배열을 감싸서 업데이트
    const payload = makeParentPlainObject({ members: newMembers });
    await pFb.updateDoc(pFb.doc(pFb.db, 'channels', cid), payload);
    
    // 로컬 즉시 반영
    ch.members = newMembers;
    activeCh = 'c1'; // 기본 전사공지로 튕겨냄
    render();
  } catch (e) {
    alert('대화방 나가기 실패: ' + (e.message || e));
  }
}

async function deleteMsg(msgId) {
  if (!confirm('이 메시지를 정말 삭제하시겠습니까? (삭제 후 복구할 수 없습니다)')) return;
  try {
    const pFb = getFB();
    if (!pFb || !pFb.db) return;
    
    // Firestore 문서 삭제 (rules에서 author 본인인지 확인)
    await pFb.deleteDoc(pFb.doc(pFb.db, 'messages', msgId));
    
    // UI 즉시 반영 (onSnapshot이 다시 덮어주겠지만 반응성을 위해)
    state.messages = state.messages.filter(m => m.id !== msgId);
    renderPreservingMsgInput();
  } catch (e) {
    alert('메시지 삭제 실패: ' + (e.message || e));
  }
}

// ══════════ 메시지 전송 ══════════
async function sendMsg() {
  const inp = document.getElementById('msgInput');
  const text = inp?.value.trim();
  if (!text) return;
  
  const pFb = getFB();
  const me = getCurrentUserUid();
  const chId = activeCh || 'c1';
  inp.value = '';
  
  const tempId = 'pending_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5);
  const nowStr = nowStamp();
  const createdTs = Date.now();
  
  pendingMessages.push({
    id: tempId,
    channel: chId,
    author: me,
    text: text,
    at: nowStr,
    createdAt: createdTs,
    _pending: true
  });
  renderPreservingMsgInput();
  
  try {
    const docId = 'msg_' + createdTs + '_' + Math.random().toString(36).slice(2, 7);
    const rawPayload = {
      channel: String(chId),
      author: String(me),
      text: String(text),
      at: String(nowStr),
      createdAt: Number(createdTs)
    };
    
    const payload = makeParentPlainObject(rawPayload);
    
    if (pFb && pFb.db) {
      await pFb.setDoc(pFb.doc(pFb.db, 'messages', docId), payload);
    }
  } catch (e) {
    console.error('[Firestore] 메시지 전송 오류:', e);
    alert('메시지 전송 실패: ' + (e.message || e));
  } finally {
    pendingMessages = pendingMessages.filter(m => m.id !== tempId);
    renderPreservingMsgInput();
  }
}

function nowStamp(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }

const MSG_FILE_MAX_MB = 25;

function msgAttachFile() {
  if (uploadingFiles) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.onchange = () => { sendFiles(input.files); };
  input.click();
}

async function sendFiles(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) return;
  const oversized = files.filter(f => f.size > MSG_FILE_MAX_MB * 1024 * 1024);
  if (oversized.length) {
    alert(`파일당 최대 ${MSG_FILE_MAX_MB}MB까지 첨부할 수 있습니다: ` + oversized.map(f => f.name).join(', '));
    return;
  }
  const chId = activeCh || 'c1';
  const me = getCurrentUserUid();
  uploadingFiles = true;
  renderPreservingMsgInput();
  
  try {
    const pFb = getFB();
    if (!pFb || !pFb.storage || !pFb.db) return;
    for (const f of files) {
      const kb = f.size / 1024;
      const size = kb >= 1024 ? (kb/1024).toFixed(1)+'MB' : kb.toFixed(0)+'KB';
      const tempId = 'pending_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5);
      const nowStr = nowStamp();
      const createdTs = Date.now();
      
      pendingMessages.push({
        id: tempId,
        channel: chId,
        author: me,
        file: f.name,
        fileSize: size,
        at: nowStr,
        createdAt: createdTs,
        _pending: true
      });
      renderPreservingMsgInput();
      
      try {
        const storageRef = pFb.ref(pFb.storage, `messages/${chId}/${createdTs}_${f.name}`);
        const uploadTask = pFb.uploadBytes(storageRef, f);
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('파일 업로드 시간 초과 (15초)')), 15000));
        
        await Promise.race([uploadTask, timeoutPromise]);
        
        const fileUrl = await pFb.getDownloadURL(storageRef);
        const docId = 'msg_' + createdTs + '_' + Math.random().toString(36).slice(2, 7);
        
        const rawPayload = {
          channel: String(chId),
          author: String(me),
          file: String(f.name),
          fileUrl: String(fileUrl),
          fileSize: String(size),
          at: String(nowStr),
          createdAt: Number(createdTs)
        };
        const payload = makeParentPlainObject(rawPayload);
        await pFb.setDoc(pFb.doc(pFb.db, 'messages', docId), payload);
      } catch (e) {
        console.error('[Storage] 파일 업로드 실패:', e);
        alert(`"${f.name}" 업로드 실패: ` + (e.message || e));
      } finally {
        pendingMessages = pendingMessages.filter(m => m.id !== tempId);
        renderPreservingMsgInput();
      }
    }
  } finally {
    uploadingFiles = false;
    renderPreservingMsgInput();
  }
}

function msgDragOver(e) { e.preventDefault(); const h=document.getElementById('msgDropHint'); if(h) h.classList.add('show'); }
function msgDragLeave(e) { const h=document.getElementById('msgDropHint'); if(h) h.classList.remove('show'); }
function msgDrop(e) {
  e.preventDefault();
  const h=document.getElementById('msgDropHint'); if(h) h.classList.remove('show');
  if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
    sendFiles(e.dataTransfer.files);
  }
}

function openNewDM() {
  const users = getAllUsers();
  const me = getCurrentUserUid();
  const others = users.filter(u => u.id !== me);
  openModal('💬 1:1 대화 상대 선택', `
    <div style="max-height:340px;overflow-y:auto;">
      ${others.map(u=>`<div class="msg-pick" onclick="startDM('${u.id}')">
        <div class="avatar other" style="width:32px;height:32px;font-size:12px;">${(u.name||'?').charAt(0)}</div>
        <div>
          <div style="font-weight:700;font-size:13.5px;color:#0f172a;">${escapeHtmlMsg(u.name)} ${escapeHtmlMsg(u.title||'')}</div>
          <div style="font-size:11.5px;color:#64748b;">${escapeHtmlMsg(u.dept||'')}</div>
        </div>
      </div>`).join('')}
    </div>
  `);
}

function startDM(otherId) {
  const me = getCurrentUserUid();
  let dm = state.channels.find(c => c.type==='dm' && (c.members||[]).includes(me) && (c.members||[]).includes(otherId));
  if (!dm) {
    dm = { id:'dm'+Date.now(), name:'DM', type:'dm', members:[me, otherId] };
    state.channels.push(dm);
    const pFb = getFB();
    if (pFb && pFb.db) {
      const payload = makeParentPlainObject({ name: dm.name, type: dm.type, members: dm.members });
      pFb.setDoc(pFb.doc(pFb.db, 'channels', dm.id), payload)
        .catch(e => alert('채팅방 생성 실패: ' + (e.message || e)));
    }
  }
  activeCh = dm.id;
  closeModal();
  render();
}

function openNewGroup() {
  const users = getAllUsers();
  const me = getCurrentUserUid();
  const others = users.filter(u => u.id !== me);
  openModal('👥 새로운 그룹 채팅 생성', `
    <div class="fg">
      <label class="fl">그룹 이름</label>
      <input class="fi" id="grpName" placeholder="예: 품질관리 프로젝트 TF팀">
    </div>
    <div class="fg">
      <label class="fl">참여 멤버 선택</label>
      <div style="max-height:240px;overflow-y:auto;border:1px solid #cbd5e1;border-radius:8px;padding:6px;">
        ${others.map(u=>`<label class="msg-pick" style="cursor:pointer;">
          <input type="checkbox" name="grpMember" value="${u.id}" style="margin-right:6px;">
          <div class="avatar other" style="width:26px;height:26px;font-size:11px;">${(u.name||'?').charAt(0)}</div>
          <div>
            <span style="font-weight:600;font-size:13px;color:#0f172a;">${escapeHtmlMsg(u.name)} ${escapeHtmlMsg(u.title||'')}</span>
            <span style="font-size:11.5px;color:#64748b;margin-left:4px;">${escapeHtmlMsg(u.dept||'')}</span>
          </div>
        </label>`).join('')}
      </div>
    </div>
  `, () => {
    const name = document.getElementById('grpName').value.trim();
    const members = Array.from(document.querySelectorAll('input[name="grpMember"]:checked')).map(c=>c.value);
    if (!name) { alert('그룹 이름을 입력하세요.'); return; }
    if (!members.length) { alert('멤버를 1명 이상 선택하세요.'); return; }
    const me = getCurrentUserUid();
    const grp = { id:'g'+Date.now(), name, type:'group', members:[me, ...members] };
    state.channels.push(grp);
    const pFb = getFB();
    if (pFb && pFb.db) {
      const payload = makeParentPlainObject({ name: grp.name, type: grp.type, members: grp.members });
      pFb.setDoc(pFb.doc(pFb.db, 'channels', grp.id), payload)
        .catch(e => alert('그룹 생성 실패: ' + (e.message || e)));
    }
    activeCh = grp.id;
    closeModal();
    render();
  });
}

let _fsUnsubs = [];
async function startSync() {
  _fsUnsubs.forEach(u => { try { u(); } catch (e) {} });
  _fsUnsubs = [];
  
  const pFb = getFB();
  if (!pFb || !pFb.db) return;
  
  _fsUnsubs.push(pFb.onSnapshot(pFb.collection(pFb.db, 'channels'), snap => {
    state.channels = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPreservingMsgInput();
  }, err => console.error('[Firestore] channels 동기화 오류:', err)));

  _fsUnsubs.push(pFb.onSnapshot(pFb.collection(pFb.db, 'projects'), snap => {
    state.projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPreservingMsgInput();
  }, err => console.error('[Firestore] projects 동기화 오류:', err)));

  const msgQuery = pFb.query(pFb.collection(pFb.db, 'messages'), pFb.orderBy('createdAt', 'desc'), pFb.limit(500));
  _fsUnsubs.push(pFb.onSnapshot(msgQuery, snap => {
    state.messages = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    renderPreservingMsgInput();
  }, err => console.error('[Firestore] messages 동기화 오류:', err)));
}

async function boot() {
  // 1. 부모 윈도우 상태 동기화 및 0ms 즉시 렌더링 (빈 화면 방지)
  if (window.parent && window.parent.state) {
    if (window.parent.state.currentUser) state.currentUser = window.parent.state.currentUser;
    if (window.parent.state.users && window.parent.state.users.length) state.users = window.parent.state.users;
    if (window.parent.state.projects && window.parent.state.projects.length) state.projects = window.parent.state.projects;
  }
  state.currentUser = getCurrentUserUid();
  render(); // 즉시 화면 표시

  // 2. 백그라운드 실시간 동기화
  const pFb = getFB();
  if (pFb && pFb.db) {
    try {
      const snaps = await pFb.getDocs(pFb.collection(pFb.db, 'users'));
      if (snaps && snaps.docs) state.users = snaps.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) { console.error('[Firestore] users 로드 오류:', e); }
    
    await loadChannelReads();
    startSync();
  }
}

function init() {
  boot();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
