<style>

/* ─── v28.4.17 ★ 통합 WBS Table — 부장님 발상: 하나의 table에 모든 컬럼, CSS로 보이기/숨기기 ─── */
.wbs-unified-wrap{position:relative;overflow:auto;background:#fff;border-radius:8px;border:1px solid #e4e7ec;max-height:calc(100vh - 280px)}
.wbs-unified-tbl{border-collapse:collapse!important;border-spacing:0!important;table-layout:fixed}
.wbs-unified-tbl thead th{height:30px;padding:0 8px;font-size:10px;font-weight:700;color:#6b7280;background:#f8fafc;border-bottom:1px solid #e4e7ec;text-align:left;position:sticky;top:0;z-index:5;box-sizing:border-box;vertical-align:middle;white-space:nowrap}

.wbs-unified-tbl tbody td.col-gantt .cell-inner{position:relative;padding:0 3px;height:31px;overflow:visible}
.wbs-unified-tbl tbody td.col-rem .cell-inner{padding:0;justify-content:center}
/* 탭별 컬럼 보이기/숨기기 */
.wbs-unified-tbl.wbs-view-split .col-mgr,

/* sticky 좌측 컬럼 (간트 탭에서 작업명 고정) */
.wbs-unified-tbl.wbs-view-gantt tbody td.col-code,

.sb-hide-btn{margin-left:4px;padding:1px 4px;background:transparent;border:none;cursor:pointer;font-size:10px;opacity:0.4;border-radius:3px}

.v284-hide-toggle{padding:5px 11px;background:#f3f4f6;color:#6b7280;border:1.5px solid #e4e7ec;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}

/* ─── 인쇄 전용 CSS (v28.4.2 전면 재작성) ─── */
@media print{
  @page{size:A4 landscape;margin:10mm 8mm}
  body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* 사이드바, 헤더 버튼 숨김 */
  .sb,.sb-toggle{display:none!important}
  .cont>.thdr>.bc-b,.cont>.thdr>div:nth-child(3),.cont>.thdr>.addb,.cont>.thdr>.v284-print-btn,.cont>.thdr>.v28-eb,.cont>.thdr>span{display:none!important}
  .layout{display:block!important}
  .mainx{margin-left:0!important;width:100%!important}
  .thdr{border-bottom:2px solid #000!important;padding:8px 0!important;page-break-inside:avoid}
  .htitle{font-size:14pt!important;font-weight:800!important;color:#000!important}
  /* 모달, 패널 숨김 */
  .ov,.mdl,.dpnl{display:none!important}
  .sb-log,.v28-week-panel,.v28-wsum{display:none!important}
  /* 동기화 로그도 인쇄 안 함 */
  
  /* v28.4.2: 모든 컨테이너 overflow 해제 + height 제한 해제 */
  .cont,.split-w,.spn,.gpn,.tpn,#v284-split-wrap,#v284-split-left,#v284-split-right,#v284-gantt-wrap{
    overflow:visible!important;
    height:auto!important;
    max-height:none!important;
    min-height:0!important;
    width:100%!important;
    display:block!important;
  }
  /* 분할 화면 좌우 모두 표시되도록 (block 대신 inline-block 또는 flex 유지) */
  #v284-split-wrap{display:flex!important;align-items:flex-start!important;page-break-inside:auto!important}
  #v284-split-left{width:30%!important;flex-shrink:0!important;display:block!important}
  #v284-split-right{flex:1!important;display:flex!important;overflow:visible!important}
  /* 간트 화면 좌우 모두 표시 */
  #v284-gantt-wrap{display:flex!important;align-items:flex-start!important;page-break-inside:auto!important}
  /* 내부 가로 스크롤 컨테이너도 모두 펼침 */
  .cont *[style*="overflow-x"],.cont *[style*="overflow-y"]{overflow:visible!important;max-width:none!important;width:auto!important}
  
  /* 표 자체는 행이 페이지 사이에서 잘리지 않도록 */
  table{width:100%!important;border-collapse:collapse!important;page-break-inside:auto!important}
  thead{display:table-header-group!important}  /* 매 페이지 헤더 반복 */
  tbody{display:table-row-group!important}
  tr{page-break-inside:avoid!important;page-break-after:auto!important}
  
  /* 색상 보존 */
  .gantt-bar,.v28-fill,.v28-bar-fill,.bdg{print-color-adjust:exact!important;-webkit-print-color-adjust:exact!important}
  
  /* 폰트 사이즈 (행 많을 때 줄여서 공간 확보) */
  .cont,.cont *{font-size:8pt!important;line-height:1.3!important}
  .wbs-tbl th,.wbs-tbl td,table th,table td{padding:2px 4px!important;white-space:nowrap!important}
  
  /* 인쇄용 헤더/푸터 */
  .v284-print-header{

function v28CalcCal(availPx){
  const MIN=6,MAX=15,BASE_W=60;
  const fitCols=Math.floor(availPx/BASE_W);
  let cols=Math.max(MIN,Math.min(MAX,fitCols));

function scheduleHealthRGB(diff){
  if(diff==null||isNaN(diff))return[148,163,184];
  const st=SCHED_HEALTH_STOPS;
  const d=Math.max(st[0][0],Math.min(st[st.length-1][0],diff));

  for(let i=0;i<st.length-1;i++){if(d>=st[i][0]&&d<=st[i+1][0]){lo=st[i];hi=st[i+1];break;}}

  return lo[1].map((c,i)=>Math.round(c+(hi[1][i]-c)*t));
}

// ★ TA 탱크 ITP 15항목 작업량 가중치 (제작 전반 무겁게, 후반 검사 가볍게)
// 자재입고~NDE(1~8) = 66 / Visual~MDR(9~15) = 34  → 1~8 완료 시 약 66%
const WT_TANK=[7,7,9,9,9,6,11,8, 6,9,5,4,4,3,3];
function wCS(w){
  // ★ v29: PM/담당자 수동 진척률 override — 모든 자동집계(자식 롤업·ITP Accept·경과율)보다 우선.
  //   ITP Accept가 되면 0%→100%로 한 번에 튀는 문제를 피하고, 실제 진행에 맞춰 직접 입력 가능.
  //   pctManual이 비어있으면(null/undefined/'') 기존 자동집계 로직 그대로.
  if(w.pctManual!=null && w.pctManual!==""){
    const pct=Math.max(0,Math.min(100,Math.round(Number(w.pctManual))||0));
    const st=w.status||(pct>=100?"완료":pct>0?"진행중":"미시작");
    const ncr=w.itpLink?cS(w.itpLink).ncr:0;   // NCR(부적합) 집계는 ITP 검사기록 그대로 유지
    return{pct,status:st,ncr};
  }
  // 자식이 있는 대단락 → 자식들의 진도율 평균(롤업)
  if(hasC(w.id)){
    const kids=childW(w.id);
    if(kids.length){
      let pct;
      if(w.wtTank && kids.length===WT_TANK.length){
        // ★ TA 탱크: 공정 가중치 적용 (검사 일정 기준 단순평균 → 실제 제작 진척 반영)
        const tot=WT_TANK.reduce((a,b)=>a+b,0);
        const sum=kids.reduce((a,k,i)=>a+wCS(k).pct*WT_TANK[i],0);
        pct=Math.round(sum/tot);
      }else{
        const sum=kids.reduce((a,k)=>a+wCS(k).pct,0);   // 재귀 (손자까지 집계)
        pct=Math.round(sum/kids.length);
      }
      const anyNcr=kids.some(k=>wCS(k).ncr>0);
      const st=w.status==="지연"?"지연":(pct===100?"완료":(pct>0||anyNcr)?"진행중":"미시작");
      return{pct,status:st,ncr:anyNcr?1:0};
    }
  }
  // 말단(소단락): ITP 연동되면 검사기록 기반
  if(w.itpLink)return cS(w.itpLink);
  // status를 기준으로 진도율 결정 (완료=100, 미시작=0, 진행중=경과율 자동 또는 pct값)
  const st=w.status||(w.pct===100?"완료":w.pct>0?"진행중":"미시작");
  let pct;
  if(st==="완료")pct=100;
  else if(st==="미시작")pct=0;
  else if(w.pct!=null)pct=w.pct;      // 진행중: 명시된 pct가 있으면 그대로 사용 (제작 공정 등)
  else if(w.s&&w.e){                   // 진행중 + 날짜만 있으면 발주일~납기일 경과율 (구매품)
    const today=new Date();
    const start=new Date(w.s), end=new Date(w.e);
    if(today<start)pct=0;             // 발주/시작 전
    else if(today>=end)pct=99;        // 납기 지남 → 입고완료 전까지 99%
    else pct=Math.round((today-start)/(end-start)*100);
    pct=Math.max(1,Math.min(99,pct)); // 진행중은 1~99% 범위
  }
  else pct=0;
  return{pct,status:st,ncr:0};
}
function wVis(){

function renumberWBS(){

  // 각 프로젝트별로 lv0=1,2,3... / lv1=N.1, N.2... 시작
  const projIds=new Set(WBS.filter(w=>w.projId).map(w=>w.projId));
  // projId 없는 WBS도 처리 (옛 데이터 호환용 — 그룹 "null"로)
  projIds.add(undefined);
  projIds.forEach(curPid=>{
    let n=0;
    for(let i=0;i<WBS.length;i++){
      if(WBS[i].projId!==curPid)continue;
      if(WBS[i].lv===0){
        n++;
        WBS[i]={...WBS[i],code:`${n}`};
        // 같은 projId의 하위 lv>0 항목들에 N.M 번호
        let c=0;
        for(let j=i+1;j<WBS.length;j++){

          if(WBS[j].lv===0)break;

        }

  });
}
function moveWBS(id,dir){
  const idx=WBS.findIndex(w=>w.id===id);if(idx===-1)return;
  const item=WBS[idx];
  if(item.lv===0){
    let be=idx+1;while(be<WBS.length&&WBS[be].lv>0)be++;
    if(dir===-1){if(idx===0)return;let ps=idx-1;while(ps>0&&WBS[ps-1].lv>0)ps--;const bl=WBS.splice(idx,be-idx);WBS.splice(ps,0,...bl);}
    else{if(be>=WBS.length)return;let ne=be+1;while(ne<WBS.length&&WBS[ne].lv>0)ne++;const bl=WBS.splice(idx,be-idx);WBS.splice(idx+(ne-be),0,...bl);}
  }else{
    let pi=idx-1;while(pi>=0&&WBS[pi].lv>=item.lv)pi--;

    const ss=pi+1,li=idx-ss,sc=pe-ss;

}

// EVMS (획득가치관리 / Earned Value Management) — v28.5
// PV(계획가치) · EV(획득가치) · SV(일정차이) · SPI(일정성과지수) + S-Curve

function evmsPlanPct(w,when){ // 대단락 계획 진척%
  let s=w.s,e=w.e;
  if(hasC(w.id)){const r=wRange(w.id); if(r){s=r.s;e=r.e;}}

  const t=when||(()=>{const d=new Date();d.setHours(0,0,0,0);return d;})();
  const sd=new Date(s),ed=new Date(e);

function evmsCalc(pid){
  const tops=WBS.filter(w=>w.projId===pid&&w.lv===0);

  });

  const dated=WBS.filter(w=>w.projId===pid&&w.s&&w.e);
  const sMin=dated.length?dated.map(w=>w.s).slice().sort()[0]:"";
  const eMax=dated.length?dated.map(w=>w.e).slice().sort().slice(-1)[0]:"";
  const curve=[];
  if(sMin&&eMax){
    const ps=new Date(sMin),pe=new Date(eMax);
    let d=new Date(ps.getFullYear(),ps.getMonth(),1);
    while(d<=pe){
      const me=new Date(d.getFullYear(),d.getMonth()+1,0);
      let pv=0,ws=0;
      tops.forEach(w=>{const wt=(w.weight!=null?w.weight:100/tops.length);const p=evmsPlanPct(w,me);pv+=wt*(p==null?0:p);ws+=wt;});
      curve.push({x:+((me-ps)/(pe-ps)*100).toFixed(1),pv:+(pv/ws).toFixed(1),label:(me.getMonth()+1)+"월",date:me.toISOString().slice(0,10)});

    }
  }

  return {tops,rows,pv:pvP,ev:evP,sv:+(evP-pvP).toFixed(1),spi:pvP>0?+(evP/pvP).toFixed(2):null,curve,todayX,sMin,eMax};
}

// v28.0 신규 모듈: 주간 자동 정리 + localStorage + JSON I/O
// ═══════════════════════════════════════════════════════════
function v28WeeklySummary(){
  if(!S.selproj)return"";
  const today=new Date();
  // v28.4.1: 현재 선택된 프로젝트의 WBS만 (projId 필터)
  const curPid=S.selproj.id;
  const items=WBS.filter(w=>w.lv>=0&&w.projId===curPid);
  // 진행 지연: 오늘 > 시작일 && 진척률 50% 미만 && 상태 != 완료
  const delays=items.filter(w=>{
    if(!w.s||!w.e)return false;
    const{pct,status}=wCS(w);
    if(status==="완료")return false;
    const sd=new Date(w.s),ed=new Date(w.e);
    if(today<sd)return false;
    // 계획 진척률 vs 실제 진척률
    const planned=Math.min(100,Math.max(0,(today-sd)/(ed-sd)*100));
    return pct!==null && (planned-pct)>=20;
  }).slice(0,30);
  // 부적합: NCR 있는 항목
  const ncrs=items.filter(w=>wCS(w).ncr>0).slice(0,30);
  // 이번주 완료: 종료일이 이번주(월~일)이고 상태 완료
  const wkStart=new Date(today);wkStart.setDate(today.getDate()-((today.getDay()+6)%7));wkStart.setHours(0,0,0,0);
  const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);wkEnd.setHours(23,59,59);
  const wkDone=items.filter(w=>{const{status}=wCS(w);if(status!=="완료")return false;if(!w.e)return false;const ed=new Date(w.e);return ed>=wkStart&&ed<=wkEnd;}).slice(0,30);
  // 차주 시작: 시작일이 다음주
  const nxStart=new Date(wkEnd);nxStart.setDate(wkEnd.getDate()+1);nxStart.setHours(0,0,0,0);
  const nxEnd=new Date(nxStart);nxEnd.setDate(nxStart.getDate()+6);nxEnd.setHours(23,59,59);
  const nxStartItems=items.filter(w=>{if(!w.s)return false;const sd=new Date(w.s);return sd>=nxStart&&sd<=nxEnd;}).slice(0,30);
  
  const fmtDate=d=>d.toISOString().slice(0,10);
  const nextMon=new Date(wkEnd);nextMon.setDate(wkEnd.getDate()+1);
  const collapsed=S.weeklyHide!==false; // 기본 접힘 → 간트 공간 확보
  const hdr=`<div class="v28-wsum-hdr" data-a="tgWeekly" style="cursor:pointer">
      <div class="v28-wsum-title">📋 주간 자동 정리${collapsed?` <span style="font-size:10px;color:#6b7280;font-weight:500">(지연 ${delays.length} · NCR ${ncrs.length} · 완료 ${wkDone.length} · 차주 ${nxStartItems.length})</span>`:''}</div>
      <div class="v28-wsum-meta">${collapsed?'▶ 펼치기':`생성: ${fmtDate(today)} · 발표: ${fmtDate(nextMon)} 월요회의　▼ 접기`}</div>
    </div>`;
  if(collapsed)return `<div class="v28-wsum" style="flex-shrink:0">${hdr}</div>`;
  return `<div class="v28-wsum" style="flex-shrink:0">
    ${hdr}
    <div class="v28-wsum-grid">

        <div class="v28-wsum-list">${wkDone.length===0?'<div class="v28-wsum-em">— 없음 —</div>':wkDone.map(w=>`<div class="v28-wsum-it">• <b>${w.code}</b> ${w.name.slice(0,18)} 100%</div>`).join("")}</div>
      </div>
      <div class="v28-wsum-sec">
        <div class="v28-wsum-sec-ttl" style="color:#3a6bb5">📅 차주 시작 (${nxStartItems.length}건)</div>
        <div class="v28-wsum-list">${nxStartItems.length===0?'<div class="v28-wsum-em">— 없음 —</div>':nxStartItems.map(w=>`<div class="v28-wsum-it">• <b>${w.code}</b> ${w.name.slice(0,18)} ${w.s.slice(5)}</div>`).join("")}</div>
      </div>
    </div>
  </div>`;
}

// v29: Firestore 자동 저장 (WBS 행/아이템을 프로젝트당 wbsData/{pid} 문서 하나로)
function v28Save(){
  if(!window.fb || !_wbsPid) return;
  const rows = WBS.filter(w=>w.projId===_wbsPid);
  const items = MITEM[_wbsPid] || [];
  fb.setDoc(fb.doc(fb.db,"wbsData",_wbsPid), {rows, items, updatedAt: Date.now()}).catch(e=>console.warn("v28Save fail",e));
  // 대단락(lv=0) 평균 진척률을 projects 문서에도 반영 — 대시보드/카드 목록의 진도율(p.progress)과 동기화
  const tops=rows.filter(w=>w.lv===0);
  const progress=tops.length?Math.round(tops.reduce((a,w)=>a+(wCS(w).pct||0),0)/tops.length):0;
  fb.setDoc(fb.doc(fb.db,"projects",_wbsPid), {progress}, {merge:true}).catch(e=>console.warn("v28Save progress sync fail",e));
}

  const payload={PROJS,WBS,MITEM,REC,PIM,ITEM_TPL:typeof ITEM_TPL!=="undefined"?ITEM_TPL:{},ts:Date.now(),ver:"v28.0",exportedAt:new Date().toISOString()};

// JSON Import
function v28Import(){
  const inp=document.createElement("input");
  inp.type="file";inp.accept=".json,application/json";
  inp.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const txt=await f.text();const d=JSON.parse(txt);
      if(!confirm(`불러오시면 현재 데이터가 교체됩니다.\n파일: ${f.name}\n계속하시겠습니까?`))return;
      if(Array.isArray(d.PROJS)){PROJS.length=0;d.PROJS.forEach(p=>PROJS.push(p));}
      if(Array.isArray(d.WBS)){WBS.length=0;d.WBS.forEach(w=>WBS.push(w));}
      if(d.MITEM){Object.keys(MITEM).forEach(k=>delete MITEM[k]);Object.assign(MITEM,d.MITEM);}
      if(d.REC){Object.keys(REC).forEach(k=>delete REC[k]);Object.assign(REC,d.REC);}
      if(d.PIM){Object.keys(PIM).forEach(k=>delete PIM[k]);Object.assign(PIM,d.PIM);}
      if(d.ITEM_TPL&&typeof ITEM_TPL!=="undefined"){Object.keys(ITEM_TPL).forEach(k=>delete ITEM_TPL[k]);Object.assign(ITEM_TPL,d.ITEM_TPL);}
      v28RecalcRange();
      addLog("📤 JSON Import 완료: "+f.name,"ok");
      R();
    }catch(err){alert("Import 실패: "+err.message);addLog("📤 Import 실패","err");}
  };
  inp.click();
}

// v28.4.17: MASTER SCHEDULE Excel 생성 (단순화 - 병합 최소화)
// xlsx-js-style 사용 — 셀 색상 + 테두리 + 안정성 우선
// ═══════════════════════════════════════════════════════════
async function v284GenerateExcel(){
  if(!S.selproj){alert("프로젝트가 선택되지 않았습니다.");return;}
  const proj=S.selproj;
  const projWBS=WBS.filter(w=>w.projId===proj.id);
  if(projWBS.length===0){alert("이 프로젝트에 WBS 항목이 없습니다.");return;}
  if(typeof XLSX==="undefined"){alert("Excel 라이브러리 로딩 중입니다.");return;}
  
  addLog(`📊 Excel 생성 시작: ${proj.no}`,"info");
  
  try{
    const dates=projWBS.filter(w=>w.s&&w.e).map(w=>[new Date(w.s),new Date(w.e)]);
    const minDate=dates.length?new Date(Math.min(...dates.map(d=>d[0]))):new Date();
    const maxDate=dates.length?new Date(Math.max(...dates.map(d=>d[1]))):new Date();
    const months=[];
    const cursor=new Date(minDate.getFullYear(),minDate.getMonth(),1);
    const endCursor=new Date(maxDate.getFullYear(),maxDate.getMonth(),1);
    while(cursor<=endCursor){months.push({y:cursor.getFullYear(),m:cursor.getMonth()+1});cursor.setMonth(cursor.getMonth()+1);}
    const dayDivisions=[4,8,12,16,20,24,28,31];
    // v28.4.30: 월말일을 행마다(월수×8회씩) 재계산하지 않도록 한 번만 계산해 재사용 — 대형 프로젝트 생성속도 개선
    const monthLastDay=months.map(mo=>new Date(mo.y,mo.m,0).getDate());
    const today=new Date();today.setHours(0,0,0,0);
    
    const fontKR=(opts={})=>({name:"맑은 고딕",sz:9,...opts});
    const center={horizontal:"center",vertical:"center",wrapText:true};
    const left={horizontal:"left",vertical:"center",wrapText:true};
    const thinB={style:"thin",color:{rgb:"888888"}};
    const mediumB={style:"medium",color:{rgb:"1A1A1A"}};
    const thickB={style:"thick",color:{rgb:"1A1A1A"}};
    const border={top:thinB,bottom:thinB,left:thinB,right:thinB};
    // v28.4.17: 외곽 강한 테두리용 헬퍼
    const borderWith=(opts={})=>({
      top:opts.top||thinB,
      bottom:opts.bottom||thinB,
      left:opts.left||thinB,
      right:opts.right||thinB
    });
    const grayFill={patternType:"solid",fgColor:{rgb:"F0F0F0"}};
    const blueFill={patternType:"solid",fgColor:{rgb:"3A7BC9"}};
    const lightBlueFill={patternType:"solid",fgColor:{rgb:"CFDCEF"}};
    const yellowFill={patternType:"solid",fgColor:{rgb:"FFF3CD"}};
    
    // ─── 컬럼 구조 (단순화: 병합 없는 DESCRIPTION) ───
    const C_NO=0,C_DESC=1,C_START=2,C_FIN=3,C_PCT=4;
    const C_MONTH_START=5;
    const C_REMARK=C_MONTH_START+months.length*8;
    const C_MEMO=C_REMARK+1;
    const totalCols=C_MEMO+1;

    // v28.4.31: 특정 날짜가 속한 일자분할 칸의 컬럼 인덱스와 그 칸 안에서의 위치(0~1)를 계산.
    // 오늘선(todayColInfo)뿐 아니라 EVMS 곡선 도형(v28.4.32)도 이 함수로 각 점의 위치를 구함.
    function dateColFrac(dateObj){
      let result=null;
      months.forEach((mo,mi)=>{
        const lastDay=monthLastDay[mi];
        dayDivisions.forEach((d,di)=>{
          const dEnd=Math.min(d,lastDay);
          const dStart=Math.min((di===0?1:dayDivisions[di-1]+1),lastDay);
          const cellStart=new Date(mo.y,mo.m-1,dStart);cellStart.setHours(0,0,0,0);
          const cellEnd=new Date(mo.y,mo.m-1,dEnd);cellEnd.setHours(23,59,59,999);
          if(cellStart<=dateObj&&dateObj<=cellEnd){
            const span=cellEnd-cellStart;
            result={col:C_MONTH_START+mi*8+di, frac: span>0?(dateObj-cellStart)/span:0};
          }
        });
      });
      return result;
    }
    // 그리드 전체 폭(일자분할 칸 개수) 기준 0~1 정규화 X 좌표. 범위 밖 날짜는 0 또는 1로 clamp.
    function dateNormX(dateObj){
      const cf=dateColFrac(dateObj);
      if(cf) return ((cf.col-C_MONTH_START)+cf.frac)/(months.length*8);
      const firstDay=new Date(months[0].y,months[0].m-1,1);
      return dateObj<firstDay?0:1;
    }
    const todayColInfo=dateColFrac(today);

    const aoa=[];
    const styles={};
    const merges=[];
    
    // R1: 타이틀 — v28.4.29 ★ 1+2행 통째 병합 시 좌상단(A1)에 텍스트 + A1 스타일 적용
    const r1=[];r1[0]="MASTER SCHEDULE";
    aoa.push(r1);
    styles["A1"]={font:fontKR({sz:24,bold:true,color:{rgb:"1A1A1A"}}),alignment:center};
    
    // R2: 빈 행 (1+2행 병합되어 A1이 보임)
    aoa.push([]);
    
    // 1행+2행 통째 세로*가로 병합 (단일 큰 영역)
    merges.push({s:{r:0,c:0},e:{r:1,c:totalCols-1}});
    
    // R3: CLIENT — v28.4.28 ② 진짜 빈 셀 (Array(N).fill("") 금지!) + ③ 우측은 마지막 컬럼
    // 핵심: 배열 인덱스로 sparse array 만들기 - 값 없는 셀은 진짜 비어있음
    const rightInfoCol=totalCols-1;  // ③ CY (마지막 컬럼)
    const r3=[];
    r3[0]=`CLIENT : ${proj.client||"-"}`;
    r3[rightInfoCol]=`CONSTRUCTOR : ㈜세종기술`;
    aoa.push(r3);
    styles["A3"]={font:fontKR({bold:true,sz:10})};
    styles[XLSX.utils.encode_cell({r:2,c:rightInfoCol})]={font:fontKR({bold:true,sz:10}),alignment:{horizontal:"right"}};
    
    // R4: PROJECT
    const r4=[];
    r4[0]=`PROJECT : ${proj.name}`;
    r4[rightInfoCol]=`Project No. : ${proj.no}`;
    aoa.push(r4);
    styles["A4"]={font:fontKR({bold:true,sz:11})};
    styles[XLSX.utils.encode_cell({r:3,c:rightInfoCol})]={font:fontKR({bold:true,sz:10}),alignment:{horizontal:"right"}};
    
    // R5: DATE / 작성 / 공기
    const r5=[];
    const todayKr=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\.\s/g,'.').replace(/\.$/,'');
    r5[0]=`DATE : ${todayKr} (REV. 1)   작성 : ${proj.pm||"김철우 부장"}`;
    const finishDate=projWBS.filter(w=>w.e).map(w=>w.e).sort().reverse()[0]||"";
    r5[rightInfoCol]=`CONSTRUCTION PERIOD : ~ ${finishDate}`;
    aoa.push(r5);
    styles["A5"]={font:fontKR({bold:true,sz:10})};
    styles[XLSX.utils.encode_cell({r:4,c:rightInfoCol})]={font:fontKR({bold:true,sz:10}),alignment:{horizontal:"right"}};
    
    aoa.push([]);  // R6 빈
    
    // R7: 컬럼 헤더
    const r7=Array(totalCols).fill("");
    r7[C_NO]="NO";r7[C_DESC]="DESCRIPTION";r7[C_START]="START";r7[C_FIN]="FINISH";r7[C_PCT]="진척률";
    months.forEach((mo,mi)=>{r7[C_MONTH_START+mi*8]=`${mo.y}년 ${String(mo.m).padStart(2,'0')}월`;});
    r7[C_REMARK]="REMARK";r7[C_MEMO]="메모";
    aoa.push(r7);
    
    // R8: 일자 헤더 — 마지막 칸은 해당 월의 실제 마지막일(28/29/30/31)로 표시
    const r8=Array(totalCols).fill("");
    months.forEach((mo,mi)=>{
      const lastDay=monthLastDay[mi];
      dayDivisions.forEach((d,di)=>{r8[C_MONTH_START+mi*8+di]=Math.min(d,lastDay);});
    });
    aoa.push(r8);
    
    // 헤더 스타일 — v28.4.17: 위/아래 medium 외곽
    const hdrTopBorder={top:mediumB,bottom:mediumB,left:thinB,right:thinB};
    const hdrTopLeftBorder={top:mediumB,bottom:mediumB,left:mediumB,right:thinB};
    const hdrTopRightBorder={top:mediumB,bottom:mediumB,left:thinB,right:mediumB};
    const hdrStyle={font:fontKR({bold:true}),alignment:center,fill:grayFill,border:hdrTopBorder};
    // C_NO은 좌측 외곽, C_MEMO는 우측 외곽
    styles[XLSX.utils.encode_cell({r:6,c:C_NO})]={...hdrStyle,border:hdrTopLeftBorder};
    styles[XLSX.utils.encode_cell({r:7,c:C_NO})]={...hdrStyle,border:hdrTopLeftBorder};
    merges.push({s:{r:6,c:C_NO},e:{r:7,c:C_NO}});
    [C_DESC,C_START,C_FIN,C_PCT,C_REMARK].forEach(c=>{
      styles[XLSX.utils.encode_cell({r:6,c:c})]=hdrStyle;
      styles[XLSX.utils.encode_cell({r:7,c:c})]={...hdrStyle};
      merges.push({s:{r:6,c:c},e:{r:7,c:c}});
    });
    styles[XLSX.utils.encode_cell({r:6,c:C_MEMO})]={...hdrStyle,border:hdrTopRightBorder};
    styles[XLSX.utils.encode_cell({r:7,c:C_MEMO})]={...hdrStyle,border:hdrTopRightBorder};
    merges.push({s:{r:6,c:C_MEMO},e:{r:7,c:C_MEMO}});
    // 월 헤더 8칸 병합
    months.forEach((mo,mi)=>{
      const sc=C_MONTH_START+mi*8;
      const ec=sc+7;
      styles[XLSX.utils.encode_cell({r:6,c:sc})]={...hdrStyle};
      for(let c=sc+1;c<=ec;c++){
        styles[XLSX.utils.encode_cell({r:6,c:c})]={fill:grayFill,border:hdrTopBorder};
      }
      merges.push({s:{r:6,c:sc},e:{r:6,c:ec}});
      dayDivisions.forEach((d,di)=>{
        styles[XLSX.utils.encode_cell({r:7,c:sc+di})]={font:fontKR({sz:8,bold:true,color:{rgb:"444444"}}),alignment:center,fill:grayFill,border:hdrTopBorder};
      });
    });
    
    // WBS 데이터 행
    projWBS.forEach((w,idx)=>{
      const{pct,status,ncr}=wCS(w);
      const fillPct=pct==null?0:pct;
      const isMain=w.lv===0;
      const r=8+idx;
      
      const row=Array(totalCols).fill("");
      row[C_NO]=isMain?(w.code||(idx+1)):"";
      row[C_DESC]=isMain?w.name:(w.lv===1?`    ${w.code} ${w.name}`:`        - ${w.name}`);
      row[C_START]=w.s||"";
      row[C_FIN]=w.e||"";
      row[C_PCT]=`${fillPct}%`;
      row[C_REMARK]=w.vendor||"";
      row[C_MEMO]=w.memo||"";
      
      // 마일스톤 셀에 ◆
      if(w.s&&w.e){
        const wEnd=new Date(w.e);
        months.forEach((mo,mi)=>{
          const lastDay=monthLastDay[mi];
          dayDivisions.forEach((d,di)=>{
            const c=C_MONTH_START+mi*8+di;
            const cellDate=new Date(mo.y,mo.m-1,Math.min(d,lastDay));
            cellDate.setHours(0,0,0,0);
            const isMilestone=isMain&&Math.abs((cellDate-wEnd)/(1000*60*60*24))<3;
            if(isMilestone)row[c]="◆";
          });
        });
      }
      aoa.push(row);
      
      // v28.4.17: 행마다 테두리 결정 (외곽 + 그룹 구분)
      // 다음 행이 대단락이면 이 행은 그룹 끝 → 아래 굵은 선
      const nextW=projWBS[idx+1];
      const isLastInGroup=!nextW||nextW.lv===0;  // 다음이 대단락(또는 끝)이면 이 행이 그룹 끝
      const isLastRow=idx===projWBS.length-1;
      const isFirstRow=idx===0;
      // 각 위치별 테두리
      const bTop=isFirstRow?mediumB:thinB;
      const bBottom=isLastRow?mediumB:(isLastInGroup?mediumB:thinB);
      const rowBorder=(leftB,rightB)=>({top:bTop,bottom:bBottom,left:leftB,right:rightB});
      const leftEdgeB=mediumB;  // 표 왼쪽 외곽
      const rightEdgeB=mediumB; // 표 오른쪽 외곽
      
      // 셀 스타일 (외곽 + 그룹 구분 반영)
      styles[XLSX.utils.encode_cell({r:r,c:C_NO})]={font:fontKR({bold:true,color:{rgb:"4A7FC1"}}),alignment:center,border:rowBorder(leftEdgeB,thinB)};
      styles[XLSX.utils.encode_cell({r:r,c:C_DESC})]={font:fontKR({sz:isMain?10:9,bold:w.lv<=1,color:{rgb:"1A1A1A"}}),alignment:left,border:rowBorder(thinB,thinB),fill:isMain?{patternType:"solid",fgColor:{rgb:"F8FAFC"}}:undefined};
      styles[XLSX.utils.encode_cell({r:r,c:C_START})]={font:fontKR({sz:8,color:{rgb:"333333"}}),alignment:center,border:rowBorder(thinB,thinB)};
      styles[XLSX.utils.encode_cell({r:r,c:C_FIN})]={font:fontKR({sz:8,color:{rgb:"333333"}}),alignment:center,border:rowBorder(thinB,thinB)};
      styles[XLSX.utils.encode_cell({r:r,c:C_PCT})]={font:fontKR({sz:9,bold:fillPct>0,color:{rgb:fillPct>0?"3A7BC9":"6B7280"}}),alignment:center,border:rowBorder(thinB,mediumB)};
      
      // 막대 셀 색칠
      if(w.s&&w.e){
        const wStart=new Date(w.s);
        const wEnd=new Date(w.e);
        const totalMs=wEnd-wStart;
        const progressEnd=new Date(wStart.getTime()+totalMs*fillPct/100);
        months.forEach((mo,mi)=>{
          const lastDay=monthLastDay[mi];
          dayDivisions.forEach((d,di)=>{
            const c=C_MONTH_START+mi*8+di;
            const dEnd=Math.min(d,lastDay);
            const dStart=Math.min((di===0?1:dayDivisions[di-1]+1),lastDay);
            const cellStart=new Date(mo.y,mo.m-1,dStart);cellStart.setHours(0,0,0,0);
            const cellEnd=new Date(mo.y,mo.m-1,dEnd);cellEnd.setHours(23,59,59,999);
            const cellDate=cellEnd; // 마일스톤/투데이 비교 기준 (셀 끝일)
            const inBar=cellEnd>=wStart&&cellStart<=wEnd;   // 막대구간↔셀구간 겹치면 칠함 (단일일도 최소 1칸)
            const inProgress=inBar&&cellStart<=progressEnd;
            const isMilestone=isMain&&Math.abs((cellDate-wEnd)/(1000*60*60*24))<3;

            let cs={border:rowBorder(thinB,thinB),alignment:center};
            if(isMilestone){
              cs.font=fontKR({sz:12,bold:true,color:{rgb:"DC2626"}});
              cs.fill=yellowFill;
            }else if(inProgress){
              cs.fill=blueFill;
            }else if(inBar){
              cs.fill=lightBlueFill;
            }
            // v28.4.31: 오늘 표시는 셀 테두리 대신 실제 도형(세로선)으로 그림 (todayColInfo, 함수 하단 참조)
            styles[XLSX.utils.encode_cell({r:r,c:c})]=cs;
          });
        });
      }else{
        for(let c=C_MONTH_START;c<C_REMARK;c++){
          styles[XLSX.utils.encode_cell({r:r,c:c})]={border:rowBorder(thinB,thinB)};
        }
      }
      
      styles[XLSX.utils.encode_cell({r:r,c:C_REMARK})]={font:fontKR({bold:true,color:{rgb:"1E40AF"}}),alignment:center,border:rowBorder(mediumB,thinB)};
      styles[XLSX.utils.encode_cell({r:r,c:C_MEMO})]={font:fontKR({color:{rgb:"1E40AF"}}),alignment:left,border:rowBorder(thinB,rightEdgeB)};
    });
    
    // NOTE 영역 — v28.4.28 ④ 진짜 빈 셀 (sparse array) 사용
    const dataEnd=8+projWBS.length;
    aoa.push([]);  // 빈 행 1개만
    const noteHdrR=dataEnd+1;
    const noteHdr=[];
    noteHdr[0]="NOTE :";
    aoa.push(noteHdr);
    styles[XLSX.utils.encode_cell({r:noteHdrR,c:0})]={font:fontKR({bold:true,sz:11})};
    
    // NOTE 본문 — sparse array (B열 등 진짜 비어있음 → 자동 오버플로 표시)
    const noteText=proj.customNote||`본 일정은 ${proj.name}의 작성 시점 기준 일정이며, 작업 변수에 따라 변경 될 수 있다.\n본 SCHEDULE는 발주처와의 협의 하에 진행한다.\n진척률은 EPC Control System의 실시간 데이터를 기준으로 산출된다.\nSCHEDULE 변경시 발주처와 협의 하에 변경한다.`;
    const noteLines=noteText.split('\n');
    noteLines.forEach((ln,ni)=>{
      const r=noteHdrR+1+ni;
      const row=[];
      row[0]=`  *  ${ln.trim()}`;
      aoa.push(row);
      styles[XLSX.utils.encode_cell({r:r,c:0})]={font:fontKR({sz:9})};
    });
    
    // 범례 — v28.4.28 sparse array
    const legR=noteHdrR+1+noteLines.length+1;
    aoa.push([]);
    const legRow=[];
    legRow[0]="범례:  ▓ = 진척 완료    ░ = 계획    | = 오늘 날짜    ◆ = 마일스톤";
    aoa.push(legRow);
    styles[XLSX.utils.encode_cell({r:legR,c:0})]={font:fontKR({bold:true,sz:9})};
    
    // 푸터 — v28.4.28 sparse array
    aoa.push([]);
    const footR=legR+2;
    const footRow=[];
    footRow[0]=`EPC Control System v28.4.29 · ㈜세종기술 품질관리부          Designed by Cwkim          생성: ${todayKr}`;
    aoa.push(footRow);
    styles[XLSX.utils.encode_cell({r:footR,c:0})]={font:fontKR({sz:8,color:{rgb:"888888"}})};
    
    // v28.4.27 ⑥ 외곽 두꺼운 테두리 — R1 ~ footR, C0 ~ totalCols-1
    // 외곽 네 변에만 thick border 적용
    const totalRows=footR+1;  // 마지막 행 (0-based 인덱스 기준 행 수)
    for(let r=0;r<totalRows;r++){
      for(let c=0;c<totalCols;c++){
        const isTop=r===0;
        const isBottom=r===totalRows-1;
        const isLeft=c===0;
        const isRight=c===totalCols-1;
        if(!(isTop||isBottom||isLeft||isRight))continue;
        const ref=XLSX.utils.encode_cell({r:r,c:c});
        const existing=styles[ref]||{};
        const existingBorder=existing.border||{};
        styles[ref]={
          ...existing,
          border:{
            top:isTop?thickB:(existingBorder.top||undefined),
            bottom:isBottom?thickB:(existingBorder.bottom||undefined),
            left:isLeft?thickB:(existingBorder.left||undefined),
            right:isRight?thickB:(existingBorder.right||undefined)
          }
        };
      }
    }
    
    // ═══ EVMS (획득가치관리) 요약 — PDF/화면과 동일 지표 ═══
    try{
    const _Ex=evmsCalc(proj.id);
    // v28.4.35: rowBorder()는 앞의 projWBS.forEach 루프 안에서만 정의되는 지역함수라
    // 여기서 부르면 ReferenceError로 매번 조용히 실패했음(EVMS 요약 테두리가 항상 안 먹힘).
    const evBorder={top:thinB,bottom:thinB,left:thinB,right:thinB};
    let evR=aoa.length;
    aoa.push([]); evR++;
    const _eh=[]; _eh[0]="■ EVMS (획득가치관리) 요약"; aoa.push(_eh);
    styles[XLSX.utils.encode_cell({r:evR,c:0})]={font:fontKR({bold:true,sz:11,color:{rgb:"1E40AF"}})}; evR++;
    aoa.push(["계획 PV",_Ex.pv+"%","실행 EV",_Ex.ev+"%","일정차이 SV",(_Ex.sv>=0?"+":"")+_Ex.sv+"%p","일정성과 SPI",(_Ex.spi==null?"-":_Ex.spi)]);
    [0,2,4,6].forEach(c=>styles[XLSX.utils.encode_cell({r:evR,c})]={font:fontKR({bold:true,sz:9,color:{rgb:"6B7280"}})});
    [1,3,5,7].forEach(c=>styles[XLSX.utils.encode_cell({r:evR,c})]={font:fontKR({bold:true,sz:10})});
    evR++;
    aoa.push([]); evR++;
    aoa.push(["코드","대단락","가중치","계획 PV","실행 EV","SV","SPI"]);
    for(let c=0;c<7;c++)styles[XLSX.utils.encode_cell({r:evR,c})]={font:fontKR({bold:true,sz:9}),fill:{fgColor:{rgb:"F0F3F8"}},border:evBorder,alignment:center};
    evR++;
    _Ex.rows.forEach(rr=>{
      aoa.push([rr.code,rr.name,rr.wt+"%",(rr.pv==null?"-":rr.pv+"%"),rr.ev+"%",(rr.sv>=0?"+":"")+rr.sv+"%p",(rr.spi==null?"-":rr.spi)]);
      for(let c=0;c<7;c++)styles[XLSX.utils.encode_cell({r:evR,c})]={font:fontKR({sz:9}),border:evBorder,alignment:c===1?left:center};
      evR++;
    });
    aoa.push([]); evR++;
    aoa.push(["월별 누적 계획(PV%)"].concat(_Ex.curve.map(p=>p.label)));
    styles[XLSX.utils.encode_cell({r:evR,c:0})]={font:fontKR({bold:true,sz:9})}; evR++;
    aoa.push(["PV%"].concat(_Ex.curve.map(p=>p.pv)));
    styles[XLSX.utils.encode_cell({r:evR,c:0})]={font:fontKR({bold:true,sz:9,color:{rgb:"1D4ED8"}})}; evR++;
    aoa.push(["EV%"].concat(_Ex.curve.map((p,j)=>j===_Ex.curve.length-1?_Ex.ev:"")));
    styles[XLSX.utils.encode_cell({r:evR,c:0})]={font:fontKR({bold:true,sz:9,color:{rgb:"16A34A"}})}; evR++;
    // 미니 S-Curve (셀 음영 — PV 누적 영역, 곡선 시각화)
    aoa.push([]); evR++;
    aoa.push(["■ S-Curve (PV 누적, 셀 음영)"].concat(_Ex.curve.map(p=>p.label)));
    styles[XLSX.utils.encode_cell({r:evR,c:0})]={font:fontKR({bold:true,sz:9})};
    for(let c=0;c<_Ex.curve.length;c++)styles[XLSX.utils.encode_cell({r:evR,c:c+1})]={font:fontKR({sz:7,color:{rgb:"6B7280"}}),alignment:{horizontal:"center"}};
    evR++;
    [100,90,80,70,60,50,40,30,20,10].forEach(L=>{
      const row=[L+"%"]; _Ex.curve.forEach(()=>row.push(""));
      aoa.push(row);
      styles[XLSX.utils.encode_cell({r:evR,c:0})]={font:fontKR({sz:8,color:{rgb:"9CA3AF"}}),alignment:{horizontal:"right"}};
      _Ex.curve.forEach((p,j)=>{ if(p.pv>=L-5) styles[XLSX.utils.encode_cell({r:evR,c:j+1})]={fill:{fgColor:{rgb:"1D4ED8"}}}; });
      evR++;
    });
    }catch(e){console.warn('EVMS Excel skip',e);}

    // 시트 변환
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    
    // 스타일 적용
    Object.keys(styles).forEach(ref=>{
      if(!ws[ref])ws[ref]={t:"s",v:""};
      ws[ref].s=styles[ref];
    });
    
    // v28.4.27 ⑥ 인쇄 영역 — A1 ~ 마지막 셀 (예: A1:CY47)
    // v28.4.35: EVMS 요약이 totalRows 계산 이후에 aoa에 추가되므로, 실제 마지막 행은
    // aoa.length 기준으로 잡아야 함(안 그러면 EVMS 요약이 인쇄영역 밖으로 잘림)
    const finalRowCount=Math.max(totalRows,aoa.length);
    const printEndRef=XLSX.utils.encode_cell({r:finalRowCount-1,c:totalCols-1});
    ws['!ref']=`A1:${printEndRef}`;
    // 인쇄 설정: 한 페이지에 가로 맞춤
    ws['!pageSetup']={
      orientation:'landscape',
      paperSize:8,  // A3
      fitToWidth:1,
      fitToHeight:0,  // 가로만 1페이지, 세로는 자유
      scale:80
    };
    ws['!printOptions']={horizontalCentered:true,verticalCentered:false};
    ws['!margins']={left:0.3,right:0.3,top:0.4,bottom:0.4,header:0.2,footer:0.2};
    // 인쇄 영역 명시
    // 인쇄 영역 명시는 wb 선언 후 (아래에서)
    
    // 컬럼 너비 — DESCRIPTION을 넓게 (병합 없음)
    const colWidths=[];
    colWidths.push({wch:5});
    colWidths.push({wch:44});  // DESCRIPTION (줄바꿈 방지 — 넉넉히)
    colWidths.push({wch:12});
    colWidths.push({wch:12});
    colWidths.push({wch:7});
    for(let i=0;i<months.length*8;i++)colWidths.push({wch:3.2});
    colWidths.push({wch:18});
    colWidths.push({wch:32});
    ws['!cols']=colWidths;
    
    ws['!rows']=[{hpt:20},{hpt:30},{hpt:16},{hpt:16},{hpt:16},{hpt:6},{hpt:22},{hpt:18}];
    for(let i=0;i<projWBS.length;i++)ws['!rows'].push({hpt:22});
    
    ws['!merges']=merges;
    
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"MASTER SCHEDULE");
    
    // v28.4.27 ⑥ 인쇄 영역 정의 (Workbook 레벨)
    wb.Workbook=wb.Workbook||{};
    wb.Workbook.Names=wb.Workbook.Names||[];
    wb.Workbook.Names.push({
      Name:'_xlnm.Print_Area',
      Ref:`'MASTER SCHEDULE'!$A$1:$${XLSX.utils.encode_col(totalCols-1)}$${finalRowCount}`,
      Sheet:0
    });
    
    const todayStrFile=new Date().toISOString().slice(0,10).replace(/-/g,'');
    const fileName=`${proj.no}_MASTER_SCHEDULE_${todayStrFile}.xlsx`;

    // v28.4.31: 오늘 날짜를 셀 테두리가 아닌 실제 도형(가는 세로선)으로 정확히 그리기 위해
    // xlsx(zip) 파일을 직접 후처리해 DrawingML(xdr:sp) 도형을 삽입.
    // twoCellAnchor로 열 인덱스에 앵커링하면 Excel이 !cols에 설정한 실제 폭으로 위치를 계산해주므로
    // 앞선 컬럼들의 누적폭은 신경 쓸 필요 없고, 대상 칸 안에서의 오프셋(colOffEmu)만 정확하면 됨.
    // wchToPx 계수(×7+6)는 Excel COM 자동화로 실측 검증한 값(wch 3.2/5/44 3개 지점 모두 정확히 일치).
    // v28.4.32: PDF의 EVMS S-Curve(파란 PV/초록 EV 꺾은선)를 Excel에도 동일하게 그림.
    // custGeom(자유도형)으로 다각선을 그리고, 좌표는 dateNormX()로 그리드 칸 위치와 정확히 맞춤.
    let curveShapesXml='';
    try{
      const _ExCurve=evmsCalc(proj.id);
      if(_ExCurve.sMin&&_ExCurve.eMax&&_ExCurve.curve.length){
        const curveRowStart=8, curveRowEnd=8+projWBS.length;
        const toPt=(normX,pct)=>`<a:pt x="${Math.round(Math.max(0,Math.min(1,normX))*100000)}" y="${Math.round((100-pct)/100*100000)}"/>`;
        const pvPts=[toPt(dateNormX(new Date(_ExCurve.sMin)),0)].concat(_ExCurve.curve.map(p=>toPt(dateNormX(new Date(p.date)),p.pv)));
        const pvPath=`<a:path w="100000" h="100000"><a:moveTo>${pvPts[0]}</a:moveTo>${pvPts.slice(1).map(pt=>`<a:lnTo>${pt}</a:lnTo>`).join('')}</a:path>`;
        const curveShape=(id,name,color,path)=>`<xdr:twoCellAnchor editAs="absolute">
<xdr:from><xdr:col>${C_MONTH_START}</xdr:col><xdr:colOff>0</xdr:colOff><xdr:row>${curveRowStart}</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:from>
<xdr:to><xdr:col>${C_REMARK}</xdr:col><xdr:colOff>0</xdr:colOff><xdr:row>${curveRowEnd}</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:to>
<xdr:sp macro="" textlink="">
<xdr:nvSpPr><xdr:cNvPr id="${id}" name="${name}"/><xdr:cNvSpPr/></xdr:nvSpPr>
<xdr:spPr>
<a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/></a:xfrm>
<a:custGeom><a:avLst/><a:gdLst/><a:ahLst/><a:cxnLst/><a:rect l="0" t="0" r="0" b="0"/><a:pathLst>${path}</a:pathLst></a:custGeom>
<a:noFill/>
<a:ln w="19050"><a:solidFill><a:srgbClr val="${color}"/></a:solidFill></a:ln>
</xdr:spPr>
<xdr:txBody><a:bodyPr/><a:lstStyle/><a:p/></xdr:txBody>
</xdr:sp>
<xdr:clientData/>
</xdr:twoCellAnchor>`;
        curveShapesXml=curveShape(3,'EVMS_PV_Curve','1D4ED8',pvPath);
        const todayInRange=today>=new Date(_ExCurve.sMin)&&today<=new Date(_ExCurve.eMax);
        if(todayInRange){
          const evPath=`<a:path w="100000" h="100000"><a:moveTo>${toPt(dateNormX(new Date(_ExCurve.sMin)),0)}</a:moveTo><a:lnTo>${toPt(dateNormX(today),_ExCurve.ev)}</a:lnTo></a:path>`;
          curveShapesXml+=curveShape(4,'EVMS_EV_Curve','16A34A',evPath);
        }
      }
    }catch(e){console.warn('[SJ FLOW] EVMS 곡선 도형 생성 실패:',e);}

    let wroteWithLine=false;
    if((todayColInfo||curveShapesXml) && typeof JSZip!=="undefined"){
      try{
        const buf=XLSX.write(wb,{type:'array',bookType:'xlsx'});
        const zip=await JSZip.loadAsync(buf);
        const wchToPx=wch=>Math.floor(wch*7+6);
        const EMU_PER_PX=9525;
        let todayLineXml='';
        if(todayColInfo){
          const colPx=wchToPx(colWidths[todayColInfo.col].wch);
          const colOffEmu=Math.max(0,Math.min(colPx-2,Math.round(todayColInfo.frac*colPx)))*EMU_PER_PX;
          const lineWidthEmu=2*EMU_PER_PX;
          todayLineXml=`<xdr:twoCellAnchor editAs="absolute">
<xdr:from><xdr:col>${todayColInfo.col}</xdr:col><xdr:colOff>${colOffEmu}</xdr:colOff><xdr:row>0</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:from>
<xdr:to><xdr:col>${todayColInfo.col}</xdr:col><xdr:colOff>${colOffEmu+lineWidthEmu}</xdr:colOff><xdr:row>${totalRows}</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:to>
<xdr:sp macro="" textlink="">
<xdr:nvSpPr><xdr:cNvPr id="2" name="TodayLine"/><xdr:cNvSpPr/></xdr:nvSpPr>
<xdr:spPr>
<a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/></a:xfrm>
<a:prstGeom prst="rect"><a:avLst/></a:prstGeom>
<a:solidFill><a:srgbClr val="DC2626"/></a:solidFill>
<a:ln><a:noFill/></a:ln>
</xdr:spPr>
<xdr:txBody><a:bodyPr/><a:lstStyle/><a:p/></xdr:txBody>
</xdr:sp>
<xdr:clientData/>
</xdr:twoCellAnchor>`;
        }
        const drawingXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<xdr:wsDr xmlns:xdr="http://schemas.openxmlformats.org/drawingml/2006/spreadsheetDrawing" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">
${todayLineXml}${curveShapesXml}
</xdr:wsDr>`;
        zip.file('xl/drawings/drawing1.xml',drawingXml);
        zip.file('xl/worksheets/_rels/sheet1.xml.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/drawing" Target="../drawings/drawing1.xml"/></Relationships>`);
        let ct=await zip.file('[Content_Types].xml').async('string');
        ct=ct.replace('</Types>','<Override PartName="/xl/drawings/drawing1.xml" ContentType="application/vnd.openxmlformats-officedocument.drawing+xml"/></Types>');
        zip.file('[Content_Types].xml',ct);
        let sheetXml=await zip.file('xl/worksheets/sheet1.xml').async('string');
        sheetXml=sheetXml.replace('</worksheet>','<drawing r:id="rId1"/></worksheet>');
        zip.file('xl/worksheets/sheet1.xml',sheetXml);
        const outBlob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        const a=document.createElement('a');
        const url=URL.createObjectURL(outBlob);
        a.href=url;a.download=fileName;document.body.appendChild(a);a.click();
        setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
        wroteWithLine=true;
      }catch(e){
        console.warn('[SJ FLOW] 오늘선 도형 삽입 실패, 기본 방식으로 저장:',e);
      }
    }
    if(!wroteWithLine) XLSX.writeFile(wb,fileName);

  }catch(e){

async function v284GeneratePDF(){
  if(!S.selproj){alert("프로젝트가 선택되지 않았습니다.");return;}
  
  const proj=S.selproj;
  const projWBS=WBS.filter(w=>w.projId===proj.id);
  if(projWBS.length===0){alert("이 프로젝트에 WBS 항목이 없습니다.");return;}
  
  if(typeof window.jspdf==="undefined"||typeof window.html2canvas==="undefined"){
    alert("PDF 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.\n(인터넷 연결을 확인하세요)");
    return;
  }
  
  addLog(`📄 PDF 생성 시작: ${proj.no}`,"info");
  
  // 임시 PDF 컨테이너 생성 (오프스크린)
  const pdfContainer=document.createElement('div');
  pdfContainer.id='v284-pdf-container';
  pdfContainer.style.cssText='position:absolute;left:-9999px;top:0;width:1600px;background:#fff;padding:0;font-family:"Malgun Gothic","맑은 고딕",sans-serif';
  
  // 일정 범위 계산
  const dates=projWBS.filter(w=>w.s&&w.e).map(w=>[new Date(w.s),new Date(w.e)]);
  const allStarts=dates.map(d=>d[0]);
  const allEnds=dates.map(d=>d[1]);
  const minDate=allStarts.length?new Date(Math.min(...allStarts)):new Date();
  const maxDate=allEnds.length?new Date(Math.max(...allEnds)):new Date();
  
  // 월 단위 헤더 (회사 양식은 월별로 4·8·12·16·20·24·28·31 8칸씩)
  const months=[];
  const cursor=new Date(minDate.getFullYear(),minDate.getMonth(),1);
  const endCursor=new Date(maxDate.getFullYear(),maxDate.getMonth(),1);
  while(cursor<=endCursor){
    months.push({y:cursor.getFullYear(),m:cursor.getMonth()+1});
    cursor.setMonth(cursor.getMonth()+1);
  }
  
  // 회사 양식: 월별로 8개 일자 컬럼 (4, 8, 12, 16, 20, 24, 28, 31/30/28...)
  // v28.4.25 ★ 라벨만 동적 - 좌표계는 v28.4.22 방식 유지 (헤더 8칸 균등 + dayPos는 5/4~12/31 기준)
  function getMonthLastDay(y,m){return new Date(y,m,0).getDate();}
  
  // v28.4.30 ★ 헤더/그리드는 "월마다 8칸 균등폭"인데 예전 dayPos()는 실제 경과일수 기준이라
  // 두 좌표계가 어긋나서(30일짜리 달이 껴있을수록 밀림) 오늘선·막대가 그리드와 안 맞는 버그가 있었음.
  // → dayPos()도 동일하게 "월 8칸 그리드" 좌표계로 계산해 완전히 일치시킴.
  const monthIndexOf=(y,m)=>months.findIndex(mo=>mo.y===y&&mo.m===m);
  const dayPos=d=>{
    const dt=new Date(d);
    const y=dt.getFullYear(),m=dt.getMonth()+1,day=dt.getDate();
    const mi=monthIndexOf(y,m);
    if(mi<0){
      const beforeRange=new Date(y,m-1,day)<new Date(months[0].y,months[0].m-1,1);
      return beforeRange?0:100;
    }
    const lastDay=getMonthLastDay(y,m);
    const edges=[0,4,8,12,16,20,24,28,lastDay];
    let i=0;while(i<edges.length-1&&day>edges[i+1])i++;
    const lo=edges[i],hi=edges[i+1];
    const frac=hi>lo?(day-lo)/(hi-lo):0;
    const posWithinMonth=(i+frac)/8;
    return Math.max(0,Math.min(100,(mi+posWithinMonth)/months.length*100));
  };

  // 오늘 위치
  const today=new Date();today.setHours(0,0,0,0);
  const _rangeStartM=months[0],_rangeEndM=months[months.length-1];
  const rangeStart=new Date(_rangeStartM.y,_rangeStartM.m-1,1);
  const rangeEnd=new Date(_rangeEndM.y,_rangeEndM.m-1,getMonthLastDay(_rangeEndM.y,_rangeEndM.m),23,59,59,999);
  const todayPos=(today>=rangeStart&&today<=rangeEnd)?dayPos(today):-1;

  // ═══ EVMS S-Curve (PDF: canvas로 직접 묘화 — 선 굵기 정확, 왜곡 없음) ═══
  let _pvArr=[], _evArr=[];
  try{
    const _Ep=evmsCalc(proj.id);
    const _sMinP=projWBS.filter(w=>w.s).map(w=>w.s).sort()[0]||"";
    const _todayP=dayPos(new Date().toISOString().slice(0,10));
    if(_sMinP)_pvArr.push([dayPos(_sMinP),0]);
    _Ep.curve.forEach(p=>_pvArr.push([dayPos(p.date),p.pv]));
    _evArr=[[_sMinP?dayPos(_sMinP):0,0],[_todayP,_Ep.ev]];
  }catch(e){console.warn('EVMS PDF curve skip',e);}
  
  // 헤더 정보
  const todayStr=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\.\s/g,'.').replace(/\.$/,'');
  const periodStr=projWBS.length>0?`${projWBS.filter(w=>w.s).map(w=>w.s).sort()[0]||""} ~ ${projWBS.filter(w=>w.e).map(w=>w.e).sort().reverse()[0]||""}`:"";
  const finishDate=projWBS.filter(w=>w.e).map(w=>w.e).sort().reverse()[0]||"";
  
  // WBS 행 HTML — 회사 양식 그대로 (대단락 흰배경/굵음 + 소단락 흰배경 + 들여쓰기 "-")
  // v28.4.5: 행 단위 빨간선 제거 → 전체 SVG로 EVMS 곡선 그림
  // 각 행의 진척 X 위치 계산 (막대 시작점 + 막대길이 × 진척률)
  const rowHeight=30;
  const evmsPoints=[];  // [{x: 진척%위치, y: 행 인덱스}] EVMS S곡선 그리기용
  // v28.4.30: 격자선은 모든 행에서 동일한 X 위치라 행마다 반복 생성할 필요가 없음.
  // 예전엔 행마다 (월수×8)개씩 그려서 대형 프로젝트는 격자선만 수천 개 DOM이 생겨 html2canvas가 느려졌음.
  // → 표 전체 높이를 덮는 오버레이 하나로 한 번만 그림 (idx===0 행에 배치, overflow:visible로 아래까지 노출).
  const gridlinesHTML=months.map((mo,mIdx)=>[4,8,12,16,20,24,28,31].map((d,dIdx)=>`<div style="position:absolute;left:${((mIdx*8+dIdx+1)/(months.length*8))*100}%;top:0;bottom:0;width:1px;background:#e8e8e8"></div>`).join('')).join('');

  const wbsRowsHTML=projWBS.map((w,idx)=>{
    const isMain=w.lv===0;
    const{pct,status,ncr}=wCS(w);
    const fillPct=pct==null?0:pct;

    // v28.4.5: EVMS 곡선용 — 막대 위에서 진척률 위치 (% 좌표)

    const hasBar=w.s&&w.e;

    // 회사 양식 막대 색: 단일 파랑 (#3a7bc9)

        <div class="v284-bar-outer" data-idx="${idx}" data-fillpct="${fillPct}" style="position:absolute;left:${left}%;top:6px;width:${Math.max(width,0.9)}%;height:12px;background:${barBg};border:1px solid ${barColor};box-sizing:border-box;z-index:2">

      </div>
    </div>
  `;
  
  document.body.appendChild(pdfContainer);

  // EVMS S-Curve를 canvas에 직접 묘화 (append 후 실제 픽셀 크기 확보 → 선 굵기 정확)
  try{
    const _cv=pdfContainer.querySelector('#evms-scurve-cv');
    if(_cv&&_pvArr.length){
      const W=_cv.offsetWidth||_cv.clientWidth||800, H=_cv.offsetHeight||_cv.clientHeight||600;
      _cv.width=W; _cv.height=H;
      const ctx=_cv.getContext('2d');
      const X=x=>x/100*W, Y=p=>H-(p/100*H);
      const drawLine=(arr,color)=>{ if(arr.length<2)return; ctx.beginPath(); ctx.moveTo(X(arr[0][0]),Y(arr[0][1])); for(let i=1;i<arr.length;i++)ctx.lineTo(X(arr[i][0]),Y(arr[i][1])); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke(); };
      drawLine(_pvArr,'#1d4ed8'); drawLine(_evArr,'#16a34a');
    }
  }catch(e){console.warn('EVMS canvas draw skip',e);}
  
  
  // 한 박자 쉬고 (SVG 렌더링 보장)
  await new Promise(r=>setTimeout(r,50));
  
  try{
    // 캡쳐
    const canvas=await html2canvas(pdfContainer,{
      scale:1.5,
      backgroundColor:'#ffffff',
      logging:false,
      useCORS:true
    });
    
    // jsPDF — A3 가로
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a3'});
    
    const pageWidth=420;
    const pageHeight=297;
    const margin=8;
    const usableWidth=pageWidth-margin*2;
    const usableHeight=pageHeight-margin*2;
    
    const imgWidth=canvas.width;
    const imgHeight=canvas.height;
    
    // v28.4.5: 페이지 분할 — 표 행이 잘리지 않도록 행 단위로 자르기
    // 그러기 위해 행 위치(픽셀)를 사전에 측정해놓음
    let drawWidth=usableWidth;
    let drawHeight=drawWidth*(imgHeight/imgWidth);
    
    if(drawHeight<=usableHeight){
      // 1페이지에 정상 출력
      pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',margin,margin,drawWidth,drawHeight);
    }else{
      // ─── 여러 페이지 분할 ───
      // 각 페이지에 들어갈 캔버스 픽셀 높이 계산
      const pageImgHeight=Math.floor(usableHeight*(imgWidth/drawWidth));
      
      // v28.4.5: 행 단위 자르기 - tbody 내 각 tr의 위치 측정
      // canvas는 html2canvas scale=1.5라서 픽셀이 1.5배
      const ctnRect=pdfContainer.getBoundingClientRect();
      const tbody=document.getElementById('v284-master-tbody');
      const rows=tbody?tbody.querySelectorAll('tr'):[];
      // 각 행 끝 Y 위치 (캔버스 픽셀 단위)
      const scale=1.5;
      const rowEndsPx=Array.from(rows).map(tr=>{
        const r=tr.getBoundingClientRect();
        return Math.round((r.bottom-ctnRect.top)*scale);
      });
      
      let pageNum=1;
      let sourceY=0;
      
      while(sourceY<imgHeight){
        if(pageNum>1)pdf.addPage();
        
        // 이 페이지 끝 = sourceY + pageImgHeight 까지의 행 중 마지막으로 완전히 들어가는 행의 bottom
        let pageEnd=sourceY+pageImgHeight;
        // 마지막 행보다 더 가면 끝까지
        if(pageEnd>=imgHeight){
          pageEnd=imgHeight;
        }else{
          // 행 안에서 잘리지 않게: sourceY ~ pageEnd 사이에 끝나는 행 중 가장 마지막
          const validRowEnds=rowEndsPx.filter(re=>re>sourceY&&re<=pageEnd);
          if(validRowEnds.length>0){
            pageEnd=validRowEnds[validRowEnds.length-1];
          }
          // 아무 행도 안 들어가면 그냥 자름 (안전장치)
        }
        
        const sliceHeight=pageEnd-sourceY;
        const tempCanvas=document.createElement('canvas');
        tempCanvas.width=imgWidth;
        tempCanvas.height=sliceHeight;
        const ctx=tempCanvas.getContext('2d');
        ctx.fillStyle='#ffffff';
        ctx.fillRect(0,0,tempCanvas.width,tempCanvas.height);
        ctx.drawImage(canvas,0,sourceY,imgWidth,sliceHeight,0,0,imgWidth,sliceHeight);
        
        const pageDrawHeight=(sliceHeight/imgWidth)*usableWidth;
        pdf.addImage(tempCanvas.toDataURL('image/jpeg',0.95),'JPEG',margin,margin,usableWidth,pageDrawHeight);
        pdf.setFontSize(8);pdf.setTextColor(107,114,128);
        pdf.text(`Page ${pageNum}`,pageWidth-margin,pageHeight-3,{align:'right'});
        
        sourceY=pageEnd;
        pageNum++;
        
        // 무한루프 방지
        if(pageNum>50)break;
      }
    }
    
    const todayStrFile=new Date().toISOString().slice(0,10).replace(/-/g,'');
    const fileName=`${proj.no}_MASTER_SCHEDULE_${todayStrFile}.pdf`;
    pdf.save(fileName);
    
    addLog(`✅ PDF 생성 완료: ${fileName}`,"ok");
  }catch(e){
    console.error("PDF 생성 오류:",e);
    alert("PDF 생성 중 오류가 발생했습니다.\n"+(e.message||""));
    addLog(`❌ PDF 생성 실패: ${e.message}`,"err");
  }finally{
    if(pdfContainer&&pdfContainer.parentNode){
      pdfContainer.parentNode.removeChild(pdfContainer);
    }
  }
}

// v29: SJ FLOW(index.html)와 같은 Firestore를 직접 읽어서 프로젝트 메타 + WBS/아이템을 불러옴.
// 같은 오리진이라 index.html에서 로그인한 Firebase Auth 세션이 이 iframe에도 자동으로 이어짐.
let _wbsPid = null;
function subscribeWbsData(pid){
  fb.onSnapshot(fb.doc(fb.db, "wbsData", pid), snap => {
    // hasPendingWrites=true면 방금 이 창에서 쓴 내용이 로컬에 반영된 것뿐이라 무시
    // (그대로 다시 적용하면 저장→갱신→저장… 무한루프가 생김)
    if (snap.metadata.hasPendingWrites) return;
    if (!snap.exists()) return;
    const d = snap.data();
    WBS.length = 0; (d.rows||[]).forEach(w => WBS.push(w));
    MITEM[pid] = d.items || [];
    v28RecalcRange();
    R();
  }, err => console.warn("[SJ FLOW] wbsData 구독 실패:", err.message));
}
(async function initFromFirestore(){
  const qs = new URLSearchParams(window.location.search);
  const view = qs.get("view");
  const pid = qs.get("pid");
  // canEdit=0 이면 읽기전용 모드 (편집 버튼 숨김)
  if (qs.get("canEdit") === "0") document.body.classList.add("sjp-readonly");
  // v29: 부서 스케줄 진입 — ?dept=<부서> 필터, ?deptMode=1 부서 자체 업무 컨테이너
  _deptFilter = qs.get("dept") || null;
  _deptMode = qs.get("deptMode") === "1";

  // ★ 화면 모드(mv)는 URL의 ?view= 값만으로 즉시(동기적으로) 확정한다.
  if (view === "mm") S = {...S, mv:"mm", mp: pid ? "items" : "projects", mproj:null};
  else S = {...S, mv:"wbs", wp:"wbs"};
  R();

  try {
    // v29: Firebase 모듈 스크립트(window.fb)가 아직 로드 전이면 대기 — 클래식 스크립트가 먼저 실행되는 레이스 방지
    let _fbTries=0; while(!window.fb && _fbTries++<100){ await new Promise(r=>setTimeout(r,50)); }
    if(!window.fb){ console.warn("[SJ FLOW] Firebase 미로드 — 초기화 중단"); return; }
    // 인증 준비 대기 — index.html에서 이미 로그인돼 있으면 거의 즉시 확인됨
    await new Promise(resolve => { const unsub = fb.onAuthStateChanged(fb.auth, u => { unsub(); resolve(u); }); });

    // v29: 부서 자체 업무 컨테이너 — 실제 프로젝트 문서가 없으므로 조회 건너뛰고 pid를 그대로 컨테이너로 사용
    if (_deptMode && pid) {
      const synth = { id: pid, no: (_deptFilter||"부서")+" 자체 업무", name: (_deptFilter||"부서")+" 자체 업무", client:"", po:"", pm:"" };
      const idx = PROJS.findIndex(p => p.id === pid);
      if (idx >= 0) PROJS[idx] = synth; else PROJS.unshift(synth);
      S = {...S, selproj:synth, wsel:null};
      _wbsPid = pid;
      subscribeWbsData(_wbsPid);
      R();
      return;
    }

    let targetProj = null;
    if (pid) {
      const snap = await fb.getDoc(fb.doc(fb.db, "projects", pid));
      if (snap.exists()) {
        const d = snap.data();
        // d.pm은 Firebase UID라 화면/PDF/Excel에 그대로 찍으면 알아볼 수 없는 문자열이 나옴 — users 컬렉션에서 실제 이름으로 변환
        let pmName = d.pm || "";
        if (pmName) {
          try {
            const uSnap = await fb.getDoc(fb.doc(fb.db, "users", pmName));
            if (uSnap.exists() && uSnap.data().name) pmName = uSnap.data().name;
          } catch(e) { console.warn("[SJ FLOW] PM 이름 조회 실패:", e.message); }
        }
        targetProj = { id: pid, no: d.code, name: d.name, client: d.client||"", po: d.po||"", pm: pmName };
        const idx = PROJS.findIndex(p => p.id === pid);
        if (idx >= 0) PROJS[idx] = targetProj; else PROJS.unshift(targetProj);
      }
    }

    if (targetProj) {
      if (view === "mm") S = {...S, mproj:targetProj, mp:"items", mitem:null, mitpId:null};
      else S = {...S, selproj:targetProj, wsel:null};
      _wbsPid = targetProj.id;
      subscribeWbsData(_wbsPid);
    }
    R();
  } catch(e) { console.warn("[SJ FLOW] Firestore 초기화 실패:", e.message); }
})();

          });

            maker: it.maker || "",
            status: "대기",

          });

        mgr: wbsItem.mgr || "",
        s: wbsItem.s || "",
        e: wbsItem.e || "",
        status: wbsItem.status || "미시작",
        itpLink: wbsItem.itpLink || null,
        lv: wbsItem.lv != null ? wbsItem.lv : 0,
        projId: S.selproj.id,
        vendor: wbsItem.vendor || "",
        memo: wbsItem.memo || ""
      };
      WBS.push(newW);
      if (typeof renumberWBS === "function") renumberWBS();
      if (typeof v28RecalcRange === "function") v28RecalcRange();
      addLog("🔗 WBS 추가 (외부): " + newW.name, "ok");
      _notify(); us({});
      return newId;
    },

    // 검사 결과
    getInspections: () => {
      if (!S.selproj) return {};
      const out = {};
      (MITEM[S.selproj.id] || []).forEach(it => {
        if (REC[it.id]) out[it.id] = { item: {...it}, records: {...REC[it.id]} };
      });
      return out;
    },
    getAcceptedItems: () => {
      // result === "Accept" 인 검사 항목만 모은 리스트 (단계 9: QA Doc Generator 자동 import용)
      if (!S.selproj) return [];
      const acc = [];
      (MITEM[S.selproj.id] || []).forEach(it => {
        if (!REC[it.id]) return;
        const tpl = getTPL(it.id);
        const tids = [];
        Object.entries(REC[it.id]).forEach(([tid, r]) => {
          if (r.result === "Accept") {
            const tp = tpl.find(t => t.id === tid);
            tids.push({
              tid: tid,
              item: tp ? tp.item : "",
              crit: r.criteria || (tp ? tp.crit : ""),
              ph: tp ? tp.ph : 1,
              actual: r.actual || ""
            });
          }
        });
        if (tids.length > 0) acc.push({ iid: it.id, item: {...it}, accepted: tids });
      });
      return acc;
    },

    // 문서 번호 표준 생성 (외부 도구가 사용)
    generateDocNo: (projNo, type, seq) => {
      const t = String(type||"DOC").toUpperCase();
      const s = String(seq||1).padStart(3, "0");
      return (projNo||"SJ") + "-" + t + "-" + s;
    },

    // 자식 창 topbar (자식이 자기 화면 갱신용, EPC는 무시)
    renderTopbar: () => {},

    // 변경 감지 리스너
    onChange: (cb) => { if (typeof cb === "function") _listeners.push(cb); },

    // ── Phase 3 슬롯 (현재는 비활성) ──
    parseWorkOrder: () => { throw new Error("Phase 3 — Cowork 워크오더 자동분석 대기 중"); },
    sendItpMail: (recipient, subject, body) => {
      // 부장님 워크플로우 단계 4: 임시저장만 (메일 API는 Phase 3)
      const drafts = JSON.parse(localStorage.getItem("sjp_mail_drafts") || "[]");
      drafts.unshift({
        recipient: recipient || "cwshin@sejong-21c.com",
        subject: subject || "ITP 작성 요청",
        body: body || "",
        savedAt: new Date().toISOString(),
        status: "draft"
      });
      if (drafts.length > 50) drafts.length = 50;
      localStorage.setItem("sjp_mail_drafts", JSON.stringify(drafts));
      addLog("📧 ITP 메일 임시저장 (Phase 3 API 대기)", "info");
      return { ok: true, mode: "draft", count: drafts.length };
    },
    getMailDrafts: () => JSON.parse(localStorage.getItem("sjp_mail_drafts") || "[]"),
    uploadInspectionPhoto: () => { throw new Error("Phase 3 — Mobile Inspection 대기 중"); },
    tallyManday: () => { throw new Error("Phase 3 — Manday Tracker 대기 중"); }
  };

  // ── 변경 알림 + 자식 창용 전역 노출 ──
  function _notify(){ _listeners.forEach(cb => { try { cb(); } catch(e){ console.error("[SJP]", e); } }); }
  function _exposeGlobals(){
    window.EPC_PROJECT = window.SJP.bridge.getProject();
    window.EPC_ITEMS = window.SJP.bridge.getItems();
    window.EPC_DOC_NO_GENERATOR = window.SJP.bridge.generateDocNo;
    window.EPC_INSPECTOR_MASTER = null; // Phase 3
    window.WPS_LIST = null;              // Phase 3
    window.WELDER_LIST = null;           // Phase 3
  }
  _exposeGlobals();
  // 250ms 주기 자동 갱신 (자식 창이 항상 최신 데이터 볼 수 있게)
  setInterval(_exposeGlobals, 250);

  // ── 자식 창에서 데이터 전송 후 EPC 복귀 시 자동 갱신 ──
  window.addEventListener("focus", () => {
    _exposeGlobals();
    if (typeof R === "function") R();
  });

  // ── 헤더 인라인 sejong-platform 버튼 (분할 버튼 그룹 옆) ──
  // v0.7.3 ★ 비활성화 — SJ FLOW 사이드바에서 동일 기능 접근 가능하므로 중복 제거
  // (코드는 보존, attachToHeader만 no-op으로 무력화)
  let _dropdown = null;

  function attachToHeader() {
    // v0.7.3: 헤더 버튼 부착 비활성화 (SJ FLOW 통합 후 중복)
    // 혹시 이전에 부착된 잔존 버튼·드롭다운 있으면 제거
    const oldBtn = document.querySelector("#sjp-hdr-btn");
    if (oldBtn && oldBtn.parentNode) oldBtn.parentNode.removeChild(oldBtn);
    const oldDrop = document.querySelector("#sjp-dropdown");
    if (oldDrop && oldDrop.parentNode) oldDrop.parentNode.removeChild(oldDrop);
    return false;
  }

  function _attachToHeader_LEGACY_DISABLED() {
    const thdr = document.querySelector(".thdr");
    if (!thdr) return false;
    if (thdr.querySelector("#sjp-hdr-btn")) return true; // 이미 부착됨

    // 분할/트리/간트 그룹 찾기 (vb 클래스 버튼들의 부모)
    const vbBtn = thdr.querySelector(".vb");
    const splitGroup = vbBtn ? vbBtn.parentNode : null;

    const btn = document.createElement("button");
    btn.id = "sjp-hdr-btn";
    btn.type = "button";
    btn.textContent = "🏢 Sejong-Platform +";
    btn.title = "Sejong-Platform 도구 메뉴";
    btn.style.cssText = [
      "padding:4px 10px",
      "background:#4a7fc1",
      "color:#fff",
      "border:none",
      "border-radius:5px",
      "font-size:11px",
      "font-weight:600",
      "cursor:pointer",
      "margin-left:8px",
      "margin-right:4px",
      "white-space:nowrap"
    ].join(";");
    btn.onclick = (e) => {
      e.stopPropagation();
      toggleDropdown();
    };

    // 분할 그룹 바로 다음 위치 (즉 트리/간트 옆, + 추가 앞)에 삽입
    if (splitGroup && splitGroup.parentNode === thdr) {
      if (splitGroup.nextSibling) {
        thdr.insertBefore(btn, splitGroup.nextSibling);
      } else {
        thdr.appendChild(btn);
      }
    } else {
      // 분할 그룹 못 찾으면 thdr 끝에 부착
      thdr.appendChild(btn);
    }
    return true;
  }

  function toggleDropdown() {
    if (_dropdown) {
      closeDropdown();
      return;
    }
    const btn = document.getElementById("sjp-hdr-btn");
    if (!btn) return;
    const rect = btn.getBoundingClientRect();
    _dropdown = document.createElement("div");
    _dropdown.id = "sjp-dropdown";
    _dropdown.style.cssText = [
      "position:fixed",
      "top:" + (rect.bottom + 5) + "px",
      "left:" + rect.left + "px",
      "z-index:9999",
      "background:#fff",
      "border:1.5px solid #4a7fc1",
      "border-radius:8px",
      "box-shadow:0 4px 14px rgba(74,127,193,0.18)",
      "padding:6px",
      "font-family:'Segoe UI',Arial,sans-serif",
      "font-size:11px",
      "min-width:185px"
    ].join(";");
    _dropdown.innerHTML =
      '<button id="sjp-btn-itp" style="display:block;width:100%;text-align:left;padding:6px 9px;margin:2px 0;border:none;background:#eef3fb;color:#1a2332;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500">📋 ITP Builder 열기</button>' +
      '<button id="sjp-btn-qadoc" style="display:block;width:100%;text-align:left;padding:6px 9px;margin:2px 0;border:none;background:#f0eeff;color:#1a2332;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500">📄 QA Doc Generator 열기</button>' +
      '<button id="sjp-btn-mail" style="display:block;width:100%;text-align:left;padding:6px 9px;margin:2px 0;border:none;background:#fff8e6;color:#1a2332;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500">✉️ ITP 작성 메일 임시저장</button>' +
      '<div style="height:1px;background:#e4e7ec;margin:5px 2px"></div>' +
      '<button id="sjp-btn-reset" style="display:block;width:100%;text-align:left;padding:6px 9px;margin:2px 0;border:none;background:#fee2e2;color:#7c1d1d;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500">🔄 데모 데이터 초기화</button>' +
      '<button id="sjp-btn-home" style="display:block;width:100%;text-align:left;padding:6px 9px;margin:2px 0;border:none;background:#f3f4f6;color:#1a2332;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500">🏠 메인 메뉴</button>';
    document.body.appendChild(_dropdown);
    btn.textContent = "🏢 Sejong-Platform −";

    // 메뉴 핸들러 연결
    document.getElementById("sjp-btn-itp").onclick = () => { closeDropdown(); openTool("ITP Builder", "../itp-builder/index.html"); };
    document.getElementById("sjp-btn-qadoc").onclick = () => { closeDropdown(); openTool("QA Doc Generator", "../qa-doc-generator/index.html"); };
    document.getElementById("sjp-btn-mail").onclick = () => { closeDropdown(); openMailDialog(); };
    document.getElementById("sjp-btn-reset").onclick = () => {
      closeDropdown();
      const ok = confirm(
        "⚠️ 데모 데이터 초기화\n\n" +
        "다음 데이터를 모두 삭제하고 페이지를 새로고침합니다:\n\n" +
        "• EPC Control (WBS · ITP · 검사기록 · 사용자 입력 프로젝트)\n" +
        "• ITP Builder (작성 중인 ITP)\n" +
        "• QA Doc Generator (작성 중인 문서)\n" +
        "• ITP 메일 임시저장함\n\n" +
        "계속하시겠습니까?"
      );
      if (!ok) return;
      try {
        localStorage.removeItem("epc_control_v28_state");
        localStorage.removeItem("sjp_itp_builder_v1");
        localStorage.removeItem("sjp_qa_doc_generator_v1");
        localStorage.removeItem("sjp_mail_drafts");
      } catch(e){}
      alert("✅ 초기화 완료 — 페이지를 새로고침합니다.");
      window.location.reload();
    };
    document.getElementById("sjp-btn-home").onclick = () => {
      closeDropdown();
      if (confirm("메인 메뉴로 이동하시겠습니까?\n저장하지 않은 작업이 있다면 먼저 JSON 백업하세요.")) {
        window.location.href = "../../../index.html";
      }
    };

    // 외부 클릭 시 닫기
    setTimeout(() => document.addEventListener("click", closeOnOutside, true), 30);
  }

  function closeDropdown() {
    if (_dropdown && _dropdown.parentNode) _dropdown.parentNode.removeChild(_dropdown);
    _dropdown = null;
    document.removeEventListener("click", closeOnOutside, true);
    const btn = document.getElementById("sjp-hdr-btn");
    if (btn) btn.textContent = "🏢 Sejong-Platform +";
  }

  function closeOnOutside(e) {
    if (!_dropdown) return;
    if (e.target.closest && (e.target.closest("#sjp-dropdown") || e.target.closest("#sjp-hdr-btn"))) return;
    closeDropdown();
  }

  function openTool(label, relativeUrl) {
    if (!S.selproj) {
      alert("⚠️ 먼저 좌측 사이드바에서 프로젝트를 선택해주세요.\n선택된 프로젝트 정보가 외부 도구로 전달됩니다.");
      return;
    }
    _exposeGlobals();
    const ex = _childWindows[label];
    if (ex && !ex.closed) { ex.focus(); return; }
    const child = window.open(relativeUrl, "sjp_" + label.replace(/\s/g,"_"),
      "width=1280,height=900,scrollbars=yes,resizable=yes,toolbar=no,menubar=no,location=no");
    if (!child) {
      alert("⚠️ 팝업이 차단되었습니다.\n브라우저 주소창 우측의 팝업 차단 해제 후 다시 시도해주세요.");
      return;
    }
    _childWindows[label] = child;
    addLog("🔗 " + label + " 열림 — 프로젝트 [" + S.selproj.no + "]", "ok");
  }

  function openMailDialog() {
    if (!S.selproj) {
      alert("⚠️ 먼저 프로젝트를 선택해주세요.");
      return;
    }
    const recipient = prompt("받는 사람 이메일:", "cwshin@sejong-21c.com");
    if (!recipient) return;
    const subject = prompt("메일 제목:", "[ITP 작성 요청] " + S.selproj.no + " " + (S.selproj.name||""));
    if (!subject) return;
    const itemsList = (MITEM[S.selproj.id] || []).map(it => "• " + it.tagNo + " (" + it.type + ")").join("\n");
    const body =
      "신채완 과장님,\n\n" +
      "프로젝트 " + S.selproj.no + " (" + (S.selproj.name||"") + ") 의 ITP 작성을 요청드립니다.\n\n" +
      "[프로젝트 정보]\n" +
      "• 고객사: " + (S.selproj.client||"-") + "\n" +
      "• PO: " + (S.selproj.po||"-") + "\n\n" +
      "[검사 대상 아이템]\n" +
      (itemsList || "(아직 등록된 아이템 없음 — Manufacture Manager에서 먼저 등록 필요)") + "\n\n" +
      "ITP Builder로 작성 후 EPC Control로 전송 부탁드립니다.\n\n" +
      "— 김철우 부장\n  ㈜세종기술 품질관리부";
    const r = window.SJP.bridge.sendItpMail(recipient, subject, body);
    if (r.ok) {
      alert(
        "✅ 메일 임시저장 완료\n\n" +
        "받는 사람: " + recipient + "\n" +
        "제목: " + subject + "\n" +
        "보관함: 총 " + r.count + "건\n\n" +
        "※ 실제 메일 자동발송 API는 Phase 3에서 연결 예정입니다.\n" +
        "현재는 브라우저 localStorage에 임시 저장됩니다."
      );
    }
  }

  // v0.7.3: 헤더 버튼 비활성화 — 폴링 중단 + 기존 부착 잔존물 1회 제거만
  attachToHeader();
  // setInterval(attachToHeader, 300);  // 비활성화: SJ FLOW 사이드바 통합

  addLog("🚀 v28.5 bridge 활성화 (SJ FLOW 사이드바 통합)", "ok");
  addLog("📌 외부 도구는 SJ FLOW 좌측 사이드바에서 접근 (헤더 + 버튼 제거)", "info");
})();
</script></body></html>
