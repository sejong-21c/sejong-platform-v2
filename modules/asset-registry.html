<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>자산 관리 대장 · 세종기술</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, collection, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCmGyObjPd20Qf1MX0XAijYzSR4VitrjRg",
    authDomain: "sejong-platform.firebaseapp.com",
    projectId: "sejong-platform",
    storageBucket: "sejong-platform.firebasestorage.app",
    messagingSenderId: "884301297710",
    appId: "1:884301297710:web:82b2e065119f7c5d9d87bf",
    measurementId: "G-8LJDWYVJ5G"
  };
  const fbApp = initializeApp(firebaseConfig);
  window.fb = { auth: getAuth(fbApp), db: getFirestore(fbApp), doc, getDoc, getDocs, setDoc, deleteDoc, collection, onSnapshot, writeBatch };
</script>
<style>
:root {
  --bg: #F5F7FA; --card: #FFFFFF; --card-soft: #F8FAFC;
  --border: #E5E8EE; --border-strong: #D0D5DD;
  --ink-1: #0B1220; --ink-2: #475569; --ink-3: #94A3B8;
  --accent: #1E4E8C; --accent-tint: #E9EEF7;
  --critical: #DC2626; --critical-tint: #FEE2E2;
  --warning: #EA580C; --warning-tint: #FFEDD5;
  --healthy: #16A34A; --healthy-tint: #DCFCE7;
  --goal: #7C3AED; --goal-tint: #EDE9FE;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Pretendard Variable','Pretendard','Malgun Gothic',-apple-system,sans-serif;
  background: var(--bg); color: var(--ink-1);
  font-variant-numeric: tabular-nums;
  line-height: 1.5;
  padding: 20px;
  overflow-y: auto;
}
.wrap { max-width: 1280px; margin: 0 auto; }
.mod-head { display: flex; align-items: flex-end; justify-content: space-between; padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 16px; gap: 20px; flex-wrap: wrap; }
.mod-head .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.mod-head .mod-title { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; margin: 0; }
.mod-head .mod-sub { font-size: 12px; color: var(--ink-2); margin: 3px 0 0; }
.mod-head-actions { display: flex; gap: 6px; align-items: center; }
.btn { font-size: 12.5px; font-weight: 600; padding: 7px 14px; border-radius: 5px; border: 1px solid var(--border-strong); background: var(--card); color: var(--ink-1); cursor: pointer; }
.btn:hover:not(:disabled) { background: var(--accent-tint); border-color: var(--accent); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: #163B6E; }
.btn-danger { background: var(--critical); color: #fff; border-color: var(--critical); }
.btn-danger:hover:not(:disabled) { background: #B91C1C; }
.btn-sm { padding: 4px 10px; font-size: 11px; }

.tabs { display: flex; gap: 4px; margin-bottom: 14px; border-bottom: 1px solid var(--border); }
.tab { padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--ink-2); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab:hover { color: var(--ink-1); }
.tab.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
.tab .cnt { font-size: 10.5px; color: var(--ink-3); font-weight: 600; margin-left: 4px; }
.tab.on .cnt { color: var(--accent); }
.tab .lock-lbl { font-size: 9.5px; color: var(--ink-3); font-weight: 600; margin-left: 4px; border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fill,minmax(160px,1fr)); gap: 10px; margin-bottom: 14px; }
.kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.kpi .k { font-size: 10.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 6px; }
.kpi .v { font-size: 22px; font-weight: 700; color: var(--ink-1); letter-spacing: -0.02em; line-height: 1.1; }
.kpi .sub { font-size: 11px; color: var(--ink-2); margin-top: 2px; }

.filter-bar { display: flex; gap: 10px; align-items: center; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-bar input.search { flex: 1; min-width: 220px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 5px; background: var(--card-soft); color: var(--ink-1); font-size: 13px; }
.filter-bar select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--card-soft); color: var(--ink-1); font-size: 12.5px; min-width: 110px; }
.filter-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 600; padding: 4px 10px; border: 1px solid var(--border); border-radius: 20px; background: var(--card-soft); color: var(--ink-2); cursor: pointer; }
.filter-chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }

.table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead { background: var(--card-soft); }
th, td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
th { text-align: left; color: var(--ink-3); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
tbody tr { cursor: pointer; transition: background .1s; }
tbody tr:hover { background: var(--card-soft); }
tbody tr:last-child td { border-bottom: none; }
td.code { font-weight: 700; color: var(--accent); font-family: 'SF Mono',Consolas,monospace; font-size: 12px; white-space: nowrap; }
td.b { font-weight: 600; }
td.mono { font-family: 'SF Mono',Consolas,monospace; font-size: 11px; word-break: break-all; }
td.sw { font-size: 10.5px; color: var(--ink-3); line-height: 1.4; max-width: 200px; }

.pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.02em; white-space: nowrap; }
.pill.type-desk { background: var(--accent-tint); color: var(--accent); }
.pill.type-lap  { background: var(--goal-tint); color: var(--goal); }
.pill.type-tab  { background: #FCE7F3; color: #9D174D; }
.pill.type-mini { background: #FEF3C7; color: #92400E; }
.pill.stat-active    { background: var(--healthy-tint); color: var(--healthy); }
.pill.stat-retired   { background: #E2E8F0; color: #475569; }
.pill.stat-aged      { background: var(--warning-tint); color: var(--warning); }
.pill.stat-retireRec { background: var(--critical-tint); color: var(--critical); }
.pill.stat-lost      { background: var(--critical-tint); color: var(--critical); }
.pill.cat-CAD      { background: var(--goal-tint); color: var(--goal); }
.pill.cat-한글     { background: var(--accent-tint); color: var(--accent); }
.pill.cat-MSOFFICE { background: var(--healthy-tint); color: var(--healthy); }
.pill.cat-WINDOWS  { background: #FCE7F3; color: #9D174D; }
.pill.cat-EZPDF    { background: var(--warning-tint); color: var(--warning); }

.sw-list { display: flex; flex-wrap: wrap; gap: 3px; }
.sw-tag { font-size: 9.5px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: var(--card-soft); border: 1px solid var(--border); color: var(--ink-2); }
.sw-tag.ok { background: var(--healthy-tint); color: var(--healthy); border-color: transparent; }
.sw-tag.view { background: #EFF6FF; color: #1E40AF; border-color: transparent; }
.sw-tag.no { background: #FEF2F2; color: #DC2626; border-color: transparent; opacity: 0.6; }

.section-note { font-size: 11.5px; color: var(--ink-3); padding: 10px 12px; background: var(--card-soft); border: 1px dashed var(--border); border-radius: 6px; margin-top: 12px; }
.section-note b { color: var(--accent); }
.perm-note { font-size: 11.5px; color: var(--warning); padding: 8px 12px; background: var(--warning-tint); border-radius: 6px; margin-top: 10px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--ink-3); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .title { font-size: 15px; font-weight: 700; color: var(--ink-2); margin-bottom: 6px; }
.empty-state .desc { font-size: 12.5px; margin-bottom: 16px; }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 14px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.stat-card .title { font-size: 12px; font-weight: 700; color: var(--ink-2); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.stat-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; font-size: 12.5px; }
.stat-row .lbl { color: var(--ink-2); }
.stat-row .bar-wrap { flex: 1; margin: 0 12px; background: var(--card-soft); height: 6px; border-radius: 3px; overflow: hidden; }
.stat-row .bar { height: 100%; background: var(--accent); }
.stat-row .val { font-weight: 700; min-width: 32px; text-align: right; }

/* Modal */
.modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal-mask.on { display: flex; }
.modal { background: var(--card); border-radius: 10px; width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,.15); }
.modal .m-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--card); z-index: 1; }
.modal .m-head h3 { font-size: 15px; font-weight: 700; color: var(--accent); }
.modal .m-body { padding: 20px; }
.modal .m-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; gap: 8px; position: sticky; bottom: 0; background: var(--card); }
.close-btn { background: transparent; border: none; font-size: 22px; color: var(--ink-3); cursor: pointer; line-height: 1; padding: 4px 8px; }
.close-btn:hover { color: var(--ink-1); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg.full { grid-column: 1 / -1; }
.fg label { font-size: 10.5px; color: var(--ink-3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.fg input, .fg select, .fg textarea { padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--card-soft); color: var(--ink-1); font-size: 12.5px; font-family: inherit; }
.fg textarea { min-height: 60px; resize: vertical; }
.fg.readonly input { background: var(--bg); color: var(--ink-2); font-family: 'SF Mono',Consolas,monospace; }

.linked-block { margin-top: 16px; padding: 12px 14px; background: var(--card-soft); border-radius: 6px; }
.linked-block .head { font-size: 10.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; margin-bottom: 8px; }
.linked-item { display: grid; grid-template-columns: 130px 1fr; padding: 4px 0; font-size: 11.5px; border-bottom: 1px dashed var(--border); }
.linked-item:last-child { border-bottom: none; }
.linked-item .k { color: var(--ink-2); font-weight: 600; }
.linked-item .v { color: var(--ink-1); font-family: 'SF Mono',Consolas,monospace; font-size: 11px; word-break: break-all; }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--ink-1); color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 12.5px; font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,.2); z-index: 200; opacity: 0; transform: translateY(10px); transition: all .2s; }
.toast.on { opacity: 1; transform: translateY(0); }
.toast.err { background: var(--critical); }

@media (max-width: 900px) {
  .kpi-row { grid-template-columns: repeat(2,1fr); }
  .form-grid { grid-template-columns: 1fr; }
  td.sw { max-width: 120px; }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="mod-head">
    <div>
      <div class="eyebrow">총무부 · Asset Registry</div>
      <h1 class="mod-title">🖥️ 자산 관리 대장 <span style="font-size:12px;color:var(--ink-3);font-weight:400;" id="verBadge">v1.0</span></h1>
      <p class="mod-sub">PC · 노트북 · 소프트웨어 라이선스 통합 관리 · 자동 채번(SJPC-XX) · Firestore 실시간</p>
    </div>
    <div class="mod-head-actions">
      <button class="btn" id="btnExcel" title="현재 화면(탭·필터 반영)을 Excel로 저장" onclick="exportExcel()">📥 Excel</button>
      <button class="btn" id="btnPdf" title="현재 화면을 PDF로 인쇄" onclick="exportPdf()">📄 PDF</button>
      <button class="btn btn-primary" id="btnNew" onclick="openDeviceModal()">+ 신규 자산</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="devices" onclick="switchTab('devices')">🖥️ PC / 노트북 <span class="cnt" id="cntDevices">0</span></div>
    <div class="tab" data-tab="licenses" data-license-only onclick="switchTab('licenses')">🔑 라이선스 <span class="cnt" id="cntLicenses">0</span> <span class="lock-lbl">🔒 총무부·슈퍼</span></div>
    <div class="tab" data-tab="stats" onclick="switchTab('stats')">📊 통계</div>
  </div>

  <div id="tabDevices">
    <div class="kpi-row" id="kpiRow"></div>
    <div class="filter-bar">
      <input class="search" id="searchInput" type="text" placeholder="🔍 관리번호 · 모델명 · 사용자 · 부서 · 시리얼 검색..." oninput="applyFilter()" />
      <select id="fType" onchange="applyFilter()"><option value="">전체 유형</option><option value="desktop">Desktop</option><option value="laptop">Laptop</option><option value="tablet">Tablet</option><option value="mini">Mini PC</option></select>
      <select id="fDept" onchange="applyFilter()"><option value="">전체 부서</option></select>
      <select id="fLoc" onchange="applyFilter()"><option value="">전체 위치</option><option value="사무실">사무실</option><option value="현장">현장</option><option value="인도네시아">인도네시아</option></select>
      <select id="fStatus" onchange="applyFilter()"><option value="">전체 상태</option><option value="active">사용중</option><option value="aged">노후 (7년+)</option><option value="retireRec">폐기 추천 (10년+)</option><option value="retired">폐기</option><option value="lost">유실</option></select>
    </div>
    <div class="table-wrap" id="deviceTableWrap"></div>
    <div class="section-note" id="permNote" style="display:none;">
      🔒 <b>라이선스 정보는 총무부·슈퍼관리자·임원만 조회 가능</b>합니다. 소프트웨어 목록만 표시되며 Serial/제품키는 접근 불가.
    </div>
  </div>

  <div id="tabLicenses" style="display:none;">
    <div class="filter-bar">
      <input class="search" id="licSearch" type="text" placeholder="🔍 프로그램·사용PC·사용자·시리얼 검색..." oninput="renderLicenses()" />
      <select id="fLicCat" onchange="renderLicenses()">
        <option value="">전체 카테고리</option>
        <option value="CAD">CAD</option>
        <option value="한글">한글</option>
        <option value="MSOFFICE">MS OFFICE</option>
        <option value="WINDOWS">WINDOWS</option>
        <option value="EZPDF">EZ PDF</option>
      </select>
    </div>
    <div class="table-wrap" id="licTableWrap"></div>
  </div>

  <div id="tabStats" style="display:none;">
    <div class="stat-grid" id="statGrid"></div>
  </div>

</div>

<!-- Device modal -->
<div class="modal-mask" id="devModal" onclick="if(event.target===this)closeDeviceModal()">
  <div class="modal">
    <div class="m-head">
      <h3 id="devModalTitle">🖥️ 자산 상세</h3>
      <button class="close-btn" onclick="closeDeviceModal()">×</button>
    </div>
    <div class="m-body">
      <div class="form-grid">
        <div class="fg readonly"><label>관리번호</label><input id="dfCode" /></div>
        <div class="fg"><label>유형</label><select id="dfType"><option value="desktop">Desktop</option><option value="laptop">Laptop</option><option value="tablet">Tablet</option><option value="mini">Mini PC</option></select></div>
        <div class="fg"><label>구매년도</label><input id="dfYear" type="text" /></div>
        <div class="fg"><label>구입처</label><input id="dfVendor" /></div>
        <div class="fg"><label>비품명</label><input id="dfItem" placeholder="Computer / 노트북 등" /></div>
        <div class="fg"><label>모델명</label><input id="dfModel" /></div>
        <div class="fg"><label>규격 / 형식</label><input id="dfSpec" placeholder="Desktop / Note book / Tablet" /></div>
        <div class="fg"><label>사용자 (관리책임자)</label><input id="dfUser" /></div>
        <div class="fg"><label>사용부서</label><input id="dfDept" list="deptList" /></div>
        <datalist id="deptList"><option>임원</option><option>관리</option><option>재무</option><option>총무부</option><option>기술부</option><option>영업부</option><option>품질관리부</option><option>구매부</option><option>생산부</option><option>안전관리부</option><option>현장시공</option><option>원자력사업부</option><option>해외사업부</option><option>현장</option></datalist>
        <div class="fg"><label>위치</label><select id="dfLoc"><option>사무실</option><option>현장</option><option>인도네시아</option></select></div>
        <div class="fg"><label>상태 <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink-3);">(사용중·노후·폐기추천은 구매년도로 자동 판정)</span></label><select id="dfStatus"><option value="active">자동 (구매년도 기준)</option><option value="retired">폐기 (수동)</option><option value="lost">유실 (수동)</option></select></div>
        <div class="fg full"><label>비고</label><textarea id="dfNote"></textarea></div>
      </div>
      <div class="form-grid" style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--border);">
        <div class="fg full"><label style="color:var(--accent);">설치 소프트웨어</label></div>
        <div class="fg"><label>Windows</label><input id="dfSwWin" /></div>
        <div class="fg"><label>CAD</label><input id="dfSwCad" /></div>
        <div class="fg"><label>Solid Edge</label><input id="dfSwSe" /></div>
        <div class="fg"><label>MS Office</label><input id="dfSwMso" /></div>
        <div class="fg"><label>한글</label><input id="dfSwHangul" /></div>
        <div class="fg"><label>PDF</label><input id="dfSwPdf" /></div>
      </div>
      <div class="linked-block" id="linkedLicenses" data-license-only></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-danger btn-sm" id="btnDelete" onclick="deleteDevice()">🗑 삭제</button>
      <div style="display:flex;gap:6px;">
        <button class="btn" onclick="closeDeviceModal()">취소</button>
        <button class="btn btn-primary" onclick="saveDevice()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- License modal -->
<div class="modal-mask" id="licModal" onclick="if(event.target===this)closeLicenseModal()">
  <div class="modal">
    <div class="m-head">
      <h3 id="licModalTitle">🔑 라이선스 상세</h3>
      <button class="close-btn" onclick="closeLicenseModal()">×</button>
    </div>
    <div class="m-body">
      <div class="form-grid">
        <div class="fg"><label>카테고리</label><select id="lfCat"><option>CAD</option><option>한글</option><option>MSOFFICE</option><option>WINDOWS</option><option>EZPDF</option><option>기타</option></select></div>
        <div class="fg"><label>프로그램명</label><input id="lfName" /></div>
        <div class="fg"><label>취득년도</label><input id="lfYear" /></div>
        <div class="fg"><label>유지기간</label><input id="lfMaint" placeholder="영구 / 1년 / ..." /></div>
        <div class="fg"><label>구입처</label><input id="lfVendor" /></div>
        <div class="fg"><label>사용PC (SJPC-XX)</label><input id="lfDevice" placeholder="SJPC-XX" /></div>
        <div class="fg"><label>사용자</label><input id="lfUser" /></div>
        <div class="fg"><label>Serial 라벨</label><input id="lfSerialLbl" placeholder="Serial No / 인증번호 / 품번" /></div>
        <div class="fg full"><label>Serial / 제품키</label><input id="lfSerialVal" /></div>
        <div class="fg full"><label>비고</label><textarea id="lfNote"></textarea></div>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn btn-danger btn-sm" onclick="deleteLicense()">🗑 삭제</button>
      <div style="display:flex;gap:6px;">
        <button class="btn" onclick="closeLicenseModal()">취소</button>
        <button class="btn btn-primary" onclick="saveLicense()">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────── 상태 ───────────────────────
const params = new URLSearchParams(location.search);
const fullAccess = params.get('full') === '1';

let state = {
  devices: [],
  licenses: [],
  loading: true,
  tab: 'devices',
  editingDeviceId: null,
  editingLicenseId: null,
  filter: { q: '', type: '', dept: '', loc: '', status: '' },
  licFilter: { q: '', cat: '' },
};

// 접근 제한: fullAccess가 아니면 라이선스 UI 요소 숨김
if (!fullAccess) {
  document.querySelectorAll('[data-license-only]').forEach(el => el.style.display = 'none');
  const note = document.getElementById('permNote');
  if (note) note.style.display = 'block';
}

// ─────────────────────── 유틸 ───────────────────────
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', err);
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2500);
}
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function typeName(t) { return {desktop:'Desktop', laptop:'Laptop', tablet:'Tablet', mini:'Mini PC'}[t] || t; }
function typeClass(t) { return {desktop:'type-desk', laptop:'type-lap', tablet:'type-tab', mini:'type-mini'}[t] || 'type-desk'; }
function statusName(s) { return {active:'사용중', aged:'노후', retireRec:'폐기 추천', retired:'폐기', lost:'유실'}[s] || s; }
function statusClass(s) { return `stat-${s || 'active'}`; }
// 구매년도 기준 자동 상태 산정 — 부장 요청: 7년+ 노후, 10년+ 폐기 추천.
// 저장된 상태가 retired/lost면 우선. 아니면 나이에서 계산.
function effectiveStatus(d) {
  if (d.status === 'retired' || d.status === 'lost') return d.status;
  const py = parseInt(d.purchaseYear, 10);
  if (!py) return d.status || 'active';
  const age = new Date().getFullYear() - py;
  if (age >= 10) return 'retireRec';
  if (age >= 7)  return 'aged';
  return 'active';
}

// SW 태그: 정품/비정품/뷰어/X 판정
function swTag(label, value) {
  if (!value || value === 'X' || value === 'x' || value === 'x ') return `<span class="sw-tag no">${label} X</span>`;
  const v = value.toString();
  if (/뷰어|view/i.test(v)) return `<span class="sw-tag view">${label} 뷰어</span>`;
  if (/비정품/.test(v)) return `<span class="sw-tag no">${label} 비정품</span>`;
  return `<span class="sw-tag ok">${label}</span>`;
}
function swSummaryCell(sw) {
  if (!sw) return '';
  return `<div class="sw-list">
    ${swTag('WIN', sw.windows)}
    ${swTag('CAD', sw.cad)}
    ${sw.solidEdge && sw.solidEdge !== 'X' ? swTag('SE', sw.solidEdge) : ''}
    ${swTag('MSO', sw.msOffice)}
    ${swTag('한글', sw.hangul)}
    ${swTag('PDF', sw.pdf)}
  </div>`;
}

// ─────────────────────── Firestore 로드 ───────────────────────
async function waitFb() {
  for (let i = 0; i < 60; i++) {
    if (window.fb && window.fb.db) return window.fb;
    await new Promise(r => setTimeout(r, 100));
  }
  throw new Error('Firebase not ready');
}
async function boot() {
  try {
    const fb = await waitFb();
    // t_devices, t_licenses 실시간 구독
    fb.onSnapshot(fb.collection(fb.db, 't_devices'), (snap) => {
      state.devices = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.loading = false;
      render();
    }, (err) => {
      console.error('[asset] devices snapshot error', err);
      state.loading = false;
      state.devices = [];
      render();
      toast('자산 로드 실패: ' + err.message, true);
    });
    if (fullAccess) {
      fb.onSnapshot(fb.collection(fb.db, 't_licenses'), (snap) => {
        state.licenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
      }, (err) => console.error('[asset] licenses snapshot error', err));
    }
  } catch (err) {
    console.error('[asset] boot failed', err);
    state.loading = false;
    render();
  }
}
boot();

// ─────────────────────── 렌더 ───────────────────────
function render() {
  document.getElementById('cntDevices').textContent = state.devices.filter(d => effectiveStatus(d) !== 'retired').length;
  document.getElementById('cntLicenses').textContent = state.licenses.length;
  populateDeptFilter();
  renderKpi();
  renderDevices();
  if (fullAccess) renderLicenses();
  if (state.tab === 'stats') renderStats();
}

function populateDeptFilter() {
  const sel = document.getElementById('fDept');
  const cur = sel.value;
  const depts = [...new Set(state.devices.map(d => d.useDept).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">전체 부서</option>' + depts.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
  sel.value = cur;
}

function renderKpi() {
  const eff = d => effectiveStatus(d);
  const active     = state.devices.filter(d => eff(d) === 'active').length;
  const aged       = state.devices.filter(d => eff(d) === 'aged').length;
  const retireRec  = state.devices.filter(d => eff(d) === 'retireRec').length;
  const retired    = state.devices.filter(d => d.status === 'retired' || d.status === 'lost').length;
  const remote     = state.devices.filter(d => d.location === '현장' || d.location === '인도네시아').length;
  const desk       = state.devices.filter(d => d.type === 'desktop').length;
  const lap        = state.devices.filter(d => d.type === 'laptop').length;
  const total      = state.devices.filter(d => eff(d) !== 'retired' && eff(d) !== 'lost').length;
  const curYear    = new Date().getFullYear();
  const html = `
    <div class="kpi"><div class="k">전체 자산</div><div class="v">${total}</div><div class="sub">Desktop ${desk} · Laptop ${lap}</div></div>
    <div class="kpi"><div class="k">사용 중</div><div class="v">${active}</div><div class="sub">7년 미만</div></div>
    <div class="kpi"><div class="k">노후 (7년+)</div><div class="v" style="color:var(--warning);">${aged}</div><div class="sub">${curYear-9}~${curYear-7}년 구매</div></div>
    <div class="kpi"><div class="k">폐기 추천 (10년+)</div><div class="v" style="color:var(--critical);">${retireRec}</div><div class="sub">${curYear-10}년 이전 구매</div></div>
    <div class="kpi"><div class="k">현장·인도네시아</div><div class="v">${remote}</div><div class="sub">외부 위치</div></div>
    <div class="kpi"><div class="k">폐기·유실</div><div class="v" style="color:var(--ink-3);">${retired}</div><div class="sub">이력 보존</div></div>
    ${fullAccess ? `<div class="kpi"><div class="k">라이선스</div><div class="v">${state.licenses.length}</div><div class="sub">CAD·한글·MSO·WIN·PDF</div></div>` : ''}
  `;
  document.getElementById('kpiRow').innerHTML = html;
}

function renderDevices() {
  const wrap = document.getElementById('deviceTableWrap');
  if (state.loading) {
    wrap.innerHTML = `<div class="empty-state"><div class="spinner"></div><div>로드 중...</div></div>`;
    return;
  }
  const filtered = filteredDevices();
  if (state.devices.length === 0) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="icon">🖥️</div>
      <div class="title">자산 대장이 비어있습니다</div>
      <div class="desc">엑셀 데이터를 가져와 시작하거나 새 자산을 등록하세요.</div>
      ${fullAccess ? `<button class="btn btn-primary" onclick="importSeed()">📥 엑셀 초기 데이터 가져오기 (54 devices + 92 licenses)</button>` : ''}
    </div>`;
    return;
  }
  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div class="desc">검색 결과가 없습니다.</div></div>`;
    return;
  }
  const rows = filtered.map(d => {
    const eff = effectiveStatus(d);
    const isRet = eff === 'retired' || eff === 'lost';
    const codeStyle = isRet ? 'color:var(--ink-3);text-decoration:line-through;' : '';
    const rowStyle = isRet ? 'color:var(--ink-3);' : '';
    return `<tr onclick="openDeviceModal('${d.id}')" style="${rowStyle}">
      <td class="code" style="${codeStyle}">${esc(d.code || '')}</td>
      <td><span class="pill ${typeClass(d.type)}">${typeName(d.type)}</span></td>
      <td>${esc(d.purchaseYear || '')}</td>
      <td class="b">${esc(d.model || '')}${d.note ? ` <span style="font-size:10px;color:var(--ink-3);">· ${esc(d.note)}</span>` : ''}</td>
      <td>${esc(d.userName || '─')}</td>
      <td>${esc(d.useDept || '')}</td>
      <td>${esc(d.location || '')}</td>
      <td class="sw">${swSummaryCell(d.softwareInstalled)}</td>
      <td><span class="pill ${statusClass(eff)}">${statusName(eff)}</span></td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table>
    <thead><tr>
      <th style="width:96px;">번호</th>
      <th style="width:82px;">유형</th>
      <th style="width:60px;">구매</th>
      <th>모델</th>
      <th>사용자</th>
      <th style="width:84px;">부서</th>
      <th style="width:80px;">위치</th>
      <th>설치 소프트웨어</th>
      <th style="width:66px;">상태</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function filteredDevices() {
  const f = state.filter;
  const q = f.q.toLowerCase();
  return state.devices.filter(d => {
    if (f.type && d.type !== f.type) return false;
    if (f.dept && d.useDept !== f.dept) return false;
    if (f.loc && d.location !== f.loc) return false;
    if (f.status && effectiveStatus(d) !== f.status) return false;
    if (q) {
      const hay = [d.code, d.model, d.userName, d.useDept, d.vendor, d.note, d.serialNumber].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => (a.code || '').localeCompare(b.code || ''));
}

function applyFilter() {
  state.filter.q = document.getElementById('searchInput').value;
  state.filter.type = document.getElementById('fType').value;
  state.filter.dept = document.getElementById('fDept').value;
  state.filter.loc = document.getElementById('fLoc').value;
  state.filter.status = document.getElementById('fStatus').value;
  renderDevices();
}

// ─────────────────────── 라이선스 ───────────────────────
function renderLicenses() {
  if (!fullAccess) return;
  const wrap = document.getElementById('licTableWrap');
  state.licFilter.q = document.getElementById('licSearch').value.toLowerCase();
  state.licFilter.cat = document.getElementById('fLicCat').value;
  const q = state.licFilter.q;
  let list = state.licenses.filter(l => {
    if (state.licFilter.cat && l.category !== state.licFilter.cat) return false;
    if (q) {
      const hay = [l.programName, l.assignedDeviceCode, l.assignedUser, l.vendor, l.serialNumber, l.serialLabel, l.note].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => (a.category || '').localeCompare(b.category || '') || (a.no || 0) - (b.no || 0));

  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🔑</div><div class="desc">라이선스 없음. 오른쪽 상단 [+ 신규 자산] 옆에서 등록 가능 (준비중).</div></div>`;
    return;
  }
  const rows = list.map(l => {
    const serial = l.serialNumber || l.serialLabel || '';
    return `<tr onclick="openLicenseModal('${l.id}')">
      <td><span class="pill cat-${esc(l.category)}">${esc(l.category)}</span></td>
      <td class="b">${esc(l.programName)}</td>
      <td>${esc(l.acquiredYear || '')}</td>
      <td>${esc(l.maintenance || '')}</td>
      <td>${esc(l.vendor || '')}</td>
      <td class="code">${esc(l.assignedDeviceCode || '─')}</td>
      <td>${esc(l.assignedUser || '')}</td>
      <td class="mono" style="max-width:260px;">${esc(serial)}</td>
      <td>${esc(l.note || '')}</td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table>
    <thead><tr>
      <th style="width:80px;">구분</th>
      <th>프로그램</th>
      <th style="width:60px;">취득</th>
      <th style="width:70px;">유지</th>
      <th style="width:88px;">구입처</th>
      <th style="width:90px;">사용PC</th>
      <th style="width:110px;">사용자</th>
      <th>Serial / 제품키</th>
      <th style="width:120px;">비고</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ─────────────────────── 통계 ───────────────────────
function renderStats() {
  const box = document.getElementById('statGrid');
  const activeD = state.devices.filter(d => { const e = effectiveStatus(d); return e !== 'retired' && e !== 'lost'; });
  const byDept = tally(activeD, d => d.useDept || '─');
  const byYear = tally(activeD, d => d.purchaseYear || '─');
  const byType = tally(activeD, d => typeName(d.type));
  const byLoc = tally(activeD, d => d.location || '─');
  box.innerHTML = `
    ${statCard('부서별 자산', byDept)}
    ${statCard('구매년도별', Object.fromEntries(Object.entries(byYear).sort((a,b) => b[0].localeCompare(a[0]))))}
    ${statCard('유형별', byType)}
    ${statCard('위치별', byLoc)}
  `;
}
function tally(arr, keyFn) {
  const t = {};
  for (const x of arr) { const k = keyFn(x); t[k] = (t[k] || 0) + 1; }
  return t;
}
function statCard(title, data) {
  const max = Math.max(...Object.values(data), 1);
  const total = Object.values(data).reduce((a,b) => a+b, 0);
  const rows = Object.entries(data).sort((a,b) => b[1] - a[1]).map(([k, v]) => `
    <div class="stat-row">
      <div class="lbl">${esc(k)}</div>
      <div class="bar-wrap"><div class="bar" style="width:${(v/max*100).toFixed(0)}%;"></div></div>
      <div class="val">${v}</div>
    </div>
  `).join('');
  return `<div class="stat-card"><div class="title">${esc(title)} <span style="color:var(--ink-3);font-weight:400;">(${total})</span></div>${rows}</div>`;
}

// ─────────────────────── 탭 전환 ───────────────────────
function switchTab(tab) {
  if (tab === 'licenses' && !fullAccess) return;
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('on', el.dataset.tab === tab));
  document.getElementById('tabDevices').style.display = tab === 'devices' ? '' : 'none';
  document.getElementById('tabLicenses').style.display = tab === 'licenses' ? '' : 'none';
  document.getElementById('tabStats').style.display = tab === 'stats' ? '' : 'none';
  if (tab === 'stats') renderStats();
}
window.switchTab = switchTab;
window.applyFilter = applyFilter;
window.renderLicenses = renderLicenses;

// ─────────────────────── 자산 CRUD ───────────────────────
async function openDeviceModal(id) {
  state.editingDeviceId = id || null;
  const d = id ? state.devices.find(x => x.id === id) : null;
  document.getElementById('devModalTitle').textContent = d ? `🖥️ ${d.code} 편집` : '🖥️ 신규 자산 등록';
  document.getElementById('dfCode').value = d ? d.code : await nextCode();
  document.getElementById('dfType').value = d?.type || 'desktop';
  document.getElementById('dfYear').value = d?.purchaseYear || new Date().getFullYear();
  document.getElementById('dfVendor').value = d?.vendor || '';
  document.getElementById('dfItem').value = d?.itemName || 'Computer';
  document.getElementById('dfModel').value = d?.model || '';
  document.getElementById('dfSpec').value = d?.spec || 'Desktop';
  document.getElementById('dfUser').value = d?.userName || '';
  document.getElementById('dfDept').value = d?.useDept || '';
  document.getElementById('dfLoc').value = d?.location || '사무실';
  // 저장된 status가 retired/lost면 그대로, 나머지는 'active'(=자동)으로 표시
  document.getElementById('dfStatus').value = (d?.status === 'retired' || d?.status === 'lost') ? d.status : 'active';
  document.getElementById('dfNote').value = d?.note || '';
  const sw = d?.softwareInstalled || {};
  document.getElementById('dfSwWin').value = sw.windows || '';
  document.getElementById('dfSwCad').value = sw.cad || '';
  document.getElementById('dfSwSe').value = sw.solidEdge || '';
  document.getElementById('dfSwMso').value = sw.msOffice || '';
  document.getElementById('dfSwHangul').value = sw.hangul || '';
  document.getElementById('dfSwPdf').value = sw.pdf || '';
  document.getElementById('btnDelete').style.display = d ? '' : 'none';
  // 연결 라이선스 (fullAccess only)
  const lb = document.getElementById('linkedLicenses');
  if (fullAccess && d) {
    const linked = state.licenses.filter(l => l.assignedDeviceCode === d.code);
    if (linked.length) {
      lb.innerHTML = `<div class="head">🔑 연결된 라이선스 (${linked.length})</div>
        ${linked.map(l => `<div class="linked-item"><span class="k">${esc(l.category)} · ${esc(l.programName)}</span><span class="v">${esc(l.serialNumber || l.serialLabel || '─')}</span></div>`).join('')}`;
      lb.style.display = '';
    } else {
      lb.style.display = 'none';
    }
  } else {
    lb.style.display = 'none';
  }
  document.getElementById('devModal').classList.add('on');
}
window.openDeviceModal = openDeviceModal;

function closeDeviceModal() { document.getElementById('devModal').classList.remove('on'); }
window.closeDeviceModal = closeDeviceModal;

async function nextCode() {
  const nums = state.devices
    .map(d => (d.code || '').match(/^SJPC-(\d+)$/i))
    .filter(Boolean)
    .map(m => parseInt(m[1], 10));
  const max = nums.length ? Math.max(...nums) : 0;
  return `SJPC-${String(max + 1).padStart(2, '0')}`;
}

async function saveDevice() {
  const code = document.getElementById('dfCode').value.trim();
  if (!code) { toast('관리번호를 입력하세요', true); return; }
  const now = Date.now();
  const doc = {
    code,
    type: document.getElementById('dfType').value,
    purchaseYear: document.getElementById('dfYear').value.trim(),
    vendor: document.getElementById('dfVendor').value.trim(),
    itemName: document.getElementById('dfItem').value.trim(),
    model: document.getElementById('dfModel').value.trim(),
    spec: document.getElementById('dfSpec').value.trim(),
    userName: document.getElementById('dfUser').value.trim(),
    useDept: document.getElementById('dfDept').value.trim(),
    location: document.getElementById('dfLoc').value,
    status: document.getElementById('dfStatus').value,
    note: document.getElementById('dfNote').value.trim(),
    softwareInstalled: {
      windows: document.getElementById('dfSwWin').value.trim(),
      cad: document.getElementById('dfSwCad').value.trim(),
      solidEdge: document.getElementById('dfSwSe').value.trim(),
      msOffice: document.getElementById('dfSwMso').value.trim(),
      hangul: document.getElementById('dfSwHangul').value.trim(),
      pdf: document.getElementById('dfSwPdf').value.trim(),
    },
    updatedAt: now,
  };
  try {
    const fb = window.fb;
    if (state.editingDeviceId) {
      // 이관 이력: 이전 값과 비교
      const prev = state.devices.find(x => x.id === state.editingDeviceId);
      if (prev && (prev.useDept !== doc.useDept || prev.userName !== doc.userName)) {
        doc.transfers = [...(prev.transfers || []), {
          fromDept: prev.useDept, toDept: doc.useDept,
          fromUser: prev.userName, toUser: doc.userName,
          at: now,
        }];
      }
      await fb.setDoc(fb.doc(fb.db, 't_devices', state.editingDeviceId), doc, { merge: true });
      toast(`${code} 저장됨`);
    } else {
      doc.createdAt = now;
      const id = 'dev_' + code.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + now.toString(36);
      await fb.setDoc(fb.doc(fb.db, 't_devices', id), doc);
      toast(`${code} 등록됨`);
    }
    closeDeviceModal();
  } catch (err) {
    console.error(err); toast('저장 실패: ' + err.message, true);
  }
}
window.saveDevice = saveDevice;

async function deleteDevice() {
  if (!state.editingDeviceId) return;
  const d = state.devices.find(x => x.id === state.editingDeviceId);
  if (!d) return;
  if (!confirm(`${d.code} 를 완전히 삭제하시겠습니까?\n(폐기는 상태만 변경, 감사이력 유지 권장)`)) return;
  try {
    await window.fb.deleteDoc(window.fb.doc(window.fb.db, 't_devices', state.editingDeviceId));
    toast(`${d.code} 삭제됨`);
    closeDeviceModal();
  } catch (err) {
    console.error(err); toast('삭제 실패: ' + err.message, true);
  }
}
window.deleteDevice = deleteDevice;

// ─────────────────────── 라이선스 CRUD ───────────────────────
function openLicenseModal(id) {
  if (!fullAccess) return;
  state.editingLicenseId = id || null;
  const l = id ? state.licenses.find(x => x.id === id) : null;
  document.getElementById('licModalTitle').textContent = l ? `🔑 ${l.programName} 편집` : '🔑 신규 라이선스';
  document.getElementById('lfCat').value = l?.category || 'CAD';
  document.getElementById('lfName').value = l?.programName || '';
  document.getElementById('lfYear').value = l?.acquiredYear || '';
  document.getElementById('lfMaint').value = l?.maintenance || '영구';
  document.getElementById('lfVendor').value = l?.vendor || '';
  document.getElementById('lfDevice').value = l?.assignedDeviceCode || '';
  document.getElementById('lfUser').value = l?.assignedUser || '';
  document.getElementById('lfSerialLbl').value = l?.serialLabel || 'Serial No';
  document.getElementById('lfSerialVal').value = l?.serialNumber || '';
  document.getElementById('lfNote').value = l?.note || '';
  document.getElementById('licModal').classList.add('on');
}
window.openLicenseModal = openLicenseModal;

function closeLicenseModal() { document.getElementById('licModal').classList.remove('on'); }
window.closeLicenseModal = closeLicenseModal;

async function saveLicense() {
  const now = Date.now();
  const doc = {
    category: document.getElementById('lfCat').value,
    programName: document.getElementById('lfName').value.trim(),
    acquiredYear: document.getElementById('lfYear').value.trim(),
    maintenance: document.getElementById('lfMaint').value.trim(),
    vendor: document.getElementById('lfVendor').value.trim(),
    assignedDeviceCode: document.getElementById('lfDevice').value.trim(),
    assignedUser: document.getElementById('lfUser').value.trim(),
    serialLabel: document.getElementById('lfSerialLbl').value.trim(),
    serialNumber: document.getElementById('lfSerialVal').value.trim(),
    note: document.getElementById('lfNote').value.trim(),
    status: 'active',
    updatedAt: now,
  };
  if (!doc.programName) { toast('프로그램명을 입력하세요', true); return; }
  try {
    const fb = window.fb;
    if (state.editingLicenseId) {
      await fb.setDoc(fb.doc(fb.db, 't_licenses', state.editingLicenseId), doc, { merge: true });
      toast(`${doc.programName} 저장됨`);
    } else {
      doc.createdAt = now;
      const id = 'lic_' + doc.category.toLowerCase() + '_' + now.toString(36);
      await fb.setDoc(fb.doc(fb.db, 't_licenses', id), doc);
      toast(`${doc.programName} 등록됨`);
    }
    closeLicenseModal();
  } catch (err) {
    console.error(err); toast('저장 실패: ' + err.message, true);
  }
}
window.saveLicense = saveLicense;

async function deleteLicense() {
  if (!state.editingLicenseId) return;
  const l = state.licenses.find(x => x.id === state.editingLicenseId);
  if (!l) return;
  if (!confirm(`${l.programName} 라이선스를 삭제하시겠습니까?`)) return;
  try {
    await window.fb.deleteDoc(window.fb.doc(window.fb.db, 't_licenses', state.editingLicenseId));
    toast(`${l.programName} 삭제됨`);
    closeLicenseModal();
  } catch (err) {
    console.error(err); toast('삭제 실패: ' + err.message, true);
  }
}
window.deleteLicense = deleteLicense;

// ─────────────────────── 엑셀 seed 초기 임포트 ───────────────────────
async function importSeed() {
  if (!fullAccess) { toast('총무부·슈퍼관리자만 임포트 가능', true); return; }
  if (!confirm('엑셀 초기 데이터를 Firestore에 임포트하시겠습니까?\n\n· t_devices 54개 문서\n· t_licenses 92개 문서\n\n기존에 문서가 있어도 관리번호가 다르면 중복 등록될 수 있습니다.')) return;

  const wrap = document.getElementById('deviceTableWrap');
  wrap.innerHTML = `<div class="empty-state"><div class="spinner"></div><div>seed 파일 로드 중...</div></div>`;
  try {
    const res = await fetch('asset-registry-seed.json?v=1');
    if (!res.ok) throw new Error('seed fetch failed ' + res.status);
    const seed = await res.json();
    wrap.innerHTML = `<div class="empty-state"><div class="spinner"></div><div>Firestore 임포트 중... (${seed.devices.length} devices + ${seed.licenses.length} licenses)</div></div>`;

    const fb = window.fb;
    const now = Date.now();
    // Batch write — 500 씩 나눠서
    const chunks = (arr, n) => Array.from({length: Math.ceil(arr.length/n)}, (_, i) => arr.slice(i*n, i*n+n));

    for (const batch of chunks(seed.devices, 400)) {
      const wb = fb.writeBatch(fb.db);
      for (const d of batch) {
        const id = 'dev_' + (d.code || 'unknown').toLowerCase().replace(/[^a-z0-9]/g, '_');
        wb.set(fb.doc(fb.db, 't_devices', id), { ...d, createdAt: now, updatedAt: now, source: 'excel-rev04' });
      }
      await wb.commit();
    }
    for (const batch of chunks(seed.licenses, 400)) {
      const wb = fb.writeBatch(fb.db);
      for (const l of batch) {
        const id = 'lic_' + (l.category || 'x').toLowerCase() + '_' + (l.no || Math.random().toString(36).slice(2, 8));
        wb.set(fb.doc(fb.db, 't_licenses', id), { ...l, createdAt: now, updatedAt: now, source: 'excel-rev04' });
      }
      await wb.commit();
    }
    toast(`✅ 임포트 완료: 자산 ${seed.devices.length} · 라이선스 ${seed.licenses.length}`);
  } catch (err) {
    console.error(err);
    toast('임포트 실패: ' + err.message, true);
    render();
  }
}
window.importSeed = importSeed;

// ─────────────────────── Excel 내보내기 (SheetJS lazy-load) ───────────────────────
async function loadXLSX() {
  if (window.XLSX) return window.XLSX;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload = res;
    s.onerror = () => rej(new Error('SheetJS 로드 실패'));
    document.head.appendChild(s);
  });
  return window.XLSX;
}
async function exportExcel() {
  try {
    toast('Excel 라이브러리 로드 중...');
    const XLSX = await loadXLSX();
    const wb = XLSX.utils.book_new();

    // 시트 1: PC/노트북
    const dev = filteredDevices().map(d => ({
      '관리번호': d.code || '',
      '유형': typeName(d.type),
      '구매년도': d.purchaseYear || '',
      '비품명': d.itemName || '',
      '모델명': d.model || '',
      '규격/형식': d.spec || '',
      '구입처': d.vendor || '',
      '사용부서': d.useDept || '',
      '사용자': d.userName || '',
      '위치': d.location || '',
      '상태': statusName(effectiveStatus(d)),
      'WINDOWS': d.softwareInstalled?.windows || '',
      'CAD': d.softwareInstalled?.cad || '',
      'SOLID EDGE': d.softwareInstalled?.solidEdge || '',
      'MS OFFICE': d.softwareInstalled?.msOffice || '',
      '한글': d.softwareInstalled?.hangul || '',
      'PDF': d.softwareInstalled?.pdf || '',
      '비고': d.note || '',
    }));
    const ws1 = XLSX.utils.json_to_sheet(dev);
    ws1['!cols'] = [{wch:10},{wch:9},{wch:8},{wch:9},{wch:20},{wch:10},{wch:10},{wch:10},{wch:12},{wch:10},{wch:8},{wch:14},{wch:12},{wch:10},{wch:14},{wch:14},{wch:14},{wch:20}];
    XLSX.utils.book_append_sheet(wb, ws1, '자산 대장');

    // 시트 2: 라이선스 (full access only)
    if (fullAccess && state.licenses.length) {
      const lic = state.licenses.map(l => ({
        '구분': l.category || '',
        '프로그램': l.programName || '',
        '취득년도': l.acquiredYear || '',
        '유지기간': l.maintenance || '',
        '구입처': l.vendor || '',
        '사용PC': l.assignedDeviceCode || '',
        '사용자': l.assignedUser || '',
        'Serial 라벨': l.serialLabel || '',
        'Serial/제품키': l.serialNumber || '',
        '비고': l.note || '',
      }));
      const ws2 = XLSX.utils.json_to_sheet(lic);
      ws2['!cols'] = [{wch:10},{wch:16},{wch:9},{wch:9},{wch:10},{wch:10},{wch:12},{wch:14},{wch:36},{wch:18}];
      XLSX.utils.book_append_sheet(wb, ws2, '라이선스');
    }

    // 시트 3: 통계
    const active = state.devices.filter(d => d.status !== 'retired');
    const byDept = tally(active, d => d.useDept || '─');
    const byYear = tally(active, d => d.purchaseYear || '─');
    const byType = tally(active, d => typeName(d.type));
    const byLoc = tally(active, d => d.location || '─');
    const stats = [];
    const addRows = (title, obj) => {
      stats.push({ '구분': title, '항목': '', '수량': '' });
      Object.entries(obj).sort((a,b) => b[1] - a[1]).forEach(([k,v]) => stats.push({ '구분': '', '항목': k, '수량': v }));
      stats.push({ '구분': '', '항목': '', '수량': '' });
    };
    addRows('부서별', byDept);
    addRows('구매년도별', byYear);
    addRows('유형별', byType);
    addRows('위치별', byLoc);
    const ws3 = XLSX.utils.json_to_sheet(stats);
    ws3['!cols'] = [{wch:14},{wch:22},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws3, '통계');

    const today = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `세종기술_자산관리대장_${today}.xlsx`);
    toast('✅ Excel 저장됨');
  } catch (err) {
    console.error(err);
    toast('Excel 내보내기 실패: ' + err.message, true);
  }
}
window.exportExcel = exportExcel;

// ─────────────────────── PDF 인쇄 ───────────────────────
function exportPdf() {
  // 인쇄 최적화 CSS 주입 (모달·필터·버튼 등 숨김)
  const styleId = 'pdfPrintStyle';
  if (!document.getElementById(styleId)) {
    const st = document.createElement('style');
    st.id = styleId;
    st.textContent = `
      @media print {
        body { padding: 8mm !important; background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .mod-head-actions, .filter-bar, .close-btn, .modal-mask, .toast, .section-note, .perm-note { display: none !important; }
        .tab:not(.on) { display: none !important; }
        .tabs { border-bottom: 2px solid #000; }
        .kpi-row { grid-template-columns: repeat(6, 1fr) !important; gap: 4px !important; }
        .kpi { padding: 6px 8px !important; }
        .kpi .v { font-size: 14px !important; }
        .kpi .sub { font-size: 9px !important; }
        table { font-size: 9.5px !important; page-break-inside: auto; }
        thead { display: table-header-group; }
        tr { page-break-inside: avoid; }
        th, td { padding: 3px 5px !important; }
        .sw-tag { font-size: 8px !important; padding: 1px 3px !important; }
        .pill { font-size: 8.5px !important; padding: 1px 5px !important; }
      }
    `;
    document.head.appendChild(st);
  }
  setTimeout(() => window.print(), 100);
}
window.exportPdf = exportPdf;
