<script type="text/babel" data-presets="env,react">
const {useState, useEffect, useCallback, useRef, useLayoutEffect} = React;

// v1.6 — 프로젝트 스코프 키. index.html이 iframe에 넘기는 ?pid=... 기준으로 저장소를 분리해서
// 프로젝트를 바꿔 열어도 WO/시방서/견적서/WPS/Welder/프로젝트 정보가 서로 섞이지 않도록 함.
const URL_PARAMS = new URLSearchParams(location.search);
const PID = URL_PARAMS.get("pid") || "standalone";

// ════════ 0. EPC Control 데이터 상속 (v1.4 — 새 창/iframe 둘 다 지원) ════════
// v1.4 (sejong-platform Phase 2):
// - window.opener (새 창에서 열린 경우) 와 window.parent (iframe 임베드) 모두 지원
// - 250ms 폴링으로 EPC Control의 데이터 변경을 자동 반영
(function inheritFromHost(){
  function getHost(){
    try {
      if (window.opener && !window.opener.closed && window.opener.SJP) return window.opener;
    } catch(e){}
    try {
      if (window.parent && window.parent !== window && window.parent.SJP) return window.parent;
    } catch(e){}
    return null;
  }
  function syncOnce(){
    const host = getHost();
    if (!host) return false;
    try {
      window.SJP = host.SJP;
      window.EPC_PROJECT = host.EPC_PROJECT;
      window.EPC_ITEMS = host.EPC_ITEMS;
      window.EPC_DOC_NO_GENERATOR = host.EPC_DOC_NO_GENERATOR;
      window.EPC_INSPECTOR_MASTER = host.EPC_INSPECTOR_MASTER;
      // v1.5 — host 값이 비어있을 때 로컬에서 직접 업로드한 WPS/Welder/Inspector 목록을 지우지 않도록 가드
      if (host.WPS_LIST) window.WPS_LIST = host.WPS_LIST;
      if (host.WELDER_LIST) window.WELDER_LIST = host.WELDER_LIST;
      if (host.INSPECTOR_LIST) window.INSPECTOR_LIST = host.INSPECTOR_LIST;
      return true;
    } catch(e){
      console.warn("[ITP Builder] host 접근 실패", e.message);
      return false;
    }
  }
  const ok = syncOnce();
  console.log("[ITP Builder v1.4] 호스트 연결 " + (ok ? "성공 — EPC Control 데이터 상속 완료" : "실패 (Standalone 모드)"));
  // 250ms 주기로 host 데이터 폴링 (EPC에서 변경 시 자동 반영)
  if (ok) setInterval(syncOnce, 250);
})();

// ════════ 1. 상수 ════════

function _bumpItpRev(v) {
  v = (v == null ? "" : String(v)).trim();
  if (/^\d+$/.test(v)) return String(parseInt(v, 10) + 1);
  if (/^[A-Ya-y]$/.test(v)) return String.fromCharCode(v.toUpperCase().charCodeAt(0) + 1);
  if (/^[Zz]$/.test(v)) return "AA";
  if (v === "") return "1";
  return v;
}

// ════════ 2. AI 파싱 (v1.7 — 접속자 본인의 Claude API 키로 브라우저에서 직접 호출) ════════
// 이 저장소(GitHub Pages)는 정적 파일만 서빙하므로 서버 프록시가 없다. 각 사용자가 자신의
// Anthropic API 키를 브라우저 localStorage에 넣어두면, 그 브라우저에서만 api.anthropic.com을
// 직접 호출한다. 키는 이 파일이나 git에 절대 저장되지 않고 사용자 로컬에만 남는다.
const API_KEY_LS = "sjp_claude_api_key";
const getApiKey = () => { try { return localStorage.getItem(API_KEY_LS) || ""; } catch(e) { return ""; } };
const setStoredApiKey = (k) => { try { if (k) localStorage.setItem(API_KEY_LS, k); else localStorage.removeItem(API_KEY_LS); } catch(e){} };
const fileToBase64 = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => res(r.result.split(",")[1]);
  r.onerror = rej;
  r.readAsDataURL(file);
});
const extractJSON = (text) => {
  const clean = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const m = clean.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("JSON 추출 실패");
  return JSON.parse(m[0]);
};
const callAPI = async (body) => {
  const key = getApiKey();
  if (!key) throw new Error("Claude API 키가 설정되지 않았습니다 — 우측 상단 🔑 API 키에서 입력해주세요.");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error?.message || `API ${r.status}`);
  }
  return r.json();
};

// v3.1 — Welder 자격 만료 판정 (QA Doc Generator의 welderStatus와 동일 기준: 2주(14일) 이내 = 임박)
const welderDueDate = (w) => (w && typeof w === "object") ? w.dueDate : "";
const welderStatus = (dueDate) => {
  if (!dueDate) return {label:"valid"};
  const due = new Date(dueDate);
  const days = (due - new Date()) / (1000*60*60*24);
  if (days < 0) return {label:"expired"};
  if (days < 14) return {label:"expiring_soon"};
  return {label:"valid"};
};

const welderLineDisplay = (w) => {
  if (typeof w === "string") return w;
  if (!w) return "";
  const base = w.name ? `${w.name} (${w.id||""})` : (w.id||"");
  return w.dueDate ? `${base} - ${w.dueDate}` : base;
};

const MASTER_WELDER_KEY = `sjp_master_welder_list__${PID}`;
// v1.9 — WPS/Welder와 동일한 방식의 검사자(Inspector) List

const MASTER_LIST_KEYS = {wps: MASTER_WPS_KEY, welder: MASTER_WELDER_KEY, inspector: MASTER_INSPECTOR_KEY};
// v2.5 fix — saveLS와 동일한 문제: 저장 실패(용량 초과)를 조용히 무시해서 "N개 업로드 완료"

const saveMasterList = (kind, arr) => { try { localStorage.setItem(MASTER_LIST_KEYS[kind], JSON.stringify(arr)); return true; } catch(e) { console.error(`[ITP Builder ${kind} 목록 저장 실패]`, e); return false; } };

// v2.2 — id 중복 복구: addItem()이 Date.now()만으로 id를 만들던 시절(수정 전) 저장된
// 데이터는 같은 밀리초에 연속 등록된 아이템끼리 id가 겹쳐있을 수 있음. 겹친 id를 가진
// 아이템(첫 번째는 그대로 두고, 이후 겹치는 것들만) 새 id로 교체해 이후 동작이 다시
// 여러 아이템에 동시에 적용되는 사고를 막는다. 단, 이미 겹친 id 때문에 한 아이템의
// 내용이 다른 아이템에 잘못 복사되어 저장된 과거 데이터 자체는 여기서 복구되지 않음
// (어느 필드가 원래 값이었는지 판단할 방법이 없음 — 사용자가 직접 다시 입력 필요).
function dedupeItemIds(items) {
  const seen = new Set();
  let fixed = 0;
  const result = (items||[]).map(it => {
    if (seen.has(it.id)) {
      fixed++;
      const newId = Date.now()+Math.random();
      seen.add(newId);
      return {...it, id: newId};
    }
    seen.add(it.id);
    return it;
  });
  return {items: result, fixed};
}

// ════════ 3-1. Firestore 클라우드 동기화 (v2.1) ════════
// NCR/CAR와 동일한 문서-청크 방식 — Firebase Storage는 사내 방화벽에 막히는 환경이 있어 회피,
// Firestore 문서 여러 개로 잘라 저장(700KB/청크). 열 때 최신값을 가져오는 방식(실시간 반영 아님).
// v2.2 — 도구 개발 규칙: 신규 컬렉션은 "t_" 접두사 필수(그렇지 않으면 permission-denied).
const ITP_FS_COLL = "t_itpBuilderDocs";
const FILE_CHUNK_SIZE = 700 * 1024;
const _lastPushedDwg = {}; // itemId -> 마지막으로 업로드한 dwgUrl 문자열 (재청크 방지)

function _timeoutAfter(ms, msg) { return new Promise((_, reject) => setTimeout(() => reject(new Error(msg)), ms)); }

// Firebase Auth 세션 복원은 비동기라 마운트 직후엔 currentUser가 잠시 비어있을 수 있음.
// 최대 5초 폴링 후에도 없으면 에러를 던져 호출자가 실패를 명확히 알 수 있게 함(false-positive 성공 방지).
async function waitForFbAuth(timeoutMs = 5000) {
  const start = Date.now();
  while (!window.fb || !fb.db || !fb.auth?.currentUser) {
    if (Date.now() - start > timeoutMs) throw new Error("로그인 세션을 확인할 수 없습니다 (오프라인이거나 로그인 전일 수 있음)");
    await new Promise(r => setTimeout(r, 200));
  }
}

async function chunkUploadString(coll, keyPrefix, dataUrlStr) {
  const chunkId = `chunk__${keyPrefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
  const totalChunks = Math.ceil(dataUrlStr.length / FILE_CHUNK_SIZE);
  const jobs = [];
  for (let i = 0; i < totalChunks; i++) {
    const chunk = dataUrlStr.slice(i*FILE_CHUNK_SIZE, (i+1)*FILE_CHUNK_SIZE);
    jobs.push(fb.setDoc(fb.doc(fb.db, coll, `${chunkId}__${i}`), { chunkId, chunkIndex: i, totalChunks, data: chunk }));
  }
  await Promise.race([Promise.all(jobs), _timeoutAfter(20000, "저장 응답이 없습니다(20초 초과)")]);
  return { chunkId, totalChunks };
}

async function loadChunkedString(coll, chunkId, totalChunks) {
  const jobs = [];
  for (let i = 0; i < totalChunks; i++) jobs.push(fb.getDoc(fb.doc(fb.db, coll, `${chunkId}__${i}`)));
  const snaps = await Promise.all(jobs);
  return snaps.map(s => s.data()?.data || "").join("");
}

async function writeItpDocToFirestore(payload) {
  await waitForFbAuth();
  const items = await Promise.all((payload.items||[]).map(async it => {
    if (!it.dwgUrl || typeof it.dwgUrl !== "string" || !it.dwgUrl.startsWith("data:")) return it;
    const cacheKey = it.id || it.tag;
    if (_lastPushedDwg[cacheKey]?.src === it.dwgUrl) {
      const {chunkId, totalChunks} = _lastPushedDwg[cacheKey];
      const {dwgUrl, ...rest} = it;
      return {...rest, dwgChunkId: chunkId, dwgChunks: totalChunks};
    }
    const {chunkId, totalChunks} = await chunkUploadString(ITP_FS_COLL, `dwg_${cacheKey}`, it.dwgUrl);
    _lastPushedDwg[cacheKey] = {src: it.dwgUrl, chunkId, totalChunks};
    const {dwgUrl, ...rest} = it;
    return {...rest, dwgChunkId: chunkId, dwgChunks: totalChunks};
  }));
  // JSON 라운드트립으로 정규화 — EPC Control(window.parent.SJP.bridge)에서 넘어온 proj 등의 객체는
  // 부모 iframe의 JS realm에서 만들어져 이 창의 Object.prototype과 달라(cross-realm), Firestore SDK가
  // "커스텀 Object"로 오인해 setDoc을 거부하는 문제가 있었음(2026-07-07 실사용 중 발견). 이 창 realm의
  // 순수 plain object로 재생성해 해결. 함수/undefined 등 Firestore가 못 저장하는 값도 함께 제거됨.
  const doc = JSON.parse(JSON.stringify({...payload, items}));
  // v1.12: 승인 스탬프 보존 + 재승인 정책.
  //   - 저장은 문서 전체 덮어쓰기라 approval* 필드가 payload에 없으면 지워짐 → 기존 값 보존.
  //   - 단, 승인 완료(approved) 상태에서 "내용이 실제로 바뀌면" 재승인이 필요하므로
  //     approvalStatus를 'draft'로 되돌린다(→ ITP 조회에서 빠지고, 재상신·재승인 대상).
  //     열기만 한 자동저장은 내용 서명(contentSig)이 같아 승인 유지.
  const newSig = _itpContentSig(payload);
  doc.contentSig = newSig;
  let _exItemCount = 0, _exRowKeys = 0;
  try {
    const ex = await fb.getDoc(fb.doc(fb.db, ITP_FS_COLL, PID));
    if (ex.exists()) {
      const e = ex.data();
      _exItemCount = (e.items||[]).length;
      _exRowKeys = Object.keys(e.itpRowsByItem||{}).length;
      ["approvalStatus","approvedBy","approvedAt","approvalId","approvedSig","approvalCount"].forEach(k => { if (e[k] !== undefined && doc[k] === undefined) doc[k] = e[k]; });
      // 승인 완료본을 실제로 편집 → 재승인 필요: 결재중 전 단계인 'draft'로 되돌림
      if (e.approvalStatus === "approved" && e.approvedSig && e.approvedSig !== newSig) {
        doc.approvalStatus = "draft";
        doc.approvedBy = null; doc.approvedAt = null;
        try { showMsg("⚠ 승인된 ITP를 수정했습니다 — 재승인이 필요합니다. (결재 상신하면 승인 시 Rev.가 올라갑니다)", 8000); } catch(_){}
      }
    }
  } catch(e) { console.warn("[ITP] 승인 스탬프 보존 조회 실패(무시):", e.message); }
  // v1.13: ★ 빈 저장으로 클라우드를 지우는 사고 방지 ★ — 새 내용에 아이템이 하나도 없는데
  //   클라우드엔 아이템/검사행이 남아 있으면(로드 전 자동저장·New 오작동 등) 덮어쓰지 않는다.
  //   (2026-07-23 SJ435-26 ITP 문서가 빈 상태로 덮어써져 전 아이템이 유실된 사고 방지)
  if ((doc.items||[]).length === 0 && Object.keys(doc.itpRowsByItem||{}).length === 0 && (_exItemCount > 0 || _exRowKeys > 0)) {
    console.warn("[ITP] 빈 저장 차단 — 클라우드 보존 (items " + _exItemCount + ", rowKeys " + _exRowKeys + ")");
    try { showMsg("⚠ 아이템이 비어 있어 저장을 건너뛰었습니다 — 클라우드의 기존 데이터를 보호합니다. (새로고침 후 다시 열어주세요)", 9000); } catch(_){}
    return;
  }
  await fb.setDoc(fb.doc(fb.db, ITP_FS_COLL, PID), doc);
}
// v1.12: ITP 내용 서명 — 검사행·문서번호·헤더·아이템(태그/이름)만 대상(정렬 안정 직렬화).
//   Rev/승인상태는 제외 — 이들이 바뀌었다고 '내용 편집'으로 보면 안 되므로.
function _stableStr(o){
  if (Array.isArray(o)) return "[" + o.map(_stableStr).join(",") + "]";
  if (o && typeof o === "object") return "{" + Object.keys(o).sort().map(k => JSON.stringify(k) + ":" + _stableStr(o[k])).join(",") + "}";
  return JSON.stringify(o === undefined ? null : o);
}
function _itpContentSig(payload){
  try {
    return _stableStr({
      rows: payload.itpRowsByItem || {},
      docno: payload.itpDocNoByItem || {},
      hdr: payload.itpHdrByItem || {},
      items: (payload.items || []).map(i => ({ id: i.id, tag: i.tag, name: i.name }))
    });
  } catch(e) { return ""; }
}

// v1.14: ★ 로드-전-저장 레이스 가드 ★ — 클라우드 첫 로드가 끝나기 전엔 어떤 Firestore 저장도 금지.
//   마운트 직후 자동저장(1초 디바운스)이 클라우드 로드(인증 대기+getDoc, 수백ms~수초)보다 먼저
//   발화하면, 이 PC의 낡은 localStorage 상태가 savedAt=Date.now()(최신!)로 클라우드의 진짜 데이터를
//   덮어썼다 → 내용이 승인본과 달라져 재승인 정책이 draft로 강등 → 승인 ITP가 조회에서 사라짐.
//   (2026-07-23~24 SJ435-26 ITP 2회 유실의 근본 원인. WBS _wbsMasterLoaded(v30.3)와 동일한 페일세이프)
let _itpCloudSynced = false;
function pushToFirestore(payload) {
  if (!_itpCloudSynced) { console.warn("[ITP Builder] 클라우드 로드 완료 전 — 저장 보류 (데이터 보호)"); return; }
  writeItpDocToFirestore(payload).catch(e => console.error("[ITP Builder 클라우드 저장]", e));
}

async function loadFromFirestoreOrSkip(applyFn) {
  // 준비될 때까지 대기 (재귀 setTimeout 대신 루프 — 완료 시점을 한 곳에서 확정하기 위함)
  while (!window.fb || !fb.db || !fb.auth?.currentUser) { await new Promise(r => setTimeout(r, 300)); }
  try {
    const snap = await fb.getDoc(fb.doc(fb.db, ITP_FS_COLL, PID));
    if (!snap.exists()) return; // 클라우드에 아직 없음(신규 프로젝트거나 이 기능 이전 데이터) — 로컬 상태 유지
    const cloud = snap.data();
    const items = await Promise.all((cloud.items||[]).map(async it => {
      if (!it.dwgChunkId) return it;
      const dwgUrl = await loadChunkedString(ITP_FS_COLL, it.dwgChunkId, it.dwgChunks);
      const {dwgChunkId, dwgChunks, ...rest} = it;
      return {...rest, dwgUrl};
    }));
    applyFn({...cloud, items});
  } catch (e) { console.error("[ITP Builder 클라우드 불러오기]", e); }
  finally {
    // 성공(적용)·스킵(문서 없음/로컬이 최신)·실패 모두 "로드 시도 완료" — 이후부터 저장 허용.
    // 실패 시에도 열어주는 이유: 여기서 영영 잠그면 오프라인 편집 내용이 클라우드에 못 올라감.
    // 대신 writeItpDocToFirestore의 빈-저장 가드가 2차 방어선으로 남는다.
    _itpCloudSynced = true;
  }
}

// v1.6 — 엑셀식 복사/붙여넣기 그리드 (QA Doc Generator makeGrid 포팅, textarea/input 공통 지원)
// v2.9 — 엑셀 클립보드(TSV) 정식 파서. 큰따옴표로 감싼 필드 안의 줄바꿈(\n)·탭(\t)은
// 구분자가 아니라 내용으로 취급하고(""는 리터럴 "), 각 행의 후행 빈 필드는 제거한다.
// (기존 naive split("\n")/split("\t")가 ① Alt+Enter 셀을 2행으로 쪼개고 ② 병합셀의 후행
//  빈 탭을 별도 열로 만들어 중간 빈칸을 만들던 두 버그를 함께 해결.)
function parseClipboardTSV(text){
  text = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const rows=[]; let row=[]; let field=""; let inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else { inQ=false; } }
      else field+=ch;
    } else {
      if(ch==='"' && field===""){ inQ=true; }
      else if(ch==='\t'){ row.push(field); field=""; }
      else if(ch==='\n'){ row.push(field); rows.push(row); row=[]; field=""; }
      else field+=ch;
    }
  }
  row.push(field); rows.push(row);
  // 트레일링 개행으로 생긴 맨 끝 빈 행 제거
  if(rows.length && rows[rows.length-1].length===1 && rows[rows.length-1][0]==="") rows.pop();
  // 각 행의 후행 빈 필드 제거(가로 병합셀 → content\t\t 대응). 최소 1칸은 유지.
  rows.forEach(r=>{ while(r.length>1 && r[r.length-1]==="") r.pop(); });
  // v2.9.1 — 세로 병합셀은 첫 줄에만 값이 있고 나머지 줄은 완전히 빈 줄로 옴(2·3·4줄 등
  // 병합 크기만큼). 그 완전히 빈 줄을 제거해 값들이 연속된 칸에 채워지게 함(중간 빈칸/건너뜀
  // 방지). "완전히 빈 줄"만 제거하므로, 다중열에서 일부 열만 빈 경우(예: Activity만 세로병합,
  // Criteria엔 값)는 그대로 유지되어 오정렬 없음.
  const filtered = rows.filter(r => !r.every(f => f === ""));
  return filtered.length ? filtered : rows;
}
// v2.9 — 내용에 맞춰 높이가 자동으로 늘어나는 textarea. 기존엔 고정 높이(minHeight:36)라
// 긴 내용이 잘려서 인쇄/미리보기에 안 나왔음. 값이 바뀔 때마다 scrollHeight로 높이 재설정.
function AutoTextarea({value, style, ...rest}){
  const ref = useRef(null);
  useLayoutEffect(()=>{
    const el=ref.current; if(!el) return;
    el.style.height='auto';
    el.style.height=(el.scrollHeight)+'px';
  }, [value]);
  return <textarea ref={ref} value={value} style={style} {...rest}/>;
}
function makeGrid(onCellPaste){
  const findCell=(container,row,col)=>container.querySelector(`[data-r="${row}"][data-c="${col}"]`);
  const moveTo=(el,dr,dc)=>{
    const container=el.closest("[data-grid]");if(!container)return;
    const r=parseInt(el.dataset.r),c=parseInt(el.dataset.c);
    let nr=r+dr,nc=c+dc;
    let target=findCell(container,nr,nc);
    if(!target&&dc!==0){target=findCell(container,r+(dc>0?1:-1),0);}
    if(target){target.focus();target.select&&target.select();}
  };
  const onKeyDown=(e)=>{
    const el=e.target;if(!el.dataset||el.dataset.r===undefined)return;
    if(e.key==="Tab"){e.preventDefault();moveTo(el,0,e.shiftKey?-1:1);}
    else if(e.key==="ArrowDown"&&e.ctrlKey){e.preventDefault();moveTo(el,1,0);}
    else if(e.key==="ArrowUp"&&e.ctrlKey){e.preventDefault();moveTo(el,-1,0);}
  };
  const onPaste=(e)=>{
    const el=e.target;if(!el.dataset||el.dataset.r===undefined)return;
    const text=(e.clipboardData||window.clipboardData).getData("text");
    if(!text||(!text.includes("\t")&&!text.includes("\n"))){return;}
    e.preventDefault();
    const rows=parseClipboardTSV(text);
    const startR=parseInt(el.dataset.r),startC=parseInt(el.dataset.c);
    onCellPaste&&onCellPaste(startR,startC,rows);
  };
  return {gridProps:{"data-grid":"1",onKeyDown,onPaste},cellProps:(r,c)=>({"data-r":r,"data-c":c})};
}

// buildSpecRows/buildInitialItpRows: 기존에 specReqs→itpRows 재생성 effect 안에 있던 로직을
// 추출 — 이제 아이템마다 이 로직을 반복 적용해야 해서 별도 함수로 분리했다.
function buildSpecRows(specReqs) {
  return (specReqs||[]).map((req, i) => mkR(
    1000+i, req.activity||"Customer Special Requirement",
    req.code||"Per Customer Spec.", req.criteria||req.description||"—",

  ));
}
function buildInitialItpRows(specReqs) { return [...ITP_BASE, ...buildSpecRows(specReqs)]; }
// scopedSetter: React의 setState(value | updaterFn) 규약을 그대로 흉내 내서, ITPPreview 내부의
// moveRow/붙여넣기 그리드/handleAddRow/인라인 편집이 "아이템별로 쪼개진 객체의 한 칸"을 마치
// 예전의 단일 배열 state처럼 다루게 해준다 — ITPPreview 내부는 한 줄도 안 고쳐도 된다.
function scopedSetter(setMapFn, itemId, fallback) {
  return (updater) => setMapFn(prev => {
    const current = prev[itemId] ?? fallback;
    const next = (typeof updater === "function") ? updater(current) : updater;
    return {...prev, [itemId]: next};
  });
}

          style={{padding:"6px 14px", background:"var(--sjp-primary)", color:"#fff", border:"none", borderRadius:4, cursor:"pointer", fontWeight:600, fontSize:11, whiteSpace:"nowrap"}}>
          + 추가
        </button>
      </div>
    </div>

    <div style={{marginTop:4, fontSize:9, color:"#444", lineHeight:1.7}}>
      1. The inspection process may be changed by the supplier's manufacturing condition.<br/>
      2. I&amp;T Activities: S-Supplier, R-Report Review, W-Witness, SW-Spot Witness, H-Hold Point, N/A-Not Applicable<br/>
      3. 노란색 행(📋 Spec)은 고객 시방서에서 추출한 추가 요구사항입니다.
    </div>
  </div>;
}

// ════════ 9. 메인 App ════════
function App(){
  const [step, setStep] = useState(0);
  // v1.6 — PJT를 클릭해서 들어온 경우(EPC 연결)만 아래 mount effect에서 정보를 채운다.
  // PJT 선택 없이 단독으로 열었다면 예전처럼 빈칸에서 직접 입력.
  const [proj, setProj] = useState({
    no: "",
    name: "",
    customer: "",
    po: "",
    scope: "",
    codes: {KS:true, ASME:true, TEMA:true, EN:false, API:false, Others:false}
  });
  // v1.6 — 좌측 "검사 대상 아이템"(제작공정관리)에서 기본으로 불러와 나열하는 것이 기본 동작.
  // 샘플 더미 아이템 대신 빈 배열로 시작하고, mount effect에서 EPC 목록과 병합한다.
  const [items, setItems] = useState([]);
  const [newItem, setNewItem] = useState({...DEF_ITEM});
  const [specReqs, setSpecReqs] = useState([]);
  const [quoteItems, setQuoteItems] = useState([]);
  const [revComments, setRevComments] = useState([]);
  const [wpsList, setWpsList] = useState(() => loadMasterList("wps") || []);
  const [welderList, setWelderList] = useState(() => loadMasterList("welder") || []);
  const [inspectorList, setInspectorList] = useState(() => loadMasterList("inspector") || []);
  // v2.3 — ITP를 프로젝트 공유 1개에서 아이템별 독립 문서로 전환. 왼쪽에서 아이템을 여러 개
  // 등록해도 서로 다른 체크리스트/문서번호/리비전을 가지도록 아이템 id로 키를 삼은 객체로 관리.
  const [itpRowsByItem, setItpRowsByItem] = useState({});   // {[itemId]: Row[]}
  const [itpDocNoByItem, setItpDocNoByItem] = useState({}); // {[itemId]: string}
  const [itpRevByItem, setItpRevByItem] = useState({});     // {[itemId]: string}
  // v1.10: ITP 미리보기 헤더(프로젝트명/Job No·아이템명/Tag No·Customer) 아이템별 수동 override.
  //   빈 문자열이면 proj/item의 자동값 사용. 신과장이 도면 태그를 잘못 넣은 경우 등 여기서 직접 교정.
  const [itpHdrByItem, setItpHdrByItem] = useState({});     // {[itemId]: {projName,jobNo,itemLabel,customer}}
  const [selectedItpItemId, setSelectedItpItemId] = useState(null);
  const [printAllMode, setPrintAllMode] = useState(false);
  // v2.3 — mobile-inspection.html이 ITP Builder의 items가 비어 WBS 브릿지 아이템만 있는
  // 예외 상황에서 옛 공유 itpRows로 폴백하는 경로가 있어(itpRowsByItem에 해당 id가 없음),
  // 그 경우 체크리스트가 통째로 비지 않도록 첫 번째 아이템 것만이라도 계속 함께 저장한다.
  const buildLegacyItpRows = () => (items[0] ? (itpRowsByItem[items[0].id] || []) : []);
  // v2.4 — 저장 실패(브라우저 저장공간 초과 등)를 화면에 알림. 1초마다 도는 자동저장에서
  // 매번 뜨면 스팸이 되므로 1분에 한 번만 표시(NCR/CAR/모바일 인스펙션과 동일한 관례).
  const lastQuotaWarnRef = useRef(0);
  const _dragItemIdx = useRef(null);  // v1.11: 아이템 순서 드래그용
  const warnLocalSaveFailed = () => {
    const now = Date.now();
    if (now - lastQuotaWarnRef.current < 60000) return;
    lastQuotaWarnRef.current = now;
    showMsg("⚠️ 이 기기의 저장 공간이 가득 차서 방금 작업한 내용이 이 브라우저에는 저장되지 않았습니다. 클라우드 저장은 별도로 진행되니 '☁ 지금 클라우드로 업로드'를 눌러 확인해주세요.", 10000);
  };
  // v2.7 — WPS/Welder/검사자 List 텍스트박스를 직접 편집하다가 실수로 전체 삭제되면
  // (전체 선택 후 삭제, 자동완성 간섭 등) 바로 빈 목록으로 저장되어버리는 사고가 있었음
  // (국도화학 T-8405 실사용 중 발견 — 11개/25명짜리 목록이 빈 배열로 남아있었음). 기존에
  // 항목이 있던 목록이 빈 값으로 바뀌려는 순간만 한 번 확인한다.
  const handleMasterListEdit = (kind, text, currentList, setList, windowKey) => {
    const arr = text.split(/[\n,;\t]+/).map(s=>s.trim()).filter(Boolean);
    if (arr.length === 0 && currentList.length > 0) {
      if (!confirm(`현재 ${currentList.length}개 등록되어 있는 목록을 비우시겠습니까?\n(취소하면 그대로 유지됩니다)`)) return;
    }
    setList(arr);
    window[windowKey] = arr;
    if (!saveMasterList(kind, arr)) warnLocalSaveFailed();
  };
  const [witnessCols, setWitnessCols] = useState([
    {key:"sj",     name:"SJ",     bg:"#eef3fb"},
    {key:"qc",     name:"QC",     bg:"#eef3fb"},
    {key:"client", name:"Client", bg:"#eef3fb"}
  ]);
  // v1.3 — AI Provider 상태 제거 (Cowork 연동 대기)
  const [msg, setMsg] = useState("");
  const [parsing, setParsing] = useState(null);
  const [showKeyModal, setShowKeyModal] = useState(false);
  // v3.3: ITP 결재선 지정 모달 상태. null=닫힘. 열리면 {users, pmUid, projCode, projName, includeReview, reviewerUid, approverUid}
  const [appvModal, setAppvModal] = useState(null);
  // v1.8: 프로젝트 태그 선택 가져오기 모달. null=닫힘. {list:[{id,tag,type,spec,name,already}], checked:{[tag]:bool}}
  const [importModal, setImportModal] = useState(null);
  // v1.9: ITP 복사 모달. null=닫힘. {sourceId, checked:{[itemId]:bool}, inclRev, inclHdr}
  const [copyModal, setCopyModal] = useState(null);
  // v2.0: 다중태그 도면 확인 모달. null=닫힘. {tags:[], note, spec, dwgUrl, dwgName, existing:Set}
  const [sharedDwgModal, setSharedDwgModal] = useState(null);
  const [keyInput, setKeyInput] = useState(() => getApiKey());

  // v1.3 — sjp-bridge.js 외부 의존성 제거 (안전한 optional chaining 유지)
  useEffect(() => {
    if (window.SJP?.bridge?.renderTopbar) {
      window.SJP.bridge.renderTopbar("ITP Builder v1.4", "신채완 과장");
    }
  }, []);

  // v1.6 — 좌측에서 선택된 아이템의 기본정보(Tag/Type/Spec/Material)를 "아이템 추가" 폼에
  // 기본값으로 미리 채워둔다. 이후 도면 업로드 시 그 위에 덮어써서 보강하는 방식(도면 파싱 자체는
  // Cowork 통합 대기 중이라 현재는 미동작).
  useEffect(() => {
    const tag = URL_PARAMS.get("tag");
    if (!tag) return;
    setNewItem(prev => prev.tag ? prev : {
      ...prev,
      tag,
      name: prev.name || tag,
      type: URL_PARAMS.get("type") || prev.type,
      appl_code: URL_PARAMS.get("spec") || prev.appl_code,
      shell_mat: URL_PARAMS.get("material") || prev.shell_mat,
    });
  }, []);

  useEffect(() => {
    const s = loadLS();
    const localSavedAt = s?.savedAt || 0;
    if (s) {
      if (s.proj) setProj(s.proj);
      if (s.items) {
        const {items: fixedItems, fixed} = dedupeItemIds(s.items);
        setItems(fixedItems);
        if (fixed > 0) showMsg(`⚠ 아이템 ${fixed}개에서 id 중복이 발견되어 자동으로 분리했습니다. 방금 분리된 아이템들의 내용을 다시 한번 확인해주세요(도면/등록 정보가 다른 아이템 것으로 잘못 들어가 있을 수 있습니다).`, 12000);
        // v2.3 마이그레이션 — 예전 "프로젝트 공유 ITP 1개"였던 데이터를 아이템별로 분리.
        // 새 필드가 이미 있으면 그대로 쓰고, 없을 때만 옛 공유 값을 현재 모든 아이템의
        // 시작값으로 복사한다(1회성, 멱등 — 기존 실사용 데이터를 지우지 않기 위함).
        if (s.itpRowsByItem) setItpRowsByItem(s.itpRowsByItem);
        else if (s.itpRows && fixedItems.length) setItpRowsByItem(Object.fromEntries(fixedItems.map(it => [it.id, JSON.parse(JSON.stringify(s.itpRows))])));
        if (s.itpDocNoByItem) setItpDocNoByItem(s.itpDocNoByItem);
        else if (s.itpDocNo && fixedItems.length) setItpDocNoByItem(Object.fromEntries(fixedItems.map(it => [it.id, s.itpDocNo])));
        if (s.itpRevByItem) setItpRevByItem(s.itpRevByItem);
        if (s.itpHdrByItem) setItpHdrByItem(s.itpHdrByItem);
        else if (s.itpRev && fixedItems.length) setItpRevByItem(Object.fromEntries(fixedItems.map(it => [it.id, s.itpRev])));
      }
      if (s.specReqs) setSpecReqs(s.specReqs);
      if (s.quoteItems) setQuoteItems(s.quoteItems);
      if (s.revComments) setRevComments(s.revComments);
    }
    // EPC Control System에서 프로젝트 정보 동기화 (window.SJP.bridge 존재 시).
    // v2.0 — 아이템(검사 대상 아이템)은 index.html 좌측 패널(제작공정관리 연동)에서 직접 선택해
    // 들어오는 방식으로 통일 — 여기서 items에 자동/후보 병합하지 않음 (중복 등록 혼란 방지).
    if (window.SJP?.bridge?.isConnected?.()) {
      const epcProj = window.SJP.bridge.getProject?.();
      if (epcProj) setProj(p => ({...p, ...epcProj}));
      setTimeout(()=>showMsg("✓ EPC Control에서 프로젝트 정보 동기화 완료", 5000), 100);
    }
    // v2.4 fix — "클라우드가 항상 최신"이라고 무조건 믿고 덮어쓰면, 클라우드 업로드가 조용히
    // 실패했거나(오프라인·인증 타이밍) 아직 반영 전인 상태에서 재접속했을 때 방금 로컬에 저장한
    // 더 최신 내용이 예전 클라우드 스냅샷으로 되돌아가는 사고가 났음(국도화학 T-8405 실사용 중
    // WPS/Welder List가 사라진 원인 — 빈 배열([])도 참(truthy)이라 무조건 덮어써졌던 것도 원인).
    // savedAt 타임스탬프를 비교해 클라우드가 로컬보다 "진짜로 더 최신"일 때만 반영하고, 배열
    // 필드는 truthy가 아니라 length>0으로 판단한다.
    loadFromFirestoreOrSkip(cloud => {
      if ((cloud.savedAt||0) <= localSavedAt) return; // 로컬이 같거나 더 최신 — 클라우드로 덮어쓰지 않음
      if (cloud.proj?.no) setProj(cloud.proj);
      if (Array.isArray(cloud.items) && cloud.items.length) {
        const {items: fixedItems, fixed} = dedupeItemIds(cloud.items);
        setItems(fixedItems);
        if (fixed > 0) showMsg(`⚠ 아이템 ${fixed}개에서 id 중복이 발견되어 자동으로 분리했습니다. 방금 분리된 아이템들의 내용을 다시 한번 확인해주세요(도면/등록 정보가 다른 아이템 것으로 잘못 들어가 있을 수 있습니다).`, 12000);
        if (cloud.itpRowsByItem) setItpRowsByItem(cloud.itpRowsByItem);
        else if (cloud.itpRows?.length && fixedItems.length) setItpRowsByItem(Object.fromEntries(fixedItems.map(it => [it.id, JSON.parse(JSON.stringify(cloud.itpRows))])));
        if (cloud.itpDocNoByItem) setItpDocNoByItem(cloud.itpDocNoByItem);
        else if (cloud.itpDocNo && fixedItems.length) setItpDocNoByItem(Object.fromEntries(fixedItems.map(it => [it.id, cloud.itpDocNo])));
        if (cloud.itpRevByItem) setItpRevByItem(cloud.itpRevByItem);
        if (cloud.itpHdrByItem) setItpHdrByItem(cloud.itpHdrByItem);
        else if (cloud.itpRev && fixedItems.length) setItpRevByItem(Object.fromEntries(fixedItems.map(it => [it.id, cloud.itpRev])));
      }
      if (cloud.specReqs?.length) setSpecReqs(cloud.specReqs);
      if (cloud.quoteItems?.length) setQuoteItems(cloud.quoteItems);
      if (cloud.revComments?.length) setRevComments(cloud.revComments);
      if (cloud.wpsList?.length) { setWpsList(cloud.wpsList); saveMasterList("wps", cloud.wpsList); }
      if (cloud.welderList?.length) { setWelderList(cloud.welderList); saveMasterList("welder", cloud.welderList); }
      if (cloud.inspectorList?.length) { setInspectorList(cloud.inspectorList); saveMasterList("inspector", cloud.inspectorList); }
      showMsg("✓ 클라우드에서 최신 데이터를 불러왔습니다", 4000);
    });
  }, []);

  useEffect(() => {
    const timer = setTimeout(() => {
      const savedAt = Date.now();
      const payload = {proj, items, specReqs, quoteItems, revComments, itpRows: buildLegacyItpRows(), itpRowsByItem, itpDocNoByItem, itpRevByItem, itpHdrByItem, wpsList, welderList, inspectorList, savedAt};
      const ok = saveLS({...payload, items: stripDwgForLocalStorage(items)});
      if (!ok) warnLocalSaveFailed();
      pushToFirestore(payload);
    }, 1000);
    return () => clearTimeout(timer);
  }, [proj, items, specReqs, quoteItems, revComments, itpRowsByItem, itpDocNoByItem, itpRevByItem, itpHdrByItem, wpsList, welderList, inspectorList]);

  // v1.5 — 업로드된 WPS/Welder 목록을 window 전역에도 반영 (동일 페이지 내 다른 참조 대응)
  useEffect(() => { if (wpsList.length) window.WPS_LIST = wpsList; }, [wpsList]);
  useEffect(() => { if (welderList.length) window.WELDER_LIST = welderList; }, [welderList]);
  useEffect(() => { if (inspectorList.length) window.INSPECTOR_LIST = inspectorList; }, [inspectorList]);

  // v2.3 — 아이템마다 독립된 itpRowsByItem을 채우는 유일한 지점. 아이템 생성 경로가 3곳
  // (addItem, applyParsedResult의 project/quote 파싱)이라 각각 시딩 코드를 넣는 대신, 이미
  // 전체 아이템을 순회하는 이 effect가 "아직 항목이 없는 아이템에 기본값을 채우는" 역할까지
  // 겸한다 — 새 아이템은 다음 렌더에서 자동으로 ITP_BASE+specReqs 행을 받는다. 기존 아이템의
  // id<1000(수동 편집분)은 그대로 보존하고 id>=1000(스펙 파생분)만 재생성한다.
  // ⚠ 아래 마이그레이션 effect(위쪽에 선언됨)보다 반드시 나중에 실행되어야 함 — 둘 다
  // 함수형 업데이트(prev=>...)를 쓰므로 순서가 지켜지면 마이그레이션 결과를 덮어쓰지 않는다.
  // v2.6 fix — 예전엔 specReqs가 바뀔 때마다(또는 프로젝트를 다시 열 때마다) 이 effect가
  // 자동으로 재실행돼서, Step 2에서 스펙 파생 행(id>=1000)을 수동으로 삭제해도 다시 들어올
  // 때마다 되살아나는 불편이 있었음. 이제 이 effect는 "아직 아무 항목도 없는 새 아이템"에
  // 처음 한 번 시딩하는 역할만 하고, 이미 있는 아이템의 스펙 파생 행 재생성은 아래
  // applySpecReqsToExistingItems()로 분리해 "다음 → 아이템 등록" 버튼을 눌렀을 때만 실행한다.
  useEffect(() => {
    setItpRowsByItem(prev => {
      const next = {...prev};
      let changed = false;
      items.forEach(it => {
        if (next[it.id]) return; // 이미 있는 아이템은 여기서 건드리지 않음
        next[it.id] = [...ITP_BASE, ...buildSpecRows(specReqs)];
        changed = true;
      });
      return changed ? next : prev;
    });
  }, [items]);

  // v2.6 — Step 0 "다음 → 아이템 등록" 클릭 시에만 명시적으로 호출. 현재 등록된 모든 아이템의
  // id>=1000(스펙 파생) 블록을 지금 specReqs 기준으로 재생성하고, id<1000(수동 편집분)은 보존.
  const applySpecReqsToExistingItems = () => {
    setItpRowsByItem(prev => {
      const next = {...prev};
      items.forEach(it => {
        const existing = next[it.id];
        const base = existing ? existing.filter(r => r.id < 1000) : [...ITP_BASE];
        next[it.id] = [...base, ...buildSpecRows(specReqs)];
      });
      return next;
    });
  };

  useEffect(() => {
    if (!proj.no) return;
    const yr = new Date().getFullYear().toString().slice(-2);
    setItpDocNoByItem(prev => {
      const next = {...prev};
      let changed = false;
      items.forEach((it, idx) => {
        if (next[it.id]) return; // 이미 있는 문서번호는 덮어쓰지 않음
        next[it.id] = window.SJP?.bridge?.generateDocNo
          ? window.SJP.bridge.generateDocNo(proj.no, "ITP", idx+1)
          : `SJ-QA-ITP-${proj.no}-${yr}-${String(idx+1).padStart(3,"0")}`;
        changed = true;
      });
      return changed ? next : prev;
    });
    setItpRevByItem(prev => {
      const next = {...prev};
      let changed = false;
      items.forEach(it => { if (next[it.id] === undefined) { next[it.id] = "0"; changed = true; } });
      return changed ? next : prev;
    });
  }, [proj.no, items]);

  // v2.3 — Step 2 진입 시 첫 아이템을 기본 선택. 선택돼 있던 아이템이 삭제된 경우에도
  // 여기서 다른 아이템으로 자동 대체된다.
  useEffect(() => {
    if (step === 2 && items.length && !items.some(it => it.id === selectedItpItemId)) {
      // v1.8: URL로 지정된 태그/아이템(왼쪽 패널에서 선택해 들어온 것)을 우선 메인으로 선택. 없으면 첫 아이템.
      const utag = URL_PARAMS.get("tag");
      const uiid = URL_PARAMS.get("itemId");
      const match = items.find(it => (utag && it.tag === utag) || (uiid && String(it.epcId) === String(uiid)));
      setSelectedItpItemId((match || items[0]).id);
    }
  }, [step, items, selectedItpItemId]);

  const showMsg = (text, ms=4000) => { setMsg(text); setTimeout(() => setMsg(""), ms); };

  // v1.8 — 파싱 결과를 상태에 반영하는 부분을 분리. API 키로 자동 호출하든, claude.ai에서
  // 수동으로 받은 JSON을 붙여넣든 동일한 로직으로 반영한다.
  const applyParsedResult = (kind, parsed, targetItemId=null, fileMeta=null) => {
    if (kind === "project") {
      // v1.9 — WO/시방서/견적서를 굳이 구분해서 올리지 않아도, 문서에 들어있는 항목만 알아서 반영.
      // Claude가 못 찾은 항목은 키 자체가 비어있거나 없으므로 각각 존재 여부로 판단.
      const proj2 = parsed.project || parsed;
      const foundParts = [];
      if (proj2 && (proj2.no || proj2.name || proj2.customer || proj2.po || proj2.scope)) {
        setProj(p => ({
          ...p,
          no: proj2.no || p.no, name: proj2.name || p.name, customer: proj2.customer || p.customer,
          po: proj2.po || p.po, scope: proj2.scope || p.scope
        }));
        foundParts.push("프로젝트 정보");
      }
      const reqs = Array.isArray(parsed.requirements) ? parsed.requirements : [];
      if (reqs.length > 0) { setSpecReqs(prev => [...prev, ...reqs]); foundParts.push(`추가 요구사항 ${reqs.length}개`); }
      const qi = Array.isArray(parsed.items) ? parsed.items : [];
      if (qi.length > 0) {
        setQuoteItems(prev => [...prev, ...qi]);
        setItems(prev => {
          const byTag = new Map(prev.map(it => [it.tag, it]));
          qi.forEach(qi2 => { if (qi2.tag && !byTag.has(qi2.tag)) byTag.set(qi2.tag, {...DEF_ITEM, ...qi2, id: Date.now()+Math.random()}); });
          return Array.from(byTag.values());
        });
        foundParts.push(`아이템 ${qi.length}개`);
      }
      showMsg(foundParts.length ? `✓ 반영 완료 — ${foundParts.join(", ")}` : `⚠ 이 문서에서 인식 가능한 정보를 찾지 못했습니다`, 5000);
    } else if (kind === "wo") {
      setProj(p => ({
        ...p,
        no: parsed.no || p.no, name: parsed.name || p.name, customer: parsed.customer || p.customer,
        po: parsed.po || p.po, scope: parsed.scope || p.scope
      }));
      showMsg(`✓ Work Order 반영 완료 — 프로젝트 정보 업데이트`, 5000);
    } else if (kind === "spec") {
      const reqs = Array.isArray(parsed.requirements) ? parsed.requirements : [];
      setSpecReqs(reqs);
      showMsg(`✓ 시방서 반영 완료 — 추가 요구사항 ${reqs.length}개`, 5000);
    } else if (kind === "quote") {
      const qi = Array.isArray(parsed.items) ? parsed.items : [];
      setQuoteItems(qi);
      // 견적서 기반 사전 등록 — 이미 있는 Tag는 건드리지 않고 신규 Tag만 추가
      setItems(prev => {
        const byTag = new Map(prev.map(it => [it.tag, it]));
        qi.forEach(qi2 => { if (qi2.tag && !byTag.has(qi2.tag)) byTag.set(qi2.tag, {...DEF_ITEM, ...qi2, id: Date.now()+Math.random()}); });
        return Array.from(byTag.values());
      });
      showMsg(`✓ 견적서 반영 완료 — 아이템 ${qi.length}개 추출/사전 등록`, 5000);
    } else {
      const dwgUrl = fileMeta ? `data:${fileMeta.mediaType};base64,${fileMeta.b64}` : undefined;
      const dwgName = fileMeta ? fileMeta.name : undefined;
      // v2.0 — 다중태그 도면(하나의 도면이 여러 TAG를 커버) 감지. 스펙 필드만 추리고
      // 제어용 필드(tag/tags/shared_drawing/req_qty)는 아이템에 저장하지 않는다(죽은 필드 방지).
      const tags = Array.isArray(parsed.tags) ? parsed.tags.map(t=>String(t).trim()).filter(Boolean) : [];
      const shared = !!parsed.shared_drawing && tags.length > 1;
      const note = (parsed.tag_review_note||"").trim();
      const {tags:_t, shared_drawing:_s, req_qty:_q, tag:_tg, tag_review_note:_n, ...specFields} = parsed;
      const spec = {...specFields, ...(dwgUrl?{dwgUrl, dwgName}:{}), ...(note?{tag_review_note:note}:{})};
      if (shared) {
        // 즉시 반영하지 않고 확인 모달을 띄운다. (확인 시 태그별 upsert — doApplySharedDwg)
        const existing = new Set(items.map(i => (i.tag||"").trim()));
        setSharedDwgModal({ tags, note, spec, existing });
        return;
      }
      const patch = {...spec};
      if (targetItemId) {
        setItems(prev => prev.map(it => it.id === targetItemId ? {...it, ...patch} : it));
        showMsg(note ? `✓ 도면 반영 완료 — 기존 아이템에 적용 (⚠ 확인 필요: ${note})` : `✓ 도면 반영 완료 — 기존 아이템에 적용`, note?9000:5000);
      } else {
        setNewItem(prev => ({...prev, ...patch, tag: prev.tag || parsed.tag || ""}));
        showMsg(note ? `✓ 도면 반영 완료 — 아이템 필드 자동 채움 (⚠ 확인 필요: ${note})` : `✓ 도면 반영 완료 — 아이템 필드 자동 채움`, note?9000:5000);
      }
    }
  };
  // v2.0 — 다중태그 도면 확인 모달에서 "등록/갱신" 클릭 시 태그별 upsert 실행.
  // doImportSelected(프로젝트 태그 가져오기)와 동일한 관용구: 기존 태그는 갱신, 없는 태그는 생성.
  const doApplySharedDwg = () => {
    const m = sharedDwgModal; if (!m) return;
    const { tags, spec } = m;
    // 카운트는 setItems 밖에서 미리 계산(업데이터 안에서 세면 showMsg가 먼저 실행돼 0으로 뜸).
    const haveTags = new Set(items.map(i => (i.tag||"").trim()));
    let added = 0, updated = 0;
    tags.forEach(t => { if (haveTags.has(t.trim())) updated++; else added++; });
    const tagSet = new Set(tags.map(t=>t.trim()));
    setItems(prev => {
      const next = prev.map(it => tagSet.has((it.tag||"").trim()) ? {...it, ...spec, tag: it.tag} : it);
      const existing = new Set(prev.map(it => (it.tag||"").trim()));
      tags.forEach(t => {
        if (!existing.has(t.trim())) next.push({ ...DEF_ITEM, ...spec, tag: t, name: (spec.name||t), id: Date.now()+Math.random() });
      });
      return next;
    });
    setSharedDwgModal(null);
    showMsg(`✓ 다중태그 도면 반영 완료 — 태그 ${tags.length}개 (생성 ${added}·갱신 ${updated})${m.note?` · ⚠ ${m.note}`:""}`, 9000);
  };

  // v1.8 — claude.ai에서 수동으로 받아온 JSON 결과를 그대로 반영 (API 키 불필요)
  const handlePasteApply = (kind, rawText, targetItemId=null) => {
    try {
      const parsed = extractJSON(rawText);
      applyParsedResult(kind, parsed, targetItemId);
      return true;
    } catch (err) {
      showMsg(`⚠ JSON 적용 실패 — ${err.message||"형식을 확인해주세요"}`, 6000);
      return false;
    }
  };
  const copyPrompt = (text) => {
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(
        () => showMsg("✓ 프롬프트 복사됨 — claude.ai에 PDF와 함께 붙여넣으세요", 5000),
        () => showMsg("⚠ 클립보드 복사 실패 — 직접 선택해서 복사해주세요", 5000)
      );
    } else {
      showMsg("⚠ 이 브라우저는 클립보드 복사를 지원하지 않습니다", 5000);
    }
  };

  const buildParsePrompt = (kind) => {
    if (kind === "project") return `This document may be a Work Order, a specification, a quotation, or some combination — figure out which parts are actually present and extract ONLY those. Return JSON only, no explanation, using this shape: {"project":{"no":"","name":"","customer":"","po":"","scope":""},"requirements":[{"category":"","activity":"","code":"","criteria":"","hold":false,"doc":""}],"items":[{"tag":"","name":"","type":"","appl_code":""}]}. Leave "project" fields as "" and "requirements"/"items" as [] for anything not actually present in the document — do not invent data. "po" = the Work Order's "Report No." field value (NOT a purchase-order number — this document's own report/document number). "requirements" = customer special inspection/test requirements beyond standard ITP items ("hold" true only if explicitly a hold/witness point). "items" = equipment/items to be manufactured, "type" one of: ${JSON.stringify(ITYPES)}.`;
    if (kind === "wo") return `Extract project info from this Work Order document. Return JSON only, no explanation: {"no":"","name":"","customer":"","po":"","scope":""}. "po" = this Work Order's own "Report No." field value (NOT a purchase-order number). Use "" for anything not found.`;
    if (kind === "spec") return `Extract customer special inspection/test requirements (beyond standard ITP items) from this specification document. Return JSON only: {"requirements":[{"category":"","activity":"","code":"","criteria":"","hold":false,"doc":""}]}. "hold" is true only if it is explicitly a hold/witness point requiring approval before proceeding. Return {"requirements":[]} if none found.`;
    if (kind === "quote") return `Extract the list of equipment/items to be manufactured from this quotation document. Return JSON only: {"items":[{"tag":"","name":"","type":"","appl_code":""}]}. "type" must be one of: ${JSON.stringify(ITYPES)}. Return {"items":[]} if none found.`;
    // v1.9 — QA Doc Generator의 BOM/Fit-up/Nozzle/Hydro/DIM 리포트가 실제로 쓰는 항목까지 전부
    // 도면에서 한 번에 뽑아오도록 확장 (기존엔 기본 스칼라 필드 몇 개만 요청했음).
    return `You are an expert pressure vessel engineer analyzing a fabrication drawing (may be multi-page PDF — check all pages).

[TITLE BLOCK SEARCH] The main material list ("DETAIL OF BODY" / "BOM OF MATERIAL") page is not always page 2 — check each page's title block (bottom-right) to find it.

[TAG & SHARED-DRAWING CHECK] (do this FIRST, before other fields)
1. Read the TAG NO./ITEM NO. in the Page 1 title block, then check the title block of EVERY other page too. If Page 1 and the detail sheets show DIFFERENT tags (e.g. cover "TA-6102A,B/6103A,B" vs detail "TA-6602A,B/6603A,B"), do NOT pick one arbitrarily: set "tag" to the Page 1 value and record BOTH verbatim in "tag_review_note" as "Page1 표제: X / 상세도 표제: Y — 확인 필요".
2. Read the "NO. OF REQ'D" value in the DESIGN DATA box into "req_qty" (numbers only).
3. Decide whether the TAG notation compresses multiple items, e.g. "TA6602AB/6603AB", "TA-6602A,B/6603A,B", "TK-1201/1202". Split base numbers on "/" and expand the suffix letters (A,B, …) to fill "tags". Example: "TA6602AB/6603AB" → ["TA-6602A","TA-6602B","TA-6603A","TA-6603B"]. If tags.length ≥ 2, set "shared_drawing": true.
4. If tags.length and req_qty disagree (or there is no compressed notation but req_qty > 1), do NOT invent tag numbers: fill "tags" only as far as certain (or leave []), set "shared_drawing": true, and put "도면 1개가 {req_qty}대에 공용 적용되나 개별 TAG NO.가 명시되지 않음 — 수동 확인 필요" in "tag_review_note".
5. If a remark/nameplate/footnote (NOT the title block) says things like "본 도면 OO TAG와 동일", "2 SETS 제작", but the extra TAG numbers are not explicitly written, do NOT add them to "tags" — quote the original text into "tag_review_note" and set "shared_drawing": true.
6. Otherwise (single tag, req_qty = 1): "tags":[tag], "shared_drawing": false, "tag_review_note":"".

[BOM_ROWS] From that material list table, extract ALL rows as an array: {name, mat, thk, sz, qty, remark}.
- name: part name (e.g. "SHELL","TOP HEAD","BOTTOM HEAD","JACKET SHELL","TUBE SHEET","GIRTH FLANGE","CHANNEL","NOZZLE PIPE","REINFORCE PAD", etc.)
- mat: material column. thk: thickness (numbers only). sz: size/dimension (e.g. "Ø1200xL3000","150A x SCH.40"). qty: numbers only. remark: remark column.
Skip blank rows. Don't invent rows for parts that don't exist on this equipment (e.g. no jacket → no jacket rows).

[DERIVE FROM BOM_ROWS] shell_mat/shell_thk/shell_len = SHELL row. head_top_mat/head_bot_mat = TOP/BOTTOM HEAD rows. ts_mat/ts_thk = TUBE SHEET row. gf_mat/gf_thk = GIRTH FLANGE row. tube_mat/tube_od = TUBE row.
shell_is_pipe = true if the SHELL row shows pipe notation (e.g. "10B x SCH.40", "450A") instead of a plate ID — in that case set shell_od (numeric OD in mm) and shell_od_display (e.g. "267.4mm (10BxSCH.40)"); otherwise leave shell_od/shell_od_display empty and shell_id = the plate inner diameter.

[APPL_CODE] Page 1 "DESIGN DATA" box, first row (label "CODE"/"Appl. Code") — copy the full value (e.g. "ASME Sec. VIII Div.1 / TEMA C").

[PRESSURES] In the same DESIGN DATA box: design_p = shell-side design pressure (MPa, numbers only). For Heat Exchangers also read tube_side_p. Under the "Test Pressure"/"HYDRO" row: test_p_shell = shell-side value, test_p_tube = tube-side value (Heat Exchanger only, else ""). mawp = maximum allowable working pressure if separately shown, else same as design_p.

[TYPE] "Condenser / Heat Exchanger" if TUBE+TUBESHEET present, "Reactor (Mixing Tank)" if AGITATOR/IMPELLER shown, "Storage Tank" if TANK with no agitator/tubes, else "Pressure Vessel".

[HEAD TYPE — top and bottom may differ] Read TOP HEAD and BOTTOM HEAD rows' shape notation and normalize to one of: ${JSON.stringify(HEAD_TYPES)}. If only one head type applies to the whole vessel, use the same value for both. Also extract head_thk_top/head_thk_bottom (numbers only).

[WELD SEAM PLAN] Heat Exchangers: "WELD SEAM PLAN" (page 1 bottom). Tanks: "WELD DETAIL" (page 2 top-right). Extract every seam joint number as a string array, e.g. ["SC-01","SL-01","JC-01","JL-01"] (SC=Shell Circ, SL=Shell Long, JC=Jacket Circ, JL=Jacket Long). Return [] if not found.

[JOINT DETAILS] For each weld joint's sectional detail drawing (especially SL-prefixed, shell longitudinal), extract root angle/tolerance and max root gap: {joint_no, root_angle, root_tol, root_gap_max} (numbers only, use 0 if not shown). Return array under joint_details, [] if none found.

[NOZZLE LIST] From the "NOZZLE LIST" table (page 1), extract every row: {no, size, pos, is_pad}. no = label as shown (e.g. "N-1","AG-1","M-1" — keep agitator/manhole labels exact). size = e.g. "200A". pos = orientation (e.g. "TOP/0","SIDE/90"). is_pad = true if that row shows "PAD" instead of a pipe size. Return [], if none found.

[JACKET/INCOIL/HALFCOIL] true only if explicitly shown on the drawing.

Return ONLY valid JSON, no markdown fences: {"tag":"","tags":[],"req_qty":"","shared_drawing":false,"tag_review_note":"","name":"","type":"","appl_code":"","shell_mat":"","shell_id":"","shell_len":"","shell_thk":"","shell_od":"","shell_od_display":"","shell_is_pipe":false,"design_p":"","design_t":"","tube_mat":"","tube_od":"","tube_side_p":"","test_p_shell":"","test_p_tube":"","mawp":"","ts_mat":"","ts_thk":"","gf_mat":"","gf_thk":"","head_top_type":"","head_bot_type":"","head_top_mat":"","head_bot_mat":"","head_thk_top":"","head_thk_bottom":"","jacket":false,"incoil":false,"halfcoil":false,"weld_seams":[],"joint_details":[],"nozzles":[],"bom_rows":[]}.
"type" must be one of: ${JSON.stringify(ITYPES)}. Use "" / false / [] for anything unreadable — do not guess or invent values.`;
  };

  // v1.7 — 접속자 본인 API 키로 실제 AI 파싱 수행 (WO/시방서/견적서/도면)
  const handleFile = async (file, kind, targetItemId=null) => {
    const kindLabel = kind==="project"?"프로젝트 문서":kind==="wo"?"Work Order":kind==="spec"?"시방서":kind==="quote"?"견적서":"도면";
    setParsing(kind);
    showMsg(`⏳ ${kindLabel} 분석 중... (최대 1분 정도 걸릴 수 있습니다)`, 60000);
    try {
      const b64 = await fileToBase64(file);
      const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
      const mediaType = isPdf ? "application/pdf" : (file.type || "image/png");
      const blockType = isPdf ? "document" : "image";
      const prompt = buildParsePrompt(kind);
      const res = await callAPI({
        model: "claude-sonnet-4-20250514",
        max_tokens: kind === "dwg" ? 4096 : 2048, // v1.9 — 도면은 nozzles/joint_details/bom_rows 배열까지 뽑아서 응답이 길어짐
        messages: [{role:"user", content:[{type:blockType, source:{type:"base64", media_type:mediaType, data:b64}}, {type:"text", text:prompt}]}]
      });
      const text = (res.content||[]).map(c=>c.text||"").join("");
      const parsed = extractJSON(text);
      applyParsedResult(kind, parsed, targetItemId, {b64, mediaType, name:file.name});
    } catch (err) {
      console.error(err);
      showMsg(`⚠ ${kindLabel} 분석 실패 — ${err.message||"알 수 없는 오류"}`, 8000);
    } finally {
      setParsing(null);
    }
  };

  // v1.5 — WPS/Welder List 업로드 (xlsx/pdf/csv). AI(Cowork) 의존 없이 클라이언트에서 직접 파싱.
  const loadXLSX = async () => {
    if (window.XLSX) return window.XLSX;
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
      s.onload = () => resolve(window.XLSX);
      s.onerror = () => reject(new Error("SheetJS CDN load failed"));
      document.head.appendChild(s);
    });
  };
  const loadPDFJS = async () => {
    if (window.pdfjsLib) return window.pdfjsLib;
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      s.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; resolve(window.pdfjsLib); };
      s.onerror = () => reject(new Error("PDF.js CDN load failed"));
      document.head.appendChild(s);
    });
  };
  const parseListFile = async (file, kind) => {
    if (!file) return;
    const ext = file.name.toLowerCase().split(".").pop();
    showMsg(`⏳ ${file.name} 분석 중...`);
    try {
      let texts = [];
      if (ext === "xlsx" || ext === "xls") {
        const XLSX = await loadXLSX();
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, {type:"array"});
        wb.SheetNames.forEach(sn => {
          const sheet = wb.Sheets[sn];
          const rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, defval:""});
          rows.forEach(r => texts.push(r.map(c=>String(c||"")).join("\t")));
        });
      } else if (ext === "pdf") {
        const pdfjs = await loadPDFJS();
        const buf = await file.arrayBuffer();
        const pdf = await pdfjs.getDocument({data:buf}).promise;
        for (let i=1; i<=pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const tc = await page.getTextContent();
          const lineMap = {};
          tc.items.forEach(it => { const y = Math.round(it.transform[5]); if (!lineMap[y]) lineMap[y]=[]; lineMap[y].push({x:it.transform[4], s:it.str}); });
          Object.keys(lineMap).sort((a,b)=>b-a).forEach(y => {
            const line = lineMap[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join("\t");
            texts.push(line);
          });
        }
      } else {
        const text = await file.text();
        texts = text.split(/\r?\n/);
      }
      const arr = [];
      const seen = new Set();
      if (kind === "wps") {
        // WPS No. 패턴: SJTC-WPS-XXX, GTAW-001 등 (셀 단위 매칭 우선)
        texts.forEach(line => {
          line.split(/\t+/).map(c=>c.trim()).forEach(c => {
            const m = c.match(/^([A-Z]{1,4}-)?[A-Z]{2,5}-\d{2,3}(-\d{2})?$/);
            if (m && !seen.has(c) && !c.match(/^(P|F|G|A|NO)-?\d/i)) { seen.add(c); arr.push(c.startsWith("SJTC-")?c:`SJTC-WPS-${c}`); }
          });
        });
        // fallback: 줄 전체에서 SJTC-WPS-XXX 패턴 직접 스캔 (셀 분리가 깨진 PDF 대응)
        if (arr.length === 0) {
          texts.forEach(line => { const m = line.match(/SJTC-WPS-[A-Z0-9-]+/g); if (m) m.forEach(x => { if (!seen.has(x)) { seen.add(x); arr.push(x); } }); });
        }
      } else if (kind === "welder") {
        // Welder ID 패턴: SJ-XXX-XX-NN. PDF는 텍스트 항목이 셀 경계 없이 이어붙는 경우가 많아
        // (버그 수정) 셀 전체와 정확히 일치해야 하는 anchor(^...$) 매칭 대신, 줄 전체에서 부분 문자열로 스캔.
        // v2.0 — 같은 줄에서 자격 만료일(YYYY-MM-DD/YYYY.MM.DD/YYYY/MM/DD)도 함께 찾아서, 있으면
        // {id,name,dueDate} 객체로 저장 (만료 임박 계산에 사용). 날짜가 없으면 예전처럼 문자열 그대로.
        // v3.2 — 관리대장에 발급일/갱신일/만료일 등 날짜가 한 줄에 여러 개 섞여 있으면 첫 번째(대개
        // 발급일=과거 날짜)를 잘못 집어서 "이미 만료"로 오판정하던 버그 수정. "만료" 라벨 바로
        // 뒤 날짜를 최우선으로 쓰고, 라벨이 없으면 해당 줄~다음 2줄 중 가장 늦은(미래) 날짜를 채택
        // (만료일은 통상 발급일보다 늦은 날짜이므로).
        const isXlsx = (ext === "xlsx" || ext === "xls");
        // v3.6 — 이름 셀 매칭 전략을 xlsx/PDF로 분리.
        // - xlsx: SheetJS가 병합 셀을 항상 병합 범위의 "첫 행"에만 값으로 채워주고 행 순서도 원본
        //   그대로 보존하므로, "가장 최근에 본 이름을 계속 물려쓰는" 순차 방식이 정확함 (예: GT-01/
        //   FC-01/SAW 3개 공정이 한 이름 아래 있어도 이름 칸은 첫 행에만 있고 나머지는 비어 있음 —
        //   실제 파일로 확인. 이 경우 "가장 가까운 줄"로 찾으면 SAW 행이 다음 사람 이름을 잘못
        //   물려받는 회귀가 생김).
        // - PDF: pdf.js가 y좌표로 줄을 재구성할 때, GT-01/FC-01 두 행에 걸친 병합 이름 셀이 그 두
        //   행 "사이"에 놓이는 경우가 있어 각 사람의 첫 번째 행(GT-01)이 이전 사람 이름을 잘못
        //   물려받는 문제가 있었음(실제 PDF로 재현). 이 경우는 줄 인덱스가 가장 가까운 이름을
        //   앞뒤 상관없이 채택해야 정확함.
        let curNameSeq = "";
        const seqNameByLine = texts.map(line => {
          const nameCell = line.split(/\t+/).map(c=>c.trim()).find(c => /^[가-힣]{2,4}$/.test(c));
          if (nameCell) curNameSeq = nameCell;
          return curNameSeq;
        });
        const nameLines = [];
        texts.forEach((line, li) => {
          const nameCell = line.split(/\t+/).map(c=>c.trim()).find(c => /^[가-힣]{2,4}$/.test(c));
          if (nameCell) nameLines.push({li, name: nameCell});
        });
        const nearestName = (li) => {
          if (!nameLines.length) return "";
          let best = nameLines[0], bestDist = Math.abs(nameLines[0].li - li);
          for (const n of nameLines) {
            const d = Math.abs(n.li - li);
            if (d < bestDist) { best = n; bestDist = d; }
          }
          return best.name;
        };
        // v3.5 — 엑셀 날짜 셀은 SheetJS(raw:false)가 셀 자체의 표시 서식을 그대로 따라가는데, 이
        // 회사 양식은 "m/d/yy" 짧은 날짜 서식이라 "10/29/26"(연도 2자리, 맨 뒤)으로 나온다. 기존
        // 정규식은 "연도 4자리가 맨 앞"만 허용해서 이 값을 아예 못 읽고 있었음(실제 파일로 재현·확인).
        // 연도-앞(YYYY-MM-DD 등)과 연도-뒤(M/D/YY, M/D/YYYY) 두 형태를 모두 지원.
        const parseAnyDate = (str) => {
          if (!str) return "";
          let m = str.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/); // YYYY-MM-DD 형
          if (m) return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
          m = str.match(/(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{2}|\d{4})/); // M/D/YY(YY) 형 (미국식, 엑셀 짧은 날짜)
          if (m) {
            let yr = m[3];
            if (yr.length === 2) yr = (parseInt(yr,10) < 50 ? "20" : "19") + yr;
            return `${yr}-${String(m[1]).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`;
          }
          return "";
        };
        // v3.4 — xlsx(회사 표준 양식)는 셀 좌표가 그대로 보존되므로, 줄 안의 아무 날짜나 스캔하는
        // 대신 "만료" 라벨이 있는 헤더 열을 찾아 그 열 값만 만료일로 쓴다. 기존 방식은 O열(최초
        // 승인일자)과 Q열(승인 만료일자)이 한 줄에 같이 있을 때 잘못된 날짜를 집을 위험이 있었음.
        // 헤더에서 "만료" 열을 못 찾으면 회사 양식 기준 Q열(0-index 16)을 기본값으로 사용.
        // v3.4 주의: 이 블록만 split("\t") (단일 탭)을 써야 함 — split(/\t+/)는 빈 셀이 연속될 때
        // 구분자를 하나로 합쳐버려서 이후 모든 컬럼 인덱스가 밀려버림 (실제 xlsx 테스트로 확인된 버그).
        let expiryColIdx = -1;
        if (isXlsx) {
          for (const line of texts) {
            const idx = line.split("\t").findIndex(c => c.includes("만료"));
            if (idx >= 0) { expiryColIdx = idx; break; }
          }
          if (expiryColIdx < 0) expiryColIdx = 16; // Q열 기본값
        }
        const findDueDateXlsx = (li) => parseAnyDate((texts[li].split("\t")[expiryColIdx] || "").trim());
        const findDueDate = (li) => {
          const win = [texts[li]||"", texts[li+1]||"", texts[li+2]||""].join(" | ");
          const labelPos = win.indexOf("만료");
          if (labelPos >= 0) {
            const after = win.slice(labelPos, labelPos + 40);
            const d = parseAnyDate(after);
            if (d) return d;
          }
          const all = [...win.matchAll(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/g)].map(m => parseAnyDate(m[0]));
          if (!all.length) return "";
          return all.reduce((a,b) => (a > b ? a : b));
        };
        texts.forEach((line, li) => {
          const norm = line.replace(/\s+/g, "");
          const ms = norm.match(/SJ-[A-Z]{2,4}-[A-Z]{2,4}(-\d{2})?(,\d{2})?/g);
          if (!ms) return;
          const curName = isXlsx ? seqNameByLine[li] : nearestName(li);
          const dueDate = isXlsx ? findDueDateXlsx(li) : findDueDate(li);
          ms.forEach(id => {
            if (seen.has(id)) return;
            seen.add(id);
            arr.push(dueDate ? {id, name:curName||"", dueDate} : (curName?`${id} (${curName})`:id));
          });
        });
      } else {
        // v2.0 — 검사자(Inspector) 자격인정 관리대장: 선임감사자/감사자/검사자/시험원 4개 분야가
        // 섞여 있는데, 자격인정번호에 "QCI"가 포함된 사람만 뽑는다 (예: "CER-QCI-001 신채완").
        texts.forEach(line => {
          const cells = line.split(/\t+/).map(c=>c.trim()).filter(Boolean);
          const certIdx = cells.findIndex(c => /QCI/i.test(c));
          if (certIdx < 0) return; // QCI 자격번호가 있는 행만 채택
          const certNo = cells[certIdx];
          const nameIdx = cells.findIndex((c,i) => i!==certIdx && /^[가-힣]{2,4}$/.test(c));
          if (nameIdx < 0) return;
          const name = cells[nameIdx];
          if (seen.has(name)) return;
          seen.add(name);
          arr.push(`${name} (${certNo})`);
        });
        // fallback: 셀 분리가 깨진 PDF 대응 — 줄 전체에서 "...QCI... 이름" 패턴 직접 스캔
        if (arr.length === 0) {
          texts.forEach(line => {
            if (!/QCI/i.test(line)) return;
            const m = line.match(/([A-Z0-9-]*QCI[A-Z0-9-]*)\s+([가-힣]{2,4})/i) || line.match(/([가-힣]{2,4})\s+([A-Z0-9-]*QCI[A-Z0-9-]*)/i);
            if (!m) return;
            const [certNo, name] = /QCI/i.test(m[1]) ? [m[1], m[2]] : [m[2], m[1]];
            if (seen.has(name)) return;
            seen.add(name);
            arr.push(`${name} (${certNo})`);
          });
        }
      }
      if (arr.length === 0) {
        showMsg(`⚠ ${file.name}: 인식된 항목이 없습니다. 수동 입력 또는 형식 확인이 필요합니다.`, 6000);
        return;
      }
      const kindLabel = kind==="wps"?"WPS":kind==="welder"?"Welder":"검사자";
      let savedOk;
      if (kind === "wps") { setWpsList(arr); window.WPS_LIST = arr; savedOk = saveMasterList("wps", arr); }
      else if (kind === "welder") { setWelderList(arr); window.WELDER_LIST = arr; savedOk = saveMasterList("welder", arr); }
      else { setInspectorList(arr); window.INSPECTOR_LIST = arr; savedOk = saveMasterList("inspector", arr); }
      if (savedOk) showMsg(`✓ ${file.name}에서 ${arr.length}개 ${kindLabel} 항목 추출 완료 — QA Doc Generator에서도 자동 반영됩니다.`, 6000);
      else warnLocalSaveFailed();
    } catch (err) {
      console.error(err);
      showMsg(`⚠ 파싱 실패 — ${err.message||"알 수 없는 오류"}`, 6000);
    }
  };

  const addItem = () => {
    if (!newItem.tag || !newItem.name) { showMsg("⚠ Tag와 Name은 필수"); return; }
    // v2.2 fix: id를 Date.now()만으로 만들면 같은 밀리초 안에 여러 아이템을 연속 등록할 때
    // (WBS에서 넘어온 아이템을 짧은 간격으로 여러 개 등록하는 경우 등) id가 겹쳐서, 한 아이템의
    // 도면/등록 정보를 채우면 같은 id를 가진 다른 아이템에도 전부 똑같이 적용되는 사고가 있었음
    // (진양화성 SJE437-26 실사용 중 발견 — applyParsedResult의 it.id===targetItemId 매칭이
    // 여러 아이템에 동시에 걸림). 다른 아이템 생성 경로(1158/1181행)와 동일하게 Math.random() 추가.
    setItems(p => [...p, {...newItem, id: Date.now()+Math.random()}]);
    setNewItem({...DEF_ITEM});
    showMsg(`✓ 아이템 추가 — ${newItem.tag}`);
  };

  // v1.7 — 왼쪽 프로젝트 태그 전체를 ITP 아이템으로 한 번에 등록 (append-only, tag 기준 중복 방지).
  //   "왼쪽 태그 = ITP 아이템"으로 기대하는 사용자를 위해, 하나씩 추가하지 않고 일괄로 가져온다.
  //   v1.8: 전체 일괄이 아니라 '원하는 태그만' 체크해서 가져오도록 선택 모달을 연다.
  //   이미 등록된 태그를 다시 선택하면 장비명(type)·규격(spec)·이름을 최신값으로 '갱신(upsert)'한다
  //   → WBS/제작공정관리에서 나중에 장비명을 채워도 이 버튼으로 ITP에 반영할 수 있다.
  const openImportModal = () => {
    const epc = (window.SJP?.bridge?.getItems && window.SJP.bridge.getItems()) || [];
    if (!epc.length) { showMsg("가져올 프로젝트 태그가 없습니다. (EPC Control에서 프로젝트를 통해 열어주세요)", 6000); return; }
    const haveTags = new Set(items.map(i => (i.tag||"").trim()).filter(Boolean));
    const list = epc.filter(e => e.tag).map(e => ({
      id: e.id, tag: e.tag,
      type: e.type || "",
      spec: e.appl_code || e.spec || "",
      material: e.shell_mat || e.material || "",
      name: e.name || e.type || e.tag,
      already: haveTags.has((e.tag||"").trim()),
    }));
    const checked = {};
    list.forEach(x => { checked[x.tag] = !x.already; }); // 기본: 아직 없는 것만 체크
    if (list.every(x => x.already)) list.forEach(x => { checked[x.tag] = false; }); // 전부 이미 있으면 다 해제(갱신은 선택적)
    setImportModal({ list, checked });
  };
  const _toggleImp = (tag) => setImportModal(p => ({...p, checked:{...p.checked, [tag]: !p.checked[tag]}}));
  const _setAllImp = (v) => setImportModal(p => ({...p, checked: Object.fromEntries(p.list.map(x=>[x.tag, v]))}));
  const doImportSelected = () => {
    const m = importModal; if (!m) return;
    const chk = m.list.filter(x => m.checked[x.tag]);
    if (!chk.length) { showMsg("가져올 아이템을 하나 이상 선택하세요.", 5000); return; }
    const haveTags = new Set(items.map(i => (i.tag||"").trim()));
    let added = 0, updated = 0;
    chk.forEach(e => { if (haveTags.has((e.tag||"").trim())) updated++; else added++; });
    const chkByTag = new Map(chk.map(e => [(e.tag||"").trim(), e]));
    setItems(prev => {
      const next = prev.map(it => {
        const e = chkByTag.get((it.tag||"").trim());
        if (!e) return it;
        return { ...it, type: e.type||it.type, appl_code: e.spec||it.appl_code, shell_mat: e.material||it.shell_mat, name: e.name||e.type||it.name, epcId: e.id };
      });
      const existing = new Set(prev.map(it => (it.tag||"").trim()));
      chk.forEach(e => {
        const key = (e.tag||"").trim();
        if (!existing.has(key)) next.push({ ...DEF_ITEM, tag: e.tag, name: e.name||e.type||e.tag, type: e.type||DEF_ITEM.type, appl_code: e.spec||"", shell_mat: e.material||"", epcId: e.id, id: Date.now()+Math.random() });
      });
      return next;
    });
    setImportModal(null);
    showMsg(`✓ 가져오기 완료 — 추가 ${added}개 · 갱신 ${updated}개${added?" (승인된 ITP였다면 재승인이 필요합니다)":""}`, 9000);
  };

  // v1.9: 한 아이템의 ITP(검사항목)를 다른 아이템들로 복사. TA-6101A에 만든 검사표를
  //   나머지 장비에 그대로 복제하고 싶을 때 사용. 검사항목(행)은 항상 복사하고, Rev·헤더는 옵션.
  const openCopyModal = () => {
    const src = selectedItpItemId;
    if (!src || !items.some(it => it.id === src)) { showMsg("먼저 복사할 원본 아이템을 선택하세요.", 5000); return; }
    if (items.length < 2) { showMsg("복사할 대상 아이템이 없습니다. (아이템을 먼저 추가하세요)", 5000); return; }
    setCopyModal({ sourceId: src, checked: {}, inclRev: false, inclHdr: false });
  };
  const _toggleCopy = (id) => setCopyModal(p => ({...p, checked:{...p.checked, [id]: !p.checked[id]}}));
  const _setAllCopy = (v) => setCopyModal(p => ({...p, checked: Object.fromEntries(items.filter(it=>it.id!==p.sourceId).map(it=>[it.id, v]))}));
  const doCopyItp = () => {
    const m = copyModal; if (!m) return;
    const targets = Object.keys(m.checked).filter(id => m.checked[id]);
    if (!targets.length) { showMsg("복사할 대상 아이템을 하나 이상 선택하세요.", 5000); return; }
    const srcRows = itpRowsByItem[m.sourceId] || [];
    // 대상 아이템 id는 문자열 key로 저장돼 있을 수 있어(state map은 문자열 키), 원본 item.id로 매칭
    const srcRev = itpRevByItem[m.sourceId];
    const srcHdr = itpHdrByItem[m.sourceId] || {};
    let cnt = 0;
    const findItemId = (k) => { const it = items.find(x => String(x.id) === String(k)); return it ? it.id : k; };
    setItpRowsByItem(prev => {
      const next = {...prev};
      targets.forEach(k => {
        const tid = findItemId(k);
        next[tid] = JSON.parse(JSON.stringify(srcRows)).map((r, i) => ({...r, id: (Date.now()+i+Math.random())}));
        cnt++;
      });
      return next;
    });
    if (m.inclRev && srcRev != null) {
      setItpRevByItem(prev => { const next = {...prev}; targets.forEach(k => { next[findItemId(k)] = srcRev; }); return next; });
    }
    if (m.inclHdr) {
      // 헤더 중 Customer/Rev 라벨 등 공통값만 복사하고, itemLabel(장비명/태그)은 대상 고유값 유지
      setItpHdrByItem(prev => {
        const next = {...prev};
        targets.forEach(k => { const tid = findItemId(k); next[tid] = {...(next[tid]||{}), customer: srcHdr.customer, projName: srcHdr.projName, jobNo: srcHdr.jobNo }; });
        return next;
      });
    }
    setCopyModal(null);
    showMsg(`✓ ${(items.find(it=>it.id===m.sourceId)||{}).tag} 의 검사항목을 ${cnt}개 아이템에 복사했습니다.${m.inclRev?" (Rev 포함)":""}${m.inclHdr?" (헤더 포함)":""} — 각 아이템의 문서번호는 고유값으로 유지됩니다.`, 9000);
  };

  // v1.11: 아이템 순서 변경 → 문서번호(끝 숫자 그룹) 순번 재부여. ◀▶ 버튼·드래그 공용.
  const _resequenceDocNos = (ordered) => {
    setItpDocNoByItem(prev => {
      const out = {...prev};
      ordered.forEach((it, i) => {
        const cur = out[it.id];
        if (cur && /\d(\D*)$/.test(cur)) {
          out[it.id] = cur.replace(/(\d+)(\D*)$/, (m, num, tail) => String(i+1).padStart(num.length, "0") + tail);
        }
      });
      return out;
    });
  };
  const moveItem = (id, dir) => {
    const idx = items.findIndex(it => it.id === id);
    const j = idx + dir;
    if (idx < 0 || j < 0 || j >= items.length) return;
    const next = [...items];
    [next[idx], next[j]] = [next[j], next[idx]];
    setItems(next);
    _resequenceDocNos(next);
  };
  const moveItemToIndex = (from, to) => {
    if (from == null || to == null || from === to) return;
    if (from < 0 || from >= items.length || to < 0 || to >= items.length) return;
    const next = [...items];
    const [moved] = next.splice(from, 1);
    next.splice(to, 0, moved);
    setItems(next);
    _resequenceDocNos(next);
  };

  const removeItem = (id) => {
    if (!confirm("이 아이템을 삭제하시겠습니까?")) return;
    setItems(p => p.filter(i => i.id !== id));
    setItpRowsByItem(p => { const {[id]:_, ...rest} = p; return rest; });
    setItpDocNoByItem(p => { const {[id]:_, ...rest} = p; return rest; });
    setItpRevByItem(p => { const {[id]:_, ...rest} = p; return rest; });
    setItpHdrByItem(p => { const {[id]:_, ...rest} = p; return rest; });
    if (selectedItpItemId === id) setSelectedItpItemId(null);
  };

  // v2.1 — SJP bridge 전송(EPC Control/Firestore 연동)과 JSON 파일 다운로드를 분리.
  // bridge.setItems()가 쓰는 state.items[pid]는 WBS(제작공정관리) Firestore 구독이 실시간으로
  // 덮어쓸 수 있어 타이밍에 따라 안 먹힐 때가 있다 — QA Doc Generator는 이거 하나만 믿지 말고
  // 아래 sendToQADoc()의 즉시 localStorage 저장(같은 pid, sjp_itp_builder_v1__*)도 함께 본다.
  const pushToHost = () => {
    if (!window.SJP?.bridge) return false;
    window.SJP.bridge.setProject(proj);
    const epcItems = items.map(it => ({
      tagNo: it.tag, type: it.type, spec: it.appl_code, maker: it.maker || ""
    }));
    window.SJP.bridge.setItems(epcItems);
    setTimeout(() => {
      const epcItemsAfter = window.SJP.bridge.getItems();
      items.forEach(localItem => {
        const epc = epcItemsAfter.find(e => e.tagNo === localItem.tag);
        if (!epc) return;
        const tplItems = (itpRowsByItem[localItem.id] || []).filter(r => r.active !== false).map((r, idx) => {
          const rid = String(r.id || (idx+1)).padStart(2, "0");
          const ph = rid <= "05" ? 0 : rid <= "14" ? 1 : 2;
          const clientVal = (r.witness && r.witness.client) || r.client;
          const pt = ["H","W","SW","R","S","N/A"].includes(clientVal) ? clientVal : "W";
          return { id: rid, item: r.activity || "", ph: ph, pt: pt, crit: r.criteria || "" };
        });
        if (tplItems.length > 0) window.SJP.bridge.setItpTemplate(epc.id, tplItems);
      });
    }, 80);
    return true;
  };
  // v2.9 — 기존 "🚀 QA Doc Generator로 바로 전송" 버튼/함수(sendToQADoc) 삭제.
  // 이 함수가 하던 일(localStorage 저장·Firestore t_itpBuilderDocs 저장·bridge 반영)은 전부
  // 1초 자동저장 effect가 이미 상시 수행하므로 중복이었고, QA Doc Generator가 이미 저장된
  // 프로젝트를 열면 자동 갱신을 건너뛰어서 "전송했는데 안 보인다"는 오해만 만들었음.
  // 대신 QA Doc Generator의 "🔄 ITP 정보 끌어오기"가 클라우드(t_itpBuilderDocs)까지 직접
  // 읽도록 개선해, 다른 컴퓨터에서 작성한 것도 항상 최신으로 가져오게 함.
  // v3.2 — ITP를 결재선에 상신. 작성(본인) → [부서장 검토] → PM 승인.
  // index.html의 다단계 결재(approvals/approvalLine)와 동일 스키마로 문서 생성.
  const submitItpForApproval = async () => {
    const cur = fb.auth && fb.auth.currentUser;
    if (!cur) { showMsg("로그인 정보가 없습니다.", 5000); return; }
    if (PID === "standalone") { showMsg("프로젝트로 열지 않아(standalone) 결재를 올릴 수 없습니다. EPC Control에서 프로젝트를 통해 열어주세요.", 7000); return; }
    // PM 조회
    let pmUid = null, projCode = proj.no || "", projName = proj.name || "";
    try {
      const psnap = await fb.getDoc(fb.doc(fb.db, "projects", PID));
      if (psnap.exists()) { const pd = psnap.data(); pmUid = pd.pm || null; projCode = pd.code || projCode; projName = pd.name || projName; }
    } catch (e) { console.warn("PM 조회 실패:", e.message); }
    // v3.3: 결재선 직접 지정 모달을 연다 (기존 confirm 대신). 전체 사용자 목록 로드.
    let users = [];
    try {
      const us = await fb.getDocs(fb.collection(fb.db, "users"));
      users = us.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(u => !u.disabled)
        .sort((a,b) => (a.name||"").localeCompare(b.name||"", "ko"));
    } catch (e) { console.warn("사용자 목록 조회 실패:", e.message); }
    // 부서장 기본 추천 (내 부서 부장/manager)
    let headUid = "";
    try {
      const me = users.find(u => u.id === cur.uid);
      if (me && me.dept) {
        const pool = users.filter(u => u.dept === me.dept && u.id !== cur.uid);
        const head = pool.find(u => u.title === "부장") || pool.find(u => u.grade === "manager") || pool.find(u => u.grade === "super");
        headUid = head ? head.id : "";

    } catch (e) {}
    // v3.4: 결재가 본인에게 갇히던 사고(검토=작성자) 방지 —

    setAppvModal({

      // v3.5: 본인이 부서장/PM이라 스스로 승인권자인 경우 → '작성자 즉시 승인' 옵션.
      //   내가 PM이면 기본 체크(가장 흔한 상황), 아니면 꺼둠.
      selfApprove: !!(pmUid && pmUid === cur.uid),
      includeReview: false,           // 기본 검토 없음 — 필요할 때만 켜서 선택
      reviewerUid: "",
      approverUid: (pmUid && pmUid !== cur.uid) ? pmUid : "",  // 승인자 기본 PM (단, 본인이 PM이면 직접 선택)
    });
  };

  // v3.3: 모달에서 지정한 결재선으로 실제 상신. 작성(본인·자동승인) → [검토] → 승인.
  const doSubmitItpApproval = async () => {
    const cur = fb.auth && fb.auth.currentUser;

    // ── v3.5: 작성자 본인이 승인권자(부서장·PM) → 즉시 승인 처리 ──
    if (m.selfApprove) {
      const now = Date.now();
      const id = "app_" + now + "_" + Math.random().toString(36).slice(2, 6);
      const today = new Date().toISOString().slice(0, 10);
      const line = [
        { role: "작성", uid: cur.uid, status: "approved", decidedAt: now, note: "" },

        description: `ITP Builder에서 작성한 ITP 결재 (작성자 본인 승인, 검사 아이템 ${items.length}종)`,

      try {
        await writeItpDocToFirestore({ proj, items, specReqs, quoteItems, revComments, itpRows: buildLegacyItpRows(), itpRowsByItem, itpDocNoByItem, itpRevByItem, itpHdrByItem, wpsList, welderList, inspectorList, savedAt: Date.now() });
        // 승인 스탬프 (index.html decideApproval 의 finalApproved 로직과 동일 — 재승인 시 Rev.No +1)
        try {
          const iref = fb.doc(fb.db, "t_itpBuilderDocs", PID);
          const isnap = await fb.getDoc(iref);
          const icur = isnap.exists() ? isnap.data() : {};
          const ipatch = { approvalStatus: "approved", approvedBy: cur.uid, approvedAt: now, approvalId: id, approvedSig: icur.contentSig || null };
          const prevCount = Number(icur.approvalCount) || 0;
          ipatch.approvalCount = prevCount + 1;
          if (prevCount >= 1) {
            const rev = Object.assign({}, icur.itpRevByItem || {});
            (icur.items || []).forEach(it => { rev[it.id] = _bumpItpRev(rev[it.id]); });
            ipatch.itpRevByItem = rev;
          }
          await fb.setDoc(iref, ipatch, { merge: true });
        } catch (e) { console.warn("자가승인 스탬프 실패:", e.message); }
        await fb.setDoc(fb.doc(fb.db, "approvals", id), docData);
        showMsg("✅ 작성자 본인 권한으로 즉시 승인 완료 — ITP 조회에 바로 등록됩니다.", 8000);
      } catch (e) { showMsg("상신 실패: " + (e.message || e), 6000); }
      return;
    }
    // v3.4: 본인(작성자)을 검토·승인에 넣으면 결재가 본인에게 갇힘 → 강하게 차단
    if (m.includeReview && !m.reviewerUid) { showMsg("검토자를 선택하거나 '검토자 추가'를 꺼주세요.", 5000); return; }
    if (m.includeReview && m.reviewerUid === cur.uid) { showMsg("검토자를 본인으로 지정할 수 없습니다.", 5000); return; }
    if (!m.approverUid) { showMsg("승인자를 선택해주세요.", 5000); return; }
    if (m.approverUid === cur.uid) { showMsg("승인자를 본인으로 지정할 수 없습니다. 다른 사람을 선택해주세요.", 6000); return; }
    if (m.includeReview && m.reviewerUid === m.approverUid) { showMsg("검토자와 승인자가 같습니다. 다르게 지정하거나 검토를 빼주세요.", 6000); return; }
    const line = [{ role: "작성", uid: cur.uid, status: "approved", decidedAt: Date.now(), note: "" }];
    if (m.includeReview && m.reviewerUid) {
      line.push({ role: "검토", uid: m.reviewerUid, status: "pending", decidedAt: null, note: "" });
      line.push({ role: "승인", uid: m.approverUid, status: "waiting", decidedAt: null, note: "" });
    } else {
      line.push({ role: "승인", uid: m.approverUid, status: "pending", decidedAt: null, note: "" });
    }
    const firstPending = line.find(s => s.status === "pending");
    const id = "app_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
    const today = new Date().toISOString().slice(0, 10);
    const docData = {
      id, type: "itp",
      title: `[${m.projCode || PID}] ITP 결재${proj.name ? " - " + proj.name : ""}`,
      projId: PID, projCode: m.projCode, projName: m.projName,
      description: `ITP Builder에서 작성한 ITP 결재 요청입니다. (검사 아이템 ${items.length}종)`,
      author: cur.uid, approvalLine: line,
      approver: firstPending.uid, to: firstPending.uid,
      status: "pending", date: today, createdAt: Date.now(),
    };
    setAppvModal(null);
    showMsg("☁ ITP 저장 후 결재 상신 중...", 15000);
    try {
      await writeItpDocToFirestore({ proj, items, specReqs, quoteItems, revComments, itpRows: buildLegacyItpRows(), itpRowsByItem, itpDocNoByItem, itpRevByItem, itpHdrByItem, wpsList, welderList, inspectorList, savedAt: Date.now() });
      // v3.3: ITP 조회에서 '결재중' 배지가 뜨도록 상태 스탬프 (승인/반려 시 index.html decideApproval이 갱신)
      try { await fb.setDoc(fb.doc(fb.db, "t_itpBuilderDocs", PID), { approvalStatus: "pending", approvalId: id, approvedBy: null, approvedAt: null }, { merge: true }); } catch(e) {}
      await fb.setDoc(fb.doc(fb.db, "approvals", id), docData);
      showMsg(m.includeReview
        ? "✅ 검토 → 승인 순서로 ITP 결재를 올렸습니다. (결재 메뉴에서 진행 확인)"
        : "✅ 승인자에게 ITP 결재를 올렸습니다. (결재 메뉴에서 진행 확인)", 8000);
    } catch (e) { showMsg("결재 상신 실패: " + (e.message || e), 6000); }
  };
  // v2.1 — 자동저장(1초 디바운스)과 동일한 함수를 즉시 실행. 이 기능 도입 이전부터 로컬에만
  // 저장돼있던 기존 프로젝트도 이 버튼 한 번으로 클라우드에 올라가 다른 계정에서 보이게 된다.
  const handleManualCloudUpload = async () => {

    try {
      await writeItpDocToFirestore({proj, items, specReqs, quoteItems, revComments, itpRows: buildLegacyItpRows(), itpRowsByItem, itpDocNoByItem, itpRevByItem, itpHdrByItem, wpsList, welderList, inspectorList, savedAt: Date.now()});
      showMsg("✓ 클라우드 업로드 완료 — 다른 계정에서도 이제 이 내용을 볼 수 있습니다", 5000);
    } catch (e) { showMsg(`⚠ 업로드 실패: ${e.message||e}`, 6000); }

  const handleExport = () => {
    const data = {proj, items, specReqs, quoteItems, wpsList, welderList, inspectorList, exported_at:new Date().toISOString(), version:"itp_builder_v1.2"};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `${proj.no||"project"}_data.json`;
    a.click(); URL.revokeObjectURL(url);
    const bridged = pushToHost();
    showMsg(bridged ? `✓ Export 완료 — EPC Control · QA Doc Generator로 자동 전송` : `✓ Export 완료 — Standalone 모드 (EPC 미연결)`);
  };
  const handleImport = (file) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (d.proj) setProj(d.proj);
        if (d.items) setItems(d.items);
        if (d.specReqs) setSpecReqs(d.specReqs);
        if (d.quoteItems) setQuoteItems(d.quoteItems);

        if (d.welderList) { setWelderList(d.welderList); window.WELDER_LIST=d.welderList; saveMasterList("welder", d.welderList); }
        if (d.inspectorList) { setInspectorList(d.inspectorList); window.INSPECTOR_LIST=d.inspectorList; saveMasterList("inspector", d.inspectorList); }
        showMsg(`✓ Import 완료 — ${d.items?.length || 0}개 아이템`);
      } catch(err) { showMsg(`⚠ Import 실패: ${err.message}`); }
    };
    r.readAsText(file);
  };
  const handleNew = () => {
    if (!confirm("새 프로젝트를 시작하시겠습니까?")) return;
    setProj({no:"", name:"", customer:"", po:"", scope:"", codes:{KS:true, ASME:true, TEMA:false, EN:false, API:false, Others:false}});
    setItems([]); setNewItem({...DEF_ITEM});
    setSpecReqs([]); setQuoteItems([]); setRevComments([]);
    setItpRowsByItem({}); setItpDocNoByItem({}); setItpRevByItem({});
    setSelectedItpItemId(null); setPrintAllMode(false); setStep(0);
        setWitnessCols([{key:"sj",name:"SJ",bg:"#eef3fb"},{key:"qc",name:"QC",bg:"#eef3fb"},{key:"client",name:"Client",bg:"#eef3fb"}]);
    showMsg(`✓ 새 프로젝트`);

  return <div className="app">
    {/* v1.3 EPC Control 톤 Topbar */}

      <div className="epc-topbar-icon">📋</div>
      <div>
        <div className="epc-topbar-title">ITP Builder v1.4</div>

    {/* v3.3: ITP 결재선 지정 모달 */}

        </div>

            <input type="checkbox" checked={appvModal.selfApprove} onChange={e=>setAppvModal(p=>({...p, selfApprove:e.target.checked}))}/>
            작성자 본인이 승인권자 — 즉시 승인
          </label>
          {appvModal.selfApprove &&
            <div style={{fontSize:10.5, color:"#15803d", marginTop:6, lineHeight:1.5}}>
              내가 부서장·PM이라 별도 결재자 없이 <b>작성=승인</b>으로 바로 승인됩니다. ITP 조회에 즉시 등록됩니다.
            </div>}
        </div>
        {!appvModal.selfApprove && <>
        {/* 검토 (선택) */}
        <div style={{border:"1px solid var(--sjp-border)", borderRadius:6, padding:"8px 10px", marginBottom:8}}>
          <label style={{display:"flex", alignItems:"center", gap:6, fontSize:12, fontWeight:700, cursor:"pointer", marginBottom:appvModal.includeReview?8:0}}>
            <input type="checkbox" checked={appvModal.includeReview} onChange={e=>setAppvModal(p=>({...p, includeReview:e.target.checked}))}/>
