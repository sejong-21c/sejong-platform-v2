          </label>
          {appvModal.includeReview &&
            <select value={appvModal.reviewerUid} onChange={e=>setAppvModal(p=>({...p, reviewerUid:e.target.value}))}
              style={{width:"100%", padding:"6px 8px", fontSize:12, border:"1px solid var(--sjp-border)", borderRadius:5}}>
              <option value="">— 검토자 선택 —</option>
              {appvModal.users.filter(u=>u.id!==appvModal.selfUid).map(u=><option key={u.id} value={u.id}>{u.name} {u.title||""} {u.dept?`(${u.dept})`:""}</option>)}
            </select>
          }
        </div>
        {/* 승인 (필수) */}
        <div style={{border:"1px solid var(--sjp-border)", borderRadius:6, padding:"8px 10px", marginBottom:14}}>
          <div style={{fontSize:12, fontWeight:700, marginBottom:8}}>승인자 <span style={{color:"#dc2626"}}>*</span> {appvModal.pmUid && appvModal.approverUid===appvModal.pmUid && <span style={{fontSize:10, color:"#16a34a", fontWeight:400}}>· PM 기본 지정됨</span>}</div>
          <select value={appvModal.approverUid} onChange={e=>setAppvModal(p=>({...p, approverUid:e.target.value}))}
            style={{width:"100%", padding:"6px 8px", fontSize:12, border:"1px solid var(--sjp-border)", borderRadius:5}}>
            <option value="">— 승인자 선택 —</option>
            {appvModal.users.filter(u=>u.id!==appvModal.selfUid).map(u=><option key={u.id} value={u.id}>{u.name} {u.title||""} {u.dept?`(${u.dept})`:""}{u.id===appvModal.pmUid?" — PM":""}</option>)}
          </select>
        </div>
        </>}
        <div style={{display:"flex", gap:6, justifyContent:"flex-end"}}>
          <button onClick={()=>setAppvModal(null)} className="btn-secondary">취소</button>
          <button onClick={doSubmitItpApproval} className="btn-primary" style={{background:appvModal.selfApprove?"#16a34a":"#7c3aed", borderColor:appvModal.selfApprove?"#16a34a":"#7c3aed"}}>{appvModal.selfApprove?"✓ 즉시 승인":"결재 상신"}</button>
        </div>
      </div>
    </div>}

    {/* v1.8: 프로젝트 태그 선택 가져오기 모달 */}
    {importModal && <div className="modal-overlay no-print" onClick={()=>setImportModal(null)}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:460, maxHeight:"80vh", display:"flex", flexDirection:"column"}}>
        <div style={{fontWeight:700, marginBottom:4, fontSize:15}}>⬇ 프로젝트 태그 가져오기</div>
        <div style={{fontSize:11, color:"var(--sjp-text-sub)", marginBottom:10, lineHeight:1.5}}>
          ITP 아이템으로 등록할 태그를 선택하세요. <b>이미 등록된 태그</b>를 다시 선택하면 장비명·규격을 최신값으로 갱신합니다.
        </div>
        <div style={{display:"flex", gap:8, marginBottom:8}}>
          <button onClick={()=>_setAllImp(true)} className="btn-secondary" style={{fontSize:11, padding:"3px 10px"}}>전체 선택</button>
          <button onClick={()=>_setAllImp(false)} className="btn-secondary" style={{fontSize:11, padding:"3px 10px"}}>전체 해제</button>
          <div style={{flex:1, textAlign:"right", fontSize:11, color:"var(--sjp-text-sub)", alignSelf:"center"}}>
            {Object.values(importModal.checked).filter(Boolean).length} / {importModal.list.length} 선택
          </div>
        </div>
        <div style={{flex:1, overflowY:"auto", border:"1px solid var(--sjp-border)", borderRadius:6, padding:4}}>
          {importModal.list.map(x =>
            <label key={x.tag} style={{display:"flex", alignItems:"center", gap:8, padding:"6px 8px", borderRadius:5, cursor:"pointer", background: importModal.checked[x.tag]?"#f0f7ff":"transparent"}}>
              <input type="checkbox" checked={!!importModal.checked[x.tag]} onChange={()=>_toggleImp(x.tag)}/>
              <span style={{fontWeight:700, color:"var(--sjp-primary)", fontSize:12, minWidth:78}}>{x.tag}</span>
              <span style={{flex:1, fontSize:11, color: x.type?"var(--sjp-text-body)":"#bbb"}}>{x.type || "(장비명 미입력)"}</span>
              {x.already && <span style={{fontSize:9, color:"#16a34a", background:"#dcfce7", padding:"1px 6px", borderRadius:8, whiteSpace:"nowrap"}}>등록됨→갱신</span>}
            </label>
          )}
        </div>
        <div style={{display:"flex", gap:6, justifyContent:"flex-end", marginTop:12}}>
          <button onClick={()=>setImportModal(null)} className="btn-secondary">취소</button>
          <button onClick={doImportSelected} className="btn-primary">선택 항목 가져오기</button>
        </div>
      </div>
    </div>}

    {/* v1.9: ITP 복사 모달 */}
    {copyModal && (() => {
      const srcItem = items.find(it => it.id === copyModal.sourceId) || {};
      const srcRowCnt = (itpRowsByItem[copyModal.sourceId] || []).filter(r => r.active !== false).length;
      const targets = items.filter(it => it.id !== copyModal.sourceId);
      const selCnt = Object.values(copyModal.checked).filter(Boolean).length;
      return <div className="modal-overlay no-print" onClick={()=>setCopyModal(null)}>
        <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:460, maxHeight:"82vh", display:"flex", flexDirection:"column"}}>
          <div style={{fontWeight:700, marginBottom:4, fontSize:15}}>📋 ITP 복사</div>
          <div style={{fontSize:11, color:"var(--sjp-text-sub)", marginBottom:10, lineHeight:1.5}}>
            <b style={{color:"#047857"}}>{srcItem.tag} · {srcItem.name||srcItem.type||""}</b> 의 검사항목 <b>{srcRowCnt}개</b>를 아래 선택한 아이템으로 복사합니다.
            대상의 기존 검사항목은 <b>덮어쓰기</b> 됩니다. (문서번호는 각 아이템 고유값 유지)
          </div>
          <div style={{display:"flex", gap:8, marginBottom:8, alignItems:"center", flexWrap:"wrap"}}>
            <button onClick={()=>_setAllCopy(true)} className="btn-secondary" style={{fontSize:11, padding:"3px 10px"}}>전체 선택</button>
            <button onClick={()=>_setAllCopy(false)} className="btn-secondary" style={{fontSize:11, padding:"3px 10px"}}>전체 해제</button>
            <div style={{flex:1, textAlign:"right", fontSize:11, color:"var(--sjp-text-sub)"}}>{selCnt} / {targets.length} 선택</div>
          </div>
          <div style={{flex:1, overflowY:"auto", border:"1px solid var(--sjp-border)", borderRadius:6, padding:4}}>
            {targets.map(it =>
              <label key={it.id} style={{display:"flex", alignItems:"center", gap:8, padding:"6px 8px", borderRadius:5, cursor:"pointer", background: copyModal.checked[it.id]?"#ecfdf5":"transparent"}}>
                <input type="checkbox" checked={!!copyModal.checked[it.id]} onChange={()=>_toggleCopy(it.id)}/>
                <span style={{fontWeight:700, color:"var(--sjp-primary)", fontSize:12, minWidth:78}}>{it.tag}</span>
                <span style={{flex:1, fontSize:11, color: (it.name||it.type)?"var(--sjp-text-body)":"#bbb"}}>{it.name || it.type || "(장비명 미입력)"}</span>
                <span style={{fontSize:9, color:"var(--sjp-text-sub)"}}>{(itpRowsByItem[it.id]||[]).filter(r=>r.active!==false).length}행</span>
              </label>
            )}
          </div>
          <div style={{display:"flex", gap:12, marginTop:10, fontSize:11, flexWrap:"wrap"}}>
            <label style={{display:"flex", alignItems:"center", gap:5, cursor:"pointer"}}>
              <input type="checkbox" checked={copyModal.inclRev} onChange={e=>setCopyModal(p=>({...p, inclRev:e.target.checked}))}/> Rev. 번호도 복사
            </label>
            <label style={{display:"flex", alignItems:"center", gap:5, cursor:"pointer"}}>
              <input type="checkbox" checked={copyModal.inclHdr} onChange={e=>setCopyModal(p=>({...p, inclHdr:e.target.checked}))}/> 헤더(Customer 등)도 복사
            </label>
          </div>
          <div style={{display:"flex", gap:6, justifyContent:"flex-end", marginTop:12}}>
            <button onClick={()=>setCopyModal(null)} className="btn-secondary">취소</button>
            <button onClick={doCopyItp} className="btn-primary" style={{background:"#059669", borderColor:"#059669"}}>선택 아이템에 복사</button>
          </div>
        </div>
      </div>;
    })()}

    {/* v2.0: 다중태그 도면 확인 모달 */}
    {sharedDwgModal && <div className="modal-overlay no-print" onClick={()=>setSharedDwgModal(null)}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:460, maxHeight:"82vh", display:"flex", flexDirection:"column"}}>
        <div style={{fontWeight:700, marginBottom:4, fontSize:15}}>🔗 다중태그 도면 감지</div>
        <div style={{fontSize:11, color:"var(--sjp-text-sub)", marginBottom:10, lineHeight:1.5}}>
          이 도면 1개가 아래 <b>{sharedDwgModal.tags.length}개 TAG</b>를 함께 커버하는 것으로 보입니다.
          각 TAG를 개별 아이템으로 <b>등록/갱신</b>하면, QA Doc Generator에서 리포트가 TAG별로 구분됩니다.
          (같은 도면·같은 사양이 각 아이템에 적용됩니다.)
        </div>
        {sharedDwgModal.note &&
          <div style={{fontSize:10.5, color:"#856404", background:"var(--sjp-warning-bg)", border:"1px solid #f0d78c", borderRadius:5, padding:"6px 10px", marginBottom:10, lineHeight:1.5}}>
            ⚠ 확인 필요: {sharedDwgModal.note}
          </div>}
        <div style={{flex:1, overflowY:"auto", border:"1px solid var(--sjp-border)", borderRadius:6, padding:4, marginBottom:12}}>
          {sharedDwgModal.tags.map(t => {
            const already = sharedDwgModal.existing.has((t||"").trim());
            return <div key={t} style={{display:"flex", alignItems:"center", gap:8, padding:"6px 8px"}}>
              <span style={{fontWeight:700, color:"var(--sjp-primary)", fontSize:12, minWidth:110}}>{t}</span>
              <span style={{fontSize:9, color: already?"#996b04":"#16a34a", background: already?"#fef3c7":"#dcfce7", padding:"1px 6px", borderRadius:8}}>{already?"기존 → 갱신":"새로 생성"}</span>
            </div>;
          })}
        </div>
        <div style={{display:"flex", gap:6, justifyContent:"flex-end"}}>
          <button onClick={()=>setSharedDwgModal(null)} className="btn-secondary">취소</button>
          <button onClick={doApplySharedDwg} className="btn-primary">태그별로 등록/갱신 ({sharedDwgModal.tags.length}개)</button>
        </div>
      </div>
    </div>}

    <EPCSlots jobNo={proj.no}/>

    {/* 단계 탭 */}
    <div className="no-print" style={{display:"flex", gap:6, marginBottom:14}}>
      {["0. 프로젝트 · 시방서 · 견적서", "1. 아이템 등록", "2. ITP 생성 · 미리보기"].map((s, i) =>
        <button key={i} onClick={()=>setStep(i)} className={"tab " + (step===i?"on":"")} style={{flex:1}}>
          {s}
        </button>
      )}
    </div>

    {msg && <div className={`msg ${msg.startsWith("✓")?"ok":msg.startsWith("⚠")?"warn":"info"}`}>{msg}</div>}

    {/* Step 0 */}
    {step === 0 && <div>
      <div className="card">
        <div className="card-h">📄 프로젝트 문서 업로드 <span className="badge">WO·시방서·견적서 통합 인식</span></div>
        <div className="card-b">
          <div style={{fontSize:10, color:"var(--sjp-text-sub)", marginBottom:8}}>
            Work Order / 시방서 / 견적서 중 아무 문서나 올리면(또는 한 문서에 여러 내용이 섞여 있어도) 그 안에 실제로 있는 항목만 알아서 찾아서 반영합니다. 문서 종류별로 따로 올릴 필요 없습니다.
          </div>
          <input type="file" accept=".pdf" id="projectFile" style={{display:"none"}} onChange={e=>e.target.files[0] && handleFile(e.target.files[0], "project")}/>
          <button onClick={()=>document.getElementById("projectFile").click()} disabled={parsing!==null} className="btn-primary">📄 문서 업로드 (PDF)</button>
          <span style={{fontSize:10, color:"var(--sjp-text-sub)", marginLeft:8}}>Project No/발주처/PO/Scope, 추가 요구사항, 견적 아이템 — 있는 것만 자동 반영</span>
          <PasteBox kind="project" prompt={buildParsePrompt("project")} onApply={handlePasteApply} onCopyPrompt={copyPrompt}/>

          <div style={{display:"flex", gap:16, marginTop:12, flexWrap:"wrap"}}>
            <div style={{fontSize:10, color: specReqs.length > 0 ? "var(--sjp-success)" : "var(--sjp-text-sub)"}}>
              📋 추가 요구사항: <strong>{specReqs.length}개</strong>
            </div>
            <div style={{fontSize:10, color: quoteItems.length > 0 ? "#7f77dd" : "var(--sjp-text-sub)"}}>
              💰 견적 아이템: <strong>{quoteItems.length}개</strong> (도면 미도착 상태에서도 ITP 생성 가능)
            </div>
          </div>
          {specReqs.length > 0 && <div style={{marginTop:8, maxHeight:200, overflowY:"auto"}}>
            {specReqs.map((r, i) =>
              <div key={i} className="spec-row">
                <strong style={{color:"var(--sjp-warning)"}}>[{r.category}]</strong> {r.activity}
                {r.hold && <span style={{color:"var(--sjp-danger)", marginLeft:5, fontWeight:600}}>(H.P.)</span>}
                <div style={{color:"var(--sjp-text-sub)", fontSize:10, marginTop:2}}>{r.code} → {r.criteria}</div>
              </div>
            )}
            <button onClick={()=>{ if(confirm("시방서 요구사항을 모두 제거하시겠습니까?")) setSpecReqs([]); }} style={{fontSize:10, padding:"3px 8px", background:"var(--sjp-danger-bg)", color:"var(--sjp-danger)", border:"1px solid #fbb", borderRadius:3, cursor:"pointer", marginTop:4}}>✕ 모두 제거</button>
          </div>}
        </div>
      </div>

      <div className="card">
        <div className="card-h">🔧 WPS / Welder / 검사자 List 업로드 <span className="badge">xlsx · pdf · csv 지원</span></div>
        <div className="card-b">
          <div style={{fontSize:10, color:"var(--sjp-text-sub)", marginBottom:8}}>회사 표준 양식(xlsx) 또는 CSV/TXT/PDF 업로드. 업로드하면 QA Doc Generator의 Fit-up & Welding IR·검사자 선택에서 바로 선택 가능합니다.</div>
          <div style={{display:"flex", gap:8, alignItems:"center", flexWrap:"wrap"}}>
            <input type="file" accept=".csv,.txt,.tsv,.xlsx,.xls,.pdf" id="wpsFile" style={{display:"none"}} onChange={e=>parseListFile(e.target.files[0], "wps")}/>
            <button onClick={()=>document.getElementById("wpsFile").click()} className="btn-secondary">📄 WPS 파일 업로드</button>
            <input type="file" accept=".csv,.txt,.tsv,.xlsx,.xls,.pdf" id="welderFile" style={{display:"none"}} onChange={e=>parseListFile(e.target.files[0], "welder")}/>
            <button onClick={()=>document.getElementById("welderFile").click()} className="btn-secondary">📄 Welder 파일 업로드</button>
            <input type="file" accept=".csv,.txt,.tsv,.xlsx,.xls,.pdf" id="inspectorFile" style={{display:"none"}} onChange={e=>parseListFile(e.target.files[0], "inspector")}/>
            <button onClick={()=>document.getElementById("inspectorFile").click()} className="btn-secondary">📄 검사자 파일 업로드</button>
            <span style={{fontSize:10, color:"var(--sjp-text-sub)"}}>현재: WPS {wpsList.length}개 / Welder {welderList.length}명 / 검사자 {inspectorList.length}명</span>
          </div>
          <div className="fld" style={{marginTop:8}}><label>WPS No. List</label>
            <textarea value={wpsList.join("\n")} onChange={e=>handleMasterListEdit("wps", e.target.value, wpsList, setWpsList, "WPS_LIST")} placeholder={"SJTC-WPS-001\nSJTC-WPS-002\n..."} style={{width:"100%", minHeight:50, fontFamily:"monospace", fontSize:10}}/>
          </div>
          <div className="fld"><label>Welder ID List{welderList.some(w=>welderDueDate(w))?" (자격 만료일 포함 — 직접 수정 시 만료일은 사라집니다)":""}</label>
            <textarea value={welderList.map(welderLineDisplay).join("\n")} onChange={e=>handleMasterListEdit("welder", e.target.value, welderList, setWelderList, "WELDER_LIST")} placeholder={"SJ-KYG-GT-01 (강용구)\nSJ-KHS-GT-01 (강희석)\n..."} style={{width:"100%", minHeight:50, fontFamily:"monospace", fontSize:10}}/>
          </div>
          {(() => {
            const expiring = welderList.filter(w => welderStatus(welderDueDate(w)).label === "expiring_soon").length;
            const expired = welderList.filter(w => welderStatus(welderDueDate(w)).label === "expired").length;
            if (!expiring && !expired) return null;
            return <div style={{marginTop:6, padding:"6px 10px", background:"var(--sjp-warning-bg)", border:"1px solid #f0d78c", borderRadius:5, fontSize:10.5, color:"#856404", fontWeight:600}}>
              ⚠ 용접사 자격 만료임박 {expiring}명 / 만료 {expired}명 — 자격인정 관리대장 기준 (30일 이내)
            </div>;
          })()}
          <div className="fld"><label>검사자(Inspector) List</label>
            <textarea value={inspectorList.join("\n")} onChange={e=>handleMasterListEdit("inspector", e.target.value, inspectorList, setInspectorList, "INSPECTOR_LIST")} placeholder={"김철우 (부장)\n신채완 (과장)\n..."} style={{width:"100%", minHeight:50, fontFamily:"monospace", fontSize:10}}/>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h">프로젝트 정보</div>
        <div className="card-b">
          <div className="fld"><label>Project No.</label><input value={proj.no} onChange={e=>setProj(p=>({...p, no:e.target.value}))} placeholder="ex. SJ2026-014"/></div>
          <div className="fld"><label>프로젝트명</label><input value={proj.name} onChange={e=>setProj(p=>({...p, name:e.target.value}))}/></div>
          <div className="fld"><label>발주처</label><input value={proj.customer} onChange={e=>setProj(p=>({...p, customer:e.target.value}))}/></div>
          <div className="fld"><label>PO No.</label><input value={proj.po} onChange={e=>setProj(p=>({...p, po:e.target.value}))}/></div>
          <div className="fld"><label>Scope</label><input value={proj.scope} onChange={e=>setProj(p=>({...p, scope:e.target.value}))}/></div>
          <div className="fld"><label>적용 코드</label>
            <div style={{flex:1}}>
              {CODES.map(c => <label key={c} className="chk">
                <input type="checkbox" checked={!!proj.codes[c]} onChange={e=>setProj(p=>({...p, codes:{...p.codes, [c]:e.target.checked}}))}/>{c}
              </label>)}
            </div>
          </div>
        </div>
      </div>

      <div style={{display:"flex", gap:6, justifyContent:"space-between", alignItems:"center"}}>
        <div style={{display:"flex", gap:6}}>
          <button onClick={handleExport} className="btn-secondary">💾 JSON Export</button>
          <input type="file" accept=".json" id="impFile" style={{display:"none"}} onChange={e=>e.target.files[0] && handleImport(e.target.files[0])}/>
          <button onClick={()=>document.getElementById("impFile").click()} className="btn-secondary">📥 JSON Import</button>
        </div>
        <button onClick={()=>{applySpecReqsToExistingItems(); setStep(1);}} className="btn-primary">다음 → 아이템 등록</button>
      </div>
    </div>}

    {/* Step 1 */}
    {step === 1 && <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">아이템 추가 <span className="badge">도면 원샷 파싱</span></div>
          <div className="card-b">
            <input type="file" accept="image/*,.pdf" id="dwgFile" style={{display:"none"}} onChange={e=>e.target.files[0] && handleFile(e.target.files[0], "dwg")}/>
            <button onClick={()=>document.getElementById("dwgFile").click()} disabled={parsing!==null} className="btn-primary" style={{background:"#993c1d", marginBottom:8, width:"100%"}}>
              📐 도면 업로드 → 아이템 필드 자동 채움
            </button>
            {newItem.dwgName && <div style={{fontSize:10, color:"var(--sjp-success)", marginBottom:6}}>{newItem.dwgName}</div>}
            <PasteBox kind="dwg" prompt={buildParsePrompt("dwg")} onApply={handlePasteApply} onCopyPrompt={copyPrompt}/>

            <div className="fld"><label>Tag No. *</label><input value={newItem.tag} onChange={e=>setNewItem(p=>({...p, tag:e.target.value}))}/></div>
            <div className="fld"><label>Item Name *</label><input value={newItem.name} onChange={e=>setNewItem(p=>({...p, name:e.target.value}))}/></div>
            <div className="fld"><label>Type</label>
              <select value={newItem.type} onChange={e=>setNewItem(p=>({...p, type:e.target.value}))}>{ITYPES.map(t => <option key={t}>{t}</option>)}</select>
            </div>
            <div className="fld"><label>Code</label><input value={newItem.appl_code} onChange={e=>setNewItem(p=>({...p, appl_code:e.target.value}))} placeholder="ex. ASME Sec.VIII Div.1"/></div>
            <div className="fld"><label>Shell Material</label><input value={newItem.shell_mat} onChange={e=>setNewItem(p=>({...p, shell_mat:e.target.value}))}/></div>
            <div className="fld"><label>Shell ID (mm)</label><input value={newItem.shell_id} onChange={e=>setNewItem(p=>({...p, shell_id:e.target.value}))}/></div>
            <div className="fld"><label>Shell Length (mm)</label><input value={newItem.shell_len} onChange={e=>setNewItem(p=>({...p, shell_len:e.target.value}))}/></div>
            <div className="fld"><label>Design P (MPa)</label><input value={newItem.design_p} onChange={e=>setNewItem(p=>({...p, design_p:e.target.value}))}/></div>
            <div className="fld"><label>Design T (℃)</label><input value={newItem.design_t} onChange={e=>setNewItem(p=>({...p, design_t:e.target.value}))}/></div>

            <div className="head-block">
              <div className="head-block-title">📌 상하 경판 분리 입력 (v25 신규)</div>
              <div className="fld"><label>Top Head Type</label>
                <select value={newItem.head_top_type} onChange={e=>setNewItem(p=>({...p, head_top_type:e.target.value}))}>{HEAD_TYPES.map(t => <option key={t}>{t}</option>)}</select>
              </div>
              <div className="fld"><label>Top Head Mat.</label><input value={newItem.head_top_mat} onChange={e=>setNewItem(p=>({...p, head_top_mat:e.target.value}))} placeholder="(비우면 Shell Mat)"/></div>
              <div className="fld"><label>Bottom Head Type</label>
                <select value={newItem.head_bot_type} onChange={e=>setNewItem(p=>({...p, head_bot_type:e.target.value}))}>{HEAD_TYPES.map(t => <option key={t}>{t}</option>)}</select>
              </div>
              <div className="fld"><label>Bottom Head Mat.</label><input value={newItem.head_bot_mat} onChange={e=>setNewItem(p=>({...p, head_bot_mat:e.target.value}))}/></div>
              {(newItem.head_top_type === "CAP (B16.9)" || newItem.head_bot_type === "CAP (B16.9)") &&
                <div style={{fontSize:10, color:"#996b04", marginTop:4}}>⚠ CAP 적용 — QC Gen에서 해당 측 Forming Report 자동 제외, DIM Report B16.9 공차 적용</div>}
            </div>

            <label className="chk"><input type="checkbox" checked={newItem.jacket} onChange={e=>setNewItem(p=>({...p, jacket:e.target.checked}))}/>Jacket</label>
            <label className="chk"><input type="checkbox" checked={newItem.incoil} onChange={e=>setNewItem(p=>({...p, incoil:e.target.checked}))}/>In-Coil</label>
            <label className="chk"><input type="checkbox" checked={newItem.halfcoil} onChange={e=>setNewItem(p=>({...p, halfcoil:e.target.checked}))}/>Half-Coil</label>

            <button onClick={addItem} className="btn-primary" style={{marginTop:8, width:"100%"}}>+ 아이템 추가</button>
          </div>
        </div>
      </div>

      <div>
        <div className="card">
          <div className="card-h" style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:6}}>
            <span>등재된 아이템 ({items.length}개)</span>
            <button onClick={openImportModal} className="btn-secondary" style={{fontSize:10.5, padding:"4px 10px"}}
              title="왼쪽 프로젝트 태그(제작공정관리 아이템)를 골라서 ITP 아이템으로 등록합니다. 이미 있는 태그를 다시 고르면 장비명·규격을 최신값으로 갱신합니다.">
              ⬇ 프로젝트 태그 선택 가져오기
            </button>
          </div>
          <div className="card-b">
            {items.length === 0 ?
              <div style={{padding:20, textAlign:"center", color:"#aaa", fontSize:11}}>
                아직 등록된 아이템이 없습니다.<br/>위 <b>⬇ 프로젝트 태그 선택 가져오기</b> 또는 왼쪽 폼·Step 0 견적서 PDF로 추가하세요.
              </div>
              :
              items.map(it =>
                <div key={it.id} className={"item-card" + (it.dwgUrl?" has-dwg":"")}>
                  <div className="item-card-h">
                    <strong className="item-tag">{it.tag}</strong>
                    <div style={{display:"flex", gap:4}}>
                      <input type="file" accept="image/*,.pdf" id={`dwg-${it.id}`} style={{display:"none"}} onChange={e=>e.target.files[0] && handleFile(e.target.files[0], "dwg", it.id)}/>
                      <button onClick={()=>document.getElementById(`dwg-${it.id}`).click()} style={{fontSize:9, padding:"2px 6px", background:"#993c1d", color:"#fff", border:"none", borderRadius:3, cursor:"pointer"}}>📐 도면</button>
                      <button onClick={()=>removeItem(it.id)} style={{fontSize:9, padding:"2px 6px", background:"var(--sjp-danger-bg)", color:"var(--sjp-danger)", border:"none", borderRadius:3, cursor:"pointer"}}>✕</button>
                    </div>
                  </div>
                  <div style={{fontSize:11, marginTop:3}}>{it.name}</div>
                  <div style={{fontSize:9, color:"var(--sjp-text-sub)", marginTop:2}}>
                    {it.type} | {it.shell_mat || "—"} | Ø{it.shell_id || "—"} × L{it.shell_len || "—"}
                  </div>
                  <div style={{fontSize:9, color:"var(--sjp-text-sub)"}}>
                    Top: <strong>{it.head_top_type}</strong> | Bot: <strong>{it.head_bot_type}</strong>
                    {(it.head_top_type === "CAP (B16.9)" || it.head_bot_type === "CAP (B16.9)") &&
                      <span style={{color:"var(--sjp-warning)", marginLeft:5, fontWeight:600}}>(CAP)</span>}
                  </div>
                  {it.dwgUrl ? <div style={{fontSize:9, color:"var(--sjp-success)", marginTop:2}}>✓ 도면 첨부됨</div>
                    : <div style={{fontSize:9, color:"var(--sjp-warning)", marginTop:2}}>⚠ 도면 미첨부</div>}
                  {it.tag_review_note && <div style={{fontSize:9, color:"#856404", background:"var(--sjp-warning-bg)", border:"1px solid #f0d78c", borderRadius:4, padding:"3px 6px", marginTop:3, lineHeight:1.4}}>⚠ 확인 필요: {it.tag_review_note}</div>}
                  <PasteBox kind="dwg" targetItemId={it.id} prompt={buildParsePrompt("dwg")} onApply={handlePasteApply} onCopyPrompt={copyPrompt}/>
                </div>
              )
            }
          </div>
        </div>

        <div style={{display:"flex", gap:6}}>
          <button onClick={()=>setStep(0)} className="btn-secondary" style={{flex:1}}>← 이전</button>
          <button onClick={()=>setStep(2)} className="btn-primary" disabled={items.length===0} style={{flex:2}}>
            다음 → ITP 생성 ({items.length}개)
          </button>
        </div>
      </div>
    </div>}

    {/* Step 2 */}
    {step === 2 && (() => {
      const selectedItem = items.find(it => it.id === selectedItpItemId) || null;
      return <div>
      <div className="no-print" style={{display:"flex", gap:6, marginBottom:8, alignItems:"center"}}>
        <button onClick={()=>setStep(1)} className="btn-secondary">← 수정하기</button>
        <span style={{fontSize:10, color:"var(--sjp-text-sub)"}}>자동 저장</span>
        {items.length > 1 && selectedItem &&
          <button onClick={openCopyModal} className="btn-secondary" style={{background:"#ecfdf5", borderColor:"#6ee7b7", color:"#047857"}}
            title="현재 선택한 아이템의 검사항목(ITP)을 다른 아이템으로 복사합니다">
            📋 이 ITP를 다른 아이템에 복사
          </button>}
        <div style={{flex:1}}/>
        <button onClick={submitItpForApproval} className="btn-primary" style={{background:"#7c3aed", borderColor:"#7c3aed"}} title="이 ITP를 결재선(작성→[부서장 검토]→PM 승인)에 올립니다">📋 결재 상신</button>
        <button onClick={handleManualCloudUpload} className="btn-secondary" title="현재 화면의 내용을 지금 즉시 클라우드에 업로드합니다 (다른 계정에서도 볼 수 있게 됨)">☁ 지금 클라우드로 업로드</button>
        <button onClick={handleExport} className="btn-secondary">💾 QC Gen으로 Export</button>
      </div>

      {!printAllMode && items.length > 1 &&
        <div className="no-print" style={{marginBottom:8}}>
          <div style={{fontSize:10, color:"var(--sjp-text-sub)", marginBottom:4}}>↔ 아이템 순서 = ITP 문서번호(-001, -002…) 순번. ◀▶ 버튼 또는 드래그로 순서를 바꾸면 문서번호가 다시 매겨집니다.</div>
          <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>
            {items.map((it, idx) => {
              const on = selectedItpItemId===it.id;
              return <div key={it.id} draggable
                onDragStart={e=>{ _dragItemIdx.current=idx; e.dataTransfer.effectAllowed="move"; }}
                onDragOver={e=>e.preventDefault()}
                onDrop={e=>{ e.preventDefault(); moveItemToIndex(_dragItemIdx.current, idx); _dragItemIdx.current=null; }}
                title="드래그해서 순서 변경"
                style={{display:"inline-flex", alignItems:"center", border:`1px solid ${on?"var(--sjp-primary)":"var(--sjp-border)"}`, borderRadius:5, overflow:"hidden", background: on?"var(--sjp-primary)":"#fff"}}>
                <button onClick={()=>moveItem(it.id,-1)} disabled={idx===0} title="앞으로" style={{border:"none", background:"transparent", color: on?"#fff":(idx===0?"#d1d5db":"#9ca3af"), cursor: idx===0?"default":"pointer", padding:"0 3px", fontSize:10}}>◀</button>
                <button onClick={()=>setSelectedItpItemId(it.id)}
                  style={{border:"none", background:"transparent", color: on?"#fff":"var(--sjp-text-body)", cursor:"grab", padding:"7px 6px", fontSize:11, fontWeight: on?700:500, whiteSpace:"nowrap"}}>
                  <span style={{opacity:.45, marginRight:4}}>⠿</span><strong>{it.tag}</strong> · {it.name}
                </button>
                <button onClick={()=>moveItem(it.id,1)} disabled={idx===items.length-1} title="뒤로" style={{border:"none", background:"transparent", color: on?"#fff":(idx===items.length-1?"#d1d5db":"#9ca3af"), cursor: idx===items.length-1?"default":"pointer", padding:"0 3px", fontSize:10}}>▶</button>
              </div>;
            })}
          </div>
        </div>
      }

      <div className="no-print" style={{marginBottom:8}}>
        <div className="print-bar">
          <span style={{fontSize:11, fontWeight:600}}>
            📄 ITP — {proj.name || "프로젝트명"} ({proj.no || "Project No"})
            {!printAllMode && selectedItem && <> · {selectedItem.tag}</>}
            {printAllMode && <> · 전체 {items.length}개 아이템</>}
          </span>
          <div style={{display:"flex", gap:6}}>
            <button onClick={()=>setPrintAllMode(m=>!m)} className="btn-secondary">
              {printAllMode ? "◀ 개별 아이템 모드" : "🖨 전체 인쇄 모드"}
            </button>
            <button onClick={()=>window.print()} className="btn-primary" disabled={!printAllMode && !selectedItem}>🖨 인쇄</button>
          </div>
        </div>
        <div style={{fontSize:10, color:"#666", padding:"4px 10px", marginTop:3, background:"#fffdf5", border:"0.5px dashed #ecd6a3", borderRadius:4}}>
          <span style={{color:"#996b04", fontWeight:600}}>🖨 인쇄 시 필수 옵션:</span>
          &nbsp;Chrome/Edge → <strong style={{color:"#c33"}}>여백(Margins): "없음(None)"</strong> (⚠ "기본값"을 선택하면 브라우저가 자체 여백을 추가로 넣어서 페이지가 한 장 더 넘어갈 수 있습니다) &nbsp;|&nbsp;
          <strong>"머리글 및 바닥글" 해제</strong> &nbsp;|&nbsp;
          <strong>"배경 그래픽" 체크</strong>
        </div>
      </div>

      {!printAllMode && selectedItem &&
        <div style={{border:"1px solid var(--sjp-border)", borderRadius:6, padding:14, background:"#fff"}}>
          <ITPPreview proj={proj} item={selectedItem}
            rows={itpRowsByItem[selectedItem.id] || buildInitialItpRows(specReqs)}
            setRows={scopedSetter(setItpRowsByItem, selectedItem.id, buildInitialItpRows(specReqs))}
            docNo={itpDocNoByItem[selectedItem.id] || ""} setDocNo={scopedSetter(setItpDocNoByItem, selectedItem.id, "")}
            rev={itpRevByItem[selectedItem.id] || "0"} setRev={scopedSetter(setItpRevByItem, selectedItem.id, "0")}
            hdr={itpHdrByItem[selectedItem.id] || {}} setHdr={scopedSetter(setItpHdrByItem, selectedItem.id, {})}
            witnessCols={witnessCols} setWitnessCols={setWitnessCols}/>
        </div>
      }

      {printAllMode && items.map((it, idx) =>
        <div key={it.id} className="itp-print-page" style={{border:"1px solid var(--sjp-border)", borderRadius:6, padding:14, background:"#fff", marginBottom: idx < items.length-1 ? 16 : 0}}>
          <ITPPreview proj={proj} item={it}
            rows={itpRowsByItem[it.id] || buildInitialItpRows(specReqs)}
            setRows={scopedSetter(setItpRowsByItem, it.id, buildInitialItpRows(specReqs))}
            docNo={itpDocNoByItem[it.id] || ""} setDocNo={scopedSetter(setItpDocNoByItem, it.id, "")}
            rev={itpRevByItem[it.id] || "0"} setRev={scopedSetter(setItpRevByItem, it.id, "0")}
            hdr={itpHdrByItem[it.id] || {}} setHdr={scopedSetter(setItpHdrByItem, it.id, {})}
            witnessCols={witnessCols} setWitnessCols={setWitnessCols}/>
        </div>
      )}
    </div>;
    })()}

    <div className="no-print" style={{textAlign:"center", marginTop:20, fontSize:9, color:"#aaa"}}>
      ITP Builder v1.4 · modules/quality/itp-builder · Sejong-Platform
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// (sejong-platform 플로팅 패널 제거됨 — SJ FLOW iframe 통합 구조로 전환)
</script>
</body>
</html>
