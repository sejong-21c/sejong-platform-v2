<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ITP Builder v1.4 · Sejong-Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   EPC Control System 디자인 토큰 (인라인 정의 — sjp-tokens.css 의존성 제거)
   v1.3 부장님 EPC Control 톤 통일 + AI Provider 제거 (Cowork 연동 대기)
═══════════════════════════════════════════════════════════ */
:root {
  --sjp-primary:        #4a7fc1;
  --sjp-primary-hover:  #3a6bb5;
  --sjp-primary-light:  #eef3fb;
  --sjp-success:        #16a34a;
  --sjp-success-bg:     #f0fdf4;
  --sjp-warning:        #f59e0b;
  --sjp-warning-bg:     #fef3c7;
  --sjp-danger:         #dc2626;
  --sjp-danger-bg:      #fee2e2;
  --sjp-border:         #e4e7ec;
  --sjp-border-strong:  #c3d6f0;
  --sjp-bg-card:        #ffffff;
  --sjp-bg-app:         #f0f4f8;
  --sjp-bg-table-head:  #f8fafc;
  --sjp-bg-row-hover:   #f9fafb;
  --sjp-text-main:      #1a2332;
  --sjp-text-body:      #4b5563;
  --sjp-text-sub:       #6b7280;
  --sjp-text-muted:     #9ca3af;
  --sjp-radius-sm:      4px;
  --sjp-radius:         5px;
  --sjp-radius-lg:      8px;
  --sjp-shadow:         0 1px 3px rgba(0,0,0,.05);
  --sjp-shadow-md:      0 2px 8px rgba(0,0,0,.08);
}

/* ═══════════════════════════════════════════════════════════
   글로벌 리셋 + 기본
═══════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body {
  margin: 0;
  padding: 0;
  background: var(--sjp-bg-app);
  font-family: 'Segoe UI','Malgun Gothic',Arial,sans-serif;
  color: var(--sjp-text-main);
  font-size: 12px;
  line-height: 1.5;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#c4cdd8;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

/* ═══════════════════════════════════════════════════════════
   App 레이아웃 (EPC Control 톤)
═══════════════════════════════════════════════════════════ */
.app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 14px;
}

/* ═══════════════════════════════════════════════════════════
   v1.3 EPC Control 톤 헤더 (sjp-bridge.js 미사용 시 자체 표시)
═══════════════════════════════════════════════════════════ */
.epc-topbar {
  background: #fff;
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius-lg);
  padding: 12px 18px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--sjp-shadow);
}
.epc-topbar-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--sjp-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  flex-shrink: 0;
}
.epc-topbar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--sjp-text-main);
}
.epc-topbar-sub {
  font-size: 10px;
  color: var(--sjp-text-sub);
}
.epc-topbar-badge {
  margin-left: auto;
  padding: 4px 10px;
  background: var(--sjp-primary-light);
  color: var(--sjp-primary);
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
}

/* ═══════════════════════════════════════════════════════════
   버튼 (EPC Control 톤)
═══════════════════════════════════════════════════════════ */
.btn-primary {
  padding: 6px 14px;
  background: var(--sjp-primary);
  color: #fff;
  border: none;
  border-radius: var(--sjp-radius);
  font-size: 11px;
  cursor: pointer;
  font-weight: 600;
  transition: background .12s;
}
.btn-primary:hover { background: var(--sjp-primary-hover); }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary {
  padding: 6px 12px;
  background: #fff;
  color: var(--sjp-text-body);
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius);
  font-size: 11px;
  cursor: pointer;
  transition: background .12s;
}
.btn-secondary:hover { background: var(--sjp-primary-light); border-color: var(--sjp-border-strong); color: var(--sjp-primary); }
.btn-success {
  padding: 6px 14px;
  background: var(--sjp-success);
  color: #fff;
  border: none;
  border-radius: var(--sjp-radius);
  font-size: 11px;
  cursor: pointer;
  font-weight: 600;
  transition: background .12s;
}
.btn-success:hover { background: #15803d; }

/* ═══════════════════════════════════════════════════════════
   탭 (EPC Control 톤)
═══════════════════════════════════════════════════════════ */
.tab {
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 600;
  background: #fff;
  color: var(--sjp-text-sub);
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius);
  cursor: pointer;
  transition: all .15s;
}
.tab.on {
  background: var(--sjp-primary);
  color: #fff;
  border-color: var(--sjp-primary);
  box-shadow: 0 2px 4px rgba(74,127,193,.2);
}
.tab:not(.on):hover {
  background: var(--sjp-primary-light);
  color: var(--sjp-primary);
  border-color: var(--sjp-border-strong);
}

/* ═══════════════════════════════════════════════════════════
   카드 (EPC Control 톤 — 둥근 모서리 + 명확한 외곽선)
═══════════════════════════════════════════════════════════ */
.card {
  background: var(--sjp-bg-card);
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius-lg);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--sjp-shadow);
  transition: box-shadow .15s;
}
.card:hover { box-shadow: var(--sjp-shadow-md); }
.card-h {
  padding: 10px 16px;
  background: var(--sjp-bg-table-head);
  border-bottom: 1px solid var(--sjp-border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  color: var(--sjp-text-main);
}
.card-b { padding: 14px 16px; }

/* ═══════════════════════════════════════════════════════════
   뱃지
═══════════════════════════════════════════════════════════ */
.badge {
  font-size: 10px;
  padding: 2px 8px;
  background: var(--sjp-primary);
  color: #fff;
  border-radius: 10px;
  font-weight: 700;
}
.badge-warn { background: var(--sjp-warning); color: #fff; }
.badge-new { background: var(--sjp-success); color: #fff; }

/* ═══════════════════════════════════════════════════════════
   필드 (입력)
═══════════════════════════════════════════════════════════ */
.fld { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.fld label {
  min-width: 120px;
  font-size: 11px;
  color: var(--sjp-text-sub);
  padding-top: 6px;
  font-weight: 600;
}
.fld input, .fld select, .fld textarea {
  flex: 1;
  font-size: 12px;
  padding: 6px 10px;
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius-sm);
  font-family: inherit;
  background: #fff;
  transition: border-color .12s;
}
.fld input:focus, .fld select:focus, .fld textarea:focus {
  outline: none;
  border-color: var(--sjp-primary);
  box-shadow: 0 0 0 2px rgba(74,127,193,.1);
}
.chk {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--sjp-text-body);
  cursor: pointer;
  margin-right: 12px;
  margin-bottom: 4px;
}
.chk input { accent-color: var(--sjp-primary); }

/* ═══════════════════════════════════════════════════════════
   슬롯 (EPC 연동 표시)
═══════════════════════════════════════════════════════════ */
.slots-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.slot {
  border: 1.5px solid var(--sjp-border);
  background: #fafafa;
  padding: 8px 12px;
  border-radius: var(--sjp-radius);
  font-size: 10px;
  transition: all .15s;
}
.slot.connected {
  border-color: var(--sjp-success);
  background: var(--sjp-success-bg);
}
.slot-title {
  font-weight: 700;
  font-size: 11px;
  color: var(--sjp-text-main);
  margin-bottom: 2px;
}
.slot-status { font-size: 9px; color: var(--sjp-text-sub); }
.slot.connected .slot-status { color: var(--sjp-success); font-weight: 600; }

/* ═══════════════════════════════════════════════════════════
   v1.3 Cowork 통합 안내 (구 AI Provider 자리)
═══════════════════════════════════════════════════════════ */
.cowork-info {
  padding: 10px 14px;
  background: var(--sjp-primary-light);
  border: 1px solid var(--sjp-border-strong);
  border-radius: var(--sjp-radius-lg);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--sjp-text-main);
}
.cowork-info-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--sjp-primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.cowork-info-text { flex: 1; }
.cowork-info-title { font-weight: 700; color: var(--sjp-primary); margin-bottom: 2px; }
.cowork-info-sub { color: var(--sjp-text-sub); font-size: 10px; line-height: 1.5; }

/* v1.7 — API 키 입력 모달 */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.modal-box {
  background: #fff; border-radius: var(--sjp-radius-lg); padding: 18px 20px;
  width: 420px; max-width: 90vw; box-shadow: var(--sjp-shadow-md);
}

/* ═══════════════════════════════════════════════════════════
   메시지
═══════════════════════════════════════════════════════════ */
.msg {
  padding: 9px 14px;
  margin-bottom: 10px;
  font-size: 11px;
  border-radius: var(--sjp-radius);
  font-weight: 500;
}
.msg.ok { background: var(--sjp-success-bg); color: #155724; border: 1px solid #c3e6cb; }
.msg.warn { background: var(--sjp-warning-bg); color: #856404; border: 1px solid #ffe69c; }
.msg.info { background: var(--sjp-primary-light); color: #004085; border: 1px solid var(--sjp-border-strong); }

/* ═══════════════════════════════════════════════════════════
   기타 (시방서, 도면 등)
═══════════════════════════════════════════════════════════ */
.spec-row {
  padding: 8px 12px;
  margin-bottom: 5px;
  background: var(--sjp-warning-bg);
  border-left: 4px solid var(--sjp-warning);
  border-radius: var(--sjp-radius-sm);
  font-size: 11px;
}
.cap-warn {
  background: var(--sjp-warning-bg);
  border: 1px dashed var(--sjp-warning);
  padding: 8px 12px;
  border-radius: var(--sjp-radius);
  font-size: 11px;
  color: #664d03;
  margin-bottom: 10px;
}
.head-block {
  background: var(--sjp-warning-bg);
  border: 1px dashed var(--sjp-warning);
  padding: 10px 12px;
  border-radius: var(--sjp-radius);
  margin: 10px 0;
}
.head-block-title {
  font-size: 11px;
  font-weight: 700;
  color: #996b04;
  margin-bottom: 6px;
}
.item-card {
  border: 1.5px solid var(--sjp-border);
  border-radius: var(--sjp-radius);
  padding: 10px 14px;
  margin-bottom: 8px;
  background: #fafafa;
  transition: all .15s;
}
.item-card:hover { background: var(--sjp-bg-row-hover); border-color: var(--sjp-border-strong); }
.item-card.has-dwg {
  background: var(--sjp-success-bg);
  border-color: var(--sjp-success);
}
.item-card-h { display: flex; justify-content: space-between; align-items: center; }
.item-tag {
  color: var(--sjp-primary);
  font-size: 12px;
  font-weight: 700;
}
.rev-banner {
  padding: 10px 14px;
  border-radius: var(--sjp-radius);
  margin-bottom: 12px;
  font-size: 12px;
  font-weight: 600;
  border-left: 4px solid;
}
.rev-pending {
  background: var(--sjp-warning-bg);
  border-left-color: var(--sjp-warning);
  color: #664d03;
}
.print-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  background: var(--sjp-bg-table-head);
  border: 1px solid var(--sjp-border);
  border-radius: var(--sjp-radius);
  margin-bottom: 10px;
}

@media print {
  /* v2.0 A안 풀-블리드 — A4 한 페이지 가득 채움 + 브라우저 머리글/꼬리글 차단 */
  @page { size: A4 portrait; margin: 0 }
  html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
  .app {
    padding: 10mm 8mm !important;
    max-width: 100% !important;
    min-height: 297mm !important;
    box-sizing: border-box !important;
  }
  .card { border: none !important; box-shadow: none !important; }
  .epc-topbar, .cowork-info, .slots-grid, .tab, .print-bar, .rev-banner, .msg, .no-print { display: none !important; }
  .ic { display: none !important; }
  /* ITP 표가 페이지 중간 잘림 방지 */
  table { page-break-inside: avoid; }
}
</style>
</head>

// v1.6 — 프로젝트 스코프 키. index.html이 iframe에 넘기는 ?pid=... 기준으로 저장소를 분리해서
// 프로젝트를 바꿔 열어도 WO/시방서/견적서/WPS/Welder/프로젝트 정보가 서로 섞이지 않도록 함.
const URL_PARAMS = new URLSearchParams(location.search);
const PID = URL_PARAMS.get("pid") || "standalone";

// ════════ 0. EPC Control 데이터 상속 (v1.4 — 새 창/iframe 둘 다 지원) ════════
// v1.4 (sejong-platform Phase 2):
// - window.opener (새 창에서 열린 경우) 와 window.parent (iframe 임베드) 모두 지원
// - 250ms 폴링으로 EPC Control의 데이터 변경을 자동 반영
(function inheritFromHost(){
  function getHost(){
    try {
      if (window.opener && !window.opener.closed && window.opener.SJP) return window.opener;
    } catch(e){}
    try {
      if (window.parent && window.parent !== window && window.parent.SJP) return window.parent;
    } catch(e){}
    return null;
  }
  function syncOnce(){
    const host = getHost();
    if (!host) return false;
    try {
      window.SJP = host.SJP;
      window.EPC_PROJECT = host.EPC_PROJECT;
      window.EPC_ITEMS = host.EPC_ITEMS;
      window.EPC_DOC_NO_GENERATOR = host.EPC_DOC_NO_GENERATOR;
      window.EPC_INSPECTOR_MASTER = host.EPC_INSPECTOR_MASTER;
      // v1.5 — host 값이 비어있을 때 로컬에서 직접 업로드한 WPS/Welder/Inspector 목록을 지우지 않도록 가드
      if (host.WPS_LIST) window.WPS_LIST = host.WPS_LIST;
      if (host.WELDER_LIST) window.WELDER_LIST = host.WELDER_LIST;
      if (host.INSPECTOR_LIST) window.INSPECTOR_LIST = host.INSPECTOR_LIST;
      return true;
    } catch(e){
      console.warn("[ITP Builder] host 접근 실패", e.message);
      return false;
    }
  }
  const ok = syncOnce();
  console.log("[ITP Builder v1.4] 호스트 연결 " + (ok ? "성공 — EPC Control 데이터 상속 완료" : "실패 (Standalone 모드)"));
  // 250ms 주기로 host 데이터 폴링 (EPC에서 변경 시 자동 반영)
  if (ok) setInterval(syncOnce, 250);
})();

// ════════ 2. AI 파싱 (v1.7 — 접속자 본인의 Claude API 키로 브라우저에서 직접 호출) ════════
// 이 저장소(GitHub Pages)는 정적 파일만 서빙하므로 서버 프록시가 없다. 각 사용자가 자신의
// Anthropic API 키를 브라우저 localStorage에 넣어두면, 그 브라우저에서만 api.anthropic.com을
// 직접 호출한다. 키는 이 파일이나 git에 절대 저장되지 않고 사용자 로컬에만 남는다.
const API_KEY_LS = "sjp_claude_api_key";
const getApiKey = () => { try { return localStorage.getItem(API_KEY_LS) || ""; } catch(e) { return ""; } };
const setStoredApiKey = (k) => { try { if (k) localStorage.setItem(API_KEY_LS, k); else localStorage.removeItem(API_KEY_LS); } catch(e){} };
const fileToBase64 = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => res(r.result.split(",")[1]);
  r.onerror = rej;
  r.readAsDataURL(file);
});
const extractJSON = (text) => {
  const clean = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const m = clean.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("JSON 추출 실패");
  return JSON.parse(m[0]);
};
const callAPI = async (body) => {
  const key = getApiKey();
  if (!key) throw new Error("Claude API 키가 설정되지 않았습니다 — 우측 상단 🔑 API 키에서 입력해주세요.");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error?.message || `API ${r.status}`);
  }
  return r.json();
};

// v2.0 — Welder 자격 만료 판정 (QA Doc Generator의 welderStatus와 동일 기준: 30일 이내 = 임박)
const welderDueDate = (w) => (w && typeof w === "object") ? w.dueDate : "";
const welderStatus = (dueDate) => {
  if (!dueDate) return {label:"valid"};
  const due = new Date(dueDate);
  const days = (due - new Date()) / (1000*60*60*24);
  if (days < 0) return {label:"expired"};
  if (days < 30) return {label:"expiring_soon"};
  return {label:"valid"};
};
// Welder List 항목을 사람이 읽을 수 있는 한 줄로 (문자열/객체 둘 다 지원 — 날짜가 있으면 함께 표시)
const welderLineDisplay = (w) => {
  if (typeof w === "string") return w;
  if (!w) return "";
  const base = w.name ? `${w.name} (${w.id||""})` : (w.id||"");
  return w.dueDate ? `${base} - ${w.dueDate}` : base;
};

// v1.6 — 엑셀식 복사/붙여넣기 그리드 (QA Doc Generator makeGrid 포팅, textarea/input 공통 지원)
function makeGrid(onCellPaste){
  const findCell=(container,row,col)=>container.querySelector(`[data-r="${row}"][data-c="${col}"]`);
  const moveTo=(el,dr,dc)=>{
    const container=el.closest("[data-grid]");if(!container)return;
    const r=parseInt(el.dataset.r),c=parseInt(el.dataset.c);
    let nr=r+dr,nc=c+dc;
    let target=findCell(container,nr,nc);
    if(!target&&dc!==0){target=findCell(container,r+(dc>0?1:-1),0);}
    if(target){target.focus();target.select&&target.select();}
  };
  const onKeyDown=(e)=>{
    const el=e.target;if(!el.dataset||el.dataset.r===undefined)return;
    if(e.key==="Tab"){e.preventDefault();moveTo(el,0,e.shiftKey?-1:1);}
    else if(e.key==="ArrowDown"&&e.ctrlKey){e.preventDefault();moveTo(el,1,0);}
    else if(e.key==="ArrowUp"&&e.ctrlKey){e.preventDefault();moveTo(el,-1,0);}
  };
  const onPaste=(e)=>{
    const el=e.target;if(!el.dataset||el.dataset.r===undefined)return;
    const text=(e.clipboardData||window.clipboardData).getData("text");
    if(!text||(!text.includes("\t")&&!text.includes("\n"))){return;}
    e.preventDefault();
    const rows=text.replace(/\r/g,"").replace(/\n$/,"").split("\n").map(line=>line.split("\t"));
    const startR=parseInt(el.dataset.r),startC=parseInt(el.dataset.c);
    onCellPaste&&onCellPaste(startR,startC,rows);
  };
  return {gridProps:{"data-grid":"1",onKeyDown,onPaste},cellProps:(r,c)=>({"data-r":r,"data-c":c})};
}

// ════════ 5. Revision 계산 ════════
function calcRev({items, specReqs, revComments}){
  const hasItems = items?.length > 0;
  const hasSpec = specReqs?.length > 0;
  const hasDWG = items?.some(i => i.dwgUrl);
  const hasComments = revComments?.length > 0;
  if (hasComments && hasDWG) return {rev:"Rev. 2", percent:100, color:"#4a7fc1", label:"Comment 반영 — 발주처 송부 가능"};
  if (hasDWG) return {rev:"Rev. 1", percent:90, color:"#1d9e75", label:"도면 반영 완료"};
  if (hasItems || hasSpec) return {rev:"Rev. 0", percent:60, color:"#d4a017", label:"Draft — 도면 추가 시 Rev. 1 자동 승격"};
  return {rev:"—", percent:0, color:"#6b7280", label:"입력 대기"};
}

function ITPPreview({proj, items, specReqs, revInfo, rows, setRows, docNo, setDocNo, rev, setRev, witnessCols, setWitnessCols}){
  const active = rows.filter(r => r.active);
  const isHX = items.some(i => i.type.includes("Condenser") || i.type.includes("Heat"));
  const isSUS = !isHX && items.some(i => /(316|304|sus|sts)/i.test(i.shell_mat||""));
  const iLbl = items.map(i => `${i.name||i.tag} / ${i.tag}`).join(", ");
  const TH = {border:"1px solid #555", padding:"5px 6px", background:"#fff", fontSize:10, fontWeight:500, textAlign:"center", verticalAlign:"middle"};
  const TD = {border:"1px solid #888", padding:"4px 5px", fontSize:10, verticalAlign:"top"};
  const TS = {width:"100%", minHeight:36, border:"none", fontSize:9, resize:"none", background:"transparent", fontFamily:"Arial,sans-serif", lineHeight:1.5};

  const moveRow = (idx, dir) => {
    const idxList = rows.map((r,i) => r.active ? i : -1).filter(i => i >= 0);
    const realIdx = idxList[idx];
    const targetReal = idxList[idx + dir];
    if (realIdx === undefined || targetReal === undefined) return;
    const newRows = [...rows];
    [newRows[realIdx], newRows[targetReal]] = [newRows[targetReal], newRows[realIdx]];
    setRows(newRows);
  };

  // v1.6 — 엑셀식 복사/붙여넣기 (Activity/Code/Criteria/Doc 4개 컬럼, QA Doc Generator와 동일 방식)
  const gridCols = ["activity", "code", "criteria", "doc"];
  const itpGrid = makeGrid((startR, startC, matrix) => {
    setRows(prev => {
      const activeRows = prev.filter(r => r.active);
      const next = [...prev];
      matrix.forEach((rowVals, ri) => {
        const targetRow = activeRows[startR + ri];
        if (!targetRow) return;
        const idx = next.findIndex(x => x.id === targetRow.id);
        if (idx < 0) return;
        const patch = {};
        rowVals.forEach((val, ci) => {
          const col = gridCols[startC + ci];
          if (col) patch[col] = val;
        });
        next[idx] = {...next[idx], ...patch};
      });
      return next;
    });
  });

  // 신규 행 추가 (v1.5 — 사용자 검사활동 추가)
  const [newRow, setNewRow] = useState({activity:"", code:"", criteria:"", doc:"", remarks:""});
  const handleAddRow = () => {
    if (!newRow.activity.trim()) { alert("검사활동(Activity)명은 필수입니다"); return; }
    const newId = Math.max(0, ...rows.map(r => r.id||0)) + 1;
    const w = {};
    witnessCols.forEach(c => { w[c.key] = "W"; });
    setRows(p => [...p, { id:newId, ...newRow, sj:"S", client:"W", witness:w, active:true, specOnly:false }]);
    setNewRow({activity:"", code:"", criteria:"", doc:"", remarks:""});
  };

  const pendingNote = revInfo.rev === "Rev. 0" && items.length > 0 && !items.some(i => i.dwgUrl);

  return <div style={{fontFamily:"Arial,sans-serif", fontSize:10}}>
    <style>{`@media print{@page{size:A4 portrait;margin:10mm}.ic{display:none!important}}`}</style>
    <div className="no-print rev-banner" style={{borderLeftColor: revInfo.color, background: revInfo.color+"15"}}>
      <strong style={{color:revInfo.color}}>{revInfo.rev}</strong>
      <span style={{marginLeft:8, color:"#666"}}>{revInfo.label}</span>
      <span style={{marginLeft:8, color:"#999", fontSize:11}}>({revInfo.percent}%)</span>
    </div>
    {pendingNote && <div className="no-print rev-banner rev-pending">
      ⚠ 도면 미도착 — 시방서·견적서 기반 Draft. 도면 추가 시 Tag·치수·재질이 자동 확정되며 Rev. 1로 승격됩니다.
    </div>}

    <table style={{width:"100%", borderCollapse:"collapse"}}>
      <colgroup><col style={{width:"30%"}}/><col style={{width:"15%"}}/><col style={{width:"25%"}}/><col style={{width:"10%"}}/><col style={{width:"20%"}}/></colgroup>
      <tbody>
        <tr>
          <td rowSpan={4} style={{border:"1px solid #555", padding:"4px 6px", textAlign:"left", verticalAlign:"middle"}}><LogoCell/></td>
          <td colSpan={4} style={{border:"1px solid #555", padding:"6px 10px", fontSize:13, fontWeight:700, textAlign:"center"}}>
            Inspection and Test Plan for {isHX?"HEAT EXCHANGER":isSUS?"SUS TANK":"CARBON TANK"}

        </tr>
        <tr>
          <td style={{border:"1px solid #555", padding:"3px 6px", fontSize:10, fontWeight:500, whiteSpace:"nowrap"}}>Document No.</td>
          <td style={{border:"1px solid #555", padding:"3px 6px", fontSize:10}}>
            <input value={docNo} onChange={e=>setDocNo(e.target.value)} style={{width:"100%", border:"none", fontSize:10, background:"transparent"}}/>
          </td>

        <input value={newRow.doc} onChange={e=>setNewRow(p=>({...p, doc:e.target.value}))} placeholder="Verifying Doc."
          style={{fontSize:10, padding:"4px 6px", border:"1px solid var(--sjp-border)", borderRadius:3}}/>
        <button onClick={handleAddRow}
          style={{padding:"6px 14px", background:"var(--sjp-primary)", color:"#fff", border:"none", borderRadius:4, cursor:"pointer", fontWeight:600, fontSize:11, whiteSpace:"nowrap"}}>
          + 추가
        </button>
      </div>
    </div>

    <div style={{marginTop:4, fontSize:9, color:"#444", lineHeight:1.7}}>
      1. The inspection process may be changed by the supplier's manufacturing condition.<br/>
      2. I&amp;T Activities: S-Supplier, R-Report Review, W-Witness, H-Hold Point<br/>
      3. 노란색 행(📋 Spec)은 고객 시방서에서 추출한 추가 요구사항입니다.
    </div>
  </div>;
}

// ════════ 9. 메인 App ════════

  // 샘플 더미 아이템 대신 빈 배열로 시작하고, mount effect에서 EPC 목록과 병합한다.
  const [items, setItems] = useState([]);

  // "1. 아이템 등록"에 넣을지 직접 결정한다 (30~40개 대형 PJT 대비 검색/숨기기 지원).
  const [epcCandidates, setEpcCandidates] = useState([]);

  // v1.3 — AI Provider 상태 제거 (Cowork 연동 대기)

  // 기본값으로 미리 채워둔다. 이후 도면 업로드 시 그 위에 덮어써서 보강하는 방식(도면 파싱 자체는

  // v1.5 — 업로드된 WPS/Welder 목록을 window 전역에도 반영 (동일 페이지 내 다른 참조 대응)

  const revInfo = calcRev({items, specReqs, revComments});

  useEffect(() => {
    setItpRows(prev => {
      const base = prev.filter(r => r.id < 1000);
      const specRows = specReqs.map((req, i) => mkR(

  useEffect(() => {

  }, [proj.no]);

  useEffect(() => {
    const newRev = revInfo.rev === "Rev. 0" ? "0" : revInfo.rev === "Rev. 1" ? "1" : revInfo.rev === "Rev. 2" ? "2" : itpRev;
    if (newRev !== itpRev) setItpRev(newRev);
  }, [revInfo.rev]);

  const showMsg = (text, ms=4000) => { setMsg(text); setTimeout(() => setMsg(""), ms); };

  // v1.8 — 파싱 결과를 상태에 반영하는 부분을 분리. API 키로 자동 호출하든, claude.ai에서
  // 수동으로 받은 JSON을 붙여넣든 동일한 로직으로 반영한다.
  const applyParsedResult = (kind, parsed, targetItemId=null, fileMeta=null) => {
    if (kind === "project") {
      // v1.9 — WO/시방서/견적서를 굳이 구분해서 올리지 않아도, 문서에 들어있는 항목만 알아서 반영.
      // Claude가 못 찾은 항목은 키 자체가 비어있거나 없으므로 각각 존재 여부로 판단.
      const proj2 = parsed.project || parsed;
      const foundParts = [];
      if (proj2 && (proj2.no || proj2.name || proj2.customer || proj2.po || proj2.scope)) {
        setProj(p => ({
          ...p,
          no: proj2.no || p.no, name: proj2.name || p.name, customer: proj2.customer || p.customer,
          po: proj2.po || p.po, scope: proj2.scope || p.scope
        }));
        foundParts.push("프로젝트 정보");
      }
      const reqs = Array.isArray(parsed.requirements) ? parsed.requirements : [];
      if (reqs.length > 0) { setSpecReqs(prev => [...prev, ...reqs]); foundParts.push(`추가 요구사항 ${reqs.length}개`); }
      const qi = Array.isArray(parsed.items) ? parsed.items : [];
      if (qi.length > 0) {
        setQuoteItems(prev => [...prev, ...qi]);
        setItems(prev => {
          const byTag = new Map(prev.map(it => [it.tag, it]));
          qi.forEach(qi2 => { if (qi2.tag && !byTag.has(qi2.tag)) byTag.set(qi2.tag, {...DEF_ITEM, ...qi2, id: Date.now()+Math.random()}); });
          return Array.from(byTag.values());
        });
        foundParts.push(`아이템 ${qi.length}개`);
      }
      showMsg(foundParts.length ? `✓ 반영 완료 — ${foundParts.join(", ")}` : `⚠ 이 문서에서 인식 가능한 정보를 찾지 못했습니다`, 5000);
    } else if (kind === "wo") {
      setProj(p => ({
        ...p,
        no: parsed.no || p.no, name: parsed.name || p.name, customer: parsed.customer || p.customer,
        po: parsed.po || p.po, scope: parsed.scope || p.scope
      }));
      showMsg(`✓ Work Order 반영 완료 — 프로젝트 정보 업데이트`, 5000);
    } else if (kind === "spec") {
      const reqs = Array.isArray(parsed.requirements) ? parsed.requirements : [];
      setSpecReqs(reqs);
      showMsg(`✓ 시방서 반영 완료 — 추가 요구사항 ${reqs.length}개`, 5000);
    } else if (kind === "quote") {
      const qi = Array.isArray(parsed.items) ? parsed.items : [];
      setQuoteItems(qi);
      // 견적서 기반 사전 등록 (Rev.0) — 이미 있는 Tag는 건드리지 않고 신규 Tag만 추가
      setItems(prev => {
        const byTag = new Map(prev.map(it => [it.tag, it]));
        qi.forEach(qi2 => { if (qi2.tag && !byTag.has(qi2.tag)) byTag.set(qi2.tag, {...DEF_ITEM, ...qi2, id: Date.now()+Math.random()}); });
        return Array.from(byTag.values());
      });
      showMsg(`✓ 견적서 반영 완료 — 아이템 ${qi.length}개 추출/사전 등록`, 5000);
    } else {
      const dwgUrl = fileMeta ? `data:${fileMeta.mediaType};base64,${fileMeta.b64}` : undefined;
      const patch = {...parsed, ...(dwgUrl?{dwgUrl, dwgName:fileMeta.name}:{})};
      if (targetItemId) {
        setItems(prev => prev.map(it => it.id === targetItemId ? {...it, ...patch} : it));
        showMsg(`✓ 도면 반영 완료 — 기존 아이템에 적용 (Rev. 1 승격)`, 5000);
      } else {
        setNewItem(prev => ({...prev, ...patch, tag: prev.tag || parsed.tag || ""}));
        showMsg(`✓ 도면 반영 완료 — 아이템 필드 자동 채움`, 5000);
      }
    }
  };

  // v1.8 — claude.ai에서 수동으로 받아온 JSON 결과를 그대로 반영 (API 키 불필요)
  const handlePasteApply = (kind, rawText, targetItemId=null) => {
    try {
      const parsed = extractJSON(rawText);
      applyParsedResult(kind, parsed, targetItemId);
      return true;
    } catch (err) {
      showMsg(`⚠ JSON 적용 실패 — ${err.message||"형식을 확인해주세요"}`, 6000);
      return false;
    }
  };
  const copyPrompt = (text) => {
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(
        () => showMsg("✓ 프롬프트 복사됨 — claude.ai에 PDF와 함께 붙여넣으세요", 5000),
        () => showMsg("⚠ 클립보드 복사 실패 — 직접 선택해서 복사해주세요", 5000)
      );
    } else {
      showMsg("⚠ 이 브라우저는 클립보드 복사를 지원하지 않습니다", 5000);
    }
  };

  const buildParsePrompt = (kind) => {
    if (kind === "project") return `This document may be a Work Order, a specification, a quotation, or some combination — figure out which parts are actually present and extract ONLY those. Return JSON only, no explanation, using this shape: {"project":{"no":"","name":"","customer":"","po":"","scope":""},"requirements":[{"category":"","activity":"","code":"","criteria":"","hold":false,"doc":""}],"items":[{"tag":"","name":"","type":"","appl_code":""}]}. Leave "project" fields as "" and "requirements"/"items" as [] for anything not actually present in the document — do not invent data. "po" = the Work Order's "Report No." field value (NOT a purchase-order number — this document's own report/document number). "requirements" = customer special inspection/test requirements beyond standard ITP items ("hold" true only if explicitly a hold/witness point). "items" = equipment/items to be manufactured, "type" one of: ${JSON.stringify(ITYPES)}.`;
    if (kind === "wo") return `Extract project info from this Work Order document. Return JSON only, no explanation: {"no":"","name":"","customer":"","po":"","scope":""}. "po" = this Work Order's own "Report No." field value (NOT a purchase-order number). Use "" for anything not found.`;
    if (kind === "spec") return `Extract customer special inspection/test requirements (beyond standard ITP items) from this specification document. Return JSON only: {"requirements":[{"category":"","activity":"","code":"","criteria":"","hold":false,"doc":""}]}. "hold" is true only if it is explicitly a hold/witness point requiring approval before proceeding. Return {"requirements":[]} if none found.`;
    if (kind === "quote") return `Extract the list of equipment/items to be manufactured from this quotation document. Return JSON only: {"items":[{"tag":"","name":"","type":"","appl_code":""}]}. "type" must be one of: ${JSON.stringify(ITYPES)}. Return {"items":[]} if none found.`;
    // v1.9 — QA Doc Generator의 BOM/Fit-up/Nozzle/Hydro/DIM 리포트가 실제로 쓰는 항목까지 전부
    // 도면에서 한 번에 뽑아오도록 확장 (기존엔 기본 스칼라 필드 몇 개만 요청했음).
    return `You are an expert pressure vessel engineer analyzing a fabrication drawing (may be multi-page PDF — check all pages).

[TITLE BLOCK SEARCH] The main material list ("DETAIL OF BODY" / "BOM OF MATERIAL") page is not always page 2 — check each page's title block (bottom-right) to find it.

[BOM_ROWS] From that material list table, extract ALL rows as an array: {name, mat, thk, sz, qty, remark}.
- name: part name (e.g. "SHELL","TOP HEAD","BOTTOM HEAD","JACKET SHELL","TUBE SHEET","GIRTH FLANGE","CHANNEL","NOZZLE PIPE","REINFORCE PAD", etc.)
- mat: material column. thk: thickness (numbers only). sz: size/dimension (e.g. "Ø1200xL3000","150A x SCH.40"). qty: numbers only. remark: remark column.
Skip blank rows. Don't invent rows for parts that don't exist on this equipment (e.g. no jacket → no jacket rows).

[DERIVE FROM BOM_ROWS] shell_mat/shell_thk/shell_len = SHELL row. head_top_mat/head_bot_mat = TOP/BOTTOM HEAD rows. ts_mat/ts_thk = TUBE SHEET row. gf_mat/gf_thk = GIRTH FLANGE row. tube_mat/tube_od = TUBE row.
shell_is_pipe = true if the SHELL row shows pipe notation (e.g. "10B x SCH.40", "450A") instead of a plate ID — in that case set shell_od (numeric OD in mm) and shell_od_display (e.g. "267.4mm (10BxSCH.40)"); otherwise leave shell_od/shell_od_display empty and shell_id = the plate inner diameter.

[APPL_CODE] Page 1 "DESIGN DATA" box, first row (label "CODE"/"Appl. Code") — copy the full value (e.g. "ASME Sec. VIII Div.1 / TEMA C").

[PRESSURES] In the same DESIGN DATA box: design_p = shell-side design pressure (MPa, numbers only). For Heat Exchangers also read tube_side_p. Under the "Test Pressure"/"HYDRO" row: test_p_shell = shell-side value, test_p_tube = tube-side value (Heat Exchanger only, else ""). mawp = maximum allowable working pressure if separately shown, else same as design_p.

[TYPE] "Condenser / Heat Exchanger" if TUBE+TUBESHEET present, "Reactor (Mixing Tank)" if AGITATOR/IMPELLER shown, "Storage Tank" if TANK with no agitator/tubes, else "Pressure Vessel".

[HEAD TYPE — top and bottom may differ] Read TOP HEAD and BOTTOM HEAD rows' shape notation and normalize to one of: ${JSON.stringify(HEAD_TYPES)}. If only one head type applies to the whole vessel, use the same value for both. Also extract head_thk_top/head_thk_bottom (numbers only).

[WELD SEAM PLAN] Heat Exchangers: "WELD SEAM PLAN" (page 1 bottom). Tanks: "WELD DETAIL" (page 2 top-right). Extract every seam joint number as a string array, e.g. ["SC-01","SL-01","JC-01","JL-01"] (SC=Shell Circ, SL=Shell Long, JC=Jacket Circ, JL=Jacket Long). Return [] if not found.

[JOINT DETAILS] For each weld joint's sectional detail drawing (especially SL-prefixed, shell longitudinal), extract root angle/tolerance and max root gap: {joint_no, root_angle, root_tol, root_gap_max} (numbers only, use 0 if not shown). Return array under joint_details, [] if none found.

[NOZZLE LIST] From the "NOZZLE LIST" table (page 1), extract every row: {no, size, pos, is_pad}. no = label as shown (e.g. "N-1","AG-1","M-1" — keep agitator/manhole labels exact). size = e.g. "200A". pos = orientation (e.g. "TOP/0","SIDE/90"). is_pad = true if that row shows "PAD" instead of a pipe size. Return [], if none found.

[JACKET/INCOIL/HALFCOIL] true only if explicitly shown on the drawing.

Return ONLY valid JSON, no markdown fences: {"tag":"","name":"","type":"","appl_code":"","shell_mat":"","shell_id":"","shell_len":"","shell_thk":"","shell_od":"","shell_od_display":"","shell_is_pipe":false,"design_p":"","design_t":"","tube_mat":"","tube_od":"","tube_side_p":"","test_p_shell":"","test_p_tube":"","mawp":"","ts_mat":"","ts_thk":"","gf_mat":"","gf_thk":"","head_top_type":"","head_bot_type":"","head_top_mat":"","head_bot_mat":"","head_thk_top":"","head_thk_bottom":"","jacket":false,"incoil":false,"halfcoil":false,"weld_seams":[],"joint_details":[],"nozzles":[],"bom_rows":[]}.
"type" must be one of: ${JSON.stringify(ITYPES)}. Use "" / false / [] for anything unreadable — do not guess or invent values.`;
  };

  // v1.7 — 접속자 본인 API 키로 실제 AI 파싱 수행 (WO/시방서/견적서/도면)
  const handleFile = async (file, kind, targetItemId=null) => {
    const kindLabel = kind==="project"?"프로젝트 문서":kind==="wo"?"Work Order":kind==="spec"?"시방서":kind==="quote"?"견적서":"도면";
    setParsing(kind);
    showMsg(`⏳ ${kindLabel} 분석 중... (최대 1분 정도 걸릴 수 있습니다)`, 60000);
    try {
      const b64 = await fileToBase64(file);
      const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
      const mediaType = isPdf ? "application/pdf" : (file.type || "image/png");
      const blockType = isPdf ? "document" : "image";
      const prompt = buildParsePrompt(kind);
      const res = await callAPI({
        model: "claude-sonnet-4-20250514",
        max_tokens: kind === "dwg" ? 4096 : 2048, // v1.9 — 도면은 nozzles/joint_details/bom_rows 배열까지 뽑아서 응답이 길어짐
        messages: [{role:"user", content:[{type:blockType, source:{type:"base64", media_type:mediaType, data:b64}}, {type:"text", text:prompt}]}]
      });
      const text = (res.content||[]).map(c=>c.text||"").join("");
      const parsed = extractJSON(text);
      applyParsedResult(kind, parsed, targetItemId, {b64, mediaType, name:file.name});
    } catch (err) {
      console.error(err);
      showMsg(`⚠ ${kindLabel} 분석 실패 — ${err.message||"알 수 없는 오류"}`, 8000);
    } finally {
      setParsing(null);
    }
  };

  // v1.5 — WPS/Welder List 업로드 (xlsx/pdf/csv). AI(Cowork) 의존 없이 클라이언트에서 직접 파싱.
  const loadXLSX = async () => {
    if (window.XLSX) return window.XLSX;
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
      s.onload = () => resolve(window.XLSX);
      s.onerror = () => reject(new Error("SheetJS CDN load failed"));
      document.head.appendChild(s);
    });
  };
  const loadPDFJS = async () => {
    if (window.pdfjsLib) return window.pdfjsLib;
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      s.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; resolve(window.pdfjsLib); };
      s.onerror = () => reject(new Error("PDF.js CDN load failed"));
      document.head.appendChild(s);
    });
  };
  const parseListFile = async (file, kind) => {
    if (!file) return;
    const ext = file.name.toLowerCase().split(".").pop();
    showMsg(`⏳ ${file.name} 분석 중...`);
    try {
      let texts = [];
      if (ext === "xlsx" || ext === "xls") {
        const XLSX = await loadXLSX();
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, {type:"array"});
        wb.SheetNames.forEach(sn => {
          const sheet = wb.Sheets[sn];
          const rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, defval:""});
          rows.forEach(r => texts.push(r.map(c=>String(c||"")).join("\t")));
        });
      } else if (ext === "pdf") {
        const pdfjs = await loadPDFJS();
        const buf = await file.arrayBuffer();
        const pdf = await pdfjs.getDocument({data:buf}).promise;
        for (let i=1; i<=pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const tc = await page.getTextContent();
          const lineMap = {};
          tc.items.forEach(it => { const y = Math.round(it.transform[5]); if (!lineMap[y]) lineMap[y]=[]; lineMap[y].push({x:it.transform[4], s:it.str}); });
          Object.keys(lineMap).sort((a,b)=>b-a).forEach(y => {
            const line = lineMap[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join("\t");
            texts.push(line);
          });
        }
      } else {
        const text = await file.text();
        texts = text.split(/\r?\n/);
      }
      const arr = [];
      const seen = new Set();
      if (kind === "wps") {
        // WPS No. 패턴: SJTC-WPS-XXX, GTAW-001 등 (셀 단위 매칭 우선)
        texts.forEach(line => {
          line.split(/\t+/).map(c=>c.trim()).forEach(c => {
            const m = c.match(/^([A-Z]{1,4}-)?[A-Z]{2,5}-\d{2,3}(-\d{2})?$/);
            if (m && !seen.has(c) && !c.match(/^(P|F|G|A|NO)-?\d/i)) { seen.add(c); arr.push(c.startsWith("SJTC-")?c:`SJTC-WPS-${c}`); }
          });
        });
        // fallback: 줄 전체에서 SJTC-WPS-XXX 패턴 직접 스캔 (셀 분리가 깨진 PDF 대응)
        if (arr.length === 0) {
          texts.forEach(line => { const m = line.match(/SJTC-WPS-[A-Z0-9-]+/g); if (m) m.forEach(x => { if (!seen.has(x)) { seen.add(x); arr.push(x); } }); });
        }
      } else if (kind === "welder") {
        // Welder ID 패턴: SJ-XXX-XX-NN. PDF는 텍스트 항목이 셀 경계 없이 이어붙는 경우가 많아
        // (버그 수정) 셀 전체와 정확히 일치해야 하는 anchor(^...$) 매칭 대신, 줄 전체에서 부분 문자열로 스캔.
        // v2.0 — 같은 줄에서 자격 만료일(YYYY-MM-DD/YYYY.MM.DD/YYYY/MM/DD)도 함께 찾아서, 있으면
        // {id,name,dueDate} 객체로 저장 (만료 임박 계산에 사용). 날짜가 없으면 예전처럼 문자열 그대로.
        let curName = "";
        const dateRe = /(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/;
        texts.forEach(line => {
          const cells = line.split(/\t+/).map(c=>c.trim());
          const nameCell = cells.find(c => /^[가-힣]{2,4}$/.test(c));
          if (nameCell) curName = nameCell;
          const norm = line.replace(/\s+/g, "");
          const ms = norm.match(/SJ-[A-Z]{2,4}-[A-Z]{2,4}(-\d{2})?(,\d{2})?/g);
          if (!ms) return;
          const dm = line.match(dateRe);
          const dueDate = dm ? `${dm[1]}-${String(dm[2]).padStart(2,"0")}-${String(dm[3]).padStart(2,"0")}` : "";
          ms.forEach(id => {
            if (seen.has(id)) return;
            seen.add(id);
            arr.push(dueDate ? {id, name:curName||"", dueDate} : (curName?`${id} (${curName})`:id));
          });
        });
      } else {
        // v2.0 — 검사자(Inspector) 자격인정 관리대장: 선임감사자/감사자/검사자/시험원 4개 분야가
        // 섞여 있는데, 자격인정번호에 "QCI"가 포함된 사람만 뽑는다 (예: "CER-QCI-001 신채완").
        texts.forEach(line => {
          const cells = line.split(/\t+/).map(c=>c.trim()).filter(Boolean);
          const certIdx = cells.findIndex(c => /QCI/i.test(c));
          if (certIdx < 0) return; // QCI 자격번호가 있는 행만 채택
          const certNo = cells[certIdx];
          const nameIdx = cells.findIndex((c,i) => i!==certIdx && /^[가-힣]{2,4}$/.test(c));
          if (nameIdx < 0) return;
          const name = cells[nameIdx];
          if (seen.has(name)) return;
          seen.add(name);
          arr.push(`${name} (${certNo})`);
        });
        // fallback: 셀 분리가 깨진 PDF 대응 — 줄 전체에서 "...QCI... 이름" 패턴 직접 스캔
        if (arr.length === 0) {
          texts.forEach(line => {
            if (!/QCI/i.test(line)) return;
            const m = line.match(/([A-Z0-9-]*QCI[A-Z0-9-]*)\s+([가-힣]{2,4})/i) || line.match(/([가-힣]{2,4})\s+([A-Z0-9-]*QCI[A-Z0-9-]*)/i);
            if (!m) return;
            const [certNo, name] = /QCI/i.test(m[1]) ? [m[1], m[2]] : [m[2], m[1]];
            if (seen.has(name)) return;
            seen.add(name);
            arr.push(`${name} (${certNo})`);
          });
        }
      }
      if (arr.length === 0) {
        showMsg(`⚠ ${file.name}: 인식된 항목이 없습니다. 수동 입력 또는 형식 확인이 필요합니다.`, 6000);
        return;
      }
      const kindLabel = kind==="wps"?"WPS":kind==="welder"?"Welder":"검사자";
      if (kind === "wps") { setWpsList(arr); window.WPS_LIST = arr; saveMasterList("wps", arr); }
      else if (kind === "welder") { setWelderList(arr); window.WELDER_LIST = arr; saveMasterList("welder", arr); }
      else { setInspectorList(arr); window.INSPECTOR_LIST = arr; saveMasterList("inspector", arr); }
      showMsg(`✓ ${file.name}에서 ${arr.length}개 ${kindLabel} 항목 추출 완료 — QA Doc Generator에서도 자동 반영됩니다.`, 6000);
    } catch (err) {
      console.error(err);
      showMsg(`⚠ 파싱 실패 — ${err.message||"알 수 없는 오류"}`, 6000);
    }
  };

  const addItem = () => {
    if (!newItem.tag || !newItem.name) { showMsg("⚠ Tag와 Name은 필수"); return; }
    setItems(p => [...p, {...newItem, id: Date.now()}]);
    setNewItem({...DEF_ITEM});
    showMsg(`✓ 아이템 추가 — ${newItem.tag}`);
  };

  const removeItem = (id) => {
    if (!confirm("이 아이템을 삭제하시겠습니까?")) return;
    setItems(p => p.filter(i => i.id !== id));
  };

  // v1.9 — 제작공정관리 후보 아이템 선택/숨기기 (수동 등록)
  const toggleCandChecked = (tag) => setCandChecked(prev => {
    const next = new Set(prev);
    next.has(tag) ? next.delete(tag) : next.add(tag);
    return next;
  });
  const hideCandidates = (tags) => setCandHidden(prev => {
    const next = new Set(prev);
    tags.forEach(t => next.add(t));
    saveCandHidden(next);
    return next;
  });
  const unhideAllCandidates = () => { setCandHidden(new Set()); saveCandHidden(new Set()); };
  const addSelectedCandidates = () => {
    if (candChecked.size === 0) return;
    setItems(prev => {
      const byTag = new Map(prev.map(it => [it.tag, it]));
      epcCandidates.forEach(ei => {
        if (candChecked.has(ei.tag) && !byTag.has(ei.tag)) {
          byTag.set(ei.tag, {...DEF_ITEM, ...ei, id: Date.now()+Math.random()});
        }
      });
      return Array.from(byTag.values());
    });
    showMsg(`✓ 검사 대상 아이템 ${candChecked.size}개 등록`);
    setCandChecked(new Set());
  };

  // v2.1 — SJP bridge 전송(EPC Control/Firestore 연동)과 JSON 파일 다운로드를 분리.
  // bridge.setItems()가 쓰는 state.items[pid]는 WBS(제작공정관리) Firestore 구독이 실시간으로
  // 덮어쓸 수 있어 타이밍에 따라 안 먹힐 때가 있다 — QA Doc Generator는 이거 하나만 믿지 말고
  // 아래 sendToQADoc()의 즉시 localStorage 저장(같은 pid, sjp_itp_builder_v1__*)도 함께 본다.
  const pushToHost = () => {
    if (!window.SJP?.bridge) return false;
    window.SJP.bridge.setProject(proj);
    const epcItems = items.map(it => ({
      tagNo: it.tag, type: it.type, spec: it.appl_code, maker: it.maker || ""
    }));
    window.SJP.bridge.setItems(epcItems);
    setTimeout(() => {
      const epcItemsAfter = window.SJP.bridge.getItems();
      items.forEach(localItem => {
        const epc = epcItemsAfter.find(e => e.tagNo === localItem.tag);
        if (!epc) return;
        const tplItems = (itpRows || []).filter(r => r.active !== false).map((r, idx) => {
          const rid = String(r.id || (idx+1)).padStart(2, "0");
          const ph = rid <= "05" ? 0 : rid <= "14" ? 1 : 2;
          const clientVal = (r.witness && r.witness.client) || r.client;
          const pt = ["H","W","R","S","N/A"].includes(clientVal) ? clientVal : "W";
          return { id: rid, item: r.activity || "", ph: ph, pt: pt, crit: r.criteria || "" };
        });
        if (tplItems.length > 0) window.SJP.bridge.setItpTemplate(epc.id, tplItems);
      });
    }, 80);
    return true;
  };
  // Step 2 "QA Doc Generator로 바로 전송" — 1초 자동저장을 기다리지 않고 지금 즉시 localStorage에
  // 쓴다. QA Doc Generator를 그 뒤에 열거나 "🔄 ITP 최신정보 새로고침"을 누르면 바로 반영된다.
  const sendToQADoc = () => {
    saveLS({proj, items, specReqs, quoteItems, revComments, itpRows, itpDocNo, itpRev});
    const bridged = pushToHost();
    showMsg(`✓ QA Doc Generator로 전송 완료${bridged?" (EPC Control 연동 포함)":""} — QA Doc Generator를 열거나 "🔄 ITP 최신정보 새로고침"을 눌러 확인하세요.`, 6000);
  };
  const handleExport = () => {
    const data = {proj, items, specReqs, quoteItems, wpsList, welderList, inspectorList, exported_at:new Date().toISOString(), version:"itp_builder_v1.2"};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `${proj.no||"project"}_data.json`;
    a.click(); URL.revokeObjectURL(url);
    const bridged = pushToHost();
    showMsg(bridged ? `✓ Export 완료 — EPC Control · QA Doc Generator로 자동 전송` : `✓ Export 완료 — Standalone 모드 (EPC 미연결)`);
  };
  const handleImport = (file) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (d.proj) setProj(d.proj);
        if (d.items) setItems(d.items);
        if (d.specReqs) setSpecReqs(d.specReqs);
        if (d.quoteItems) setQuoteItems(d.quoteItems);
        if (d.wpsList) { setWpsList(d.wpsList); window.WPS_LIST=d.wpsList; saveMasterList("wps", d.wpsList); }
        if (d.welderList) { setWelderList(d.welderList); window.WELDER_LIST=d.welderList; saveMasterList("welder", d.welderList); }
        if (d.inspectorList) { setInspectorList(d.inspectorList); window.INSPECTOR_LIST=d.inspectorList; saveMasterList("inspector", d.inspectorList); }
        showMsg(`✓ Import 완료 — ${d.items?.length || 0}개 아이템`);
      } catch(err) { showMsg(`⚠ Import 실패: ${err.message}`); }
    };
    r.readAsText(file);
  };
  const handleNew = () => {
    if (!confirm("새 프로젝트를 시작하시겠습니까?")) return;
    setProj({no:"", name:"", customer:"", po:"", scope:"", codes:{KS:true, ASME:true, TEMA:false, EN:false, API:false, Others:false}});
    setItems([]); setNewItem({...DEF_ITEM});
    setSpecReqs([]); setQuoteItems([]); setRevComments([]);
    setItpRows([...ITP_BASE]); setItpDocNo(""); setItpRev("0"); setStep(0);
        setWitnessCols([{key:"sj",name:"SJ",bg:"#eef3fb"},{key:"qc",name:"QC",bg:"#eef3fb"},{key:"client",name:"Client",bg:"#eef3fb"}]);
    showMsg(`✓ 새 프로젝트`);
  };

  return <div className="app">
    {/* v1.3 EPC Control 톤 Topbar */}
    <div className="epc-topbar no-print">
      <div className="epc-topbar-icon">📋</div>
      <div>
        <div className="epc-topbar-title">ITP Builder v1.4</div>
        <div className="epc-topbar-sub">신채완 과장 · ㈜세종기술 품질관리부</div>
      </div>
      <div className="epc-topbar-badge">{revInfo.rev}</div>
      <button onClick={()=>setShowKeyModal(true)} className="btn-secondary" style={{marginLeft:8}}>🔑 API 키{getApiKey()?" ✓":""}</button>
      <button onClick={handleNew} className="btn-secondary" style={{marginLeft:8}}>🗋 New</button>
    </div>

    {showKeyModal && <div className="modal-overlay no-print" onClick={()=>setShowKeyModal(false)}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:700, marginBottom:8}}>🔑 Claude API 키</div>
        <div style={{fontSize:10.5, color:"var(--sjp-text-sub)", marginBottom:10, lineHeight:1.5}}>
          Work Order·시방서·견적서·도면 PDF 자동 파싱에 사용됩니다. 이 키는 이 브라우저의 localStorage에만 저장되며,
          api.anthropic.com으로만 직접 전송됩니다 — 저장소(git)나 서버로는 전송/저장되지 않습니다.
          공용 PC에서는 사용 후 "삭제"를 눌러주세요.
        </div>
        <input type="password" value={keyInput} onChange={e=>setKeyInput(e.target.value)} placeholder="sk-ant-..." style={{width:"100%", padding:"6px 8px", fontSize:12, border:"1px solid var(--sjp-border)", borderRadius:5, marginBottom:10}}/>
        <div style={{display:"flex", gap:6, justifyContent:"flex-end"}}>
          <button onClick={()=>{ setStoredApiKey(""); setKeyInput(""); showMsg("API 키를 삭제했습니다"); }} className="btn-secondary">삭제</button>
          <button onClick={()=>setShowKeyModal(false)} className="btn-secondary">닫기</button>
          <button onClick={()=>{ setStoredApiKey(keyInput.trim()); setShowKeyModal(false); showMsg("✓ API 키 저장 완료"); }} className="btn-primary">저장</button>
        </div>
      </div>
    </div>}

    <EPCSlots jobNo={proj.no}/>

    {/* 단계 탭 */}
    <div className="no-print" style={{display:"flex", gap:6, marginBottom:14}}>
      {["0. 프로젝트 · 시방서 · 견적서", "1. 아이템 등록", "2. ITP 생성 · 미리보기"].map((s, i) =>
        <button key={i} onClick={()=>setStep(i)} className={"tab " + (step===i?"on":"")} style={{flex:1}}>
          {s}
        </button>
      )}
    </div>

    {msg && <div className={`msg ${msg.startsWith("✓")?"ok":msg.startsWith("⚠")?"warn":"info"}`}>{msg}</div>}

    {/* Step 0 */}
    {step === 0 && <div>
      <div className="card">
        <div className="card-h">📄 프로젝트 문서 업로드 <span className="badge">WO·시방서·견적서 통합 인식</span></div>
        <div className="card-b">
          <div style={{fontSize:10, color:"var(--sjp-text-sub)", marginBottom:8}}>
            Work Order / 시방서 / 견적서 중 아무 문서나 올리면(또는 한 문서에 여러 내용이 섞여 있어도) 그 안에 실제로 있는 항목만 알아서 찾아서 반영합니다. 문서 종류별로 따로 올릴 필요 없습니다.
          </div>
          <input type="file" accept=".pdf" id="projectFile" style={{display:"none"}} onChange={e=>e.target.files[0] && handleFile(e.target.files[0], "project")}/>
          <button onClick={()=>document.getElementById("projectFile").click()} disabled={parsing!==null} className="btn-primary">📄 문서 업로드 (PDF)</button>
          <span style={{fontSize:10, color:"var(--sjp-text-sub)", marginLeft:8}}>Project No/발주처/PO/Scope, 추가 요구사항, 견적 아이템 — 있는 것만 자동 반영</span>
          <PasteBox kind="project" prompt={buildParsePrompt("project")} onApply={handlePasteApply} onCopyPrompt={copyPrompt}/>

          <div style={{display:"flex", gap:16, marginTop:12, flexWrap:"wrap"}}>
            <div style={{fontSize:10, color: specReqs.length > 0 ? "var(--sjp-success)" : "var(--sjp-text-sub)"}}>
              📋 추가 요구사항: <strong>{specReqs.length}개</strong>
            </div>
            <div style={{fontSize:10, color: quoteItems.length > 0 ? "#7f77dd" : "var(--sjp-text-sub)"}}>
              💰 견적 아이템: <strong>{quoteItems.length}개</strong> (도면 미도착 상태에서도 Rev. 0 ITP 생성 가능, 도면 첨부 시 Rev. 1 자동 승격)
            </div>
          </div>
          {specReqs.length > 0 && <div style={{marginTop:8, maxHeight:200, overflowY:"auto"}}>
            {specReqs.map((r, i) =>
              <div key={i} className="spec-row">
                <strong style={{color:"var(--sjp-warning)"}}>[{r.category}]</strong> {r.activity}
                {r.hold && <span style={{color:"var(--sjp-danger)", marginLeft:5, fontWeight:600}}>(H.P.)</span>}
                <div style={{color:"var(--sjp-text-sub)", fontSize:10, marginTop:2}}>{r.code} → {r.criteria}</div>
              </div>
            )}
            <button onClick={()=>{ if(confirm("시방서 요구사항을 모두 제거하시겠습니까?")) setSpecReqs([]); }} style={{fontSize:10, padding:"3px 8px", background:"var(--sjp-danger-bg)", color:"var(--sjp-danger)", border:"1px solid #fbb", borderRadius:3, cursor:"pointer", marginTop:4}}>✕ 모두 제거</button>
          </div>}
        </div>
      </div>

      <div className="card">
        <div className="card-h">🔧 WPS / Welder / 검사자 List 업로드 <span className="badge">xlsx · pdf · csv 지원</span></div>
        <div className="card-b">
          <div style={{fontSize:10, color:"var(--sjp-text-sub)", marginBottom:8}}>회사 표준 양식(xlsx) 또는 CSV/TXT/PDF 업로드. 업로드하면 QA Doc Generator의 Fit-up & Welding IR·검사자 선택에서 바로 선택 가능합니다.</div>
          <div style={{display:"flex", gap:8, alignItems:"center", flexWrap:"wrap"}}>
            <input type="file" accept=".csv,.txt,.tsv,.xlsx,.xls,.pdf" id="wpsFile" style={{display:"none"}} onChange={e=>parseListFile(e.target.files[0], "wps")}/>
            <button onClick={()=>document.getElementById("wpsFile").click()} className="btn-secondary">📄 WPS 파일 업로드</button>
            <input type="file" accept=".csv,.txt,.tsv,.xlsx,.xls,.pdf" id="welderFile" style={{display:"none"}} onChange={e=>parseListFile(e.target.files[0], "welder")}/>
            <button onClick={()=>document.getElementById("welderFile").click()} className="btn-secondary">📄 Welder 파일 업로드</button>
            <input type="file" accept=".csv,.txt,.tsv,.xlsx,.xls,.pdf" id="inspectorFile" style={{display:"none"}} onChange={e=>parseListFile(e.target.files[0], "inspector")}/>
            <button onClick={()=>document.getElementById("inspectorFile").click()} className="btn-secondary">📄 검사자 파일 업로드</button>
            <span style={{fontSize:10, color:"var(--sjp-text-sub)"}}>현재: WPS {wpsList.length}개 / Welder {welderList.length}명 / 검사자 {inspectorList.length}명</span>
          </div>
          <div className="fld" style={{marginTop:8}}><label>WPS No. List</label>
            <textarea value={wpsList.join("\n")} onChange={e=>{const arr=e.target.value.split(/[\n,;\t]+/).map(s=>s.trim()).filter(Boolean); setWpsList(arr); window.WPS_LIST=arr; saveMasterList("wps", arr);}} placeholder={"SJTC-WPS-001\nSJTC-WPS-002\n..."} style={{width:"100%", minHeight:50, fontFamily:"monospace", fontSize:10}}/>
          </div>
          <div className="fld"><label>Welder ID List{welderList.some(w=>welderDueDate(w))?" (자격 만료일 포함 — 직접 수정 시 만료일은 사라집니다)":""}</label>
            <textarea value={welderList.map(welderLineDisplay).join("\n")} onChange={e=>{const arr=e.target.value.split(/[\n,;\t]+/).map(s=>s.trim()).filter(Boolean); setWelderList(arr); window.WELDER_LIST=arr; saveMasterList("welder", arr);}} placeholder={"SJ-KYG-GT-01 (강용구)\nSJ-KHS-GT-01 (강희석)\n..."} style={{width:"100%", minHeight:50, fontFamily:"monospace", fontSize:10}}/>
          </div>
          {(() => {
            const expiring = welderList.filter(w => welderStatus(welderDueDate(w)).label === "expiring_soon").length;
            const expired = welderList.filter(w => welderStatus(welderDueDate(w)).label === "expired").length;
            if (!expiring && !expired) return null;
            return <div style={{marginTop:6, padding:"6px 10px", background:"var(--sjp-warning-bg)", border:"1px solid #f0d78c", borderRadius:5, fontSize:10.5, color:"#856404", fontWeight:600}}>
              ⚠ 용접사 자격 만료임박 {expiring}명 / 만료 {expired}명 — 자격인정 관리대장 기준 (30일 이내)
            </div>;
          })()}
          <div className="fld"><label>검사자(Inspector) List</label>
            <textarea value={inspectorList.join("\n")} onChange={e=>{const arr=e.target.value.split(/[\n,;\t]+/).map(s=>s.trim()).filter(Boolean); setInspectorList(arr); window.INSPECTOR_LIST=arr; saveMasterList("inspector", arr);}} placeholder={"김철우 (부장)\n신채완 (과장)\n..."} style={{width:"100%", minHeight:50, fontFamily:"monospace", fontSize:10}}/>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h">프로젝트 정보</div>
        <div className="card-b">
          <div className="fld"><label>Project No.</label><input value={proj.no} onChange={e=>setProj(p=>({...p, no:e.target.value}))} placeholder="ex. SJ2026-014"/></div>
          <div className="fld"><label>프로젝트명</label><input value={proj.name} onChange={e=>setProj(p=>({...p, name:e.target.value}))}/></div>
          <div className="fld"><label>발주처</label><input value={proj.customer} onChange={e=>setProj(p=>({...p, customer:e.target.value}))}/></div>
          <div className="fld"><label>PO No.</label><input value={proj.po} onChange={e=>setProj(p=>({...p, po:e.target.value}))}/></div>
          <div className="fld"><label>Scope</label><input value={proj.scope} onChange={e=>setProj(p=>({...p, scope:e.target.value}))}/></div>
          <div className="fld"><label>적용 코드</label>
            <div style={{flex:1}}>
              {CODES.map(c => <label key={c} className="chk">
                <input type="checkbox" checked={!!proj.codes[c]} onChange={e=>setProj(p=>({...p, codes:{...p.codes, [c]:e.target.checked}}))}/>{c}
              </label>)}
            </div>
          </div>
        </div>
      </div>

      <div style={{display:"flex", gap:6, justifyContent:"space-between", alignItems:"center"}}>
        <div style={{display:"flex", gap:6}}>
          <button onClick={handleExport} className="btn-secondary">💾 JSON Export</button>
          <input type="file" accept=".json" id="impFile" style={{display:"none"}} onChange={e=>e.target.files[0] && handleImport(e.target.files[0])}/>
          <button onClick={()=>document.getElementById("impFile").click()} className="btn-secondary">📥 JSON Import</button>
        </div>
        <button onClick={()=>setStep(1)} className="btn-primary">다음 → 아이템 등록</button>
      </div>
    </div>}

    {/* Step 1 */}
    {step === 1 && <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
      <div>
        <div className="card">
          <div className="card-h">아이템 추가 <span className="badge">도면 원샷 파싱</span></div>
          <div className="card-b">
            <input type="file" accept="image/*,.pdf" id="dwgFile" style={{display:"none"}} onChange={e=>e.target.files[0] && handleFile(e.target.files[0], "dwg")}/>
            <button onClick={()=>document.getElementById("dwgFile").click()} disabled={parsing!==null} className="btn-primary" style={{background:"#993c1d", marginBottom:8, width:"100%"}}>
              📐 도면 업로드 → 아이템 필드 자동 채움
            </button>
            {newItem.dwgName && <div style={{fontSize:10, color:"var(--sjp-success)", marginBottom:6}}>{newItem.dwgName}</div>}
            <PasteBox kind="dwg" prompt={buildParsePrompt("dwg")} onApply={handlePasteApply} onCopyPrompt={copyPrompt}/>

            <div className="fld"><label>Tag No. *</label><input value={newItem.tag} onChange={e=>setNewItem(p=>({...p, tag:e.target.value}))}/></div>
            <div className="fld"><label>Item Name *</label><input value={newItem.name} onChange={e=>setNewItem(p=>({...p, name:e.target.value}))}/></div>
            <div className="fld"><label>Type</label>
              <select value={newItem.type} onChange={e=>setNewItem(p=>({...p, type:e.target.value}))}>{ITYPES.map(t => <option key={t}>{t}</option>)}</select>
            </div>
            <div className="fld"><label>Code</label><input value={newItem.appl_code} onChange={e=>setNewItem(p=>({...p, appl_code:e.target.value}))} placeholder="ex. ASME Sec.VIII Div.1"/></div>
            <div className="fld"><label>Shell Material</label><input value={newItem.shell_mat} onChange={e=>setNewItem(p=>({...p, shell_mat:e.target.value}))}/></div>
            <div className="fld"><label>Shell ID (mm)</label><input value={newItem.shell_id} onChange={e=>setNewItem(p=>({...p, shell_id:e.target.value}))}/></div>
            <div className="fld"><label>Shell Length (mm)</label><input value={newItem.shell_len} onChange={e=>setNewItem(p=>({...p, shell_len:e.target.value}))}/></div>
            <div className="fld"><label>Design P (MPa)</label><input value={newItem.design_p} onChange={e=>setNewItem(p=>({...p, design_p:e.target.value}))}/></div>
            <div className="fld"><label>Design T (℃)</label><input value={newItem.design_t} onChange={e=>setNewItem(p=>({...p, design_t:e.target.value}))}/></div>

            <div className="head-block">
              <div className="head-block-title">📌 상하 경판 분리 입력 (v25 신규)</div>
              <div className="fld"><label>Top Head Type</label>
                <select value={newItem.head_top_type} onChange={e=>setNewItem(p=>({...p, head_top_type:e.target.value}))}>{HEAD_TYPES.map(t => <option key={t}>{t}</option>)}</select>
              </div>
              <div className="fld"><label>Top Head Mat.</label><input value={newItem.head_top_mat} onChange={e=>setNewItem(p=>({...p, head_top_mat:e.target.value}))} placeholder="(비우면 Shell Mat)"/></div>
              <div className="fld"><label>Bottom Head Type</label>
                <select value={newItem.head_bot_type} onChange={e=>setNewItem(p=>({...p, head_bot_type:e.target.value}))}>{HEAD_TYPES.map(t => <option key={t}>{t}</option>)}</select>
              </div>
              <div className="fld"><label>Bottom Head Mat.</label><input value={newItem.head_bot_mat} onChange={e=>setNewItem(p=>({...p, head_bot_mat:e.target.value}))}/></div>
              {(newItem.head_top_type === "CAP (B16.9)" || newItem.head_bot_type === "CAP (B16.9)") &&
                <div style={{fontSize:10, color:"#996b04", marginTop:4}}>⚠ CAP 적용 — QC Gen에서 해당 측 Forming Report 자동 제외, DIM Report B16.9 공차 적용</div>}
            </div>

            <label className="chk"><input type="checkbox" checked={newItem.jacket} onChange={e=>setNewItem(p=>({...p, jacket:e.target.checked}))}/>Jacket</label>
            <label className="chk"><input type="checkbox" checked={newItem.incoil} onChange={e=>setNewItem(p=>({...p, incoil:e.target.checked}))}/>In-Coil</label>
            <label className="chk"><input type="checkbox" checked={newItem.halfcoil} onChange={e=>setNewItem(p=>({...p, halfcoil:e.target.checked}))}/>Half-Coil</label>

            <button onClick={addItem} className="btn-primary" style={{marginTop:8, width:"100%"}}>+ 아이템 추가</button>
          </div>
        </div>
      </div>

      <div>
        {epcCandidates.length > 0 && (() => {
          const registeredTags = new Set(items.map(it => it.tag));
          const visible = epcCandidates.filter(ei => ei.tag && !registeredTags.has(ei.tag) && !candHidden.has(ei.tag));
          const q = candSearch.trim().toLowerCase();
          const filtered = q ? visible.filter(ei => (ei.tag||"").toLowerCase().includes(q) || (ei.name||"").toLowerCase().includes(q)) : visible;
          const hiddenCount = candHidden.size;
          return <div className="card" style={{marginBottom:12}}>
            <div className="card-h">📦 제작공정관리 연동 후보 ({filtered.length}개)
              <span style={{fontSize:9, fontWeight:400, color:"var(--sjp-text-sub)", marginLeft:6}}>선택한 항목만 아이템 등록에 추가됩니다</span>
            </div>
            <div className="card-b">
              {visible.length > 8 &&
                <input value={candSearch} onChange={e=>setCandSearch(e.target.value)} placeholder="Tag/이름 검색..." style={{width:"100%", marginBottom:6, padding:"4px 6px", fontSize:11, border:"1px solid var(--sjp-border)", borderRadius:4}}/>}
              {filtered.length === 0 ?
                <div style={{padding:12, textAlign:"center", color:"#aaa", fontSize:11}}>
                  표시할 후보가 없습니다.
                  {hiddenCount>0 && <><br/><button onClick={unhideAllCandidates} style={{marginTop:6, fontSize:9, padding:"2px 8px", border:"1px solid var(--sjp-border)", borderRadius:3, background:"#fff", cursor:"pointer"}}>숨김 {hiddenCount}개 다시 보기</button></>}
                </div>
                :
                <div style={{maxHeight:220, overflowY:"auto"}}>
                  {filtered.map(ei =>
                    <div key={ei.tag} style={{display:"flex", alignItems:"center", gap:6, padding:"4px 2px", borderBottom:"1px solid var(--sjp-border)"}}>
                      <input type="checkbox" checked={candChecked.has(ei.tag)} onChange={()=>toggleCandChecked(ei.tag)}/>
                      <div style={{flex:1, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
                        <strong style={{fontSize:11}}>{ei.tag}</strong>
                        <span style={{fontSize:10, color:"var(--sjp-text-sub)", marginLeft:6}}>{ei.name||"—"}</span>
                      </div>
                      <button onClick={()=>hideCandidates([ei.tag])} title="목록에서 숨기기 (이미 처리됐거나 필요 없는 경우)" style={{fontSize:9, padding:"1px 6px", border:"1px solid var(--sjp-border)", borderRadius:3, background:"#fff", cursor:"pointer", color:"#999", flexShrink:0}}>숨기기</button>
                    </div>
                  )}
                </div>
              }
              <div style={{display:"flex", gap:6, marginTop:8, alignItems:"center"}}>
                <button onClick={addSelectedCandidates} disabled={candChecked.size===0} className="btn-primary" style={{fontSize:11, padding:"4px 10px"}}>+ 선택 항목 등록 ({candChecked.size})</button>
                {hiddenCount>0 && <button onClick={unhideAllCandidates} style={{fontSize:9, color:"var(--sjp-text-sub)", background:"none", border:"none", cursor:"pointer", textDecoration:"underline"}}>숨김 {hiddenCount}개 초기화</button>}
              </div>
            </div>
          </div>;
        })()}

        <div className="card">
          <div className="card-h">등재된 아이템 ({items.length}개)</div>
          <div className="card-b">
            {items.length === 0 ?
              <div style={{padding:20, textAlign:"center", color:"#aaa", fontSize:11}}>
                아직 등록된 아이템이 없습니다.<br/>왼쪽 폼 또는 Step 0의 견적서 PDF로 추가하세요.
              </div>
              :
              items.map(it =>
                <div key={it.id} className={"item-card" + (it.dwgUrl?" has-dwg":"")}>
                  <div className="item-card-h">
                    <strong className="item-tag">{it.tag}</strong>
                    <div style={{display:"flex", gap:4}}>
                      <input type="file" accept="image/*,.pdf" id={`dwg-${it.id}`} style={{display:"none"}} onChange={e=>e.target.files[0] && handleFile(e.target.files[0], "dwg", it.id)}/>
                      <button onClick={()=>document.getElementById(`dwg-${it.id}`).click()} style={{fontSize:9, padding:"2px 6px", background:"#993c1d", color:"#fff", border:"none", borderRadius:3, cursor:"pointer"}}>📐 도면</button>
                      <button onClick={()=>removeItem(it.id)} style={{fontSize:9, padding:"2px 6px", background:"var(--sjp-danger-bg)", color:"var(--sjp-danger)", border:"none", borderRadius:3, cursor:"pointer"}}>✕</button>
                    </div>
                  </div>
                  <div style={{fontSize:11, marginTop:3}}>{it.name}</div>
                  <div style={{fontSize:9, color:"var(--sjp-text-sub)", marginTop:2}}>
                    {it.type} | {it.shell_mat || "—"} | Ø{it.shell_id || "—"} × L{it.shell_len || "—"}
                  </div>
                  <div style={{fontSize:9, color:"var(--sjp-text-sub)"}}>
                    Top: <strong>{it.head_top_type}</strong> | Bot: <strong>{it.head_bot_type}</strong>
                    {(it.head_top_type === "CAP (B16.9)" || it.head_bot_type === "CAP (B16.9)") &&
                      <span style={{color:"var(--sjp-warning)", marginLeft:5, fontWeight:600}}>(CAP)</span>}
                  </div>
                  {it.dwgUrl ? <div style={{fontSize:9, color:"var(--sjp-success)", marginTop:2}}>✓ 도면 첨부 — Rev. 1 기여</div>
                    : <div style={{fontSize:9, color:"var(--sjp-warning)", marginTop:2}}>⚠ 도면 미첨부 — Rev. 0</div>}
                  <PasteBox kind="dwg" targetItemId={it.id} prompt={buildParsePrompt("dwg")} onApply={handlePasteApply} onCopyPrompt={copyPrompt}/>
                </div>
              )
            }
          </div>
        </div>

        <div style={{display:"flex", gap:6}}>
          <button onClick={()=>setStep(0)} className="btn-secondary" style={{flex:1}}>← 이전</button>
          <button onClick={()=>setStep(2)} className="btn-primary" disabled={items.length===0} style={{flex:2}}>
            다음 → ITP 생성 ({items.length}개)
          </button>
        </div>
      </div>
    </div>}

    {/* Step 2 */}
    {step === 2 && <div>
      <div className="no-print" style={{display:"flex", gap:6, marginBottom:8, alignItems:"center"}}>
        <button onClick={()=>setStep(1)} className="btn-secondary">← 수정하기</button>
        <span style={{fontSize:10, color:"var(--sjp-text-sub)"}}>자동 저장</span>
        <div style={{flex:1}}/>
        <button onClick={sendToQADoc} className="btn-primary" title="파일 다운로드 없이, 지금 상태를 바로 QA Doc Generator에 전달합니다">🚀 QA Doc Generator로 바로 전송</button>
        <button onClick={handleExport} className="btn-secondary">💾 QC Gen으로 Export</button>
      </div>

      <div className="no-print" style={{marginBottom:8}}>
        <div className="print-bar">
          <span style={{fontSize:11, fontWeight:600}}>📄 ITP — {proj.name || "프로젝트명"} ({proj.no || "Project No"})</span>
          <button onClick={()=>window.print()} className="btn-primary">🖨 인쇄</button>
        </div>
        <div style={{fontSize:10, color:"#666", padding:"4px 10px", marginTop:3, background:"#fffdf5", border:"0.5px dashed #ecd6a3", borderRadius:4}}>
          <span style={{color:"#996b04", fontWeight:600}}>🖨 인쇄 시 권장 옵션:</span>
          &nbsp;Chrome/Edge → <strong>여백(Margins): "기본값" 또는 "없음"</strong> &nbsp;|&nbsp;
          <strong>"머리글 및 바닥글" 해제</strong> &nbsp;|&nbsp;
          <strong>"배경 그래픽" 체크</strong>
        </div>
      </div>

      <div style={{border:"1px solid var(--sjp-border)", borderRadius:6, padding:14, background:"#fff"}}>
        <ITPPreview proj={proj} items={items} specReqs={specReqs} revInfo={revInfo}
          rows={itpRows} setRows={setItpRows} docNo={itpDocNo} setDocNo={setItpDocNo} rev={itpRev} setRev={setItpRev}
          witnessCols={witnessCols} setWitnessCols={setWitnessCols}/>
      </div>
    </div>}

    <div className="no-print" style={{textAlign:"center", marginTop:20, fontSize:9, color:"#aaa"}}>
      ITP Builder v1.4 · modules/quality/itp-builder · Sejong-Platform
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// (sejong-platform 플로팅 패널 제거됨 — SJ FLOW iframe 통합 구조로 전환)
</script>
</body>
</html>
