<style>
:root {
  --primary: #1976D2; --primary-hover: #1565C0; --primary-light: #E3F2FD; --primary-lighter: #F0F7FF;
  --success: #4CAF50; --warning: #FF9800; --danger: #F44336;
  --bg: #F5F7FA; --white: #FFFFFF;
  --border: #E0E0E0; --border-light: #F0F0F0;
  --text: #333; --text-light: #666; --text-lighter: #999;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Malgun Gothic", "맑은 고딕", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* 공통 */
.btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); }
.btn-success { background: var(--success); color: #fff; border-color: var(--success); }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-warning { background: var(--warning); color: #fff; border-color: var(--warning); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-lg { padding: 12px 22px; font-size: 15px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.b-pill { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.b-pill.green { background: #E8F5E9; color: #2E7D32; }
.b-pill.blue  { background: #E3F2FD; color: #1565C0; }
.b-pill.orange{ background: #FFF3E0; color: #E65100; }
.b-pill.red   { background: #FFEBEE; color: #C62828; }
.b-pill.gray  { background: var(--border-light); color: var(--text-light); }
.b-pill.yellow{ background: #FFFDE7; color: #F57F17; }
.fg { margin-bottom: 14px; }
.fl { display: block; font-size: 12px; color: var(--text-light); margin-bottom: 5px; font-weight: 600; }
.fi, .fs { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; }
.fi:focus, .fs:focus { outline: none; border-color: var(--primary); }
.mod-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.mod-title { font-size: 17px; font-weight: 700; }
.mod-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }

/* 탭 */
.tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 18px; }
.tab { padding: 10px 18px; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; font-size: 14px; font-family: inherit; color: var(--text-light); font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-badge { display: inline-block; min-width: 18px; height: 18px; padding: 0 5px; background: var(--danger); color: #fff; border-radius: 9px; font-size: 10px; font-weight: 700; line-height: 18px; text-align: center; }
.tab-badge.warn { background: var(--warning); }
.tab-badge.gray { background: var(--text-lighter); }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
.kpi { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.kpi-label { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
.kpi-value { font-size: 24px; font-weight: 800; }
.kpi-trend { font-size: 11px; color: var(--text-lighter); margin-top: 2px; }
.kpi.warn { border-left: 4px solid var(--warning); }
.kpi.danger { border-left: 4px solid var(--danger); }
.kpi.info { border-left: 4px solid var(--primary); }
.kpi.ok { border-left: 4px solid var(--success); }

/* 테이블 */
.mt-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.mt-table thead th { background: var(--bg); padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-light); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
.mt-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.mt-table tr.row-warn td { background: #FFFDE7; }
.mt-table tr.row-danger td { background: #FFEBEE; }
.mt-table tr:hover td { background: var(--primary-lighter); }
.mt-table tr.row-warn:hover td { background: #FFF9C4; }
.mt-table tr.row-danger:hover td { background: #FFCDD2; }
.mt-table .ico-btn { border: 1px solid var(--border); background: var(--white); border-radius: 6px; padding: 3px 7px; font-size: 12px; cursor: pointer; margin-left: 3px; }
.mt-table .ico-btn:hover { background: var(--bg); }

/* 앱 레이아웃 */
#app { flex: 1; overflow-y: auto; padding: 24px; }

/* 필터바 */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; }
.filter-bar select, .filter-bar input { padding: 5px 9px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 12px; background: #fff; font-family: inherit; }

/* 스캔 화면 */
.scan-hero { background: linear-gradient(135deg, #1976D2 0%, #1565C0 100%); color: #fff; padding: 28px 30px; border-radius: var(--radius); margin-bottom: 20px; }
.scan-hero h2 { font-size: 22px; margin-bottom: 6px; }

.scan-panel { display: grid; grid-template-columns: 1.1fr 1fr; gap: 18px; margin-bottom: 20px; }

.scan-status { padding: 16px; border-radius: 8px; text-align: center; font-size: 14px; margin-top: 12px; background: var(--bg); color: var(--text-light); }
.scan-status.ok { background: #E8F5E9; color: #2E7D32; }
.scan-status.warn { background: #FFF3E0; color: #E65100; }
.scan-status.err { background: #FFEBEE; color: #C62828; }

/* 카메라 스캔 */
#camera-modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 400; display: none; flex-direction: column; align-items: center; justify-content: center; }
#camera-modal.open { display: flex; }
#camera-video { max-width: 90vw; max-height: 70vh; border-radius: 8px; background: #000; }
#camera-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: 8px 18px; cursor: pointer; font-size: 14px; }
#camera-msg { color: #fff; margin-top: 18px; font-size: 14px; }
#camera-canvas { display: none; }

/* 모달 */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
.overlay.active { display: flex; }
.modal-box { background: var(--white); border-radius: 12px; width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-box.wide { max-width: 780px; }
.modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.modal-head h3 { font-size: 15px; font-weight: 700; }
.modal-body { padding: 18px 20px; overflow-y: auto; flex: 1; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
.close-x { border: none; background: none; font-size: 22px; cursor: pointer; color: var(--text-lighter); }

/* 폼 그리드 */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }

/* 라벨 인쇄 */
.qr-label { border: 2px dashed var(--border); padding: 20px; text-align: center; background: #fff; border-radius: 8px; }
.qr-label-code { font-size: 16px; font-weight: 700; margin-top: 10px; }
.qr-label-name { font-size: 12px; color: var(--text-light); margin-top: 4px; }

@media print {
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
  .print-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
}

/* 상태 배지 (기구 상태) */
.status-pill { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.status-normal { background: #E8F5E9; color: #2E7D32; }
.status-repair { background: #FFF3E0; color: #E65100; }
.status-scrap  { background: #ECEFF1; color: #455A64; text-decoration: line-through; }
.status-out    { background: #FFEBEE; color: #C62828; }

/* 검교정 색상 */
.cal-ok    { color: #2E7D32; font-weight: 600; }
.cal-warn  { color: #E65100; font-weight: 700; }
.cal-danger{ color: #C62828; font-weight: 700; }

.empty-hint { text-align: center; padding: 60px 20px; color: var(--text-lighter); }
.empty-hint .big { font-size: 40px; margin-bottom: 12px; }

/* 사진 미리보기 */
.photo-thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); background: var(--bg); }
.photo-large { width: 100%; max-height: 240px; object-fit: contain; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); }

/* 화면 좁을 때 */
@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .scan-panel { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>

<div id="app"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   측정기구 반입출 관리 (WMS) — 세종플랫폼 모듈
   Firestore 컬렉션:
   - measurementTools     : 기구 마스터
   - measurementCheckouts : 반출/반입 이력 로그
   메인 앱과 localStorage(SJ_FLOW_V04)를 공유하여 사용자 정보를 읽는다.
═══════════════════════════════════════════════════════════════════════════ */

const KEY = 'SJ_FLOW_V04';
const MODULE_KEY = 'MTOOLS_V01';
const CAL_ALERT_CHANNEL = 'qa-calibration-alert'; // 메신저 채널 id
const DEFAULT_CAL_CYCLE_MONTH = 12; // 검교정 기본 주기(개월)
const CAL_WARN_DAYS = 30;           // 임박 기준
const CAL_DANGER_DAYS = 0;          // 만기 기준(음수 → 지남)

let state = {};      // 메인 플랫폼 state (사용자 정보용)
let tools = [];      // 측정기구 마스터
let checkouts = [];  // 반입출 로그

let view = {
  tab: 'dashboard',       // dashboard | scan | active | master | history
  filterStatus: '',
  filterSite: '',
  filterCal: '',
  search: '',
  editingId: null,
  detailId: null,
  calTargetId: null,
  scanUser: '',           // 반입출 화면에서 입력한 이름
  scanSite: '',           // 반출 시 현장
  scanRecent: [],         // 최근 스캔 [{time, code, name, action, ok, msg}]
};

/* ══════════ 초기 로드 ══════════ */
function loadPlatformState() {
  try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { state = {}; }
  if (!state.users) state.users = [];
}
function loadLocalCache() {
  try {
    const disk = JSON.parse(localStorage.getItem(MODULE_KEY) || '{}');
    tools = disk.tools || [];
    checkouts = disk.checkouts || [];
  } catch(e) { tools = []; checkouts = []; }
}
function writeLocalCache() {
  try {
    localStorage.setItem(MODULE_KEY, JSON.stringify({ tools, checkouts }));
  } catch(e) { console.warn('로컬 캐시 저장 실패', e); }
}

/* ══════════ Firestore 동기화 (NCR 패턴 준용) ══════════ */
const _lastSynced = { measurementTools: [], measurementCheckouts: [] };
async function syncArrayToFirestore(coll, arr) {
  if (!window.fb || !fb.db) return;
  const current = arr || [];
  const prevMap = new Map((_lastSynced[coll]||[]).map(x => [x.id, x]));
  const currMap = new Map(current.map(x => [x.id, x]));
  const jobs = [];
  currMap.forEach((x, id) => {
    const prev = prevMap.get(id);
    if (!prev || JSON.stringify(prev) !== JSON.stringify(x)) {
      jobs.push(fb.setDoc(fb.doc(fb.db, coll, id), x).catch(e => console.error(`[${coll}]`, e)));
    }
  });
  if (jobs.length) await Promise.all(jobs);
  _lastSynced[coll] = JSON.parse(JSON.stringify(current));
}
function deleteFirestoreDoc(coll, id) {
  if (!window.fb || !fb.db) return;
  fb.deleteDoc(fb.doc(fb.db, coll, id)).catch(e => console.error(`[${coll} 삭제]`, e));
}
function mergeServerSnapshot(localArr, serverDocs, prevSynced) {
  const serverIds = new Set(serverDocs.map(d => d.id));
  const prevSyncedIds = new Set((prevSynced||[]).map(d => d.id));
  const notYetSynced = (localArr||[]).filter(n => !serverIds.has(n.id) && !prevSyncedIds.has(n.id));
  return [...serverDocs, ...notYetSynced];
}
function startFirestoreSync() {
  if (!window.fb || !fb.db) { setTimeout(startFirestoreSync, 300); return; }
  if (!fb.auth || !fb.auth.currentUser) { setTimeout(startFirestoreSync, 400); return; }
  fb.onSnapshot(fb.collection(fb.db, 'measurementTools'), snap => {
    const serverDocs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
    tools = mergeServerSnapshot(tools, serverDocs, _lastSynced.measurementTools);
    _lastSynced.measurementTools = JSON.parse(JSON.stringify(serverDocs));
    writeLocalCache();
    render();
    maybeSendCalibrationAlerts();
  }, e => console.error('[measurementTools 구독]', e));
  fb.onSnapshot(fb.collection(fb.db, 'measurementCheckouts'), snap => {
    const serverDocs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
    checkouts = mergeServerSnapshot(checkouts, serverDocs, _lastSynced.measurementCheckouts);
    _lastSynced.measurementCheckouts = JSON.parse(JSON.stringify(serverDocs));
    writeLocalCache();
    render();
  }, e => console.error('[measurementCheckouts 구독]', e));
}

function save() {
  try {
    writeLocalCache();
    try { window.parent.render && window.parent.render(); } catch(e) {}
    syncArrayToFirestore('measurementTools', tools);
    syncArrayToFirestore('measurementCheckouts', checkouts);
  } catch(e) {
    if (e.name === 'QuotaExceededError' || e.code === 22) {
      alert('⚠️ 저장 공간 부족');
    }
  }
}

/* ══════════ 유틸 ══════════ */
function nowISO() { return new Date().toISOString(); }
function today() { const d = new Date(); return d.toISOString().slice(0,10); }
function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function fmtDateTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function daysBetween(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr); if (isNaN(d)) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return Math.round((target - now) / 86400000);
}
function addMonths(dateStr, months) {
  if (!dateStr) return '';
  const d = new Date(dateStr); if (isNaN(d)) return '';
  d.setMonth(d.getMonth() + Number(months || 0));
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function esc(s) { return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uid() { return 'mt-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function coId() { return 'co-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function currentUser() {
  const uid = state.currentUser;
  if (!uid) return null;
  return (state.users||[]).find(u => u.id === uid) || null;
}
function isQADept() {
  const u = currentUser();
  return u && (u.dept === '품질관리부' || u.grade === 'super');
}
function currentUserName() {
  const u = currentUser();
  return u ? u.name : '';
}

function calStatus(nextCal) {
  const d = daysBetween(nextCal);
  if (d === null) return { level: 'none', label: '미설정', klass: 'gray', days: null };
  if (d < CAL_DANGER_DAYS) return { level: 'danger', label: `만기 ${Math.abs(d)}일 경과`, klass: 'red', days: d };
  if (d <= CAL_WARN_DAYS) return { level: 'warn', label: `${d}일 남음`, klass: 'orange', days: d };
  return { level: 'ok', label: `${d}일 남음`, klass: 'green', days: d };
}

function findByCode(code) {
  const c = String(code||'').trim();
  if (!c) return null;
  return tools.find(t => (t.code||'').trim().toUpperCase() === c.toUpperCase()) || null;
}
function isCheckedOut(tool) {
  return !!(tool && tool.currentCheckout && tool.currentCheckout.checkedOutAt);
}

/* ══════════ 반입출 실행 로직 ══════════ */
function performCheckout(tool, userName, site, actor) {
  if (!tool) return { ok: false, msg: '측정기구를 찾을 수 없습니다.' };
  if (tool.status === 'scrap')  return { ok: false, msg: '폐기 처리된 기구입니다.' };
  if (tool.status === 'repair') return { ok: false, msg: '수리중 상태입니다.' };
  if (isCheckedOut(tool)) {
    const c = tool.currentCheckout;
    return { ok: false, msg: `이미 반출중 (${c.userName} → ${c.site})` };
  }
  if (!userName) return { ok: false, msg: '사용자 이름을 입력해주세요.' };
  if (!site)     return { ok: false, msg: '반출 현장을 입력해주세요.' };
  const now = nowISO();
  const co = { userName, site, checkedOutAt: now, checkedOutBy: actor || userName };
  const log = {
    id: coId(),
    toolId: tool.id, toolCode: tool.code, toolName: tool.name,
    userName, site,
    checkedOutAt: now, checkedInAt: null,
    checkedOutBy: actor || userName, checkedInBy: null,
    note: ''
  };
  const idx = tools.findIndex(t => t.id === tool.id);
  if (idx >= 0) tools[idx] = { ...tools[idx], currentCheckout: co, status: 'normal', updatedAt: now };
  checkouts.push(log);
  save();
  return { ok: true, msg: `반출 완료 · ${tool.name} → ${site}`, kind: 'out' };
}

function performCheckin(tool, userName, actor) {
  if (!tool) return { ok: false, msg: '측정기구를 찾을 수 없습니다.' };
  if (!isCheckedOut(tool)) return { ok: false, msg: '반출 상태가 아닙니다.' };
  const now = nowISO();
  const idx = tools.findIndex(t => t.id === tool.id);
  if (idx >= 0) tools[idx] = { ...tools[idx], currentCheckout: null, updatedAt: now };
  // 열려있는 로그(최근 것) 마감
  const openLogIdx = [...checkouts].reverse().findIndex(l => l.toolId === tool.id && !l.checkedInAt);
  if (openLogIdx >= 0) {
    const realIdx = checkouts.length - 1 - openLogIdx;
    checkouts[realIdx] = { ...checkouts[realIdx], checkedInAt: now, checkedInBy: actor || userName };
  }
  save();
  return { ok: true, msg: `반입 완료 · ${tool.name}`, kind: 'in' };
}

/* 스캔 처리 — 이름/현장은 view.scan* 사용 */
function processScan(code) {
  const c = String(code||'').trim();
  if (!c) return;
  const tool = findByCode(c);
  const actor = currentUserName() || view.scanUser;
  let res;
  if (!tool) {
    res = { ok: false, msg: `등록되지 않은 코드: ${c}` };
  } else if (isCheckedOut(tool)) {
    // 자동 반입
    const name = view.scanUser || actor || tool.currentCheckout.userName;
    res = performCheckin(tool, name, actor);
  } else {
    // 자동 반출
    if (!view.scanUser) return uiScanFeedback({ ok: false, msg: '먼저 사용자 이름을 입력해주세요.' }, c);
    if (!view.scanSite) return uiScanFeedback({ ok: false, msg: '먼저 반출 현장을 입력해주세요.' }, c);
    res = performCheckout(tool, view.scanUser, view.scanSite, actor);
  }
  uiScanFeedback(res, c, tool);
}

function uiScanFeedback(res, code, tool) {
  view.scanRecent.unshift({
    time: nowISO(),
    code, name: tool ? tool.name : '-',
    action: res.kind || (res.ok ? 'ok' : 'err'),
    ok: res.ok, msg: res.msg
  });
  view.scanRecent = view.scanRecent.slice(0, 12);
  // 소리 피드백 (짧은 beep) — 브라우저 정책상 유저 상호작용 있어야 재생 가능
  try { beep(res.ok); } catch(e) {}
  render();
}

let _audioCtx = null;
function beep(ok) {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = _audioCtx;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sine'; o.frequency.value = ok ? 880 : 220;
  g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.2);
}

/* ══════════ 검교정 만기 알림 (품질부만, 하루 1회 자동) ══════════ */
async function maybeSendCalibrationAlerts() {
  if (!isQADept()) return;
  if (!window.fb || !fb.auth || !fb.auth.currentUser) return;
  const t = today();
  const targets = tools.filter(x => {
    if (x.status === 'scrap') return false;
    const st = calStatus(x.nextCalibration);
    return st.level === 'warn' || st.level === 'danger';
  });
  for (const tool of targets) {
    if (tool.lastAlertDate === t) continue;
    const st = calStatus(tool.nextCalibration);
    const icon = st.level === 'danger' ? '🔴' : '🟠';
    const line = `${icon} [검교정 ${st.level==='danger'?'만기':'임박'}] ${tool.name} (${tool.code}) — ${st.label}, 다음검교정 ${fmtDate(tool.nextCalibration)}`;
    try {
      await fb.setDoc(
        fb.doc(fb.collection(fb.db, 'messages')),
        {
          channel: CAL_ALERT_CHANNEL,
          author: 'SYSTEM',
          text: line,
          at: new Date().toISOString(),
          createdAt: Date.now(),
          system: true
        }
      );
      // 채널 등록 (없으면 생성)
      await fb.setDoc(
        fb.doc(fb.db, 'channels', CAL_ALERT_CHANNEL),
        { name: '검교정 알림', type: 'system', members: [] },
        { merge: true }
      );
      // 알림 발송 표시
      const idx = tools.findIndex(x => x.id === tool.id);
      if (idx >= 0) {
        tools[idx] = { ...tools[idx], lastAlertDate: t };
        await fb.setDoc(fb.doc(fb.db, 'measurementTools', tool.id), tools[idx]);
      }
    } catch(e) { console.warn('알림 발송 실패', e); }
  }
}

function computeBadges() {
  let out = 0, calWarn = 0, calDanger = 0;
  tools.forEach(t => {
    if (t.status === 'scrap') return;
    if (isCheckedOut(t)) out++;
    const st = calStatus(t.nextCalibration);
    if (st.level === 'warn') calWarn++;
    if (st.level === 'danger') calDanger++;
  });
  return { out, calWarn, calDanger };
}

function setupScanInputs() {

      // 카메라 모달 열려있거나 다른 입력 포커스면 재포커스 안 함
      setTimeout(() => {
        const ae = document.activeElement;
        const cam = document.getElementById('camera-modal');
        if (cam && cam.classList.contains('open')) return;
        if (ae && (ae.id === 'scan-user' || ae.id === 'scan-site' || ae.tagName === 'BUTTON')) return;
        el.focus();
      }, 200);
    });
  }
}

function scanKeyDown(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const v = e.target.value;
    e.target.value = '';
    if (v.trim()) processScan(v.trim());
  }
}

function statusPill(t) {
  if (isCheckedOut(t)) return '<span class="status-pill status-out">반출중</span>';
  const s = t.status || 'normal';
  if (s === 'repair') return '<span class="status-pill status-repair">수리중</span>';
  if (s === 'scrap')  return '<span class="status-pill status-scrap">폐기</span>';
  return '<span class="status-pill status-normal">정상</span>';
}

function autoCalcNext() {
  const last  = document.getElementById('tm-lastcal').value;
  const cycle = Number(document.getElementById('tm-cycle').value || DEFAULT_CAL_CYCLE_MONTH);
  const el = document.getElementById('tm-nextcal');
  if (last && !el.dataset.userTouched) el.value = addMonths(last, cycle);
}
function onPhotoChange(e) {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const max = 400;
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const data = c.toDataURL('image/jpeg', 0.75);
      document.getElementById('tm-photo-data').value = data;
      let prev = document.getElementById('tm-photo-prev');
      if (!prev) {
        const wrap = document.getElementById('tm-photo-prev-wrap');
        if (wrap) wrap.innerHTML = `<img src="${data}" class="photo-large" id="tm-photo-prev"><br>`;
      } else {
        prev.src = data;
      }
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
}
function saveTool() {
  const code = document.getElementById('tm-code').value.trim();
  const name = document.getElementById('tm-name').value.trim();
  if (!code || !name) { alert('관리번호와 기구명은 필수입니다.'); return; }
  // 중복 관리번호 체크
  const dup = tools.find(t => t.code === code && t.id !== view.editingId);
  if (dup) { alert(`관리번호 ${code} 는 이미 등록되어 있습니다: ${dup.name}`); return; }

  const payload = {
    code,
    name,
    maker:    document.getElementById('tm-maker').value.trim(),
    model:    document.getElementById('tm-model').value.trim(),
    spec:     document.getElementById('tm-spec').value.trim(),
    status:   document.getElementById('tm-status').value,
    location: document.getElementById('tm-location').value.trim(),
    ownerDept:document.getElementById('tm-owner').value.trim(),
    lastCalibration:  document.getElementById('tm-lastcal').value,
    calibrationCycle: Number(document.getElementById('tm-cycle').value) || DEFAULT_CAL_CYCLE_MONTH,
    nextCalibration:  document.getElementById('tm-nextcal').value,
    calibrationOrg:   document.getElementById('tm-calorg').value.trim(),
    certificateUrl:   document.getElementById('tm-cert').value.trim(),
    purchaseDate:  document.getElementById('tm-pdate').value,
    purchasePrice: Number(document.getElementById('tm-price').value) || 0,
    note:  document.getElementById('tm-note').value.trim(),
    photo: document.getElementById('tm-photo-data').value || '',
    updatedAt: nowISO(),
  };
  if (view.editingId) {
    const idx = tools.findIndex(t => t.id === view.editingId);
    if (idx >= 0) tools[idx] = { ...tools[idx], ...payload };
  } else {
    tools.push({
      id: uid(),
      ...payload,
      createdAt: nowISO(),
      currentCheckout: null,
    });
  }
  save();
  closeToolModal();
  render();
}
function deleteTool(id) {
  if (!isQADept()) return;
  const t = tools.find(x => x.id === id); if (!t) return;
  if (isCheckedOut(t)) { alert('반출중인 기구는 삭제할 수 없습니다. 먼저 반입 처리하세요.'); return; }
  if (!confirm(`측정기구 "${t.name} (${t.code})"를 삭제하시겠습니까?\n(이력은 유지됩니다)`)) return;
  tools = tools.filter(x => x.id !== id);
  writeLocalCache();
  deleteFirestoreDoc('measurementTools', id);
  render();
}

        <label class="fl">검교정일 <span style="color:var(--danger);">*</span></label>
        <input class="fi" type="date" id="cal-date" value="${todayStr}" onchange="calCalcNext()">
      </div>
      <div class="fg">
        <label class="fl">주기 (개월)</label>
        <input class="fi" type="number" id="cal-cycle" value="${cycle}" onchange="calCalcNext()">
      </div>
      <div class="fg">
        <label class="fl">다음 검교정일 <span style="color:var(--text-lighter);font-weight:400;">(자동)</span></label>
        <input class="fi" type="date" id="cal-next" value="${addMonths(todayStr, cycle)}">
      </div>
      <div class="fg">
        <label class="fl">검교정 기관</label>
        <input class="fi" id="cal-org" value="${esc(t.calibrationOrg||'')}">
      </div>
      <div class="fg full">
        <label class="fl">성적서 링크</label>
        <input class="fi" id="cal-cert" value="" placeholder="URL 또는 파일 경로 (교체 시 이전 값 덮어씀)">
      </div>
      <div class="fg full">
        <label class="fl">비고</label>
        <textarea class="fi" id="cal-note" rows="2"></textarea>
      </div>
    </div>
  `;
  document.getElementById('cal-modal').classList.add('active');
}
function calCalcNext() {
  const d = document.getElementById('cal-date').value;
  const c = Number(document.getElementById('cal-cycle').value || DEFAULT_CAL_CYCLE_MONTH);
  const nx = document.getElementById('cal-next');
  if (d) nx.value = addMonths(d, c);
}
function closeCalModal() {
  document.getElementById('cal-modal').classList.remove('active');
  view.calTargetId = null;
}
function saveCal() {
  const id = view.calTargetId; if (!id) return;
  const idx = tools.findIndex(x => x.id === id); if (idx < 0) return;
  const date  = document.getElementById('cal-date').value;
  const cycle = Number(document.getElementById('cal-cycle').value || DEFAULT_CAL_CYCLE_MONTH);
  const next  = document.getElementById('cal-next').value;
  const org   = document.getElementById('cal-org').value.trim();
  const cert  = document.getElementById('cal-cert').value.trim();
  const note  = document.getElementById('cal-note').value.trim();
  if (!date) { alert('검교정일을 입력하세요.'); return; }
  const prev = tools[idx];
  const history = (prev.calibrationHistory || []).concat([{
    date, cycle, nextCalibration: next, org, cert, note,
    registeredBy: currentUserName() || '', registeredAt: nowISO()
  }]);
  tools[idx] = {
    ...prev,
    lastCalibration: date,
    calibrationCycle: cycle,
    nextCalibration: next,
    calibrationOrg: org || prev.calibrationOrg,
    certificateUrl: cert || prev.certificateUrl,
    calibrationHistory: history,
    lastAlertDate: null, // 만기 알림 재설정
    updatedAt: nowISO(),
  };
  save();
  closeCalModal();
  render();
}

/* ══════════ QR 라벨 인쇄 ══════════ */
function printOne(id) {
  const t = tools.find(x => x.id === id); if (!t) return;
  buildPrintGrid([t]);
  setTimeout(() => window.print(), 100);
}
function openPrintAll() {
  const list = tools.filter(t => t.status !== 'scrap');
  if (list.length === 0) { alert('인쇄할 기구가 없습니다.'); return; }
  buildPrintGrid(list);
  setTimeout(() => window.print(), 100);
}
function buildPrintGrid(list) {
  const area = document.getElementById('print-area');
  const grid = document.getElementById('print-grid');
  grid.innerHTML = list.map(t => `
    <div class="qr-label">
      <div id="print-qr-${t.id}"></div>
      <div class="qr-label-code">${esc(t.code)}</div>
      <div class="qr-label-name">${esc(t.name)}${t.spec?' · '+esc(t.spec):''}</div>
    </div>
  `).join('');
  area.style.display = 'block';
  list.forEach(t => {
    const el = document.getElementById(`print-qr-${t.id}`);
    if (el && window.QRCode) new QRCode(el, { text: t.code, width: 140, height: 140, correctLevel: QRCode.CorrectLevel.M });
  });
  // 인쇄 후 숨김
  const onAfter = () => { area.style.display = 'none'; window.removeEventListener('afterprint', onAfter); };
  window.addEventListener('afterprint', onAfter);
}

/* ══════════ 카메라 스캔 ══════════ */
let _camStream = null, _camAnim = null, _camScanning = false;
async function openCameraScan() {
  const modal = document.getElementById('camera-modal');
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  const msg = document.getElementById('camera-msg');
  modal.classList.add('open');
  msg.textContent = '카메라 접근중...';
  try {
    _camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
    video.srcObject = _camStream;
    await video.play();
    msg.textContent = 'QR 코드를 카메라에 비춰주세요';
    _camScanning = true;
    const ctx = canvas.getContext('2d');
    const tick = () => {
      if (!_camScanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qr = window.jsQR ? jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' }) : null;
        if (qr && qr.data) {
          msg.textContent = '✅ 인식됨: ' + qr.data;
          const code = qr.data;
          closeCameraScan();
          processScan(code);
          return;
        }
      }
      _camAnim = requestAnimationFrame(tick);
    };
    _camAnim = requestAnimationFrame(tick);
  } catch(e) {
    msg.textContent = '❌ 카메라 접근 실패: ' + (e.message || e);
    console.error(e);
  }
}
function closeCameraScan() {
  _camScanning = false;
  if (_camAnim) cancelAnimationFrame(_camAnim);
  if (_camStream) { _camStream.getTracks().forEach(t => t.stop()); _camStream = null; }
  document.getElementById('camera-modal').classList.remove('open');
  // 스캐너 입력창 재포커스
  const el = document.getElementById('scan-input'); if (el) el.focus();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const m = document.getElementById('camera-modal');
    if (m && m.classList.contains('open')) closeCameraScan();
  }
});

/* ══════════ 탭/렌더 진입 ══════════ */
function setTab(t) {
  view.tab = t;
  view.search = '';
  view.filterStatus = '';
  view.filterSite = '';
  view.filterCal = '';
  render();
}

/* 전역 노출 */
window.setTab = setTab;
window.processScan = processScan;
window.scanKeyDown = scanKeyDown;
window.openTool = openTool;
window.closeToolModal = closeToolModal;
window.saveTool = saveTool;
window.deleteTool = deleteTool;
window.openDetail = openDetail;
window.closeDetailModal = closeDetailModal;
window.openCal = openCal;
window.closeCalModal = closeCalModal;
window.saveCal = saveCal;
window.calCalcNext = calCalcNext;
window.autoCalcNext = autoCalcNext;
window.openCameraScan = openCameraScan;
window.closeCameraScan = closeCameraScan;
window.printOne = printOne;
window.openPrintAll = openPrintAll;
window.view = view;

/* ══════════ 부팅 ══════════ */
function boot() {
  loadPlatformState();
  loadLocalCache();
  render();
  startFirestoreSync();

  // 다른 탭에서 사용자 정보 갱신 시 반영
  window.addEventListener('storage', e => {
    if (e.key === KEY) { loadPlatformState(); render(); }
  });
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
