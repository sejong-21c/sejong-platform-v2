<title>CAR 관리</title>
<script type="module">
  // Firebase Firestore — CAR 데이터(및 참조용 NCR)를 index.html과 공유. v29.8: 기존엔
  // localStorage에만 저장되어 기기/브라우저마다 CAR 목록이 따로 놀았음(전사 공유 안 됨).
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  // v29.13.3 fix: Firebase Storage 업로드가 사내 방화벽/보안 정책에 막혀 응답이
  // 영원히 없는 환경이 있었음(Firestore는 정상 동작 확인됨). Storage를 아예 거치지
  // 않고, 첨부파일을 700KB씩 조각내 Firestore 문서 여러 개(fileChunks 컬렉션)로
  // 저장하는 방식으로 전환 — 이미 뚫려있는 통로만 사용해 네트워크 문제와 무관해짐.
  const firebaseConfig = {
    apiKey: "AIzaSyCmGyObjPd20Qf1MX0XAijYzSR4VitrjRg",
    authDomain: "sejong-platform.firebaseapp.com",
    projectId: "sejong-platform",
    storageBucket: "sejong-platform.firebasestorage.app",
    messagingSenderId: "884301297710",
    appId: "1:884301297710:web:82b2e065119f7c5d9d87bf",
    measurementId: "G-8LJDWYVJ5G"
  };
  const fbApp = initializeApp(firebaseConfig);
  window.fb = { auth: getAuth(fbApp), db: getFirestore(fbApp), doc, getDoc, getDocs, setDoc, deleteDoc, collection, onSnapshot };
</script>
<style>
:root {
  --primary: #1976D2; --primary-hover: #1565C0; --primary-light: #E3F2FD;
  --success: #4CAF50; --warning: #FF9800; --danger: #F44336;
  --bg: #F5F7FA; --white: #FFFFFF;
  --border: #E0E0E0; --border-light: #F0F0F0;
  --text: #333; --text-light: #666; --text-lighter: #999;
  --radius: 8px;
  --car: #0369a1; --car-light: #f0f9ff; --car-border: #bae6fd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Malgun Gothic", "맑은 고딕", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

.btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.b-pill { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.b-pill.green  { background: #E8F5E9; color: #2E7D32; }
.b-pill.blue   { background: #E3F2FD; color: #1565C0; }
.b-pill.orange { background: #FFF3E0; color: #E65100; }
.b-pill.red    { background: #FFEBEE; color: #C62828; }
.b-pill.gray   { background: var(--border-light); color: var(--text-light); }
.org-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.org-table thead th { background: var(--bg); padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-light); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
.org-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.org-ico-btn { border: 1px solid var(--border); background: var(--white); border-radius: 6px; padding: 3px 7px; font-size: 12px; cursor: pointer; margin-left: 3px; }
.org-ico-btn:hover { background: var(--bg); }
.fg { margin-bottom: 14px; }
.fl { display: block; font-size: 12px; color: var(--text-light); margin-bottom: 5px; font-weight: 600; }
.fi, .fs { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; }
.fi:focus, .fs:focus { outline: none; border-color: var(--primary); }
.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
.kpi { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.kpi-label { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
.kpi-value { font-size: 24px; font-weight: 800; }
.kpi-trend { font-size: 11px; color: var(--text-lighter); margin-top: 2px; }
.mod-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.mod-title { font-size: 17px; font-weight: 700; }
.mod-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.back-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); cursor: pointer; font-size: 12px; font-family: inherit; }
.back-btn:hover { background: var(--bg); }
#app { flex: 1; overflow-y: auto; padding: 24px; }
.car-filter { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; }
.car-filter select, .car-filter input { padding: 5px 9px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 12px; background: #fff; font-family: inherit; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
.overlay.active { display: flex; }
.modal-box { background: var(--white); border-radius: 12px; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }

/* CAR 경향분석 모달 */

#car-trend-modal.open { display: flex; }

.ctr-toolbar { background: var(--car-light); border-bottom: 1px solid var(--car-border); padding: 10px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.ctr-toolbar select, .ctr-toolbar input { padding: 6px 10px; border: 1.5px solid var(--car-border); border-radius: 6px; font-size: 13px; background: #fff; font-family: inherit; }
.ctr-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
.ctr-section { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.ctr-section h4 { font-size: 13px; font-weight: 700; color: var(--car); margin: 0 0 14px; }
.ctr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.ctr-chart-wrap { background: #fafafa; border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow: hidden; }
.ctr-chart-title { font-size: 12px; font-weight: 700; color: var(--text-light); margin-bottom: 10px; }
.ctr-kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.ntr-filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.ntr-filter-chip { display: inline-flex; align-items: center; gap: 4px; background: #e0f2fe; color: #0369a1; border: 1px solid #7dd3fc; border-radius: 14px; padding: 4px 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
.ntr-filter-chip:hover { background: #bae6fd; }

.ctr-kpi { background: var(--car-light); border-radius: 8px; padding: 14px; text-align: center; }

.ctr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.ctr-table th { background: var(--car-light); color: var(--car); font-weight: 700; padding: 8px 12px; text-align: left; border-bottom: 2px solid var(--car-border); }
.ctr-table td { padding: 7px 12px; border-bottom: 1px solid var(--border-light); }
.ctr-table tr:hover td { background: var(--car-light); }
.ctr-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; background: #fff; }

/* CAR 파일 파싱 모달 */
#car-parse-modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 300; align-items: stretch; justify-content: stretch; }
#car-parse-modal.open { display: flex; }
.cpm-box { background: #fff; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
.cpm-head { background: var(--primary); color: #fff; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.cpm-head h3 { font-size: 15px; font-weight: 700; margin: 0; }
.cpm-content { display: flex; flex: 1; overflow: hidden; min-height: 0; }
.cpm-left { flex: 0 0 50%; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: #f5f5f5; }
.cpm-left-head { padding: 8px 12px; background: var(--bg); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--text-light); flex-shrink: 0; }
.cpm-left-img-wrap { flex: 1; overflow-y: auto; padding: 8px; }
.cpm-right { flex: 1; overflow-y: auto; }
.cpm-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.cpm-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.cpm-field { display: flex; flex-direction: column; gap: 4px; }
.cpm-field label { font-size: 12px; font-weight: 600; color: var(--text-light); }
.cpm-field input, .cpm-field select, .cpm-field textarea { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; }

.cpm-parse-badge.found  { background: #E8F5E9; color: #2E7D32; }
.cpm-parse-badge.manual { background: #FFF3E0; color: #E65100; }
.cpm-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; background: #fff; }
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a18;color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;font-weight:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<body>

<div id="app">로딩 중...</div>
<div class="toast" id="toast"></div>

<!-- 일반 모달 -->
<div class="overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modal-title"></h3>

<!-- CAR 경향분석 팝업 -->

<!-- CAR 파일 파싱 모달 -->
<div id="car-parse-modal">
  <div class="cpm-box">
    <div class="cpm-head">
      <h3>📎 CAR 파일 파싱 결과</h3>
      <button onclick="closeCARParseModal()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;">×</button>

      <div class="cpm-left">

          <div style="padding:16px;color:var(--text-light);font-size:13px;">파일을 불러오는 중...</div>

    </div>

<input type="file" id="car-file-input" accept=".pdf,.docx" style="display:none" onchange="handleCARFile(this)">

<script>
const KEY = 'SJ_FLOW_V04';
const CAR_STATUS = { 'in-progress':['orange','조치중'], 'closed':['green','완료'] };
const CAR_QUAL_REQ = [
  '1장. 품질보증 조직','2장. 품질보증 프로그램','3장. 설계관리',
  '4장. 조달관리','5장. 지시, 절차서 및 도면','6장. 문서관리',
  '7장. 구매품목 및 서비스 관리','8장. 식별 및 추적관리',
  '9장. 특수공정 관리','10장. 검사','11장. 시험관리',
  '12장. 계측기기 관리','13장. 취급, 저장 및 운반',
  '14장. 검사·시험 및 운전상태 표시','15장. 부적합품 관리',
  '16장. 시정조치','17장. 품질보증기록','18장. 감사'
];
const CAR_FIELD = ['관리','설계','구매','제작','공사','검사 및 시험','기록','기타'];
const CAR_CAUSE = ['업무지연','절차미준수','교육부족','인력부족','장비불량','환경미비','위변조','기타'];

let state = {};
let filterState = { proj: '', status: '', search: '' };

function loadState() {
  try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { state = {}; }
  if (!state.cars)          state.cars = [];
  if (!state.carDeleteReqs) state.carDeleteReqs = [];
  if (!state.ncrs)          state.ncrs = [];
  if (!state.projects)      state.projects = [];
  if (!state.users)         state.users = [];
}

// v29.8: state.cars를 Firestore와 실시간 동기화 (ncr.html과 동일한 방식).
// ncrs는 CAR가 참조만 하므로(생성/수정 안 함) 읽기 전용으로만 구독.
const _lastSynced = { t_cars: [], t_carDeleteReqs: [] };

// v29.8: 도구별·액션별 권한 체크 (부모의 canDo와 동일 규칙 재현). ncr.html과 동일.
function canDoLocal(moduleId, action, user) {
  user = user || (state.users||[]).find(x => x.id === state.currentUser);
  if (!user) return false;
  // v29.12: 슈퍼관리자·대표이사는 모든 도구·모든 액션 무조건 허용
  if (user.grade === 'super' || user.grade === 'exec') return true;
  const explicit = user.modulePerms && user.modulePerms[moduleId] && user.modulePerms[moduleId][action];
  if (explicit === true) return true;
  if (explicit === false) return false;
  const dept = '품질관리부';
  if (moduleId === 'ncr' || moduleId === 'car') {
    if (action === 'register') return user.dept === dept;
    if (action === 'delete')   return user.dept === dept && user.grade === 'manager';
  }
  return false;
}
// v29.10 fix: 이전에는 "로컬 배열에 없으면 삭제"로 판단해서, 등록 직후 onSnapshot이
// 서버에 아직 반영 안 된 구버전 스냅샷으로 state.cars를 되돌리는 순간 방금 등록한
// 문서가 즉시 삭제되는 버그가 있었음. 이제 삭제는 여기서 추론하지 않고, 실제 삭제가
// 확정되는 지점(deleteFirestoreDoc 호출부)에서만 명시적으로 수행한다.
async function syncArrayToFirestore(coll, arr) {
  if (!window.fb || !fb.db) return;
  const current = arr || [];
  const prevMap = new Map((_lastSynced[coll]||[]).map(x => [x.id, x]));
  const currMap = new Map(current.map(x => [x.id, x]));
  const jobs = [];
  currMap.forEach((x, id) => {
    const prev = prevMap.get(id);
    if (!prev || JSON.stringify(prev) !== JSON.stringify(x)) {
      jobs.push(fb.setDoc(fb.doc(fb.db, coll, id), x).catch(e => { console.error(`[${coll} 동기화]`, e); notifySyncError(`클라우드 저장 실패(${coll}): ${e.message||e}`); }));
    }
  });
  if (jobs.length) await Promise.all(jobs);
  _lastSynced[coll] = JSON.parse(JSON.stringify(current));
}
// v29.9.1: localStorage 소유권 분리 — 이 iframe이 소유한 키(cars/carDeleteReqs)만 merge-write.
// state 전체를 쓰면 로드 시점의 stale projects/users/ncrs가 다른 창(부모·NCR iframe)이
// 그 사이 저장한 최신 값을 덮어써 양방향 데이터 유실 race가 생김.
function writeOwnedKeysToDisk() {
  const raw = localStorage.getItem(KEY);
  const disk = raw ? JSON.parse(raw) : {};
  disk.cars = state.cars;
  disk.carDeleteReqs = state.carDeleteReqs;
  localStorage.setItem(KEY, JSON.stringify(disk));
}

// v29.11 fix: 연달아 여러 건을 빠르게 등록하면, 방금 등록한 항목이 서버에 아직
// 반영되기 전에 onSnapshot이 옛 스냅샷으로 state.cars를 통째로 교체해버려 그 항목이
// 잠깐 배열에서 빠지고, 그 사이 다음 항목의 번호(CAR-YYYY-NNN)가 배열 길이 기준으로
// 계산되면서 방금 사라진 항목과 같은 번호를 만들어 서로 덮어쓰는 사고가 있었음(ncr.html과 동일).
// 서버 스냅샷에 없는 로컬 항목이라도, 이전에 한 번도 동기화 확인된 적이 없다면(=이제
// 막 로컬에서 추가돼 아직 서버 왕복이 안 끝난 것) 지우지 않고 합쳐서 유지한다.
function mergeServerSnapshot(localArr, serverDocs, prevSynced) {
  const serverIds = new Set(serverDocs.map(d => d.id));
  const prevSyncedIds = new Set((prevSynced||[]).map(d => d.id));
  const notYetSynced = (localArr||[]).filter(n => !serverIds.has(n.id) && !prevSyncedIds.has(n.id));
  return [...serverDocs, ...notYetSynced];
}
// v29.18 fix: 전사 Firestore 보안 규칙상 컬렉션 이름이 't_'로 시작해야만
// 허용됨(부장님 공지) — 'cars'/'carDeleteReqs'는 예외 허용 목록에 없어 다른
// 사용자에게 공유가 안 되던 근본 원인으로 추정됨. 't_cars'/'t_carDeleteReqs'로
// 이전하고, 기존 컬렉션에 남아있던 문서는 1회 마이그레이션으로 복사한다.
async function migrateLegacyCollection(oldColl, newColl) {
  const FLAG = `_migrated_${oldColl}_to_${newColl}`;
  if (localStorage.getItem(FLAG)) return;
  try {
    const snap = await fb.getDocs(fb.collection(fb.db, oldColl));
    const jobs = [];
    snap.forEach(d => jobs.push(fb.setDoc(fb.doc(fb.db, newColl, d.id), d.data())));
    if (jobs.length) await Promise.all(jobs);
    localStorage.setItem(FLAG, '1');
    console.info(`[마이그레이션 완료] ${oldColl} → ${newColl} (${jobs.length}건)`);
  } catch(e) {
    // 구 컬렉션이 이미 읽기도 막혀있으면 여기서 실패한다 — 신규 데이터는 어차피
    // t_ 컬렉션으로만 오가므로 앱 동작 자체에는 지장 없음(과거 데이터만 못 옮김).
    console.error(`[마이그레이션 실패] ${oldColl} → ${newColl}`, e);
    // v29.19: permission-denied는 재시도해도 항상 실패 — 접속마다 에러 반복 방지 (ncr.html과 동일)
    if (e && e.code === 'permission-denied') localStorage.setItem(FLAG, '1');
  }
}
// v29.19: 동기화 확인 이력 영속화 (ncr.html과 동일) — 서버 존재가 확인된 적 있는 문서
// id를 localStorage에 기록해, 캐시에 남은 "삭제된 항목"이 로컬 전용으로 오인돼
// 부활하는 것을 방지한다.
const SYNCED_IDS_KEY = KEY + '__syncedIds';
let _syncedIdsDisk = {};
try { _syncedIdsDisk = JSON.parse(localStorage.getItem(SYNCED_IDS_KEY) || '{}'); } catch(e) { _syncedIdsDisk = {}; }
function markSyncedIds(coll, docs) {
  const set = new Set(_syncedIdsDisk[coll] || []);
  (docs || []).forEach(d => d && d.id && set.add(d.id));
  _syncedIdsDisk[coll] = [...set];
  try { localStorage.setItem(SYNCED_IDS_KEY, JSON.stringify(_syncedIdsDisk)); } catch(e) {}
}
function persistedSyncedObjs(coll) { return (_syncedIdsDisk[coll] || []).map(id => ({ id })); }

// v29.19: 자가 복구 — 서버에는 없고 이 브라우저 로컬 캐시에만 있는(서버 확인 이력도
// 없는) 항목을 첫 스냅샷 수신 직후 1회 자동 업로드 (ncr.html과 동일). 초기 'cars'
// 시절 규칙 거부로 클라우드 저장이 실패해 등록자 브라우저에만 남아있던 과거 CAR들이
// 이것으로 전사 공유된다.
const _repaired = {};
function repairLocalOnlyDocs(coll, arr, serverDocs) {
  if (_repaired[coll]) return;
  _repaired[coll] = true;
  const serverIds = new Set((serverDocs || []).map(d => d.id));
  const localOnly = (arr || []).filter(x => x && x.id && !serverIds.has(x.id));
  if (!localOnly.length) return;
  console.info(`[자가복구] ${coll}: 로컬 전용 ${localOnly.length}건 클라우드 업로드 시작`);
  syncArrayToFirestore(coll, arr);
}
async function startCarFirestoreSync() {
  if (!window.fb || !fb.db) { setTimeout(startCarFirestoreSync, 300); return; }
  // v29.9.1: 인증 복원 전 구독 → permission-denied → 리스너 영구 종료 방지 (ncr.html과 동일)
  if (!fb.auth || !fb.auth.currentUser) { setTimeout(startCarFirestoreSync, 400); return; }
  await Promise.all([
    migrateLegacyCollection('cars', 't_cars'),
    migrateLegacyCollection('carDeleteReqs', 't_carDeleteReqs'),
    migrateLegacyCollection('ncrs', 't_ncrs'),
  ]);
  subscribeCarsColl();
  subscribeNcrsRefColl();

  setTimeout(checkQdHandoff, 500);

// v29.20: 품질종합분석표 차트 클릭 핸드오프 수신 (ncr.html과 동일)
function checkQdHandoff() {
  try {

// v29.17 fix: 인증 확인 후에도 토큰 리프레시 타이밍 등으로 아주 드물게
// permission-denied가 한 번 나면 그 뒤론 재구독 없이 리스너가 영구히 죽어
// 특정 사용자만 실시간 동기화가 조용히 멈추는 사고가 있었다(ncr.html과 동일
// 원인). 에러가 나면 해당 구독만 몇 초 뒤 자동으로 다시 건다.
function subscribeCarsColl() {
  fb.onSnapshot(fb.collection(fb.db, 't_cars'), snap => {
    // v29.13.4: 첨부파일 조각 문서('chunk__'로 시작하는 id)를 같은 컬렉션에 저장하므로,
    // 실제 CAR 목록에 섞여 보이지 않도록 걸러낸다.
    const serverDocs = snap.docs.filter(d => !d.id.startsWith('chunk__')).map(d => ({ ...d.data(), id: d.id }));
    state.cars = mergeServerSnapshot(state.cars, serverDocs, (_lastSynced.t_cars||[]).concat(persistedSyncedObjs('t_cars')));
    _lastSynced.t_cars = JSON.parse(JSON.stringify(serverDocs));
    markSyncedIds('t_cars', serverDocs);
    repairLocalOnlyDocs('t_cars', state.cars, serverDocs);
    try { writeOwnedKeysToDisk(); } catch(e) {}
    render();
  }, e => { console.error('[cars 동기화 구독]', e); notifySyncError(`CAR 실시간 동기화 실패: ${e.message||e}`); setTimeout(subscribeCarsColl, 3000); });

    state.ncrs = snap.docs.filter(d => !d.id.startsWith('chunk__')).map(d => ({ ...d.data(), id: d.id })); // 읽기 전용(참조용) — 디스크엔 안 씀(NCR iframe 소유)
    render();

}
function subscribeCarDeleteReqsColl() {
  fb.onSnapshot(fb.collection(fb.db, 't_carDeleteReqs'), snap => {

    state.carDeleteReqs = mergeServerSnapshot(state.carDeleteReqs, serverDocs, (_lastSynced.t_carDeleteReqs||[]).concat(persistedSyncedObjs('t_carDeleteReqs')));
    _lastSynced.t_carDeleteReqs = JSON.parse(JSON.stringify(serverDocs));

function getP(id) { return (state.projects||[]).find(p => p.id === id) || {}; }

// v29.11 fix: 배열 길이(state.cars.length + 1) 기준 채번은 항목이 삭제되어 있거나
// 동기화 지연으로 배열이 잠깐 짧아지는 경우 기존 번호와 충돌해 서로 덮어쓰는 사고로
// 이어졌음. 실제 존재하는 최대 번호+1로 계산해 결번(삭제) 유무와 무관하게 항상
// 미사용 번호를 반환한다.
function nextCarNo(year) {
  const prefix = `CAR-${year}-`;
  const maxNum = (state.cars||[]).reduce((max, c) => {
    if (typeof c.id !== 'string' || !c.id.startsWith(prefix)) return max;
    const v = parseInt(c.id.slice(prefix.length), 10);
    return Number.isFinite(v) && v > max ? v : max;
  }, 0);
  return String(maxNum + 1).padStart(3, '0');
}

function _toBlobUrl(dataUrl) {
  const [header, b64] = dataUrl.split(',');
  const mime = header.match(/:(.*?);/)?.[1] || 'application/octet-stream';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return URL.createObjectURL(new Blob([arr], { type: mime }));
}

    <div class="card" style="padding:0;overflow:hidden;">

          <th>CAR No.</th><th>연계 NCR</th>
          <th>시정조치 내용</th><th>발생분야</th><th>원인</th><th>요구부서</th>

        <tbody>
          ${filtered.length ? filtered.map(c => {
            const st = CAR_STATUS[c.status] || CAR_STATUS['in-progress'];
            const overdue = c.replyDue && c.status==='in-progress' && c.replyDue < new Date().toISOString().slice(0,10);
            return `<tr>
              <td style="font-weight:700;font-size:11px;white-space:nowrap;">${c.id}</td>
              <td style="font-size:11px;color:var(--primary);">${c.ncrId||'<span style="color:var(--text-lighter);">단독</span>'}</td>
              <td style="font-size:12px;max-width:180px;">${c.action}</td>
              <td style="font-size:11px;">${c.field||'-'}</td>
              <td style="font-size:11px;">${c.cause||'-'}</td>
              <td style="font-size:12px;white-space:nowrap;">${_fmtDept(c.reqDept)}</td>
              <td style="font-size:11px;white-space:nowrap;">${c.issuedAt||'-'}</td>
              <td style="font-size:11px;white-space:nowrap;${overdue?'color:var(--danger);font-weight:700;':''}">${c.replyDue||'-'}</td>
              <td style="font-size:11px;white-space:nowrap;color:var(--primary);">${c.repliedAt||'-'}</td>
              <td style="font-size:11px;white-space:nowrap;color:var(--warning);">${c.actionAt||'-'}</td>
              <td style="font-size:11px;white-space:nowrap;color:var(--success);">${c.closedAt||'-'}</td>
              <td><span class="b-pill ${st[0]}">${st[1]}</span></td>
              <td style="white-space:nowrap;">
                <button class="org-ico-btn" onclick="openCARMgr('${c.id}')" title="상세/수정">📋</button>
                ${(c.meta?.fileChunkId || c.meta?.fileUrl || c.meta?.fileDataUrl) ? `<button class="org-ico-btn" onclick="viewCARFile('${c.id}')" title="파일 보기">📄</button>` : ''}
                ${(()=>{
                  // v29.10: CAR 삭제는 즉시 실행되지 않고 항상 24시간 대기 요청으로만 처리된다.
                  const pendingReq = (state.carDeleteReqs||[]).find(r => r.carId === c.id && r.status === 'pending');
                  if (pendingReq) {
                    const canCancel = pendingReq.requestedBy === state.currentUser || canDeleteCAR;
                    return `<span style="font-size:10px;color:var(--danger);white-space:nowrap;" title="${fmtCARRemain((pendingReq.scheduledDeleteAt||0) - Date.now())}">삭제대기</span>`
                      + (canCancel ? `<button class="org-ico-btn" onclick="cancelCARDelete('${pendingReq.id}')" title="삭제 요청 취소" style="color:var(--text-light);">↩</button>` : '');
                  }
                  if (canDeleteCAR || canRegisterCAR) return `<button class="org-ico-btn" onclick="requestCARDelete('${c.id}')" title="삭제 요청 (24시간 대기 후 삭제)" style="color:var(--danger);">🗑️</button>`;
                  return '';
                })()}
              </td>
            </tr>`;
          }).join('') : `<tr><td colspan="13" style="text-align:center;padding:30px;color:var(--text-light);">등록된 CAR이 없습니다</td></tr>`}
        </tbody>
      </table>
    </div>
  `;

  if (_prevFocusId) {
    const el = document.getElementById(_prevFocusId);
    if (el) { el.focus(); if (_prevCursor != null) try { el.setSelectionRange(_prevCursor, _prevCursor); } catch(e){} }
  }
}

/* ═══ CAR 발행 ═══ */
// v29.41: 프로젝트/고객명/도면번호/W.R No.는 등록 시 굳이 안 물어보도록 뺌
// (필요하면 CAR 관리 화면에서 나중에 채울 수 있음 — 스키마 자체는 유지).
// 시정조치 내용 한 칸이던 걸 요구내용 → 발생원인 → 조치내용 → 결과 순서로
// 4칸으로 늘림. 시정조치요구부서도 여러 부서에 동시 요청하는 경우가 많아
// 다중 선택(체크박스)으로 변경.
function openNewCAR() {
  openModal('+ CAR 발행', `
    <div class="fg">

    <div class="fg" style="display:flex;gap:8px;">
      <div style="flex:1;"><label class="fl">발생분야</label><select class="fs" id="carField">${_opts(CAR_FIELD)}</select></div>
      <div style="flex:1;"><label class="fl">원인</label><select class="fs" id="carCause">${_opts(CAR_CAUSE)}</select></div>
    </div>
    <div class="fg"><label class="fl">시정조치 요구내용</label><textarea class="fi" id="carReqContent" rows="2" placeholder="요구/지시된 사항을 기재하세요"></textarea></div>
    <div class="fg"><label class="fl">발생원인</label><textarea class="fi" id="carCauseDetail" rows="2" placeholder="원인을 구체적으로 기재하세요 (나중에 입력해도 됨)"></textarea></div>
    <div class="fg"><label class="fl">조치내용</label><textarea class="fi" id="carAction" rows="2" placeholder="시행한(할) 시정조치를 기재하세요 (나중에 입력해도 됨)"></textarea></div>
    <div class="fg"><label class="fl">결과</label><textarea class="fi" id="carResult" rows="2" placeholder="조치 결과 (나중에 입력해도 됨)"></textarea></div>
    <div class="fg">
      <label class="fl">시정조치요구부서 (여러 부서 선택 가능)</label>
      <div id="carReqDeptGrid">${_deptCheckboxGrid([])}</div>
    </div>
    <div class="fg"><label class="fl">회신기한</label><input class="fi" type="date" id="carReplyDue"></div>
  `, () => {
    const carNo       = document.getElementById('carNo').value.trim();
    const issuedAt    = document.getElementById('carIssuedAt').value;
    const qualReq     = document.getElementById('carQualReq').value;
    const field       = document.getElementById('carField').value;
    const cause       = document.getElementById('carCause').value;
    const reqContent  = document.getElementById('carReqContent').value.trim();
    const causeDetail = document.getElementById('carCauseDetail').value.trim();
    const action      = document.getElementById('carAction').value.trim();
    const result      = document.getElementById('carResult').value.trim();
    const reqDept     = _getCheckedDepts('carReqDeptGrid');
    const replyDue    = document.getElementById('carReplyDue').value;
    if (!state.cars) state.cars = [];
    const num = nextCarNo(new Date().getFullYear());
    const today = new Date().toISOString().slice(0,10);
    const id = carNo || `CAR-${new Date().getFullYear()}-${num}`;
    if ((state.cars||[]).some(c => c.id === id)) { alert(`CAR No. [${id}] 이미 존재합니다.`); return; }
    state.cars.push({
      id,
      ncrId: null, proj: '', action, reqContent, causeDetail, result, reqDept, status: 'in-progress',
      qualReq, field, cause,
      issuedAt: issuedAt || today,
      replyDue: replyDue || '',
      repliedAt: '', actionAt: '', closedAt: null,
      meta: { client: '', dwgNo: '', wrNo: '' }
    });
    save(); closeModal(); render();
  });
}

/* ═══ CAR 상세/수정 ═══ */
function openCARMgr(carId) {
  const c = (state.cars||[]).find(x => x.id === carId);
  if (!c) return;
  // v29.13 fix: 이전에 다른 CAR을 열어 파일을 골랐다가 저장하지 않고 닫으면(취소/X)
  // window._mgrCARUploadPromise가 안 지워진 채 남아, 다음에 아무 파일도 안 고른 이
  // CAR을 저장할 때도 그 stale 업로드를 기다리며 "업로드 중..."에 멈춰있는 것처럼
  // 보이는 버그가 있었음. 모달을 열 때마다 항상 초기화한다.
  window._mgrCARUploadPromise = null; window._mgrCARFileName = null;
  const st = CAR_STATUS[c.status] || CAR_STATUS['in-progress'];
  const p  = getP(c.proj);
  const projName = c.proj==='__direct__' ? (c.meta?.projDirect||'직접입력') : (p?.code ? `${p.code} ${p.name}` : '-');
  openModal(`📋 CAR 관리 — ${c.id}`, `
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <span class="b-pill ${st[0]}">${st[1]}</span>
      <span style="font-size:12px;color:var(--text-light);">${projName} · 발행일: ${c.issuedAt||'-'}</span>
    </div>
    <div class="fg"><label class="fl">연계 NCR No. <span style="font-size:11px;color:var(--text-light);">(단독 발행이면 비워두세요)</span></label><input class="fi" id="mgr-ncrId" value="${c.ncrId||''}" placeholder="예: SJ-NCR-2026-01"></div>
    <div class="fg" style="display:flex;gap:8px;">
      <div style="flex:1;"><label class="fl">고객명</label><input class="fi" id="mgr-client" value="${c.meta?.client||''}"></div>
      <div style="flex:1;"><label class="fl">발행일자</label><input class="fi" type="date" id="mgr-issuedAt" value="${c.issuedAt||''}"></div>
    </div>
    <div class="fg" style="display:flex;gap:8px;">
      <div style="flex:1;"><label class="fl">도면번호</label><input class="fi" id="mgr-dwg" value="${c.meta?.dwgNo||''}"></div>
      <div style="flex:1;"><label class="fl">W.R No.</label><input class="fi" id="mgr-wr" value="${c.meta?.wrNo||''}"></div>
    </div>
    <div class="fg"><label class="fl">품질요건</label><select class="fs" id="mgr-qualReq">${_opts(CAR_QUAL_REQ, c.qualReq||'')}</select></div>
    <div class="fg" style="display:flex;gap:8px;">
      <div style="flex:1;"><label class="fl">발생분야</label><select class="fs" id="mgr-field">${_opts(CAR_FIELD, c.field||'')}</select></div>
      <div style="flex:1;"><label class="fl">원인</label><select class="fs" id="mgr-cause">${_opts(CAR_CAUSE, c.cause||'')}</select></div>
    </div>
    <div class="fg"><label class="fl">시정조치 요구내용</label><textarea class="fi" id="mgr-reqContent" rows="2">${c.reqContent||''}</textarea></div>
    <div class="fg"><label class="fl">발생원인</label><textarea class="fi" id="mgr-causeDetail" rows="2">${c.causeDetail||''}</textarea></div>
    <div class="fg"><label class="fl">조치내용</label><textarea class="fi" id="mgr-action" rows="2">${c.action}</textarea></div>
    <div class="fg"><label class="fl">결과</label><textarea class="fi" id="mgr-result" rows="2">${c.result||''}</textarea></div>
    <div class="fg">
      <label class="fl">시정조치요구부서 (여러 부서 선택 가능)</label>
      <div id="mgr-reqDeptGrid">${_deptCheckboxGrid(c.reqDept||[])}</div>
    </div>
    <div class="fg"><label class="fl">회신기한</label><input class="fi" type="date" id="mgr-replyDue" value="${c.replyDue||''}"></div>
    <div class="fg" style="display:flex;gap:8px;">
      <div style="flex:1;"><label class="fl">회신일자</label><input class="fi" type="date" id="mgr-repliedAt" value="${c.repliedAt||''}"></div>
      <div style="flex:1;"><label class="fl">조치일자</label><input class="fi" type="date" id="mgr-actionAt" value="${c.actionAt||''}"></div>
    </div>
    <div class="fg">
      <label class="fl">상태</label>
      <select class="fs" id="mgr-status">
        <option value="in-progress" ${c.status==='in-progress'?'selected':''}>조치중</option>
        <option value="closed"      ${c.status==='closed'     ?'selected':''}>완료</option>
      </select>
    </div>
    <div class="fg">
      <label class="fl">종결일자 <span style="font-size:11px;color:var(--text-light);">(상태가 완료일 때 자동 입력)</span></label>
      <input class="fi" type="date" id="mgr-closed" value="${c.closedAt||''}">
    </div>
    <div class="fg">
      <label class="fl">첨부파일 업데이트</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <button type="button" class="btn btn-sm" onclick="document.getElementById('mgr-car-file-input').click()">📎 파일 선택</button>
        <span id="mgr-car-file-name" style="font-size:12px;color:var(--text-light);">${c.meta?.fileName||'없음'}</span>
        ${(c.meta?.fileChunkId || c.meta?.fileUrl || c.meta?.fileDataUrl) ? `<button type="button" class="btn btn-sm" onclick="viewCARFile('${c.id}')">📄 현재 파일 보기</button>` : ''}
      </div>
      <input type="file" id="mgr-car-file-input" accept=".pdf,.docx" style="display:none" onchange="(function(inp){
        const f=inp.files[0]; if(!f) return;
        window._mgrCARFileName=f.name; document.getElementById('mgr-car-file-name').textContent=f.name;
        window._mgrCARUploadPromise = startAttachmentUpload('car', f); // 파일 고른 즉시 백그라운드 업로드 시작(체감 대기시간 제거)
      })(this)">
    </div>
  `, async () => {
    // v29.13.5 fix: 입력값은 await 전에 미리 읽어두고, 실제 반영은 await 이후
    // "그 시점의" state.cars에서 다시 조회한 객체에 적용한다. 첨부파일 조각을
    // cars 컬렉션에 함께 저장하다 보니, 업로드 중 실시간 동기화가 state.cars
    // 배열을 통째로 새로 갈아끼우는 경우가 있어(mergeServerSnapshot), 모달을 열
    // 때 붙잡아둔 c 참조가 그 사이 배열에서 떨어져 나가(stale) 수정 내용이
    // 조용히 저장 안 되던(특히 파일) 버그가 있었음.
    const ncrIdVal     = document.getElementById('mgr-ncrId').value.trim();
    const actionVal    = document.getElementById('mgr-action').value.trim();
    const reqContentVal= document.getElementById('mgr-reqContent').value.trim();
    const causeDetailVal=document.getElementById('mgr-causeDetail').value.trim();
    const resultVal    = document.getElementById('mgr-result').value.trim();
    const reqDeptVal   = _getCheckedDepts('mgr-reqDeptGrid');
    const qualReqVal   = document.getElementById('mgr-qualReq').value;
    const fieldVal     = document.getElementById('mgr-field').value;
    const causeVal     = document.getElementById('mgr-cause').value;
    const issuedAtVal  = document.getElementById('mgr-issuedAt').value;
    const replyDueVal  = document.getElementById('mgr-replyDue').value;
    const repliedAtVal = document.getElementById('mgr-repliedAt').value;
    const actionAtVal  = document.getElementById('mgr-actionAt').value;
    const clientVal    = document.getElementById('mgr-client').value.trim();
    const dwgNoVal     = document.getElementById('mgr-dwg').value.trim();
    const wrNoVal      = document.getElementById('mgr-wr').value.trim();
    const newStatus    = document.getElementById('mgr-status').value;
    const closedAtVal  = document.getElementById('mgr-closed').value;

    let attach = { ok: true, chunkId: null, totalChunks: 0, name: null };
    if (window._mgrCARUploadPromise) {
      const btn = document.getElementById('modal-confirm');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ 업로드 중...'; }
      attach = await resolveAttachmentOrNull('car', window._mgrCARUploadPromise);
      if (btn) { btn.disabled = false; btn.textContent = '확인'; }
      if (!attach.ok) return;
    }

    const current = (state.cars||[]).find(x => x.id === carId);
    if (!current) { window._mgrCARUploadPromise = null; window._mgrCARFileName = null; closeModal(); render(); return; }
    // v29.44: 연계 NCR No.를 등록 후에도 고칠 수 있게 함(문서 파싱 오인식으로
    // 잘못된 번호가 연결된 채 저장되면 이전엔 수정할 방법이 없었음). NCR 쪽
    // carId 역참조도 함께 갱신 — car.html의 state.ncrs는 읽기 전용 참조라
    // save()가 안 건드리므로, closeCAR()와 동일하게 Firestore에 직접 반영한다.
    if (ncrIdVal !== (current.ncrId||'')) {
      const ncrWrites = [];
      if (current.ncrId) {
        const oldN = (state.ncrs||[]).find(x => x.id === current.ncrId);
        if (oldN && oldN.carId === current.id) { oldN.carId = null; ncrWrites.push([oldN.id, { carId: null }]); }
      }
      current.ncrId = ncrIdVal || null;
      if (current.ncrId) {
        const newN = (state.ncrs||[]).find(x => x.id === current.ncrId);
        if (newN && !newN.carId) { newN.carId = current.id; ncrWrites.push([newN.id, { carId: current.id }]); }
      }
      if (window.fb && fb.db) {
        for (const [ncrDocId, patch] of ncrWrites) {
          try { await fb.setDoc(fb.doc(fb.db, 't_ncrs', ncrDocId), patch, { merge: true }); }
          catch (e) { console.error('[연계 NCR 역참조 반영 실패]', e); }
        }
      }
    }
    current.action    = actionVal || current.action;
    current.reqContent  = reqContentVal;
    current.causeDetail = causeDetailVal;
    current.result       = resultVal;
    current.reqDept   = reqDeptVal;
    current.qualReq   = qualReqVal;
    current.field     = fieldVal;
    current.cause     = causeVal;
    current.issuedAt  = issuedAtVal || current.issuedAt;
    current.replyDue  = replyDueVal;
    current.repliedAt = repliedAtVal;
    current.actionAt  = actionAtVal;
    if (!current.meta) current.meta = {};
    current.meta.client = clientVal;
    current.meta.dwgNo  = dwgNoVal;
    current.meta.wrNo   = wrNoVal;
    if (newStatus === 'closed' && !current.closedAt) current.closedAt = closedAtVal || new Date().toISOString().slice(0,10);
    else if (newStatus !== 'closed') current.closedAt = closedAtVal || null;
    else current.closedAt = closedAtVal;
    current.status = newStatus;
    if (attach.chunkId) {
      current.meta.fileChunkId = attach.chunkId;
      current.meta.fileChunks = attach.totalChunks;
      current.meta.fileName = attach.name;
    }
    window._mgrCARUploadPromise = null; window._mgrCARFileName = null;
    save(); closeModal(); render();
  });
}

/* ═══ CAR 완료 처리 ═══ */
async function closeCAR(carId) {
  const c = (state.cars||[]).find(x => x.id === carId);
  if (!c) return;
  if (!confirm(`${carId}을(를) 완료 처리하시겠습니까?`)) return;
  c.status   = 'closed';
  c.closedAt = new Date().toISOString().slice(0,10);
  let ncrUpdated = null;
  if (c.ncrId) {
    const n = (state.ncrs||[]).find(x => x.id === c.ncrId);
    if (n && n.status !== 'closed' && confirm(`연계된 ${n.id}도 종결 처리할까요?`)) {
      n.status   = 'closed';
      n.closedAt = new Date().toISOString().slice(0,10);
      ncrUpdated = n;
    }
  }
  // v29.9 fix: CAR 모듈의 save()는 cars만 Firestore로 동기화하므로, 연계 NCR을 종결하는
  // 경우 그 변경도 명시적으로 서버에 반영해야 다른 사용자한테 보임.
  if (ncrUpdated && window.fb && fb.db) {
    try { await fb.setDoc(fb.doc(fb.db, 't_ncrs', ncrUpdated.id), { status: 'closed', closedAt: ncrUpdated.closedAt }, { merge: true }); }
    catch (e) { console.error('[NCR 종결 반영 실패]', e); }
  }
  save(); render();
}

// v29.12: Firestore 문서 하나의 최대 크기는 1MB라, 첨부파일을 meta.fileDataUrl에
// base64로 통째로 넣으면 조용히 저장 실패(콘솔에만 에러)해서 "등록 즉시 사라지는"
// 것처럼 보였음. → Firebase Storage 업로드로 전환했었으나, 사내 방화벽/보안 정책이
// Storage 요청 자체를 응답 없이 막는 환경이 있어(uploadBytes가 영원히 안 끝남,
// Firestore는 정상 동작 확인됨) v29.13.3에서 Storage를 완전히 걷어냄.
// v29.13.4 fix: 그 다음 시도한 별도 컬렉션(fileChunks)도 새 컬렉션이라 Firestore
// 보안 규칙에 허용 항목이 없어 똑같이 막혔을 가능성이 높음(Storage 때와 동일 패턴).
// 그래서 새 컬렉션을 아예 안 만들고, 이미 쓰기가 확실히 되는 'ncrs'/'cars' 컬렉션
// 자체에 조각 문서를 'chunk__'로 시작하는 id로 같이 저장한다. 목록 화면에 이 조각
// 문서가 섞여 보이지 않도록, 이 컬렉션을 구독하는 모든 곳(ncr.html/car.html의
// 각 onSnapshot, qa-dashboard.html)에서 id가 'chunk__'로 시작하는 문서는 걸러낸다.
const MAX_ATTACH_MB = 8; // 문서를 여러 개로 쪼개 저장하므로 널널하게 허용 (3MB 안팎 실사용 기준 여유)
const FILE_CHUNK_SIZE = 700 * 1024; // base64 기준 — Firestore 문서 1MB 제한 대비 여유 확보
const ATTACH_SAVE_TIMEOUT_MS = 20000;
function _timeoutAfter(ms, msg) {
  return new Promise((_, reject) => setTimeout(() => reject(new Error(msg)), ms));
}
function _readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('파일을 읽는 데 실패했습니다.'));
    r.readAsDataURL(file);
  });
}
function _attachCollFor(coll) { return coll === 'ncr' ? 't_ncrs' : 't_cars'; }
// 파일을 고른 직후 즉시 호출 — OCR/파싱 + 사용자가 내용 확인하는 시간과 겹치게 해서
// 등록 버튼을 누를 때는 체감 대기시간이 없게 한다.
function startAttachmentUpload(coll, file) {
  if (!file) return null;
  const p = (async () => {
    if (file.size > MAX_ATTACH_MB * 1024 * 1024) {
      throw new Error(`${MAX_ATTACH_MB}MB 이하 파일만 첨부할 수 있습니다 (현재 ${(file.size/1024/1024).toFixed(1)}MB)`);
    }
    const dataUrl = await _readAsDataURL(file);
    const chunkId = `chunk__${coll}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
    const totalChunks = Math.ceil(dataUrl.length / FILE_CHUNK_SIZE);
    const targetColl = _attachCollFor(coll);
    const jobs = [];
    for (let i = 0; i < totalChunks; i++) {
      const chunk = dataUrl.slice(i*FILE_CHUNK_SIZE, (i+1)*FILE_CHUNK_SIZE);
      jobs.push(fb.setDoc(fb.doc(fb.db, targetColl, `${chunkId}__${i}`), { chunkId, chunkIndex: i, totalChunks, data: chunk }));
    }
    // 사내 방화벽이 Firestore까지 막는 극단적인 경우에도 영원히 멈추지 않도록 시간제한.
    await Promise.race([Promise.all(jobs), _timeoutAfter(ATTACH_SAVE_TIMEOUT_MS, '저장 응답이 없습니다(20초 초과) — 사내 네트워크 문제일 수 있습니다.')]);
    return { chunkId, totalChunks, name: file.name };
  })();
  p.catch(() => {}); // 등록 버튼을 누르기 전(=아직 아무도 안 기다리는 동안) 실패해도 콘솔에 unhandled rejection 경고 안 뜨게. 실제 처리는 resolveAttachmentOrNull에서.
  return p;
}
async function resolveAttachmentOrNull(coll, uploadPromise) {
  if (!uploadPromise) return { ok: true, chunkId: null, totalChunks: 0, name: null };
  try {
    const { chunkId, totalChunks, name } = await uploadPromise;
    return { ok: true, chunkId, totalChunks, name };
  } catch (e) {
    console.error(`[${coll} 첨부파일 저장]`, e);
    const proceed = confirm(`첨부 파일 저장에 실패했습니다: ${e.message || e}\n파일 없이 저장하시겠습니까?\n(취소를 누르면 저장이 중단됩니다)`);
    return { ok: proceed, chunkId: null, totalChunks: 0, name: null };
  }
}
// 조각들을 모아 원본 데이터 URL로 재조립. coll('ncr'|'car')로 조각이 저장된 컬렉션을 찾는다.
async function loadAttachmentDataUrl(coll, chunkId, totalChunks) {
  const targetColl = _attachCollFor(coll);
  const jobs = [];
  for (let i = 0; i < totalChunks; i++) jobs.push(fb.getDoc(fb.doc(fb.db, targetColl, `${chunkId}__${i}`)));
  const snaps = await Promise.all(jobs);
  return snaps.map(s => s.data()?.data || '').join('');
}

/* ═══ 삭제 플로우 ═══ */
// v29.10: NCR/CAR 삭제는 즉시 실행되지 않는다 — 품질관리부가 삭제를 요청하면
// 24시간 삭제 대기 상태가 되고, 그 사이 품질관리부장이 조기승인(즉시삭제)하거나
// 반려(취소)할 수 있다. 아무 조치가 없으면 24시간 경과 후 자동으로 삭제된다.
const CAR_DELETE_WAIT_MS = 24 * 60 * 60 * 1000;

function requestCARDelete(carId) {
  openModal(`🗑️ CAR 삭제 요청 — ${carId}`, `
    <div style="font-size:12px;color:var(--text-light);margin-bottom:12px;">삭제 요청 후 24시간 동안 삭제 대기 상태가 되며, 그 사이 품질관리부장이 조기승인(즉시삭제) 또는 반려할 수 있습니다. 아무 조치가 없으면 24시간 후 자동 삭제됩니다.</div>
    <div class="fg"><label class="fl">삭제 사유</label><textarea class="fi" id="del-reason" rows="3" placeholder="삭제 사유를 입력하세요"></textarea></div>
  `, () => {
    const reason = document.getElementById('del-reason').value.trim();
    if (!reason) { alert('삭제 사유를 입력하세요.'); return; }
    if (!state.carDeleteReqs) state.carDeleteReqs = [];
    const now = Date.now();
    state.carDeleteReqs.push({ id: 'cdr'+now, carId, requestedBy: state.currentUser, requestedAt: new Date().toISOString().slice(0,10), scheduledDeleteAt: now + CAR_DELETE_WAIT_MS, reason, status: 'pending' });
    save(); closeModal(); render();
  });
}

// 요청 당사자 또는 품질관리부장이 대기 중인 삭제 요청을 취소(철회)한다.
function cancelCARDelete(reqId) {
  const req = (state.carDeleteReqs||[]).find(r => r.id === reqId);
  if (!req) return;
  req.status = 'cancelled';
  save(); render();
}

// 품질관리부장의 조기승인 — 24시간을 기다리지 않고 즉시 삭제를 확정한다.
function approveCARDelete(reqId) {
  const req = (state.carDeleteReqs||[]).find(r => r.id === reqId);
  if (!req || !confirm(`CAR [${req.carId}] 을 24시간 대기 없이 즉시 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
  state.cars = (state.cars||[]).filter(c => c.id !== req.carId);
  deleteFirestoreDoc('t_cars', req.carId);
  req.status = 'approved';
  save(); render();
}

function rejectCARDelete(reqId) {
  const req = (state.carDeleteReqs||[]).find(r => r.id === reqId);
  if (!req) return;
  req.status = 'rejected';
  save(); render();
}

// 대기 시간이 지난 삭제 요청을 자동으로 확정 삭제한다. render()마다, 그리고
// 주기적으로(setInterval) 호출되어 브라우저를 오래 열어둔 경우에도, 다음에
// 모듈을 열었을 때도 대기 시간이 지난 요청은 즉시 정리된다.
function finalizeExpiredCARDeletes() {
  const now = Date.now();
  let changed = false;
  (state.carDeleteReqs||[]).forEach(r => {
    if (r.status === 'pending' && r.scheduledDeleteAt && now >= r.scheduledDeleteAt) {
      state.cars = (state.cars||[]).filter(c => c.id !== r.carId);
      deleteFirestoreDoc('t_cars', r.carId);
      r.status = 'auto-deleted';
      changed = true;
    }
  });
  if (changed) save();
}

function fmtCARRemain(ms) {
  if (ms <= 0) return '곧 자동삭제';
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return `자동삭제까지 ${h}시간 ${m}분`;
}

async function viewCARFile(carId) {
  const c = (state.cars||[]).find(x => x.id === carId);
  if (c?.meta?.fileChunkId) {
    try {
      const dataUrl = await loadAttachmentDataUrl('car', c.meta.fileChunkId, c.meta.fileChunks || 0);
      if (!dataUrl) { alert('파일을 불러오지 못했습니다.'); return; }
      window.open(_toBlobUrl(dataUrl), '_blank');
    } catch (e) { alert('파일을 불러오는 데 실패했습니다: ' + (e.message || e)); }
    return;
  }
  if (c?.meta?.fileUrl) { window.open(c.meta.fileUrl, '_blank'); return; } // 구버전 레코드(Storage 방식) 호환
  if (c?.meta?.fileDataUrl) { window.open(_toBlobUrl(c.meta.fileDataUrl), '_blank'); return; } // 구버전 레코드(용량 제한 이전) 호환
  alert('저장된 파일이 없습니다.');
}

/* ═══ 차트 헬퍼 (NCR과 동일) ═══ */
function _count(arr, key) {
  return arr.reduce((acc, n) => { acc[n[key]] = (acc[n[key]]||0)+1; return acc; }, {});
}

// v29.43: 경향분석 차트를 클릭하면 그 값으로 상세목록을 필터링(드릴다운).
// 여러 차트에서 동시에 선택 가능 — 예: 발생분야=구매 이면서 상태=완료.
// 같은 값을 다시 클릭하면 해제.
let ctrDrill = {};
function _drillEsc(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}
function _htmlEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toggleCtrDrill(field, val) {
  if (ctrDrill[field] === val) delete ctrDrill[field];
  else ctrDrill[field] = val;
  renderCARTrend();
}
function clearCtrDrill() { ctrDrill = {}; renderCARTrend(); }
function _ctrDrillChips() {
  const LABELS = { qualReq:'품질요건', field:'발생분야', cause:'원인', status:'상태', ym:'월' };
  const keys = Object.keys(ctrDrill);
  if (!keys.length) return '';
  const chips = keys.map(k => {
    const val = k==='ym' ? (()=>{ const [y,m]=ctrDrill[k].split('-'); return `${y}년 ${parseInt(m)}월`; })() : _htmlEsc(ctrDrill[k]);
    return `<span class="ntr-filter-chip" onclick="toggleCtrDrill('${k}','${_drillEsc(ctrDrill[k])}')">${LABELS[k]||k}: ${val} ✕</span>`;
  }).join('');
  return `<div class="ntr-filter-row">${chips}<span class="ntr-filter-clear" onclick="clearCtrDrill()">전체 해제</span></div>`;
}

function _barSvg(entries, colors, onClickField) {
  if (!entries.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:#aaa;">데이터 없음</div>';
  const max = Math.max(...entries.map(e=>e[1]), 1);
  const n = entries.length;
  const W = 300, PL = 10, PR = 10, PT = 28, PB = n > 5 ? 60 : 38;
  const H = 170;
  const iW = W - PL - PR, iH = H - PT - PB;
  const gap = iW / n;
  const bW = Math.max(8, Math.min(40, Math.floor(gap * 0.55)));
  const rotate = n > 5;
  const bars = entries.map(([label, val], i) => {
    const bH = val === 0 ? 0 : Math.max(4, Math.round(val / max * iH));
    const cx = PL + Math.round(i * gap + gap / 2);
    const by = PT + iH - bH;
    const valY = by - 6;
    const lblY = H - PB + (rotate ? 4 : 14);
    const lbl = _htmlEsc(label.length > 7 ? label.slice(0, 6) + '…' : label);
    const anchor = rotate ? 'end' : 'middle';
    const selected = onClickField && ctrDrill[onClickField] === label;
    const gAttrs = onClickField ? ` style="cursor:pointer;" onclick="toggleCtrDrill('${onClickField}','${_drillEsc(label)}')"` : '';
    return `<g${gAttrs}>
      <rect x="${cx - bW/2}" y="${by}" width="${bW}" height="${bH}" rx="3" fill="${colors[i % colors.length]}"${selected?' stroke="#111" stroke-width="2.5"':''}/>
      <text x="${cx}" y="${valY}" text-anchor="middle" font-size="10" fill="#333">${val}</text>
      <text x="${cx}" y="${lblY}" text-anchor="${anchor}" font-size="9" fill="${selected?'#111':'#666'}" font-weight="${selected?'700':'400'}"${rotate ? ` transform="rotate(-40,${cx},${lblY})"` : ''}>${lbl}</text>
    </g>`;
  }).join('');
  return `<svg viewBox="-2 -4 ${W+4} ${H+8}" style="width:100%;max-width:400px;margin:0 auto;display:block;overflow:visible;">
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="#e0e0e0" stroke-width="1"/>
    ${bars}
  </svg>`;
}

function _donutSvg(entries, colors, onClickField) {
  if (!entries.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:#aaa;">데이터 없음</div>';
  const total = entries.reduce((s,[,v])=>s+v,0);
  if (!total) return '<div style="text-align:center;padding:20px;font-size:12px;color:#aaa;">데이터 없음</div>';
  const cx=75, cy=75, R=58, ri=34, mid_r=(R+ri)/2;
  const LX=148, rowH=20;
  const H=Math.max(160, entries.length*rowH+24);
  let angle=-Math.PI/2;
  const slices = entries.map(([label,val],i) => {
    const a=(val/total)*2*Math.PI;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    angle+=a;
    const x2=cx+R*Math.cos(angle), y2=cy+R*Math.sin(angle);
    const lg=a>Math.PI?1:0;
    const midA=angle-a/2;
    const tx=cx+mid_r*Math.cos(midA), ty=cy+mid_r*Math.sin(midA);
    const pct=Math.round(val/total*100);
    const selected = onClickField && ctrDrill[onClickField] === label;
    const gAttrs = onClickField ? ` style="cursor:pointer;" onclick="toggleCtrDrill('${onClickField}','${_drillEsc(label)}')"` : '';
    return `<g${gAttrs}><path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg} 1 ${x2.toFixed(1)},${y2.toFixed(1)} L${cx},${cy} Z" fill="${colors[i%colors.length]}"${selected?' stroke="#111" stroke-width="2"':''}/>
    ${a>0.4?`<text x="${tx.toFixed(1)}" y="${(ty+3.5).toFixed(1)}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">${pct}%</text>`:''}</g>`;
  });
  const legend = entries.map(([label,val],i) => {
    const lbl=_htmlEsc(label.length>8?label.slice(0,7)+'…':label);
    const selected = onClickField && ctrDrill[onClickField] === label;
    const gAttrs = onClickField ? ` style="cursor:pointer;" onclick="toggleCtrDrill('${onClickField}','${_drillEsc(label)}')"` : '';
    return `<g transform="translate(${LX},${(H-entries.length*rowH)/2+i*rowH})"${gAttrs}>
      <rect width="10" height="10" rx="2" fill="${colors[i%colors.length]}"${selected?' stroke="#111" stroke-width="1.5"':''}/>
      <text x="15" y="9" font-size="11" fill="${selected?'#111':'#444'}" font-weight="${selected?'700':'400'}">${lbl} (${val})</text>
    </g>`;
  });
  return `<svg viewBox="0 0 280 ${H}" style="width:100%;max-width:380px;margin:0 auto;display:block;overflow:visible;">
    <circle cx="${cx}" cy="${cy}" r="${R+1}" fill="#f5f5f5"/>
    ${slices.join('')}
    <circle cx="${cx}" cy="${cy}" r="${ri}" fill="#fff"/>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="13" fill="#444" font-weight="700">${total}</text>
    <text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="10" fill="#999">건</text>
    ${legend.join('')}
  </svg>`;
}

function _fillMonths(raw, yr) {
  const out={};
  if (yr) {
    for (let m=1;m<=12;m++) { const k=yr+'-'+String(m).padStart(2,'0'); out[k]=raw[k]||0; }
  } else {
    const ks=Object.keys(raw).sort();
    if (!ks.length) return out;
    let [y,m]=[parseInt(ks[0].slice(0,4)),parseInt(ks[0].slice(5))];
    const [ey,em]=[parseInt(ks[ks.length-1].slice(0,4)),parseInt(ks[ks.length-1].slice(5))];
    while (y<ey||(y===ey&&m<=em)) {
      const k=y+'-'+String(m).padStart(2,'0'); out[k]=raw[k]||0;
      m++; if(m>12){m=1;y++;}
    }
  }
  return out;
}

function _lineSvg(monthData, H=160, extraStyle='', onClickField) {
  const keys=Object.keys(monthData).sort();
  if (!keys.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:#aaa;">데이터 없음</div>';
  const vals=keys.map(k=>monthData[k]);
  const maxV=Math.max(...vals,1);
  const n=keys.length;
  const sameYr=new Set(keys.map(k=>k.slice(0,4))).size===1;
  const W=300,PL=40,PR=20,PT=30,PB=46;
  const iW=W-PL-PR,iH=H-PT-PB;
  const xs=n===1?[PL+Math.round(iW/2)]:keys.map((_,i)=>PL+Math.round(i/(n-1)*iW));
  const ys=vals.map(v=>PT+iH-Math.round(v/maxV*iH));
  const path=xs.map((x,i)=>`${i===0?'M':'L'}${x},${ys[i]}`).join(' ');
  const area=path+` L${xs[xs.length-1]},${PT+iH} L${xs[0]},${PT+iH} Z`;
  const BASE=H-PB;
  const pts=xs.map((x,i)=>{
    const lbl=sameYr?(parseInt(keys[i].slice(5))+'월'):keys[i].slice(2);
    const v=vals[i];
    const selected = onClickField && ctrDrill[onClickField] === keys[i];
    const clickable = onClickField && v > 0;
    const gAttrs = clickable ? ` style="cursor:pointer;" onclick="toggleCtrDrill('${onClickField}','${_drillEsc(keys[i])}')"` : '';
    return `<g${gAttrs}>
    ${clickable ? `<circle cx="${x}" cy="${ys[i]}" r="10" fill="transparent"/>` : ''}
    <circle cx="${x}" cy="${ys[i]}" r="${selected?5:3.5}" fill="#0369a1"${selected?' stroke="#111" stroke-width="1.5"':''}/>
    <text x="${x}" y="${BASE+13}" text-anchor="middle" font-size="8" fill="${selected?'#111':'#888'}" font-weight="${selected?'700':'400'}">${lbl}</text>
    <text x="${x}" y="${BASE+27}" text-anchor="middle" font-size="9" font-weight="${v>0?'700':'400'}" fill="${v>0?'#0369a1':'#bbb'}">(${v})</text>
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:760px;margin:0 auto;display:block;overflow:visible;${extraStyle}">
    <path d="${area}" fill="#0369a1" opacity="0.08"/>
    <path d="${path}" fill="none" stroke="#0369a1" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${BASE}" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="${PL}" y1="${BASE}" x2="${W-PR}" y2="${BASE}" stroke="#e0e0e0" stroke-width="1"/>
  </svg>`;
}

/* ═══ 경향분석 ═══ */
function openCARTrend() {
  loadState();
  ctrDrill = {};
  const cars = state.cars || [];
  const years = [...new Set(cars.map(c=>(c.issuedAt||'').slice(0,4)).filter(Boolean))].sort();
  const yrSel = document.getElementById('ctr-year');
  yrSel.innerHTML = '<option value="">전체 연도</option>' + years.map(y=>`<option value="${y}">${y}년</option>`).join('');
  const projs = [...new Set(cars.map(c=>c.proj))];
  const pSel = document.getElementById('ctr-proj');
  pSel.innerHTML = '<option value="">전체 프로젝트</option>' + projs.map(pid=>{
    const p=getP(pid); return p?.id?`<option value="${pid}">${p.code} ${p.name}</option>`:'';
  }).join('');
  document.getElementById('car-trend-modal').classList.add('open');
  renderCARTrend();
}

function closeCARTrend() { document.getElementById('car-trend-modal').classList.remove('open'); }

function _ctrFiltered() {
  const yr=document.getElementById('ctr-year')?.value||'';
  const mo=document.getElementById('ctr-month')?.value||'';
  const pj=document.getElementById('ctr-proj')?.value||'';
  return (state.cars||[]).filter(c=>{
    const d=c.issuedAt||'';
    if (yr && !d.startsWith(yr)) return false;
    if (mo && d.slice(5,7)!==mo.padStart(2,'0')) return false;
    if (pj && c.proj!==pj) return false;
    // 차트 클릭으로 선택한 드릴다운 필터(여러 개 동시 적용, AND 조건)
    if (ctrDrill.ym && !d.startsWith(ctrDrill.ym)) return false;
    if (ctrDrill.qualReq && c.qualReq !== ctrDrill.qualReq) return false;
    if (ctrDrill.field && c.field !== ctrDrill.field) return false;
    if (ctrDrill.cause && c.cause !== ctrDrill.cause) return false;
    if (ctrDrill.status && (CAR_STATUS[c.status]?.[1]||c.status) !== ctrDrill.status) return false;
    return true;
  });
}

/* ═══ 파일 등록 ═══ */
function loadPdfJs(cb) {
  if (window.pdfjsLib) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
  s.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'; cb(); };
  document.head.appendChild(s);
}
function loadMammoth(cb) {
  if (window.mammoth) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js';
  s.onload = cb;
  document.head.appendChild(s);
}

function handleCARFile(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  // 파일을 고른 즉시 Storage 업로드를 백그라운드로 시작 — OCR/파싱 + 사용자가
  // 내용 확인하는 시간과 겹치게 해서, 등록 버튼을 누를 때는 체감 대기시간이 없게 한다.
  const uploadPromise = startAttachmentUpload('car', file);
  const ext = file.name.split('.').pop().toLowerCase();
  const frDataUrl = new FileReader();
  frDataUrl.onload = evDU => {
    const fileDataUrl = evDU.target.result;
    const done = (text, ocrFailed, imgDataUrl) => {
      const parsed = parseCARText(text, file.name);
      parsed.ocrFailed = ocrFailed || false;
      parsed.imgDataUrl = imgDataUrl || null;
      parsed.fileDataUrl = fileDataUrl; // 등록 전 미리보기 전용(저장은 Storage 업로드로 처리)
      parsed.fileName = file.name;
      parsed.uploadPromise = uploadPromise;
      showCARParseModal(parsed);
    };
    if (ext === 'pdf') {
      loadPdfJs(() => extractPdfText(file, done));
    } else if (ext === 'docx') {
      loadMammoth(() => {
        const reader = new FileReader();
        reader.onload = e => window.mammoth.extractRawText({ arrayBuffer: e.target.result }).then(r => done(r.value, false));
        reader.readAsArrayBuffer(file);
      });
    } else {
      alert('PDF 또는 Word(.docx) 파일만 지원합니다.');
    }
  };
  frDataUrl.readAsDataURL(file);
}

async function extractPdfText(file, cb) {
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  if (text.replace(/\s+/g,'').length < 80) {
    await extractPdfOCR(file, cb);
  } else {
    cb(text);
  }
}

async function extractPdfOCR(file, cb) {
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2.5 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  const imgDataUrl = canvas.toDataURL('image/jpeg', 0.9);
  let ocrText = '';
  try {
    if (!window.Tesseract) {
      await new Promise((res,rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const worker = await Tesseract.createWorker('kor+eng', 1, {
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/worker.min.js',
      langPath: 'https://tessdata.projectnaptha.com/4.0.0',
      corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@4.0.4/tesseract-core-simd-lstm.wasm.js',
    });
    const result = await worker.recognize(canvas);
    await worker.terminate();
    ocrText = result.data.text || '';
  } catch(e) { ocrText = ''; }
  cb(ocrText, ocrText.replace(/\s+/g,'').length < 30, imgDataUrl);
}

// v29.40 fix: 문서 형식이 예상 라벨(콜론+정확한 위치)과 조금만 달라도 정규식이
// 아예 못 찾아서 거의 모든 항목이 "직접입력"으로만 남는 문제가 있었음 —
// 라벨 기반 탐색이 실패하면 문서 전체에서 패턴만으로 한 번 더 찾는 폴백을
// 추가하고, 드롭다운 항목(발생분야·원인·품질요건·시정조치요구부서)도 문서
// 안에 옵션 텍스트가 그대로 있으면 미리 선택해 둔다. 오탐이 있어도 빈 칸보다
// 추정값이 낫다는 전제(잘못되면 사용자가 확인 후 직접 고침).
function parseCARText(text, filename) {
  const cl = s => (s||'').replace(/\s+/g,' ').trim();
  const fname = (filename||'').replace(/\.[^.]+$/,'');
  // v29.42: 실제 사내 CAR 양식(SJ-QAF-1601-01)을 기준으로 라벨 위치를 정확히
  // 지정해서 뽑는다. "발행번호 26 - CAR - 001"처럼 2자리 연도-분리표기라
  // 기존 정규식(CAR-2026-001 형태 가정)으로는 아예 못 잡았었음.
  const carNoTpl = text.match(/발행\s*번호\s*[：:]?\s*(\d{2,4})\s*-\s*CAR\s*-\s*(\d+)/i);
  let carNo = '';
  if (carNoTpl) {
    const yy = carNoTpl[1].length === 2 ? '20'+carNoTpl[1] : carNoTpl[1];
    carNo = `CAR-${yy}-${carNoTpl[2].padStart(3,'0')}`;
  } else {
    carNo = text.match(/CAR\s*No\.?\s*[：:]?\s*([\w\-]+)/i)?.[1] ||
            text.match(/\b(CAR[-\s]?\d{2,4}[-\s]?\d{1,4})\b/i)?.[0]?.replace(/\s/g,'-') ||
            fname.match(/(CAR[-\s]?\d{4}[-\s]\d+)/i)?.[1]?.replace(/\s/g,'-') || '';
  }
  const ncrRef = text.match(/NCR\s*No\.?\s*[：:]?\s*([\w\-]+)/i)?.[1] ||
                 text.match(/\b(SJ-NCR-\d{4}-\d+|NCR[-\s]?\d{2,4}[-\s]?\d{1,4})\b/i)?.[0]?.replace(/\s/g,'-') || '';
  // "26.01.26"처럼 2자리 연도 날짜는, 라벨(발행일자/회신기한) 바로 뒤에서만
  // 인식한다 — 라벨 없이 문서 전체를 훑는 블라인드 폴백은 오탐 위험이 커서
  // 4자리 연도로만 제한.
  const normDate = d => {
    let [y,m,dd] = d.split(/[.\-\/]/);
    if (y.length === 2) y = '20'+y;
    if (m.length === 1) m = '0'+m;
    if (dd.length === 1) dd = '0'+dd;
    return `${y}-${m}-${dd}`;
  };
  const dateMatches = [...text.matchAll(/(\d{4}[.\-\/]\d{1,2}[.\-\/]\d{1,2})/g)].map(m=>m[1]);
  const dateRaw = text.match(/(?:발행일자|발행일|작성일|Issue\s*Date)[^0-9]{0,12}(\d{2,4}[.\-\/]\d{1,2}[.\-\/]\d{1,2})/i)?.[1] || dateMatches[0] || '';
  const issuedAt = dateRaw ? normDate(dateRaw) : '';
  const dueRaw  = text.match(/(?:회신\s*기한|회신\s*요청일|Reply\s*Due|Due\s*Date)[^0-9]{0,12}(\d{2,4}[.\-\/]\d{1,2}[.\-\/]\d{1,2})/i)?.[1] ||
                  dateMatches.find(d => normDate(d) !== issuedAt) || '';
  const replyDue = dueRaw ? normDate(dueRaw) : '';
  // 조치부서(생산부, 구매부처럼 복수)를 시정조치요구부서로 — 문서 전체를
  // 훑지 않고 "조치부서" 라벨 바로 뒤 구간에서만 부서명을 찾아 오탐을 막는다.
  const DEPT_LIST_ALL = ['영업부','기술부','구매부','생산부','품질관리부','현장시공','안전관리부','총무부','재무부'];
  const reqDeptLine = text.match(/조치\s*부서\s*[：:]?\s*([\s\S]+?)(?=발행구분|본\s*요구서|$)/i)?.[1] || '';
  const reqDept = reqDeptLine ? DEPT_LIST_ALL.filter(d => reqDeptLine.includes(d)) : [];
  // 품질위배사항 요구내용(요구자가 적는 문단) — 이 양식의 안내문구
  // "구체적으로 기술" 뒤부터 "작 성 자" 전까지가 실제 요구내용 문단.
  const reqContent = cl(
    text.match(/구체적으로\s*기술\s*([\s\S]+?)(?=작\s*성\s*자|발생원인|조치내용|$)/i)?.[1] ||
    text.match(/요구\s*내용[^\n]{0,40}?[：:]\s*([\s\S]+?)(?=작\s*성\s*자|발생원인|조치내용|$)/i)?.[1] || ''
  );
  // 발생원인/조치내용 칸 — 아직 미발행/미회신 문서는 이 칸들이 비어있는
  // 경우가 대부분이라(정상), 못 찾으면 그냥 빈 문자열(직접입력)로 둔다.
  const causeDetail = cl(text.match(/발생원인\s*([\s\S]*?)(?=조치\s*내용|작\s*성\s*자|$)/i)?.[1] || '');
  const action = cl(
    text.match(/조치\s*내용\s*([\s\S]*?)(?=작\s*성\s*자|조치\s*결과|확\s*인|$)/i)?.[1] ||
    text.match(/(?:시정조치|Corrective\s*Action)\s*(?:내용|Content)[^\n：:]{0,10}[：:]?\s*([\s\S]+?)(?=담당자|Assignee|회신기한|Reply\s*Due|Due\s*Date|$)/i)?.[1] || ''
  );
  // 조치결과 확인란의 검토의견 → 결과. 대부분 미기재 상태라 빈 값이 정상.
  const result = cl(text.match(/검토의견\s*[：:]?\s*([\s\S]*?)(?=검\s*토\s*자|부\s*서\s*장|$)/i)?.[1] || '');
  // 품질요건(18개 챕터명)은 문구가 충분히 구체적이라 문서 전체 검색이 안전.
  // 발생분야/원인 드롭다운은 옵션이 "관리"/"기타"처럼 짧아 무관한 텍스트에
  // 오탐(품질관리부→관리, 체크 안 된 "기타" 체크박스 등)이 잦았던 항목이라
  // 자동감지를 뺐다 — 항상 직접입력으로 두고 사용자가 고른다.
  const findOpt = opts => opts.find(o => text.includes(o)) || '';
  const qualReq = findOpt(CAR_QUAL_REQ);
  const field = '';
  const cause = '';
  return { carNo, ncrRef, issuedAt, replyDue, reqContent, causeDetail, action, result, qualReq, field, cause, reqDept };
}

// v29.41: 프로젝트/고객명/도면번호/W.R No.는 파싱 확인 화면에서도 안 물어봄
// (등록 폼과 동일하게 뺌 — 필요하면 CAR 관리 화면에서 나중에 채울 수 있음).
// 시정조치 내용 한 칸이던 걸 요구내용 → 발생원인 → 조치내용 → 결과 순서로
// 4칸으로 늘리고, 시정조치요구부서도 다중 선택(체크박스)으로 변경.
function showCARParseModal(p) {
  const badge = v => v ? '<span class="cpm-parse-badge found">자동감지</span>' : '<span class="cpm-parse-badge manual">직접입력</span>';
  const inpStyle = 'width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;';

  const filePanel = document.getElementById('car-parse-file');
  if (filePanel) {
    if (p.ocrFailed && p.imgDataUrl) {
      filePanel.innerHTML = `<div style="padding:6px 10px;background:#fff3e0;font-size:11px;color:#e65100;font-weight:600;flex-shrink:0;">⚠️ 스캔본 — OCR 인식 불가, 직접 입력하세요</div>
        <div class="cpm-left-img-wrap"><img src="${p.imgDataUrl}" style="width:100%;border-radius:4px;"></div>`;
    } else if (p.fileDataUrl?.startsWith('data:application/pdf')) {
      filePanel.innerHTML = `<iframe src="${_toBlobUrl(p.fileDataUrl)}" style="flex:1;border:none;width:100%;height:100%;"></iframe>`;
    } else if (p.fileDataUrl) {
      filePanel.innerHTML = `<div style="padding:12px;font-size:12px;color:var(--text-light);">📄 ${p.fileName||'파일'}</div>`;
    }
  }
  window._carParseFileDataUrl = p.fileDataUrl || null;
  window._carParseFileName    = p.fileName    || null;
  window._carParseUploadPromise = p.uploadPromise || null;

  document.getElementById('car-parse-modal').classList.add('open');
  document.getElementById('car-parse-body').innerHTML = `
    <div style="background:${p.ocrFailed?'#fff3e0':'#e8f5e9'};border-radius:8px;padding:8px 12px;font-size:12px;color:${p.ocrFailed?'#e65100':'#2e7d32'};font-weight:600;">
      ${p.ocrFailed?'⚠️ 스캔본 자동 인식 불가 — 직접 입력하세요':'✅ 문서 파싱 완료 — 확인 후 등록하세요'}
    </div>
    <div class="cpm-row">
      <div class="cpm-field"><label>CAR No. ${badge(p.carNo)}</label><input id="cp-carno" value="${p.carNo||''}" placeholder="예: CAR-2026-001"></div>
      <div class="cpm-field"><label>연계 NCR No. ${badge(p.ncrRef)}</label><input id="cp-ncrref" value="${p.ncrRef||''}" placeholder="예: NCR-2026-001"></div>
    </div>
    <div class="cpm-row">
      <div class="cpm-field"><label>발행일자 ${badge(p.issuedAt)}</label><input id="cp-date" type="date" value="${p.issuedAt||''}"></div>
      <div class="cpm-field"><label>회신기한 ${badge(p.replyDue)}</label><input id="cp-replyDue" type="date" value="${p.replyDue||''}"></div>
    </div>
    <div class="cpm-field"><label>품질요건 ${badge(p.qualReq)}</label><select id="cp-qualReq" style="${inpStyle}">${_opts(CAR_QUAL_REQ, p.qualReq)}</select></div>
    <div class="cpm-row">
      <div class="cpm-field"><label>발생분야 ${badge(p.field)}</label><select id="cp-field" style="${inpStyle}">${_opts(CAR_FIELD, p.field)}</select></div>
      <div class="cpm-field"><label>원인 ${badge(p.cause)}</label><select id="cp-cause" style="${inpStyle}">${_opts(CAR_CAUSE, p.cause)}</select></div>
    </div>
    <div class="cpm-field"><label>시정조치 요구내용 ${badge(p.reqContent)}</label><textarea id="cp-reqContent" rows="2" style="${inpStyle}resize:vertical;" placeholder="요구/지시된 사항을 기재하세요">${p.reqContent||''}</textarea></div>
    <div class="cpm-field"><label>발생원인 ${badge(p.causeDetail)}</label><textarea id="cp-causeDetail" rows="2" style="${inpStyle}resize:vertical;" placeholder="원인을 구체적으로 기재하세요 (나중에 입력해도 됨)">${p.causeDetail||''}</textarea></div>
    <div class="cpm-field"><label>조치내용 ${badge(p.action)}</label><textarea id="cp-action" rows="3" style="${inpStyle}min-height:60px;resize:vertical;" placeholder="시행한(할) 시정조치를 기재하세요 (나중에 입력해도 됨)">${p.action||''}</textarea></div>
    <div class="cpm-field"><label>결과 ${badge(p.result)}</label><textarea id="cp-result" rows="2" style="${inpStyle}resize:vertical;" placeholder="조치 결과 (나중에 입력해도 됨)">${p.result||''}</textarea></div>
    <div class="cpm-field">
      <label>시정조치요구부서 ${badge(p.reqDept?.length>0)} (여러 부서 선택 가능)</label>
      <div id="cp-reqDeptGrid">${_deptCheckboxGrid(p.reqDept||[])}</div>
    </div>
    <div class="cpm-field"><label>상태</label>
      <select id="cp-status" style="${inpStyle}">
        <option value="in-progress">조치중</option>
        <option value="closed">완료</option>
      </select>
    </div>
  `;
}

async function confirmCARParse() {
  const carNo    = document.getElementById('cp-carno').value.trim();
  const ncrRef   = document.getElementById('cp-ncrref').value.trim();
  const date     = document.getElementById('cp-date').value;
  const replyDue = document.getElementById('cp-replyDue').value;
  const reqDept  = _getCheckedDepts('cp-reqDeptGrid');
  const qualReq  = document.getElementById('cp-qualReq').value;
  const field    = document.getElementById('cp-field').value;
  const cause    = document.getElementById('cp-cause').value;
  const reqContent  = document.getElementById('cp-reqContent').value.trim();
  const causeDetail = document.getElementById('cp-causeDetail').value.trim();
  const action   = document.getElementById('cp-action').value.trim();
  const result   = document.getElementById('cp-result').value.trim();
  const status   = document.getElementById('cp-status').value;
  const today = new Date().toISOString().slice(0,10);
  const num = nextCarNo(new Date().getFullYear());
  const id = carNo || `CAR-${new Date().getFullYear()}-${num}`;
  if ((state.cars||[]).some(c => c.id === id)) {
    alert(`CAR No. [${id}] 가 이미 등록되어 있습니다.\nCAR No. 를 다르게 입력하세요.`); return;
  }
  const btn = document.getElementById('car-parse-confirm-btn');
  const uploadPromise = window._carParseUploadPromise || null;
  let attach = { ok: true, chunkId: null, totalChunks: 0, name: null };
  if (uploadPromise) {
    if (btn) { btn.disabled = true; btn.textContent = '⏳ 파일 저장 중...'; } // 대부분 이미 끝나있어 순간적으로만 보임
    attach = await resolveAttachmentOrNull('car', uploadPromise);
    if (btn) { btn.disabled = false; btn.textContent = '✅ CAR 등록'; }
  }
  if (!attach.ok) return;
  if (!state.cars) state.cars = [];
  const ncrId = ncrRef || null;
  state.cars.push({
    id, ncrId, proj: '', action, reqContent, causeDetail, result, reqDept, status,
    qualReq, field, cause,
    issuedAt: date || today,
    replyDue: replyDue || '',
    repliedAt: '', actionAt: '',
    closedAt: status === 'closed' ? today : null,
    meta: {
      client: '', dwgNo: '', wrNo: '',
      fileChunkId: attach.chunkId,
      fileChunks: attach.totalChunks,
      fileName: attach.name
    }
  });
  if (ncrId) {
    const n = (state.ncrs||[]).find(x => x.id === ncrId);
    if (n && !n.carId) n.carId = id;
  }
  window._carParseFileDataUrl = null;
  window._carParseFileName    = null;
  window._carParseUploadPromise = null;
  save(); closeCARParseModal(); render();
}

function closeCARParseModal() { document.getElementById('car-parse-modal').classList.remove('open'); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
// 클라우드 저장/구독 실패는 콘솔에만 남아 사용자가 원인을 알 방법이 없었다
// (보안 정책상 콘솔 접근이 막힌 환경도 있음) — 화면에 토스트로 보여준다.
// 재시도가 반복될 때 토스트가 계속 뜨지 않도록 1분에 한 번만 표시한다.
let _lastSyncErrorToastAt = 0;
function notifySyncError(msg){
  const now = Date.now();
  if (now - _lastSyncErrorToastAt < 60000) return;
  _lastSyncErrorToastAt = now;
  showToast('❌ '+msg);
}

/* ═══ 초기화 ═══ */
loadState();
render();
startCarFirestoreSync();
setInterval(finalizeExpiredCARDeletes, 60000);
</script>
